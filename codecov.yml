coverage:
  status:
    patch:
      default:
        # Minimum patch coverage required -- fails CI if new lines are under-tested.
        # Generated template files (*_templ.go) are excluded via the ignore list below.
        target: 78%
    project:
      # Per-package floors mirror testdata/coverage-floor.json exactly: every
      # entry in the JSON has a matching entry here, including aggregate
      # entries (e.g. `connection` for `internal/connection`) AND subpackage
      # entries (`connection_emby`, etc.). Codecov runs each as an independent
      # status check, so a regression in a single subpackage fails the
      # specific check rather than being averaged away by its better-covered
      # siblings. Update both files together when raising a floor with
      # `scripts/coverage-floor.sh --bump`.
      default:
        # Catch-all for any package not listed below.
        target: auto
        threshold: 2%
      api:
        target: 58%
        paths:
          - internal/api
      api_middleware:
        target: 86%
        paths:
          - internal/api/middleware
      artist:
        target: 83%
        paths:
          - internal/artist
      auth:
        target: 65%
        paths:
          - internal/auth
      backup:
