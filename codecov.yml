coverage:
  status:
    patch:
      default:
        # Minimum patch coverage required -- fails CI if new lines are under-tested.
        # Generated template files (*_templ.go) are excluded via the ignore list below.
        target: 70%

ignore:
  # Templ codegen output -- byte-for-byte compiler output, not hand-written.
  - "**/*_templ.go"
  # Application entrypoint wiring: run() bootstraps all services and starts the
  # HTTP server. It is not unit-testable without a full integration test harness.
  # All extracted helper functions (resetPasswordDB, getDBIntSetting, etc.) are
  # tested separately in cmd/stillwater/main_test.go.
  - "cmd/stillwater/main.go"
