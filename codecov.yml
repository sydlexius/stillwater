# NOTE ON codecov/patch TIMING -- do not "fix" this by adding after_n_builds.
#
# Codecov posts its commit status once `after_n_builds` uploads have arrived,
# and that key DEFAULTS TO 1. Setting it to 1 explicitly is a no-op; an earlier
# attempt to do exactly that changed nothing.
#
# The premature red 0% was caused by there being TWO uploaders, not by the
# threshold: bruno-ci.yml uploaded Bruno coverage minutes before ci.yml's merged
# Go profile, so the first upload to arrive carried almost no coverage of a Go
# diff. That upload has been removed, so this repo now performs AT MOST ONE
# upload and never more than one, and the default is correct.
#
# "At most one", not "exactly one": ci.yml's coverage-upload job is gated on
# `changes.outputs.code == 'true'` and a successful test job, so a docs-only or
# workflow-only PR produces ZERO uploads and no patch status at all. That is
# expected. Do not "fix" a missing status on a docs-only PR.
#
# Raising the value is NOT the fix if a second uploader is ever reintroduced:
# a conditional uploader makes the count variable (1 or 2), and a fixed
# after_n_builds: 2 would leave the status pending FOREVER on any run where the
# conditional upload is skipped -- worse than firing early. Keep the upload
# count deterministic instead.

flag_management:
  default_rules:
    carryforward: false

coverage:
  status:
    patch:
      default:
        # Minimum patch coverage required -- fails CI if new lines are under-tested.
        # Generated template files (*_templ.go) are excluded via the ignore list below.
        target: 78%
    project:
      # Per-package floors mirror testdata/coverage-floor.json exactly: every
      # entry in the JSON has a matching entry here, including aggregate
      # entries (e.g. `connection` for `internal/connection`) AND subpackage
      # entries (`connection_emby`, etc.). Codecov runs each as an independent
      # status check, so a regression in a single subpackage fails the
      # specific check rather than being averaged away by its better-covered
      # siblings. Update both files together when raising a floor with
      # `scripts/coverage-floor.sh --bump`. This mirror is enforced by
      # scripts/check-codecov-floor-mirror.sh (pre-push gate + CI's "Codecov
      # Floor Mirror" job, #2756) -- a divergence here now fails loudly
      # instead of sitting unnoticed.
      default:
        # Catch-all for any package not listed below.
        target: auto
        threshold: 2%
      api:
        target: 58%
        paths:
          - internal/api
      api_middleware:
        target: 86%
        paths:
          - internal/api/middleware
      artist:
