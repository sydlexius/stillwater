# Gate -- pre-push-gate.sh checks that have no CI equivalent in ci.yml.
#
# These checks are enforced by the local pre-push git hook. This workflow
# closes the bypass: a PR pushed without the hook still fails required status
# checks here before it can merge.
#
# Covers:
#   1. Generated-file freshness: templ + all doc generators.
#      The ci.yml lint job verifies *_templ.go but does NOT run the doc
#      generators (gen-provider-matrix, gen-env-reference, gen-rules-catalogue,
#      gen-settings-reference, gen-doc-anchors, gen-ci-reference).
#   2. Per-package coverage floor: enforces the one-way ratchet recorded in
#      testdata/coverage-floor.json.  ci.yml uploads to codecov but never
#      compares against the local floor file.
#   3. Fuzz matrix drift: verifies fuzz.yml matrix matches live Fuzz* funcs.
#      fuzz.yml runs the drift check only on a weekly schedule, not on PRs.
#   4. Bruno route parity: asserts every /api/v1 route in router.go is either
#      exercised by a Bruno request or recorded in api/bruno/parity-ignore.json.
#   5. Provider failure smoke: asserts every covered handler surface reports
#      provider failures explicitly instead of returning empty data.
#   6. Tool version drift: asserts the lint/spell tool versions pinned in the
#      bash hook, the pre-commit config, and the CI workflows all agree.
#
# Trigger design:
#   Runs unconditionally on every push to main and every PR targeting main
#   (no paths-filter gate on the workflow trigger).  GitHub treats a required
#   status check as FAILED when the check is absent -- only when the check
#   runs and exits 0 does it count as passing.  A paths-filter on the trigger
#   itself would mean docs-only or script-only PRs skip the check entirely,
#   which is the exact bypass this workflow closes.
#
#   dorny/paths-filter is used INSIDE each job only to skip expensive steps
#   that demonstrably cannot change the outcome.  The job itself always runs
#   and always emits a status.

name: Pre-Push Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Generated-file freshness
  #
  # Runs make generate (templ + tailwind) and all doc generators, then fails
  # on any uncommitted diff.  This catches:
  #   - stale *_templ.go from a wrong-version templ binary
  #   - stale provider matrix, env-var reference, rules catalogue, settings
  #     reference, or doc-anchors file after source changes
  #   - stale styles.css after input.css changes
  #
  # Always runs (no paths-filter guard) so the check is unconditionally
  # present on every PR and cannot be silently absent.
  # ---------------------------------------------------------------------------
  generated-files:
    name: Generated Files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # SHA verified against live tag via:
      #   gh api repos/actions/setup-go/git/ref/tags/v6 --jq '.object.sha'
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      # Install Tailwind CSS via the shared composite action (single source of
      # truth for version + SHA; see .github/actions/setup-tailwind).
      - uses: ./.github/actions/setup-tailwind

      - name: Regenerate templ
        run: go tool templ generate

      - name: Regenerate Tailwind CSS
        run: tailwindcss -i web/static/css/input.css -o web/static/css/styles.css --minify

      - name: Regenerate doc generators
        run: |
          go run ./cmd/gen-provider-matrix
          go run ./cmd/gen-env-reference
          go run ./cmd/gen-rules-catalogue
          go run ./cmd/gen-settings-reference
          go run ./cmd/gen-doc-anchors
          go run ./cmd/gen-ci-reference

      - name: Fail on stale generated files
        run: |
          # Mark untracked files intent-to-add so a brand-new generated
          # artifact (a first-time anchors file, a new matrix page) shows up
          # in git diff -- a plain 'git diff' only reports tracked files.
          git add -A -N
          dirty=$(git diff --name-only)
          if [ -n "$dirty" ]; then
            echo "FAIL: committed generated files are stale."
            echo ""
            echo "Stale files:"
            echo "$dirty" | awk '{print "  " $0}'
            echo ""
            echo "Fix: run 'make generate && make generate-docs' locally, then commit the results."
            {
              echo "## Generated Files -- FAILED"
              echo ""
              echo "Stale files (regenerate and commit):"
              echo '```'
              echo "$dirty"
              echo '```'
              echo ""
              echo "Fix:"
              echo '```'
              echo "make generate && make generate-docs"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "OK: all generated files are current."

  # ---------------------------------------------------------------------------
  # Per-package coverage floor (pass-through)
  #
  # Real enforcement has moved to the CI workflow (ci.yml Coverage Floor job),
  # which consumes the per-shard coverage artifacts uploaded by the test matrix
  # instead of re-running the full ./internal/... suite.
  #
  # This job is kept here solely to preserve the "Pre-Push Gate / Coverage Floor"
  # required-status-check entry.  It always runs and always emits a terminal
  # status without running go test.
  #
  # BRANCH PROTECTION NOTE: add "CI / Coverage Floor" as a required status check
  # in addition to (or replacing) this one so the enforcement in ci.yml is
  # actually gated.  See docs/pr-workflow.md.
  # ---------------------------------------------------------------------------
  coverage-floor:
    name: Coverage Floor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            go:
              - '.github/workflows/gate.yml'
              - '.github/workflows/ci.yml'
              - 'scripts/coverage-floor.sh'
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'testdata/coverage-floor.json'

      - name: Coverage floor enforced by CI workflow
        if: steps.filter.outputs.go == 'true'
        run: echo "Coverage floor enforcement runs in the CI workflow (Coverage Floor job); see that check for results."

      - name: Skip (no Go changes)
        if: steps.filter.outputs.go != 'true'
        run: echo "No Go source changes detected; coverage floor check skipped."

  # ---------------------------------------------------------------------------
  # Fuzz matrix drift
  #
  # Replicates the '=== Fuzz matrix drift check ===' step in
  # scripts/pre-push-gate.sh.  fuzz.yml runs the same check but only on a
  # weekly schedule, not on PRs.
  #
  # Uses dorny/paths-filter to limit the check to PRs that touch Go source
  # or the fuzz workflow itself.  The job always runs and always emits a
  # terminal status.
  # ---------------------------------------------------------------------------
  fuzz-matrix-drift:
    name: Fuzz Matrix Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            relevant:
              - '**/*.go'
              - '.github/workflows/fuzz.yml'

      - name: Check fuzz matrix is current
        if: steps.filter.outputs.relevant == 'true'
        run: |
          live_file="$(mktemp)"
          matrix_file="$(mktemp)"
          trap 'rm -f "$live_file" "$matrix_file"' EXIT

          grep -RhoE --include='*.go' '^func Fuzz[A-Za-z0-9_]+' internal/ \
            | awk '{print $2}' | sort -u > "$live_file"
          grep -Eo 'fuzz_func:[[:space:]]*"?Fuzz[A-Za-z0-9_]+' .github/workflows/fuzz.yml \
            | sed -E 's/.*(Fuzz[A-Za-z0-9_]+).*/\1/' | sort -u > "$matrix_file"

          missing=$(comm -23 "$live_file" "$matrix_file")
          extra=$(comm -13 "$live_file" "$matrix_file")
          if [ -n "$missing$extra" ]; then
            echo "FAIL: fuzz matrix is out of sync with internal/ Fuzz* functions."
            if [ -n "$missing" ]; then
              echo "Missing in fuzz.yml matrix (add these):"
              echo "$missing" | awk '{print "  " $0}'
            fi
            if [ -n "$extra" ]; then
              echo "Extra in fuzz.yml matrix (no matching live target):"
              echo "$extra" | awk '{print "  " $0}'
            fi
            {
              echo "## Fuzz Matrix Drift -- FAILED"
              echo ""
              echo "The fuzz.yml matrix is out of sync with Fuzz* functions in \`internal/\`."
              echo "Update \`.github/workflows/fuzz.yml\` matrix entries to match."
              if [ -n "$missing" ]; then
                echo ""
                echo "Missing from fuzz.yml (add these):"
                echo '```'
                echo "$missing"
                echo '```'
              fi
              if [ -n "$extra" ]; then
                echo ""
                echo "Extra in fuzz.yml (no matching live target -- remove these):"
                echo '```'
                echo "$extra"
                echo '```'
              fi
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "OK: $(wc -l < "$live_file" | tr -d ' ') fuzz targets, matrix set matches."

      - name: Skip (no relevant changes)
        if: steps.filter.outputs.relevant != 'true'
        run: echo "No Go source or fuzz workflow changes; drift check skipped."

  # ---------------------------------------------------------------------------
  # Bruno route parity
  #
  # Replicates the '=== Bruno route parity check ===' step in
  # scripts/pre-push-gate.sh.  Verifies every /api/v1 route registered in
  # internal/api/router.go is either exercised by a Bruno request
  # (api/bruno/**/*.bru) or explicitly recorded in api/bruno/parity-ignore.json
  # -- catching a new API endpoint shipped without an accompanying Bruno smoke
  # request.  Pure shell, so no Go toolchain is needed.
  #
  # Uses dorny/paths-filter to limit the check to PRs that touch the router,
  # the Bruno collection, or the parity script.  The job always runs and
  # always emits a terminal status.
  # ---------------------------------------------------------------------------
  bruno-parity:
    name: Bruno Route Parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            relevant:
              - 'internal/api/router.go'
              - 'api/bruno/**'
              - 'scripts/check-bruno-parity.sh'
              - 'scripts/pre-push-gate.sh'
              - '.github/workflows/gate.yml'

      - name: Check Bruno route parity
        if: steps.filter.outputs.relevant == 'true'
        run: bash scripts/check-bruno-parity.sh

      - name: Skip (no relevant changes)
        if: steps.filter.outputs.relevant != 'true'
        run: echo "No router, Bruno, or parity-script changes; route parity check skipped."

  # ---------------------------------------------------------------------------
  # Provider failure smoke test
  #
  # Replicates the '=== Provider failure smoke test ===' step in
  # scripts/pre-push-gate.sh.  Builds the binary, starts a temporary instance
  # with SW_FORCE_PROVIDER_ERROR set to all known providers, and asserts that
  # every covered handler surface communicates the failure explicitly.
  #
  # Uses dorny/paths-filter to skip on PRs that touch no Go source or smoke
  # scripts; the job itself always runs and always emits a terminal status.
  # ---------------------------------------------------------------------------
  provider-failure-smoke:
    name: Provider Failure Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            relevant:
              - '**/*.go'
              - 'scripts/smoke-provider-failure.sh'
              - 'scripts/pre-push-gate.sh'
              - '.github/workflows/gate.yml'
              - 'go.mod'
              - 'go.sum'

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        if: steps.filter.outputs.relevant == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - uses: ./.github/actions/setup-tailwind
        if: steps.filter.outputs.relevant == 'true'

      - name: Run provider failure smoke test
        if: steps.filter.outputs.relevant == 'true'
        run: bash scripts/smoke-provider-failure.sh

      - name: Skip (no relevant changes)
        if: steps.filter.outputs.relevant != 'true'
        run: echo "No Go source or smoke script changes; provider failure smoke skipped."

  # ---------------------------------------------------------------------------
  # Tool version drift
  #
  # Replicates the '=== Tool version drift ===' step in
  # scripts/pre-push-gate.sh.  Asserts the lint/spell tool versions pinned
  # independently in .githooks/pre-commit, .pre-commit-config.yaml, ci.yml,
  # and docs.yml all agree.  A grep-only check, so no Go toolchain is needed;
  # always runs and always emits a terminal status.
  # ---------------------------------------------------------------------------
  tool-versions:
    name: Tool Version Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check tool version alignment
        run: |
          output=$(bash scripts/check-tool-versions.sh 2>&1) || {
            echo "$output"
            {
              echo "## Tool Version Drift -- FAILED"
              echo ""
              echo "Tool version pins are mismatched across config files. Fix locally:"
              echo '```'
              echo "make sync-tool-versions"
              echo '```'
              echo ""
              echo "Drift details:"
              echo '```'
              echo "$output"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
          echo "$output"
