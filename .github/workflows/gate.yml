# Gate -- pre-push-gate.sh checks that have no CI equivalent in ci.yml.
#
# These checks are enforced by the local pre-push git hook. This workflow
# closes the bypass: a PR pushed without the hook still fails required status
# checks here before it can merge.
#
# Covers:
#   1. Generated-file freshness: templ + all doc generators.
#      The ci.yml lint job verifies *_templ.go but does NOT run the doc
#      generators (gen-provider-matrix, gen-env-reference, gen-rules-catalogue,
#      gen-settings-reference, gen-doc-anchors, gen-ci-reference).
#   2. Per-package coverage floor: enforces the one-way ratchet recorded in
#      testdata/coverage-floor.json.  ci.yml uploads to codecov but never
#      compares against the local floor file.
#   3. Fuzz matrix drift: verifies fuzz.yml matrix matches live Fuzz* funcs.
#      fuzz.yml runs the drift check only on a weekly schedule, not on PRs.
#   4. Bruno route parity: asserts every /api/v1 route in router.go is either
#      exercised by a Bruno request or recorded in api/bruno/parity-ignore.json.
#   5. Provider failure smoke: asserts every covered handler surface reports
#      provider failures explicitly instead of returning empty data.
#   6. Tool version drift: asserts the lint/spell tool versions pinned in the
#      bash hook, the pre-commit config, and the CI workflows all agree.
#
# Trigger design:
#   Runs unconditionally on every push to main and every PR targeting main
#   (no paths-filter gate on the workflow trigger).  GitHub treats a required
#   status check as FAILED when the check is absent -- only when the check
#   runs and exits 0 does it count as passing.  A paths-filter on the trigger
#   itself would mean docs-only or script-only PRs skip the check entirely,
#   which is the exact bypass this workflow closes.
#
#   dorny/paths-filter is used INSIDE each job only to skip expensive steps
#   that demonstrably cannot change the outcome.  The job itself always runs
#   and always emits a status.

name: Pre-Push Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Generated-file freshness
  #
  # Runs make generate (templ + tailwind) and all doc generators, then fails
  # on any uncommitted diff.  This catches:
  #   - stale *_templ.go from a wrong-version templ binary
  #   - stale provider matrix, env-var reference, rules catalogue, settings
  #     reference, or doc-anchors file after source changes
  #   - stale styles.css after input.css changes
  #
  # NOT a required status check (verified live, #2445). Job always runs (so a
  # future promotion to required needs no wrapper change); the actual
  # regenerate-and-diff steps are gated on the `relevant` filter below, which
  # unions every input the eleven generators + templ + tailwind read: all Go
  # source (struct tags the generators reflect over), .templ files, the
  # generators' own source and the Makefile they and gen-make-reference
  # parse, the i18n locale JSON gen-settings-reference reads, the SQL
  # migration gen-platform-profiles reads, ci.yml (gen-ci-reference's input),
  # the docs tree gen-doc-anchors walks, the setup-tailwind composite action
  # (pins the version gen-tailwind builds against), and the CSS gen-tailwind
  # builds. A filter entry must be the generator's actual input path, not the
  # workflow file the check happens to live in (#2445 -- see BLOCKING-1/3 in
  # the review that caught this). This workflow only triggers on
  # push/pull_request (no schedule/workflow_dispatch), both of which
  # dorny/paths-filter can always diff, so there is no ambiguous-trigger case
  # to fail closed on here.
  # ---------------------------------------------------------------------------
  generated-files:
    name: Generated Files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Needed to diff against the PR base / previous push commit below.
          fetch-depth: 0

      - name: Check relevant paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            relevant:
              - '**/*.go'
              - '**/*.templ'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'internal/i18n/locales/**'
              - 'internal/database/migrations/**'
              - 'docs/site/src/**'
              - 'web/static/css/**'
              # gate.yml and ci.yml are listed here deliberately, not as an
              # instance of the "workflow file the check happens to live in"
              # anti-pattern called out above: gate.yml is this job's own
              # regenerate-and-diff logic (a change to it can change what
              # this check does), and ci.yml is gen-ci-reference's actual
              # generator input (see line 69). Both are genuine inputs, not
              # filler.
              - '.github/workflows/gate.yml'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-tailwind/**'

      # SHA verified against live tag via:
      #   gh api repos/actions/setup-go/git/ref/tags/v6 --jq '.object.sha'
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        if: steps.filter.outputs.relevant == 'true'
        with:
          go-version-file: go.mod
          cache: true

      # Install Tailwind CSS via the shared composite action (single source of
      # truth for version + SHA; see .github/actions/setup-tailwind).
      - uses: ./.github/actions/setup-tailwind
        if: steps.filter.outputs.relevant == 'true'

      - name: Regenerate templ
        if: steps.filter.outputs.relevant == 'true'
        run: go tool templ generate

      - name: Regenerate Tailwind CSS
        if: steps.filter.outputs.relevant == 'true'
        run: tailwindcss -i web/static/css/input.css -o web/static/css/styles.css --minify

      - name: Regenerate doc generators
        # Must stay in lockstep with scripts/check-generated.sh: that script
        # (run by the local pre-push hook) regenerates all generators, but CI
        # only re-ran six, so a contributor without the hook could land stale
        # gen-cli-reference / gen-envelope-changelog / gen-make-reference /
        # gen-platform-profiles / gen-prefs-reference output past required
        # checks (#2009 #3 -- the audit said 3 missing; two more were added to
        # check-generated.sh since, so it is 5). Keep this list == the
        # generators in check-generated.sh.
        if: steps.filter.outputs.relevant == 'true'
        run: |
          go run ./cmd/gen-provider-matrix
          go run ./cmd/gen-env-reference
          go run ./cmd/gen-rules-catalogue
          go run ./cmd/gen-settings-reference
          go run ./cmd/gen-doc-anchors
          go run ./cmd/gen-ci-reference
          go run ./cmd/gen-cli-reference
          go run ./cmd/gen-envelope-changelog
          go run ./cmd/gen-make-reference
          go run ./cmd/gen-platform-profiles
          go run ./cmd/gen-prefs-reference

      - name: Fail on stale generated files
        if: steps.filter.outputs.relevant == 'true'
        run: |
          # Mark untracked files intent-to-add so a brand-new generated
          # artifact (a first-time anchors file, a new matrix page) shows up
          # in git diff -- a plain 'git diff' only reports tracked files.
          git add -A -N
          dirty=$(git diff --name-only)
          if [ -n "$dirty" ]; then
            echo "FAIL: committed generated files are stale."
            echo ""
            echo "Stale files:"
            echo "$dirty" | awk '{print "  " $0}'
            echo ""
            echo "Fix: run 'make generate && make generate-docs' locally, then commit the results."
            {
              echo "## Generated Files -- FAILED"
              echo ""
              echo "Stale files (regenerate and commit):"
              echo '```'
              echo "$dirty"
              echo '```'
              echo ""
              echo "Fix:"
              echo '```'
              echo "make generate && make generate-docs"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "OK: all generated files are current."

      - name: Skip (no generator-relevant changes)
        if: steps.filter.outputs.relevant != 'true'
        run: echo "No Go/templ/docs/CSS/generator-input changes; generated-file regeneration skipped."

  # ---------------------------------------------------------------------------
  # Per-package coverage floor (pass-through, informational only)
  #
  # Real enforcement lives in the CI workflow (ci.yml's `coverage-floor` +
  # `coverage-floor-summary` jobs, the latter owning the required "Coverage
  # Floor" check name), which consumes the per-shard coverage artifacts
  # uploaded by the test matrix instead of re-running the full
  # ./internal/... suite.
  #
  # RENAMED from "Coverage Floor" (#2445): this job and ci.yml's
  # coverage-floor-summary used to emit two check runs with the identical
  # name "Coverage Floor". GitHub's required-status-check matching is by bare
  # check name, not workflow-qualified, so branch protection's single
  # "Coverage Floor" requirement was satisfied by whichever of the two
  # reported success -- including this pass-through placeholder, which never
  # actually enforces anything. A superseded/cancelled run of one of the two
  # same-named checks already false-blocked two PRs' merge oracle. Renaming
  # this (non-enforcing) job removes it as a second emitter of that name;
  # ci.yml's coverage-floor-summary remains the SOLE job named "Coverage
  # Floor", so it alone satisfies the existing branch-protection requirement.
  # NO branch-protection change is needed: the required check's name is
  # unchanged, only the duplicate producer is removed.
  # ---------------------------------------------------------------------------
  coverage-floor:
    name: Coverage Floor (Gate Pointer)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Needed to diff against the PR base / previous push commit below.
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '.github/workflows/gate.yml'
              - '.github/workflows/ci.yml'
              - 'scripts/coverage-floor.sh'
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'testdata/coverage-floor.json'

      - name: Coverage floor enforced by CI workflow
        if: steps.filter.outputs.go == 'true'
        run: echo "Coverage floor enforcement runs in the CI workflow (Coverage Floor job); see that check for results."

      - name: Skip (no Go changes)
        if: steps.filter.outputs.go != 'true'
        run: echo "No Go source changes detected; coverage floor check skipped."

  # ---------------------------------------------------------------------------
  # Fuzz matrix drift
  #
  # Replicates the '=== Fuzz matrix drift check ===' step in
  # scripts/pre-push-gate.sh.  fuzz.yml runs the same check but only on a
  # weekly schedule, not on PRs.
  #
  # Uses dorny/paths-filter to limit the check to PRs that touch Go source
  # or the fuzz workflow itself.  The job always runs and always emits a
  # terminal status.
  # ---------------------------------------------------------------------------
  fuzz-matrix-drift:
    name: Fuzz Matrix Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Needed to diff against the PR base / previous push commit below.
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            relevant:
              - '**/*.go'
              - '.github/workflows/fuzz.yml'

      - name: Check fuzz matrix is current
        if: steps.filter.outputs.relevant == 'true'
        run: |
          live_file="$(mktemp)"
          matrix_file="$(mktemp)"
          trap 'rm -f "$live_file" "$matrix_file"' EXIT

          grep -RhoE --include='*.go' '^func Fuzz[A-Za-z0-9_]+' internal/ \
            | awk '{print $2}' | sort -u > "$live_file"
          grep -Eo 'fuzz_func:[[:space:]]*"?Fuzz[A-Za-z0-9_]+' .github/workflows/fuzz.yml \
            | sed -E 's/.*(Fuzz[A-Za-z0-9_]+).*/\1/' | sort -u > "$matrix_file"

          missing=$(comm -23 "$live_file" "$matrix_file")
          extra=$(comm -13 "$live_file" "$matrix_file")
          if [ -n "$missing$extra" ]; then
            echo "FAIL: fuzz matrix is out of sync with internal/ Fuzz* functions."
            if [ -n "$missing" ]; then
              echo "Missing in fuzz.yml matrix (add these):"
              echo "$missing" | awk '{print "  " $0}'
            fi
            if [ -n "$extra" ]; then
              echo "Extra in fuzz.yml matrix (no matching live target):"
              echo "$extra" | awk '{print "  " $0}'
            fi
            {
              echo "## Fuzz Matrix Drift -- FAILED"
              echo ""
              echo "The fuzz.yml matrix is out of sync with Fuzz* functions in \`internal/\`."
              echo "Update \`.github/workflows/fuzz.yml\` matrix entries to match."
              if [ -n "$missing" ]; then
                echo ""
                echo "Missing from fuzz.yml (add these):"
                echo '```'
                echo "$missing"
                echo '```'
              fi
              if [ -n "$extra" ]; then
                echo ""
                echo "Extra in fuzz.yml (no matching live target -- remove these):"
                echo '```'
                echo "$extra"
                echo '```'
              fi
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "OK: $(wc -l < "$live_file" | tr -d ' ') fuzz targets, matrix set matches."

      - name: Skip (no relevant changes)
        if: steps.filter.outputs.relevant != 'true'
        run: echo "No Go source or fuzz workflow changes; drift check skipped."

  # ---------------------------------------------------------------------------
  # Bruno route parity
  #
  # Replicates the '=== Bruno route parity check ===' step in
  # scripts/pre-push-gate.sh.  Verifies every /api/v1 route registered in
  # internal/api/router.go is either exercised by a Bruno request
  # (api/bruno/**/*.bru) or explicitly recorded in api/bruno/parity-ignore.json
  # -- catching a new API endpoint shipped without an accompanying Bruno smoke
  # request.  Pure shell, so no Go toolchain is needed.
  #
  # Uses dorny/paths-filter to limit the check to PRs that touch the router,
  # the Bruno collection, or the parity script.  The job always runs and
  # always emits a terminal status.
  # ---------------------------------------------------------------------------
  bruno-parity:
    name: Bruno Route Parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Needed to diff against the PR base / previous push commit below.
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            relevant:
              - 'internal/api/router.go'
              - 'api/bruno/**'
              - 'scripts/check-bruno-parity.sh'
              - 'scripts/pre-push-gate.sh'
              - '.github/workflows/gate.yml'

      - name: Check Bruno route parity
        if: steps.filter.outputs.relevant == 'true'
        run: bash scripts/check-bruno-parity.sh

      - name: Skip (no relevant changes)
        if: steps.filter.outputs.relevant != 'true'
        run: echo "No router, Bruno, or parity-script changes; route parity check skipped."

  # ---------------------------------------------------------------------------
  # Provider failure smoke test
  #
  # Replicates the '=== Provider failure smoke test ===' step in
  # scripts/pre-push-gate.sh.  Builds the binary, starts a temporary instance
  # with SW_FORCE_PROVIDER_ERROR set to all known providers, and asserts that
  # every covered handler surface communicates the failure explicitly.
  #
  # Uses dorny/paths-filter to skip on PRs that touch no Go source or smoke
  # scripts; the job itself always runs and always emits a terminal status.
  # ---------------------------------------------------------------------------
  provider-failure-smoke:
    name: Provider Failure Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Needed to diff against the PR base / previous push commit below.
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            relevant:
              - '**/*.go'
              - 'scripts/smoke-provider-failure.sh'
              - 'scripts/pre-push-gate.sh'
              - '.github/workflows/gate.yml'
              - 'go.mod'
              - 'go.sum'

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        if: steps.filter.outputs.relevant == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - uses: ./.github/actions/setup-tailwind
        if: steps.filter.outputs.relevant == 'true'

      - name: Run provider failure smoke test
        if: steps.filter.outputs.relevant == 'true'
        run: bash scripts/smoke-provider-failure.sh

      - name: Skip (no relevant changes)
        if: steps.filter.outputs.relevant != 'true'
        run: echo "No Go source or smoke script changes; provider failure smoke skipped."

  # ---------------------------------------------------------------------------
  # Tool version drift
  #
  # Replicates the '=== Tool version drift ===' step in
  # scripts/pre-push-gate.sh.  Asserts the lint/spell tool versions pinned
  # independently in .githooks/pre-commit, .pre-commit-config.yaml, ci.yml,
  # and docs.yml all agree.  A grep-only check, so no Go toolchain is needed;
  # always runs and always emits a terminal status.
  # ---------------------------------------------------------------------------
  tool-versions:
    name: Tool Version Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check tool version alignment
        run: |
          output=$(bash scripts/check-tool-versions.sh 2>&1) || {
            echo "$output"
            {
              echo "## Tool Version Drift -- FAILED"
              echo ""
              echo "Tool version pins are mismatched across config files. Fix locally:"
              echo '```'
              echo "make sync-tool-versions"
              echo '```'
              echo ""
              echo "Drift details:"
              echo '```'
              echo "$output"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
          echo "$output"

  # ---------------------------------------------------------------------------
  # Doc-facts drift
  #
  # Replicates the '=== Doc facts ===' check in scripts/pre-push-gate.sh, which
  # the local pre-push hook runs but gate.yml did not -- so a contributor
  # without the hook could land a stale hand-written doc fact (built-in rule
  # count, envelope version, dev-setup Go version, SWAG upload limit) past
  # required checks (#2009 #4). check-doc-facts.sh is a grep-only guard, so no
  # Go toolchain is needed; always runs and always emits a terminal status.
  # ---------------------------------------------------------------------------
  doc-facts:
    name: Doc Facts Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check hand-written doc facts
        run: |
          output=$(bash scripts/check-doc-facts.sh 2>&1) || {
            echo "$output"
            {
              echo "## Doc Facts Drift -- FAILED"
              echo ""
              echo "A hand-written doc fact no longer matches its source of truth (built-in rule count, envelope version, dev-setup Go version, or SWAG upload limit). Reconcile the doc with the code, or update the assertion in scripts/check-doc-facts.sh."
              echo ""
              echo "Details:"
              echo '```'
              echo "$output"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
          echo "$output"

  # ---------------------------------------------------------------------------
  # Shellcheck (#2445)
  #
  # NOT a required status check (new job). Before this, a script-only diff
  # (e.g. #2443: 4 shell/Markdown files, zero Go) ran 41 checks, none of which
  # gave any real signal on the shell scripts themselves. This job is the
  # replacement: real shellcheck signal on script-only PRs instead of only
  # no-ops.
  #
  # Gated on the `scripts` filter (job always runs, step gated -- same
  # uniform pattern as the rest of this file, though not load-bearing here
  # since the check isn't required). reviewdog's default filter_mode (file)
  # only reports/fails on diagnostics in files that are part of the current
  # diff, so pre-existing shellcheck findings in an untouched script do not
  # block this PR.
  #
  # The `path` list covers every tracked *.sh file, not just scripts/ and
  # .githooks/ -- build/docker/entrypoint.sh in particular is a production
  # path and was previously never linted (#2445).
  #
  # The reviewdog step only runs on same-repo PRs: its `github-check`
  # reporter needs `checks: write` to create a check run, but GITHUB_TOKEN is
  # read-only on a fork PR, so the step would hard-fail on every external
  # contribution with zero shellcheck signal to show for it. On a fork PR the
  # fallback step runs shellcheck directly and fails the job on a real
  # finding, without attempting to post a check run.
  # ---------------------------------------------------------------------------
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Needed to diff against the PR base / previous push commit below.
          fetch-depth: 0

      - name: Check relevant paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            scripts:
              - 'scripts/**'
              - '.githooks/**'
              - 'build/docker/entrypoint.sh'
              - 'docs/site/build-api-reference.sh'
              - 'docs/hero/**'
              - 'tests/load/run.sh'

      # SHA verified via: gh api repos/reviewdog/action-shellcheck/git/ref/tags/v1.32.0 --jq '.object.sha'
      - name: Run shellcheck (same-repo PR / push)
        if: steps.filter.outputs.scripts == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: reviewdog/action-shellcheck@853366d6a4afe65985b8f9ba43924a4afc0a45c9 # v1.32.0
        with:
          # github-check (not github-pr-check): this job runs on both
          # pull_request AND push (to main); github-pr-check assumes PR
          # context and github-check works either way.
          reporter: github-check
          fail_level: error
          # .githooks/pre-commit and .githooks/pre-push have no .sh extension
          # (standard hook naming); reviewdog's default *.sh pattern would
          # silently skip both, so the primary same-repo lint path never
          # checks the hooks it lists as an input. This mirrors the fork-PR
          # fallback below, which globs .githooks/* unconditionally.
          check_all_files_with_shebangs: true
          path: |
            scripts
            .githooks
            build/docker/entrypoint.sh
            docs/site/build-api-reference.sh
            docs/hero
            tests/load/run.sh

      - name: Run shellcheck (fork PR -- no check-run annotations)
        # ubuntu-latest ships shellcheck preinstalled; no install step needed.
        if: steps.filter.outputs.scripts == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          # nullglob: an unmatched glob (e.g. no docs/hero/mocks/*.sh files)
          # would otherwise pass shellcheck a literal, unexpanded pattern and
          # false-fail the job on an unrelated fork PR.
          shopt -s nullglob
          shellcheck -S error scripts/*.sh scripts/lib/*.sh .githooks/* \
            build/docker/entrypoint.sh docs/site/build-api-reference.sh \
            docs/hero/*.sh docs/hero/mocks/*.sh tests/load/run.sh

      - name: Skip (no script changes)
        if: steps.filter.outputs.scripts != 'true'
        run: echo "No scripts/ or .githooks/ changes; shellcheck skipped."
