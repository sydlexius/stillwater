name: Docs Drift

# POLICY: this workflow is a two-tier docs-drift check.
#
# Enforcement model (as of 2026-07-10, issue #2030):
#   HARD gates (fail CI, block merge) -- generated references:
#     - Generated reference pages drift: scripts/check-generated.sh runs
#       gen-env-reference, gen-cli-reference, gen-rules-catalogue,
#       gen-settings-reference, gen-doc-anchors, gen-envelope-changelog,
#       gen-make-reference, gen-platform-profiles, gen-prefs-reference in
#       -check mode on every push. A stale generated file fails the gate.
#     - Coverage gaps: each generator fails loudly at generation time if a
#       code-defined key lacks its required metadata (e.g. env:/desc: tags
#       for config vars; flag:/desc: tags for CLI flags; catalogue entry for
#       rules). So adding a key without docs is a build failure.
#   HARD gates (fail CI, block merge) -- high-risk hand-written surfaces,
#   this workflow (#2030, hardening #2008's soft advisory):
#     - `internal/api/openapi.yaml` changes without a corresponding
#       `docs/**` update. The API spec is the contract for external
#       integrators.
#     - Changes to the irreversible/destructive handlers -- filesystem
#       deletion (`internal/api/handlers_foreign_files.go`), irreversible
#       artist merge (`internal/api/handlers_artist_duplicates.go`), and
#       cascade-delete library operations (`internal/api/handlers_library.go`)
#       -- without a corresponding `docs/**` update (precedent: #1779 / PR
#       #2007 changed filesystem deletion behavior and was only soft-flagged).
#   SOFT advisory (this workflow, #2008) -- other hand-written narrative docs:
#     - Provider guides, troubleshooting, and other API-adjacent handlers
#       (`internal/provider/**`, `internal/connection/**`,
#       `internal/scraper/**`, and any `internal/api/handlers_*` outside the
#       destructive set above) are not generated and cannot be drift-checked
#       mechanically. This workflow flags those cases without blocking merge.
#
# The `docs: not-required` label is the opt-out for BOTH tiers: applying it
# clears a hard block or a soft advisory without requiring a new commit
# (the `labeled`/`unlabeled` trigger below re-runs the job).
#
# Raising the enforcement level further: to make additional surfaces
# blocking, either add a new hard-gate filter group here (mirroring
# `openapi`/`destructive`) or move the check into
# scripts/check-generated.sh if the surface can be made mechanically
# generated. Maintainer sign-off required; see issues #2008 and #2030.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    # The job's internal dorny/paths-filter also reads `docs/**`, but that is
    # deliberately NOT in this trigger: the advisory ("code changed without
    # docs") is only meaningful when a code path is present in the PR. The
    # pull_request paths filter and the internal filter both evaluate the full
    # PR diff (head vs base), so a docs-only follow-up push still re-triggers
    # and clears the advisory as long as the PR still touches one of these
    # code paths -- which is the only case the advisory applies to.
    paths:
      - 'internal/provider/**'
      - 'internal/connection/**'
      - 'internal/scraper/**'
      - 'internal/api/openapi.yaml'
      - 'internal/api/handlers_*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  drift:
    name: Check docs drift
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          list-files: shell
          filters: |
            openapi:
              - 'internal/api/openapi.yaml'
            destructive:
              - 'internal/api/handlers_foreign_files.go'
              - 'internal/api/handlers_artist_duplicates.go'
              - 'internal/api/handlers_library.go'
            code:
              - 'internal/provider/**'
              - 'internal/connection/**'
              - 'internal/scraper/**'
              - 'internal/api/handlers_*'
            docs:
              - 'docs/**'

      - name: Apply or clear docs-drift advisory
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          OPENAPI_CHANGED: ${{ steps.filter.outputs.openapi }}
          DESTRUCTIVE_CHANGED: ${{ steps.filter.outputs.destructive }}
          DESTRUCTIVE_FILES: ${{ steps.filter.outputs.destructive_files }}
          CODE_CHANGED: ${{ steps.filter.outputs.code }}
          DOCS_CHANGED: ${{ steps.filter.outputs.docs }}
        with:
          script: |
            const MARKER = '<!-- docs-drift-bot -->';
            const NEEDS_LABEL = 'needs-docs-review';
            const OPT_OUT_LABEL = 'docs: not-required';

            const openapiChanged = process.env.OPENAPI_CHANGED === 'true';
            const destructiveChanged = process.env.DESTRUCTIVE_CHANGED === 'true';
            const destructiveFiles = (process.env.DESTRUCTIVE_FILES || '')
              .split(/\s+/)
              .filter(Boolean);
            const codeChanged = process.env.CODE_CHANGED === 'true';
            const docsChanged = process.env.DOCS_CHANGED === 'true';
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (err) {
                if (err.status === 404) {
                  try {
                    await github.rest.issues.createLabel({ owner, repo, name, color, description });
                  } catch (createErr) {
                    if (createErr.status !== 422) throw createErr;
                  }
                } else {
                  throw err;
                }
              }
            }

            async function findMarkerComment() {
              const iter = github.paginate.iterator(
                github.rest.issues.listComments,
                { owner, repo, issue_number, per_page: 100 }
              );
              for await (const { data: comments } of iter) {
                for (const c of comments) {
                  if (c.body && c.body.includes(MARKER)) return c;
                }
              }
              return null;
            }

            async function setLabel(name, present) {
              const labels = pr.labels.map(l => l.name);
              const has = labels.includes(name);
              if (present && !has) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [name] });
              } else if (!present && has) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
                } catch (err) {
                  if (err.status !== 404) throw err;
                }
              }
            }

            async function upsertComment(body) {
              const existing = await findMarkerComment();
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
              return existing;
            }

            await ensureLabel(
              NEEDS_LABEL,
              'fbca04',
              'Code changed without a matching docs update; may be a blocking hard gate (openapi.yaml / destructive handlers) or a soft advisory depending on which paths changed'
            );
            await ensureLabel(
              OPT_OUT_LABEL,
              'c5def5',
              'Override the docs-drift check; this PR does not need docs changes. Clears both the soft advisory and the hard gate.'
            );

            const optedOut = pr.labels.some(l => l.name === OPT_OUT_LABEL);
            const hardGateTriggered = (openapiChanged || destructiveChanged) && !docsChanged && !optedOut;
            const softAdvisoryTriggered = !hardGateTriggered && codeChanged && !docsChanged && !optedOut;

            if (hardGateTriggered) {
              const surfaces = [];
              if (openapiChanged) surfaces.push('`internal/api/openapi.yaml` (the API contract for external integrators)');
              if (destructiveChanged) {
                const files = destructiveFiles.length
                  ? destructiveFiles.map(f => `\`${f}\``).join(', ')
                  : 'a destructive handler file (`handlers_foreign_files.go`, `handlers_artist_duplicates.go`, or `handlers_library.go`)';
                surfaces.push(`an irreversible/destructive handler: ${files}`);
              }

              const body = [
                MARKER,
                '## Docs drift: merge blocked',
                '',
                'This PR modifies a high-risk surface without a matching `docs/` update:',
                '',
                ...surfaces.map(s => `- ${s}`),
                '',
                '**Merge is blocked** until one of the following is true:',
                '',
                '1. This PR also updates the relevant page(s) under `docs/` (for example',
                '   `docs/site/src/reference/providers.md` or the API reference built from',
                '   `internal/api/openapi.yaml`), or',
                '2. The `docs: not-required` label is applied, if no docs change is needed.',
                '',
                'This check re-runs automatically when the label is applied or removed, so',
                'no new commit is required to clear it.',
              ].join('\n');

              await upsertComment(body);
              await setLabel(NEEDS_LABEL, true);
              core.setFailed(
                `Docs drift hard gate: ${surfaces.join('; ')} changed without a docs/** update. ` +
                'Update the relevant docs, or apply the `docs: not-required` label to opt out.'
              );
            } else if (softAdvisoryTriggered) {
              const body = [
                MARKER,
                '## Docs drift advisory',
                '',
                'This PR touches code surfaces whose user-visible behavior is documented at',
                '<https://sydlexius.github.io/stillwater/>, but no `docs/` files changed.',
                'Consider whether any of the following pages need an update:',
                '',
                '- Provider list and capabilities (`docs/site/src/reference/providers.md`)',
                '- Settings reference (`docs/site/src/reference/settings-by-tab.md`)',
                '- Connect-platform guides (`docs/site/src/getting-started/connect-*.md`)',
                '- Troubleshooting (`docs/site/src/troubleshooting/platform-auth.md`)',
                '- API reference auto-built from `internal/api/openapi.yaml`',
                '',
                'If no docs change is needed, apply the `docs: not-required` label and this',
                'advisory will clear on the next workflow run.',
                '',
                '_This is a soft advisory and never blocks merge._',
              ].join('\n');

              await upsertComment(body);
              await setLabel(NEEDS_LABEL, true);
            } else {
              const existing = await findMarkerComment();
              if (existing) {
                const wasBlocking = existing.body && existing.body.includes('merge blocked');
                let reason;
                if (optedOut) {
                  reason = 'Cleared: `docs: not-required` label is set on this PR.';
                } else if (docsChanged) {
                  reason = 'Cleared: this PR updates `docs/` alongside the code changes.';
                } else {
                  reason = 'Cleared: no docs-sensitive code paths are modified.';
                }

                const cleared = [
                  MARKER,
                  wasBlocking ? '## Docs drift: hard gate cleared' : '## Docs drift advisory',
                  '',
                  reason,
                  '',
                  wasBlocking
                    ? '_The hard gate no longer applies; merge is not blocked by this check._'
                    : '_This is a soft advisory and never blocks merge._',
                ].join('\n');
                await upsertComment(cleared);
              }
              await setLabel(NEEDS_LABEL, false);
            }
