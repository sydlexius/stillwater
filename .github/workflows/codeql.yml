name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Detects a diff where EVERY changed file is under .github/workflows/ (e.g.
  # a Dependabot action-version bump), mirroring the same detector in
  # ci.yml's `changes` job. Not a required status check, so no satisfier is
  # needed here -- a skipped `analyze` run is fine. Ambiguous cases (no
  # resolvable base SHA, or a non-pull_request/push trigger) default to
  # `only=false`, i.e. fail toward running the scan rather than skipping a
  # real code change.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    outputs:
      workflow_only: ${{ steps.workflow_only.outputs.only }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect workflow-only diff
        id: workflow_only
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Cannot resolve base SHA; treating as not workflow-only."
            echo "only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "${BASE_SHA}" "${{ github.sha }}")
          if [ -z "${CHANGED}" ]; then
            echo "only=false" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "${CHANGED}" | grep -qvE '^\.github/workflows/'; then
            echo "only=false" >> "$GITHUB_OUTPUT"
          else
            echo "only=true" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    needs: [changes]
    # Always run on schedule/workflow_dispatch (the `changes` job's own `if:`
    # skips it for those triggers, leaving this output empty/false); skip
    # only when this specific push/PR diff is proven workflow-only. always()
    # makes that explicit/robust rather than relying on GitHub's evaluation
    # of a truthy `if:` past a skipped dependency. Not a required check, so a
    # skip here does not need a satisfier the way ci.yml's required jobs do.
    if: always() && needs.changes.outputs.workflow_only != 'true'
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Generate templ
        run: go tool templ generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PKG=github.com/sydlexius/stillwater/internal/version
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}" \
            -o stillwater ./cmd/stillwater

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:go

  analyze-actions:
    name: Analyze Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:actions
