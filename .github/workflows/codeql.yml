name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Named "Detect Changes (CodeQL)", not "Detect Changes", so its check run
  # does not collide with ci.yml's identically-purposed "Detect Changes" job
  # (#2445 -- GitHub required-status-check matching is by bare check name,
  # not workflow-qualified, and a same-named check from two workflows made a
  # superseded/cancelled run on one of them count against the merge oracle).
  # Neither instance is a required status check, so this rename needs no
  # branch-protection change.
  #
  # Computes the `go` filter that gates `analyze` below (aggressive: skip the
  # expensive Go static analysis whenever the diff cannot plausibly affect Go
  # findings). Supersedes the old workflow-only-only detector: a diff with
  # zero Go/templ files is exactly the case that filter is designed to catch,
  # so a purpose-built `go` filter is both simpler and more precise. Not a
  # required status check, so no always-run satisfier is needed here -- a
  # skipped `analyze` run is fine. dorny/paths-filter defaults an
  # unresolvable-base case to no match on push/pull_request; `analyze`'s `if:`
  # below independently forces a real run on schedule/workflow_dispatch
  # (where this job doesn't even execute), so ambiguity never resolves to a
  # skip.
  changes:
    name: Detect Changes (CodeQL)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - '**/*.templ'
              - 'go.mod'
              - 'go.sum'

  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    needs: [changes]
    # Run for real when the diff can plausibly affect Go (changes.outputs.go)
    # or on schedule/workflow_dispatch (the `changes` job's own `if:` skips it
    # for those triggers, leaving both outputs empty/false -- fail-closed to a
    # real run rather than treating empty as "safe to skip"). Otherwise skip:
    # a diff with zero Go/templ files cannot change CodeQL's Go findings.
    # always() makes the schedule/dispatch fail-closed path explicit/robust
    # rather than relying on GitHub's evaluation of a truthy `if:` past a
    # skipped dependency. Not a required check, so a skip here does not need
    # a satisfier the way ci.yml's required jobs do.
    if: |
      always() &&
      (needs.changes.result == 'skipped' ||
       (needs.changes.result == 'success' && needs.changes.outputs.go == 'true'))
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Generate templ
        run: go tool templ generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PKG=github.com/sydlexius/stillwater/internal/version
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}" \
            -o stillwater ./cmd/stillwater

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:go

  analyze-actions:
    name: Analyze Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:actions
