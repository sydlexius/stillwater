name: Edge

# Rolling "edge" Docker image, published to GHCR on EVERY merge to main so the
# latest main is dogfoodable without waiting for the once-daily nightly image or
# a formal RC. Docker-only by design (issue #2734): no Go code, no updater
# channel, no GUI surface. Sibling workflows:
#   - .github/workflows/nightly.yml         -- daily :nightly Docker image
#   - .github/workflows/release-nightly.yml -- daily GoReleaser binaries
#   - .github/workflows/release.yml         -- stable/rc pipeline (tag-triggered)
#
# Tags published to ghcr.io/<owner>/<repo>:
#   - edge                         moving; always the latest main
#   - edge-YYYYMMDD-<shortsha>     immutable; one per commit, pinnable/rollback
#
# Follow-ups (M57): #2735 (edge binaries as GitHub Releases), #2736 (in-app
# updater edge channel with unstable warnings). Neither is in scope here.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  # Only the latest main matters for a dogfood channel: cancel a superseded
  # in-flight build so :edge always converges on HEAD. Trade-off: a commit
  # superseded within a few minutes may not get its own edge-<sha> published.
  group: edge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge:
    name: Edge Build
    # Guard a stray workflow_dispatch on a non-main branch.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push (and prune) the GHCR image
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: main

      # Compute the immutable tag explicitly (date + short sha) rather than via
      # docker/metadata-action handlebars, so the format is unambiguous.
      - name: Compute edge tags
        id: tags
        run: |
          set -euo pipefail
          date_utc="$(date -u +%Y%m%d)"
          short_sha="$(git rev-parse --short HEAD)"
          echo "immutable=edge-${date_utc}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=edge
            type=raw,value=${{ steps.tags.outputs.immutable }}

      # Same multi-arch matrix as nightly (amd64 + arm64) so :edge runs on the
      # same hosts as :latest/:nightly. arm64 builds under QEMU emulation.
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: build/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Retention: keep the 20 most-recent immutable edge-* image versions and
      # delete older ones. Best-effort and NON-FATAL: the moving :edge tag is
      # never touched, and a token that cannot delete versions of an owner-scoped
      # GHCR package must not fail an otherwise-successful publish. If this step
      # warns persistently, move pruning to a maintainer PAT or a pinned cleanup
      # action (see #2734).
      - name: Prune old edge image versions
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          KEEP: 20
        run: |
          set -uo pipefail
          pkg="${GITHUB_REPOSITORY##*/}"
          echo "Pruning edge-* versions of container package '${OWNER}/${pkg}' (keep ${KEEP})"

          # List version ids whose tags include an immutable edge-* tag. Capture
          # the API call's exit status DIRECTLY (a pipe into mapfile would mask
          # a gh failure behind mapfile's own success, misreporting a request
          # error as "Nothing to prune"). Distinguish three cases explicitly:
          # request failed -> warn + skip; genuinely empty -> nothing to prune;
          # otherwise -> sort newest-first and prune the tail.
          if ! raw="$(gh api --paginate \
            "/users/${OWNER}/packages/container/${pkg}/versions" \
            --jq '.[] | select(.metadata.container.tags | any(startswith("edge-"))) | "\(.created_at)\t\(.id)"' \
            2>/dev/null)"; then
            echo "warning: could not list package versions; skipping prune"
            exit 0
          fi
          if [ -z "${raw}" ]; then
            echo "No immutable edge-* versions found; nothing to prune."
            exit 0
          fi
          mapfile -t ids < <(printf '%s\n' "${raw}" | sort -r | cut -f2)

          total=${#ids[@]}
          echo "Immutable edge-* versions found: ${total}"
          if [ "${total}" -le "${KEEP}" ]; then
            echo "Nothing to prune."
            exit 0
          fi

          for id in "${ids[@]:${KEEP}}"; do
            if gh api --method DELETE \
              "/users/${OWNER}/packages/container/${pkg}/versions/${id}" >/dev/null 2>&1; then
              echo "Deleted version ${id}"
            else
              echo "warning: failed to delete version ${id} (token scope?); continuing"
            fi
          done
