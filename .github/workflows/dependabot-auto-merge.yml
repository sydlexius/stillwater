# Auto-approve and squash-merge Dependabot PRs for patch and minor updates.
# Major version bumps are left for manual review. Auto-merge waits for all
# required status checks (CI lint, test, build) to pass before merging.
#
# Prerequisites:
#   - Auto-merge enabled in repo settings (Settings > General > Pull Requests)
#   - Branch protection rules requiring status checks on main
#   - "Allow GitHub Actions to create and approve pull requests" enabled
#     (Settings > Actions > General > Workflow permissions)

name: Auto-merge Dependabot PRs

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-approve patch and minor updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
