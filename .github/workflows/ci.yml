name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      js: ${{ steps.filter.outputs.js }}
      a11y: ${{ steps.filter.outputs.a11y }}
      # True when the diff touches something the Go build/test legs are actually
      # BUILT OUT OF (ci.yml itself, a composite action, the Makefile, scripts/lib,
      # or a script ci.yml invokes) -- see the "Detect harness-touching diff" step
      # below for the full derivation and why it is not a filename allowlist.
      # Drives a trimmed-but-real representative build+test leg (see build_matrix/
      # test_matrix) rather than the full app-test fan-out.
      #
      # Replaces workflow_only/workflow_touched (#2453), which fired on ANY
      # .github/workflows/** edit and so ran real Go legs for workflows that
      # cannot affect the Go path at all.
      harness_touched: ${{ steps.harness.outputs.touched }}
      # Always emits at least one matrix leg so GitHub can interpolate the job
      # name. Non-code PRs get a single placeholder leg marked skip=true whose
      # build steps no-op. (An empty matrix, or a job skipped via `if:`, instead
      # surfaces the literal, unexpanded "Build (${{ matrix.goos }},
      # ${{ matrix.goarch }})" check name.) Workflow-only PRs get the same
      # single leg but run for real (no skip flag) as the representative build.
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      # Full 9-shard matrix for code changes; a single representative shard
      # for workflow-only PRs (exercises checkout/setup-go/cache/upload-artifact
      # for real without paying for the full fan-out); unused otherwise.
      test_matrix: ${{ steps.matrix.outputs.test_matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Needed to diff against the PR base / previous push commit below.
          fetch-depth: 0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '**/*.templ'
              - 'web/static/**'
              - 'internal/**'
              - 'cmd/**'
              - 'Makefile'
              - 'build/docker/**'
              - '.goreleaser.yml'
              - '.golangci.yml'
              - '.spectral.yaml'
              - 'internal/api/openapi.yaml'
            js:
              - 'web/static/js/**'
              - 'tests/unit/**'
              - 'package.json'
              - 'package-lock.json'
            a11y:
              - 'web/templates/**'
              - 'web/static/css/**'
              - 'web/static/js/**'
              - 'tests/a11y/**'
              - 'playwright.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '**/*.go'
              - '**/*.templ'

      # Does this diff touch the Go BUILD/TEST HARNESS? (#2453)
      #
      # Supersedes workflow_only/workflow_touched, which collapsed ANY
      # `.github/workflows/**` edit into "run the real Go legs". That made a
      # 2-file YAML diff (#2490: codeql.yml + dependabot.yml) pay for a 144s Go
      # Cache Primer and a 248s test shard -- 95% of the run -- to prove
      # nothing about a change containing no Go.
      #
      # The classification is DERIVED, not an enumerated allowlist of
      # "non-harness" workflow files. A hand-maintained list asserts something
      # nothing enforces, and the day it goes stale it fails toward SKIPPING the
      # suite -- silent under-testing, which #2199/#2445 establish as the
      # dangerous direction.
      #
      # It is derived BY CONSTRUCTION, from what the Go legs actually consume:
      #
      #   ci.yml            -- defines the Go legs themselves
      #   .github/actions/  -- composite actions those legs use
      #   Makefile          -- invoked by them
      #   scripts/<x>       -- ONLY when ci.yml actually references it (grepped,
      #                        not listed, so the set can never go stale)
      #   scripts/lib/      -- shared infrastructure the above source
      #
      # Deliberately NOT "any workflow that mentions the Go toolchain": codeql.yml
      # runs setup-go and `go build` for its OWN analysis, and nightly/fuzz/
      # mutation do likewise. None of them feed ci.yml's Go legs, so none can
      # invalidate ci.yml's Go results. A workflow OTHER than ci.yml is therefore
      # non-harness BY CONSTRUCTION -- including one added tomorrow, with no list
      # to update and no way to forget.
      #
      # Fail-closed: an unresolvable base SHA yields harness=true (run the suite).
      - name: Detect harness-touching diff
        id: harness
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Cannot resolve base SHA; failing CLOSED (harness=true) so the suite still runs."
            echo "touched=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "${BASE_SHA}" "${{ github.sha }}")
          if [ -z "${CHANGED}" ]; then
            echo "Empty diff; harness=false."
            echo "touched=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HARNESS=false

          # Things the Go legs are built out of.
          if printf '%s\n' "${CHANGED}" \
            | grep -qE '^(\.github/workflows/ci\.yml|Makefile)$|^(\.github/actions/|scripts/lib/)'; then
            echo "harness: a Go-leg component changed (ci.yml / composite action / Makefile / scripts/lib)."
            HARNESS=true
          fi

          # A changed script counts ONLY if ci.yml actually invokes it. Derived by
          # grepping ci.yml for the path, so the set cannot drift out of date.
          # (Script paths in this repo contain no spaces, so word-splitting the
          # filtered list is safe here.)
          for f in $(printf '%s\n' "${CHANGED}" | grep -E '^scripts/' || true); do
            if grep -qF -- "${f}" .github/workflows/ci.yml; then
              echo "harness: ci.yml invokes ${f}."
              HARNESS=true
            fi
          done

          echo "harness_touched=${HARNESS}"
          echo "touched=${HARNESS}" >> "$GITHUB_OUTPUT"

      - name: Compute build/test matrices
        id: matrix
        run: |
          if [ "${{ steps.filter.outputs.code }}" = "true" ]; then
            echo 'build_matrix={"include":[{"goos":"linux","goarch":"amd64"},{"goos":"linux","goarch":"arm64"},{"goos":"darwin","goarch":"amd64"},{"goos":"darwin","goarch":"arm64"},{"goos":"windows","goarch":"amd64"}]}' >> "$GITHUB_OUTPUT"
            echo 'test_matrix={"shard":["api-1","api-2","rule-1","rule-2","services","settingsio","providers","scan","rest"]}' >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.harness.outputs.touched }}" = "true" ]; then
            echo 'build_matrix={"include":[{"goos":"linux","goarch":"amd64"}]}' >> "$GITHUB_OUTPUT"
            echo 'test_matrix={"shard":["rest"]}' >> "$GITHUB_OUTPUT"
          else
            echo 'build_matrix={"include":[{"goos":"linux","goarch":"amd64","skip":true}]}' >> "$GITHUB_OUTPUT"
            echo 'test_matrix={"shard":["rest"]}' >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Go module + build cache primer (D3 -- shard cache consolidation)
  #
  # Before the 9 test shards run, this job warms BOTH halves of the Go
  # cache and saves them under one cache entry:
  #   1. go mod download         -> populates the module cache (~/go/pkg/mod)
  #   2. go test -race -run='^$'  -> compiles every test binary + dep WITH
  #      race instrumentation (running zero tests) so the build cache
  #      (~/.cache/go-build) holds the exact race-instrumented objects the
  #      shards' `go test -v -race` needs.  Without this step the build
  #      cache would be empty and all 9 read-only shards would cold-compile
  #      -race on every run (a regression vs main's per-shard cache: true).
  # Shards restore that entry read-only (actions/cache/restore, no post-job
  # save) to avoid 9 concurrent writes that race to save the same key.
  #
  # D2 (restore-keys): the explicit actions/cache step here carries a
  # restore-keys fallback so a go.sum change warms from the last matching
  # cache instead of cold-building.  Other Go jobs (lint, coverage, build)
  # keep setup-go cache:true; they each have at most 1-2 concurrent
  # instances so the multiplier effect is small compared to the 9-shard
  # case, and fewer changes lower the diff risk.
  # ---------------------------------------------------------------------------
  go-cache-primer:
    name: Go Cache Primer
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.harness_touched == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          # Disable the built-in cache so the explicit actions/cache step
          # below owns the lifecycle (keyed on go.sum with restore-keys).
          cache: false

      - name: Restore Go module + build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          # Exact key: cache hit restores the most recent warm build.
          # Restore-key: cache miss on a go.sum/go.mod change warms from the
          # last compatible entry instead of forcing a cold rebuild.
          # go.mod is hashed too so a toolchain-directive bump that leaves
          # go.sum untouched still invalidates the stale build cache.
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Populate the module cache so shards avoid redundant downloads.
      # go mod download is fast (~5-30s) and its output is the shared
      # ~/go/pkg/mod tree that all 9 shards will restore read-only.
      - name: Warm Go module cache
        run: go mod download

      # Warm the build cache (~/.cache/go-build) with race-instrumented
      # objects.  -run='^$' matches no tests, so this compiles every test
      # binary + dependency with -race but executes zero tests.  The
      # post-job actions/cache save then captures these objects so the 9
      # read-only shards restore them instead of cold-compiling -race.
      - name: Warm Go build cache (race-instrumented)
        run: go test -race -count=1 -run='^$' ./...

  # Worker job: does the real lint work, gated on code changes. The always-
  # running lint-summary wrapper below owns the required "Lint" check name so
  # docs-only PRs report success rather than a permanently-skipped context.
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate templ
        run: go tool templ generate

      - name: Verify generated files are up-to-date
        run: |
          DIRTY=$(git diff --name-only | grep -E '_templ\.go$' || true)
          if [ -n "$DIRTY" ]; then
            echo "Generated templ files are out of date:"
            echo "  ${DIRTY//$'\n'/$'\n'  }"
            echo "Run 'go tool templ generate' locally and commit the results."
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          # Invalidate the action's result cache daily (default is 7 days) so a
          # stale cache cannot resurrect a phantom finding across tool/action
          # bumps. PR #1821 hit exactly this: a cached analysis surfaced an
          # SA5011 that a fresh run (and local lint) did not reproduce.
          cache-invalidation-interval: 1

      - name: Validate OpenAPI spec
        run: npx --yes @stoplight/spectral-cli@6.15.0 lint internal/api/openapi.yaml --ruleset .spectral.yaml --fail-severity=warn

  # Aggregate gate that owns the "Lint" check name. Always runs so the required
  # context reports success (not skipped) on non-code PRs, and fails closed if
  # the `changes` detector itself failed/was cancelled before trusting its
  # `code` output.
  lint-summary:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: always()
    steps:
      # Action-pin drift (#2492) is hosted HERE, inside an already-REQUIRED
      # check, rather than as a new standalone job. A new job's check name is
      # not required until the branch ruleset is edited out-of-band, so a guard
      # shipped that way would run, report, and block nothing -- the same
      # false-assurance failure #2491 exists to remove. This job is required and
      # `if: always()`, so a step added here is enforced the moment it merges.
      #
      # It is a lint over the workflow files, so `Lint` is also its honest home.
      # No paths filter: the check is a sub-second grep, and gating it would
      # only add a way for it to silently not run.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Action pin drift
        run: bash scripts/check-action-pins.sh

      # `if: always()` so a pin-drift failure above does not mask the lint
      # result (and vice versa): both signals must reach the operator on the
      # same run, not one-at-a-time across two pushes.
      - name: Verify lint check succeeded
        if: always()
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Detect Changes did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "No code changes; Lint Check was skipped."
            exit 0
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint Check did not succeed: ${{ needs.lint.result }}"
            exit 1
          fi

  js-test:
    name: JS Unit Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.js == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm test

  # Worker job: does the real a11y work, gated on tests/a11y/** changes. The
  # always-running a11y-summary wrapper below owns the required "A11y Smoke
  # Tests (Playwright + axe-core)" check name so non-a11y PRs report success
  # rather than a permanently-skipped required context.
  a11y-test:
    name: A11y Smoke Tests Check
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.a11y == 'true'
    # The full pipeline (build + server boot + Playwright + teardown) comfortably
    # finishes inside 10 min; 20 leaves headroom for slow runners and npm/browser
    # install on cache miss.
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install JS dependencies
        run: npm ci

      # Cache the Playwright browser binary on a key derived from
      # package-lock.json (which pins the exact @playwright/* version).
      # On a cache hit the binary download is skipped; system dependencies
      # are installed separately below (they are OS packages, not cached).
      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-chromium-

      - name: Install Playwright Chromium browser binary
        # Skip binary download on cache hit; the binary is already in
        # ~/.cache/ms-playwright restored above.
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright Chromium system dependencies
        # Always install OS-level deps (libnss3, libgbm, etc.); they are
        # not included in the cached browser archive.
        run: npx playwright install-deps chromium

      - name: Generate templ
        run: go tool templ generate

      - uses: ./.github/actions/setup-tailwind

      - name: Build Tailwind CSS
        run: tailwindcss -i web/static/css/input.css -o web/static/css/styles.css --minify

      - name: Build binary
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.1.0-dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PKG=github.com/sydlexius/stillwater/internal/version
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}" \
            -o stillwater ./cmd/stillwater

      - name: Pick a free port
        id: port
        run: |
          PORT=$(python3 -c 'import socket; s=socket.socket(); s.bind(("",0)); p=s.getsockname()[1]; s.close(); print(p)')
          echo "port=${PORT}" >> "$GITHUB_OUTPUT"

      - name: Start Stillwater (ephemeral)
        id: server
        env:
          SW_DB_PATH: ${{ runner.temp }}/stillwater-a11y.db
          SW_PORT: ${{ steps.port.outputs.port }}
          SW_LOG_FORMAT: text
          SW_LOG_LEVEL: warn
          SW_BACKUP_ENABLED: "false"
          SW_UX: "next"
        run: |
          ./stillwater > "${{ runner.temp }}/stillwater-a11y.log" 2>&1 &
          echo "pid=$!" >> "$GITHUB_OUTPUT"

      - name: Wait for server ready
        env:
          PORT: ${{ steps.port.outputs.port }}
          PID: ${{ steps.server.outputs.pid }}
        run: |
          echo "Polling http://127.0.0.1:${PORT}/api/v1/health ..."
          DEADLINE=$(( $(date +%s) + 60 ))
          while [ "$(date +%s)" -lt "${DEADLINE}" ]; do
            if ! kill -0 "${PID}" 2>/dev/null; then
              echo "Stillwater exited before becoming ready"
              cat "${{ runner.temp }}/stillwater-a11y.log" || true
              exit 1
            fi
            HEALTH=$(curl -sf --max-time 5 "http://127.0.0.1:${PORT}/api/v1/health" 2>/dev/null || true)
            if echo "${HEALTH}" | grep -q '"status":"ok"'; then
              echo "Server ready."
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready within 60s"
          cat "${{ runner.temp }}/stillwater-a11y.log" || true
          exit 1

      - name: Run Playwright a11y tests
        env:
          SW_PORT: ${{ steps.port.outputs.port }}
          SW_TEST_URL: http://127.0.0.1:${{ steps.port.outputs.port }}
        run: npx playwright test --config=playwright.config.js

      - name: Stop Stillwater
        if: always()
        env:
          PID: ${{ steps.server.outputs.pid }}
        run: |
          if kill -0 "${PID}" 2>/dev/null; then kill "${PID}"; fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-a11y-report
          path: tests/a11y/report/
          retention-days: 7

  # Aggregate gate that owns the "A11y Smoke Tests (Playwright + axe-core)"
  # check name. Always runs so the required context reports success (not
  # skipped) on non-a11y PRs, and fails closed if the `changes` detector
  # itself failed/was cancelled before trusting its `a11y` output.
  a11y-summary:
    name: A11y Smoke Tests (Playwright + axe-core)
    runs-on: ubuntu-latest
    needs: [changes, a11y-test]
    if: always()
    steps:
      - name: Verify a11y check succeeded
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Detect Changes did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.a11y }}" != "true" ]; then
            echo "No a11y-relevant changes; A11y Smoke Tests Check was skipped."
            exit 0
          fi
          if [ "${{ needs.a11y-test.result }}" != "success" ]; then
            echo "A11y Smoke Tests Check did not succeed: ${{ needs.a11y-test.result }}"
            exit 1
          fi

  test:
    # Per-shard display names render as "Test Shard (api)", "Test Shard (rule)",
    # etc. The bare name "Test" is owned by the test-summary job below so the
    # pre-existing required check remains satisfied without a branch-protection
    # update at merge time.
    name: Test Shard
    runs-on: ubuntu-latest
    needs: [changes, go-cache-primer]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.harness_touched == 'true'
    strategy:
      # One shard's failure should not cancel the others -- a flake in one
      # shard hides real failures in the others if fail-fast is on.
      fail-fast: false
      # Full 9-shard set for code changes; a single representative shard
      # (`rest`) for workflow-only/workflow-touched diffs -- see
      # changes.outputs.test_matrix.
      matrix: ${{ fromJson(needs.changes.outputs.test_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          # Disable built-in cache; read-only restore from the primer's
          # shared entry below.  Shards do not save (actions/cache/restore),
          # so all 9 write to the SAME key without racing.
          cache: false

      # Restore Go cache from the shared primer entry (read-only).
      # restore-keys ensures a go.sum change still warms from the last
      # compatible entry rather than cold-building.
      - name: Restore Go module + build cache (read-only)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Resolve the package list (and optional -run bucket regex) for this
      # shard. Named shards (services / settingsio / providers / scan) come from the SHARDS
      # map below. The partitioned bases (api / rule) are each split into two
      # buckets -- shards api-1/api-2 and rule-1/rule-2 -- by a round-robin over
      # their test names; both were verified isolation-safe under that split
      # (each bucket passes run alone, shuffled, with -race). The `rest` shard
      # is the dynamic remainder, so new packages auto-fall into it. Wall time =
      # max(shards) + runner overhead.
      - name: Resolve shard package list
        id: shard
        run: |
          # Single source of truth for named-shard package mappings. Adding or
          # moving packages between shards is a one-line change here; the named
          # branches, the partition bases, and the `rest` exclusion regex all
          # derive from this map, so they cannot drift. Adding a NEW shard also
          # requires updating the matrix.shard list above.
          declare -A SHARDS=(
            [api]="internal/api"
            [rule]="internal/rule"
            [services]="internal/auth internal/image internal/artist"
            # settingsio is its own shard: its persistence/encryption tests run
            # ~100s, which made services the matrix long pole when bundled in.
            [settingsio]="internal/settingsio"
            [providers]="internal/provider internal/connection"
            [scan]="internal/scanner internal/library internal/database internal/scraper internal/foreign internal/watcher"
          )
          shard="${{ matrix.shard }}"
          run=""
          case "${shard}" in
            rest)
              # Dynamic exclusion: derive the regex from SHARDS so this
              # branch cannot drift from the named-shard branches. Module
              # path comes from `go list -m` so a go.mod rename does not
              # silently break sharding.
              module=$(go list -m)
              excludes=""
              for k in "${!SHARDS[@]}"; do
                for p in ${SHARDS[$k]}; do
                  excludes="${excludes:+${excludes}|}${p}"
                done
              done
              pkgs=$(go list ./... | grep -v -E "^${module}/(${excludes})(/|$)" | tr '\n' ' ')
              ;;
            *-[12])
              # Partitioned shard "<base>-<n>": run only this bucket's tests via
              # -run. Round-robin over SORTED test names keeps the two buckets
              # balanced regardless of name clustering (an alphabetic split would
              # be lopsided -- most names share a prefix). Names come from grep
              # over *_test.go (no compile); a name that is not a real test is a
              # harmless no-op in -run.
              base="${shard%-*}"
              idx=$(( ${shard##*-} - 1 ))           # api-1 -> 0, api-2 -> 1
              if [ -z "${SHARDS[${base}]+x}" ]; then
                echo "Unknown partition base: ${base}" >&2
                exit 1
              fi
              dir="${SHARDS[${base}]}"
              names=$(grep -rhoE '^func (Test|Example|Fuzz)[A-Za-z0-9_]+' \
                        --include='*_test.go' "${dir}" \
                      | sed -E 's/^func //' | grep -vx 'TestMain' | sort -u)
              sel=""
              i=0
              while IFS= read -r t; do
                [ -z "${t}" ] && continue
                if [ $(( i % 2 )) -eq "${idx}" ]; then
                  sel="${sel:+${sel}|}${t}"
                fi
                i=$(( i + 1 ))
              done < <(printf '%s\n' "${names}")
              if [ -z "${sel}" ]; then
                echo "Empty partition for ${shard}" >&2
                exit 1
              fi
              run="^(${sel})\$"
              pkgs="./${dir}/... "
              ;;
            *)
              if [ -z "${SHARDS[${shard}]+x}" ]; then
                echo "Unknown shard: ${shard}" >&2
                exit 1
              fi
              pkgs=""
              for p in ${SHARDS[${shard}]}; do
                pkgs="${pkgs}./${p}/... "
              done
              ;;
          esac
          echo "packages=${pkgs}" >> "$GITHUB_OUTPUT"
          # -run regex can be large; use the heredoc form of GITHUB_OUTPUT.
          {
            echo "run<<__RUN_EOF__"
            echo "${run}"
            echo "__RUN_EOF__"
          } >> "$GITHUB_OUTPUT"

      # -coverpkg=./... is intentionally cross-shard: each shard's coverage
      # profile records hits across the WHOLE module, not just its own
      # packages. Codecov OR-merges multiple uploads on the same commit, so
      # a line marked covered by any shard wins -- the final report is
      # accurate regardless of which shard executed which test.
      - name: Run tests
        # Partitioned shards (api-*, rule-*) pass a -run bucket regex via $RUN
        # (env, so the large regex cannot break shell quoting); other shards run
        # their whole package set (RUN empty). The package list is a simple path
        # string, injected directly as before.
        env:
          RUN: ${{ steps.shard.outputs.run }}
        run: |
          if [ -n "$RUN" ]; then
            go test -v -race -count=1 -timeout 8m -coverpkg=./... -coverprofile=coverage.out -run "$RUN" ${{ steps.shard.outputs.packages }}
          else
            go test -v -race -count=1 -timeout 8m -coverpkg=./... -coverprofile=coverage.out ${{ steps.shard.outputs.packages }}
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Unique name per shard so all artifacts survive side-by-side and the
          # consumer job can download them all with `pattern: coverage-*`.
          name: coverage-${{ matrix.shard }}
          path: coverage.out
          # 1 day is enough for intra-workflow handoff; no need to retain longer.
          retention-days: 1

  # Aggregate gate that owns the "Test" check name. Branch protection can keep
  # requiring "Test" without enumerating every shard, and this job will fail
  # iff any matrix shard did not succeed. always() ensures we still emit a
  # status when shards fail or are cancelled (default needs behavior would
  # skip the gate, leaving "Test" unreported and branch protection stuck).
  test-summary:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()
    steps:
      - name: Verify all shards succeeded
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Detect Changes did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.code }}" != "true" ] && [ "${{ needs.changes.outputs.harness_touched }}" != "true" ]; then
            echo "No code or workflow changes; Test shards were skipped."
            exit 0
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more Test shards did not succeed: ${{ needs.test.result }}"
            exit 1
          fi

  # Non-required job that decouples Codecov from the required CI gate.
  # A Codecov outage turns this job red but cannot block a merge because
  # it is not registered in branch-protection required checks. The `test`
  # job (and the "Test" gate via test-summary) are the actual required gates.
  # Closes #1881, #1884.
  coverage-upload:
    name: Upload Coverage
    runs-on: ubuntu-latest
    needs: [changes, test]
    # Gated on real code changes only: a workflow-only push still runs the
    # `test` job (single `rest` shard, see changes.outputs.harness_touched), and
    # that shard's coverage alone would poison main's Codecov baseline if
    # uploaded unflagged. Docs-only pushes skip `test` entirely (result is
    # 'skipped', not 'success'), so this job is naturally a no-op there too.
    if: needs.changes.outputs.code == 'true' && needs.test.result == 'success'
    permissions:
      contents: read
      # Required for Codecov OIDC token exchange (use_oidc: true).
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # Download all per-shard artifacts; each lands in its own directory
          # (e.g. coverage-api-1/coverage.out, coverage-rule-2/coverage.out).
          pattern: coverage-*

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Merge coverage profiles
        # go tool gocovmerge performs a per-block UNION merge (summing hit
        # counts), so each statement block appears exactly once in the output.
        # The naive head-1/tail concat duplicates every block across shards
        # because each shard runs -coverpkg=./... and emits a full-module
        # profile; plain concat causes coverage-floor.sh to sum nstmts 9x
        # while covered stays 1x, collapsing every package to ~1/numShards.
        run: go tool gocovmerge coverage-*/coverage.out > merged-coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: merged-coverage.out
          # Prevent Codecov from auto-discovering unrelated files.
          disable_search: true
          # false: a transient Codecov outage turns this job yellow but does
          # not block the merge gate (job is non-required). Setting true would
          # also be safe for the same reason, but false reduces noise when
          # Codecov is flaky.
          fail_ci_if_error: false
          use_oidc: true

  # Worker job: does the real coverage-floor enforcement, gated on code
  # changes + a successful Test run. The always-running coverage-floor-summary
  # wrapper below owns the required "Coverage Floor" check name so docs-only
  # PRs report success rather than a permanently-skipped context.
  coverage-floor:
    name: Coverage Floor Check
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always() && needs.changes.outputs.code == 'true' && needs.test.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*

      - name: Merge coverage profiles
        run: go tool gocovmerge coverage-*/coverage.out > merged.out

      - name: Enforce per-package coverage floor
        run: |
          output=$(bash scripts/coverage-floor.sh --cover merged.out 2>&1) || {
            echo "$output"
            {
              echo "## Coverage Floor -- FAILED"
              echo ""
              echo "One or more packages fell below their coverage floor. Add tests or update"
              echo "\`testdata/coverage-floor.json\` if the drop is intentional."
              echo ""
              echo '```'
              echo "$output"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
          echo "$output"

  # Aggregate gate that owns the "Coverage Floor" check name. Always runs so
  # the required context reports success (not skipped) on non-code PRs, and
  # fails closed if the `changes` detector itself failed/was cancelled before
  # trusting its `code` output, or if Test failed (which leaves the worker
  # skipped rather than failed).
  coverage-floor-summary:
    name: Coverage Floor
    runs-on: ubuntu-latest
    needs: [changes, test, coverage-floor]
    if: always()
    steps:
      - name: Verify coverage floor check succeeded
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Detect Changes did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "No code changes; Coverage Floor Check was skipped."
            exit 0
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test did not succeed, so Coverage Floor Check did not run: ${{ needs.test.result }}"
            exit 1
          fi
          if [ "${{ needs.coverage-floor.result }}" != "success" ]; then
            echo "Coverage Floor Check did not succeed: ${{ needs.coverage-floor.result }}"
            exit 1
          fi

  build-matrix:
    # Per-target display names render as "Build Matrix (linux, amd64)", etc.
    # The bare name "Build" is owned by the build aggregator job below so the
    # pre-existing required check remains satisfied without a branch-protection
    # update.
    name: Build Matrix (${{ matrix.goos }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [changes, lint, coverage-floor]
    # Run a placeholder leg for docs-only PRs, a single REAL representative
    # leg for workflow-only PRs (see changes.outputs.build_matrix), and the
    # full matrix -- gated on lint/coverage-floor success -- for code changes.
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.changes.outputs.code != 'true' ||
       (needs.lint.result == 'success' &&
        (needs.coverage-floor.result == 'success' || needs.coverage-floor.result == 'skipped')))
    # Avoid a job-level `if: code == 'true'`: a skipped matrix job surfaces a check
    # named with the literal, unexpanded ${{ matrix.* }} template. Non-code PRs get
    # a single placeholder leg (skip=true, see the `changes` job) whose steps
    # no-op, so the check name still interpolates to a concrete goos/goarch.
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.build_matrix) }}
    steps:
      - name: Checkout
        if: ${{ matrix.skip != true }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        if: ${{ matrix.skip != true }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate templ
        if: ${{ matrix.skip != true }}
        run: go tool templ generate

      - name: Build binary
        if: ${{ matrix.skip != true }}
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -trimpath \
            -ldflags="-s -w" \
            -o /dev/null \
            ./cmd/stillwater

  # Aggregate gate that owns the "Build" check name. Branch protection can keep
  # requiring "Build" without enumerating every matrix leg. always() ensures we
  # still emit a status when legs fail or are cancelled.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, build-matrix]
    if: always()
    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Detect Changes did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          result="${{ needs.build-matrix.result }}"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "Build matrix failed or was cancelled: $result"
            exit 1
          fi
          # build-matrix's own `if:` skips it (result=skipped) when code == 'true'
          # but an upstream dependency (lint/coverage-floor) failed -- that is a
          # real code change for which nothing was actually built, so "skipped"
          # must not silently pass here the way it correctly does for a
          # docs-only PR (code != 'true').
          if [ "${{ needs.changes.outputs.code }}" = "true" ] && [ "$result" = "skipped" ]; then
            echo "Build matrix was skipped for a code change (an upstream dependency did not succeed): $result"
            exit 1
          fi
          echo "Build matrix result: $result"

  # ---------------------------------------------------------------------------
  # D4 -- Cache usage guardrail
  #
  # Reads the repository's Actions cache usage via the REST API and emits a
  # ::warning:: annotation when usage exceeds 8 GiB (cap = 10 GiB).
  # This is a non-blocking informational job; it never fails CI.
  # Run on every push + PR so the signal appears in the workflow summary.
  # ---------------------------------------------------------------------------
  cache-usage:
    name: Cache Usage Check
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check Actions cache usage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        # Tolerate only the API being unavailable (transient gh failure or an
        # empty response): those exit 0 so the guardrail stays non-blocking.
        # Any real logic error past that point still fails the step rather
        # than being silently swallowed by continue-on-error.
        run: |
          usage_bytes=$(gh api "repos/${REPO}/actions/cache/usage" \
            --jq '.active_caches_size_in_bytes' 2>/dev/null) || {
            echo "Warning: cache usage API unavailable; skipping guardrail."; exit 0; }
          [ -z "$usage_bytes" ] && { echo "Warning: empty cache-usage response; skipping guardrail."; exit 0; }
          usage_gib=$(awk "BEGIN{printf \"%.2f\", ${usage_bytes}/1073741824}")
          echo "Actions cache usage: ${usage_gib} GiB / 10 GiB"
          if awk "BEGIN{exit !(${usage_gib} > 8)}"; then
            echo "::warning::Actions cache usage ${usage_gib} GiB exceeds 8 GiB warning threshold (cap = 10 GiB). Cache thrash risk -- consider pruning stale entries."
          fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    # On push-to-main: gate on test (never publish an image for a commit whose
    # tests failed). On PRs: run a build-only check (no push) to catch
    # Dockerfile regressions early; test is not a dependency here since the
    # PR test gate already covers correctness.
    needs: [changes, lint, test, coverage-floor]
    if: needs.changes.outputs.code == 'true' && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: build/docker/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
