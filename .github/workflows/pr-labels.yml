# Enforce release labels on pull requests.
#
# Step 1 (auto-label): On open/edit/sync, parse "Fixes #N" / "Closes #N" /
# "Resolves #N" references from the PR body, fetch labels from each linked
# issue, and copy any that exist in the repo's Labels set onto the PR.
#
# Step 2 (gate): Fail the required status check if the PR has no label
# defined in the repo's Labels set.  Applying a label re-triggers this
# workflow through the "labeled" event, giving the gate a second chance to
# pass without a new commit.
#
# The "valid label" set is the repo's own Labels list (queried via the API).
# Manage it through Settings > Labels -- no workflow edit needed to add or
# rename a label.  Release-notes grouping is still controlled by
# .claude/release.toml; unmapped labels fall into "Other Changes".
#
# Uses pull_request_target so a fork PR cannot redefine the gate logic.
#
# Dependabot PRs are skipped -- they never reference labelled issues.
#
# Required status check name: "Label gate / Require release label"
# Add that name to Settings > Branches > branch protection for main.

name: Label gate

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, labeled, unlabeled]
    branches: [main]

permissions: {}

jobs:
  require-label:
    name: Require release label
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: write
    if: github.event.pull_request.user.login != 'dependabot[bot]'

    steps:
      - name: Auto-label from linked issues
        # Skip on label events -- the label is already applied; no need to
        # re-query linked issues.
        if: |
          github.event.action != 'labeled' &&
          github.event.action != 'unlabeled'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Valid labels = the repo's own Labels set (Settings > Labels).
            const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const validLabels = new Set(repoLabels.map(l => l.name));
            core.info(`Repo labels (${validLabels.size}): ${[...validLabels].sort().join(', ')}`);

            // Parse issue references from the PR body.
            const body = context.payload.pull_request.body || '';
            const pattern = /(?:fix(?:es)?|close[sd]?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = [];
            let match;
            while ((match = pattern.exec(body)) !== null) {
              const n = parseInt(match[1], 10);
              if (!issueNumbers.includes(n)) issueNumbers.push(n);
            }

            if (issueNumbers.length === 0) {
              core.info('No issue references found in PR body -- skipping auto-label');
              return;
            }
            core.info(`Linked issues: ${issueNumbers.map(n => '#' + n).join(', ')}`);

            // Collect release labels from each linked issue.
            const toApply = new Set();
            for (const num of issueNumbers) {
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                });
                if (issue.data.pull_request) {
                  core.info(`#${num} is a pull request, skipping`);
                  continue;
                }
                for (const label of issue.data.labels) {
                  if (validLabels.has(label.name)) toApply.add(label.name);
                }
              } catch (err) {
                core.warning(`Could not fetch issue #${num}: ${err.message}`);
              }
            }

            if (toApply.size === 0) {
              core.info('No matching release labels found on linked issues');
              return;
            }

            // ---------------------------------------------------------------
            // Dedupe + elevate mutually-exclusive families (#2499).
            //
            // The union above is correct for ADDITIVE labels (ci, security,
            // bug, ...): a PR closing several issues really is all of those
            // things. It is WRONG for families whose members are mutually
            // exclusive. #2498 (closing three issues) ended up labeled
            // `priority: high` + `medium` + `low`, `scope: small` + `medium`,
            // and BOTH `needs-docs-review` and `docs: not-required` -- the PR
            // asserting three different priorities at once, and the gate
            // passing anyway because it only requires *a* valid label.
            //
            // Each family collapses to exactly ONE member, ELEVATED to the most
            // conservative value present. Direction matters: a PR closing N
            // issues genuinely IS the union of that work, so we elevate rather
            // than take the first or the lowest. Never under-prioritize, never
            // under-scope, never silently skip a docs review.
            //
            // Each array is ordered MOST-conservative first (index 0 wins).
            const EXCLUSIVE_FAMILIES = {
              priority: ['priority: critical', 'priority: high', 'priority: medium', 'priority: low'],
              scope: ['scope: large', 'scope: medium', 'scope: small'],
              docs: ['needs-docs-review', 'docs: not-required'],
            };

            // Guard the table against label renames/additions. A repo label that
            // LOOKS like a family member but is not ranked would fall through as
            // an additive label and silently re-introduce the union this fixes.
            // Fail loudly instead of quietly doing the wrong thing.
            const ranked = new Set(Object.values(EXCLUSIVE_FAMILIES).flat());
            const unranked = [...validLabels].filter(
              l => /^(priority|scope|docs):/.test(l) && !ranked.has(l)
            );
            if (unranked.length > 0) {
              core.setFailed(
                `Label(s) ${unranked.join(', ')} look like members of a mutually-exclusive ` +
                `family but are not ranked in EXCLUSIVE_FAMILIES in this workflow. ` +
                `Add them (most-conservative first) so the elevator can order them. ` +
                `Leaving them unranked would silently re-introduce conflicting labels.`
              );
              return;
            }

            // Resolve each family against the union AND the PR's current labels,
            // so a PR that is ALREADY mislabeled gets repaired, not just
            // prevented. (The old code was add-only and could never repair one.)
            const existing = new Set(
              context.payload.pull_request.labels.map(l => l.name)
            );
            const candidates = new Set([...toApply, ...existing]);
            const toRemove = new Set();

            for (const [family, order] of Object.entries(EXCLUSIVE_FAMILIES)) {
              const present = order.filter(l => candidates.has(l));
              if (present.length === 0) continue;
              const winner = present[0];               // order is most-conservative first
              for (const loser of present.slice(1)) {
                toApply.delete(loser);
                if (existing.has(loser)) toRemove.add(loser);
              }
              if (present.length > 1) {
                core.info(
                  `${family}: elevated to "${winner}" (dropped ${present.slice(1).join(', ')})`
                );
              }
            }

            // Remove losing family members already on the PR.
            //
            // Loop safety: removeLabel fires an `unlabeled` event, but THIS step
            // is skipped on labeled/unlabeled (see the `if:` above), so the
            // elevator cannot re-trigger itself. The gate step still re-runs and
            // re-checks, which is what we want.
            for (const loser of toRemove) {
              core.info(`Removing conflicting label: ${loser}`);
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: loser,
                });
              } catch (err) {
                // 404 = already gone (race with a concurrent run). Anything else
                // is real: surface it rather than leaving a conflicting label on.
                if (err.status === 404) {
                  core.info(`  ${loser} was already removed`);
                } else {
                  core.warning(`Could not remove ${loser}: ${err.message}`);
                }
              }
            }

            const missing = [...toApply].filter(l => !existing.has(l));
            if (missing.length === 0) {
              core.info('No new labels to apply');
              return;
            }

            core.info(`Applying labels: ${missing.join(', ')}`);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: missing,
            });

      - name: Check release label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Valid labels = the repo's own Labels set (Settings > Labels).
            const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const validLabels = new Set(repoLabels.map(l => l.name));

            // Fetch current PR labels via API -- auto-label may have just
            // added some in the previous step.
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const prLabels = pr.data.labels.map(l => l.name);
            const hasValid = prLabels.some(l => validLabels.has(l));

            if (!hasValid) {
              core.setFailed(
                `PR has no label from the repo's Labels set. ` +
                `Apply at least one (Settings > Labels lists them all). ` +
                `If this PR fixes a labelled issue, the label will be applied automatically.`
              );
            } else {
              core.info(`Label present: ${prLabels.filter(l => validLabels.has(l)).join(', ')}`);
            }
