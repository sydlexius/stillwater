name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.markdownlint-cli2.yaml'
      # Spell-check config consumed by the crate-ci/typos step: a rule change
      # here alters lint outcomes on unchanged markdown, so it must re-trigger.
      - '.typos.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.markdownlint-cli2.yaml'
      # Spell-check config consumed by the crate-ci/typos step: a rule change
      # here alters lint outcomes on unchanged markdown, so it must re-trigger.
      - '.typos.toml'
      - '.github/workflows/docs.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check typos in markdown
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
        with:
          files: '**/*.md'

      - name: Lint markdown
        # The ACTION version (v24.x) and the markdownlint-cli2 CLI version it
        # bundles (0.23.x) are DIFFERENT numbering schemes. The local pre-commit
        # hook pins the CLI by its npm version, so the two sides cannot be
        # compared textually. The declaration below is the single anchor that
        # relates them, and scripts/check-tool-versions.sh asserts the local pin
        # matches it. Dependabot bumps the SHA but NOT this comment, so the drift
        # check fails closed and forces both sides to move together (#2500).
        # bundles: markdownlint-cli2 0.23.0
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: '**/*.md'
