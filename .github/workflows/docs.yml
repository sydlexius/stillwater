name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.markdownlint-cli2.yaml'
      # Spell-check config consumed by the crate-ci/typos step: a rule change
      # here alters lint outcomes on unchanged markdown, so it must re-trigger.
      - '.typos.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.markdownlint-cli2.yaml'
      # Spell-check config consumed by the crate-ci/typos step: a rule change
      # here alters lint outcomes on unchanged markdown, so it must re-trigger.
      - '.typos.toml'
      - '.github/workflows/docs.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check typos in markdown
        uses: crate-ci/typos@f8a58b6b53f2279f71eb605f03a4ae4d10608f45 # v1.47.0
        with:
          files: '**/*.md'

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: '**/*.md'
