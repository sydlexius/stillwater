name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.markdownlint-cli2.yaml'
      # Spell-check config consumed by the crate-ci/typos step: a rule change
      # here alters lint outcomes on unchanged markdown, so it must re-trigger.
      - '.typos.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.markdownlint-cli2.yaml'
      # Spell-check config consumed by the crate-ci/typos step: a rule change
      # here alters lint outcomes on unchanged markdown, so it must re-trigger.
      - '.typos.toml'
      - '.github/workflows/docs.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check typos in markdown
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
        with:
          files: '**/*.md'

      # Run markdownlint-cli2 EXACTLY as .githooks/pre-commit does, reading the
      # version from the SAME file (.markdownlint-cli2-version). One token, one
      # place: CI and the hook cannot run different linters, because there is only
      # one version in the repo (#2504).
      #
      # This replaces DavidAnson/markdownlint-cli2-action. That action pinned the
      # ACTION version (v24.x) while the hook pinned the CLI's npm version
      # (0.23.x) -- two incomparable schemes. #2501 tried to relate them with a
      # `# bundles:` declaration comment and a parity assertion, but BOTH SIDES
      # READ THE COMMENT, so they always agreed: Dependabot bumping the action's
      # SHA (the exact scenario the guard existed for) left the comment untouched
      # and the check PASSED while CI silently ran a different CLI. A comment
      # asserting a fact is not a check of that fact.
      #
      # Removing the second scheme makes the drift impossible BY CONSTRUCTION
      # rather than detectable by a guard -- and drops one pinned action that
      # Dependabot can no longer bump out of lockstep.
      - name: Lint markdown
        run: |
          version="$(tr -d '[:space:]' < .markdownlint-cli2-version)"
          if [ -z "$version" ]; then
            echo "::error::.markdownlint-cli2-version is empty or missing"
            exit 1
          fi
          echo "markdownlint-cli2 $version (from .markdownlint-cli2-version)"
          npx -y "markdownlint-cli2@${version}" '**/*.md'
