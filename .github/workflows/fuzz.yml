# Scheduled fuzz workflow
#
# Triggers: weekly cron on Monday 06:00 UTC + manual workflow_dispatch.
#
# Schedule choice (Monday 06:00 UTC):
#   - Offset from the existing security.yml cron (Monday 03:30 UTC) by 2.5 h
#     so the two weekly jobs do not compete for ubuntu-latest capacity.
#   - Morning UTC means failures appear early in the European/US workday.
#
# Discovery approach -- static matrix:
#   All fuzz targets are enumerated explicitly rather than via a runtime
#   `grep | jq` dynamic approach. Reasons:
#     1. Dynamic enumeration requires a separate "discover" job, adding
#        latency and complexity.
#     2. A static matrix is self-documenting and easy to review in CI.
#     3. When new fuzz targets are added, updating a matrix entry is an
#        intentional one-line PR that goes through normal review -- not
#        accidental drift.
#   The drift-check job (below) detects when the codebase has more
#   `func Fuzz*` definitions than the matrix has entries and fails CI,
#   directing the developer to update the matrix.
#
# Cache strategy:
#   - Key: "fuzz-corpus-<package>-<fuzz_func>-<hash of go.sum>"
#     go.sum changing (new/upgraded deps) busts the corpus to avoid
#     replaying inputs that exercised old code paths against new code.
#     Per-target keys keep concurrent matrix entries from stomping each
#     other's save-cache.
#   - restore-keys fall back to the previous corpus snapshot for the
#     same (package, fuzz_func) pair so each target accumulates safely
#     between go.sum bumps.
#   - Cache paths per matrix entry:
#       ~/.cache/go-build               -- the Go build cache (speeds up -fuzz compile)
#       <package>/testdata/fuzz/<FuzzName>
#                                       -- accumulated corpus entries for one
#                                          target (written by go test -fuzz when
#                                          new interesting inputs are found)
#
# Crash handling:
#   - go test -fuzz exits non-zero on a crash, which fails the matrix entry.
#   - The testdata/fuzz/<FuzzName>/ directory for the failing package is
#     uploaded as a named artifact so developers can reproduce locally:
#       go test -run=FuzzXxx/corpus-file ./internal/<pkg>/...
#   - Automatic issue creation is deliberately omitted; CI failure + artifact
#     is sufficient signal without the complexity of dedup / rate-limiting.

name: Fuzz

on:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Drift detection: fail if the number of `func Fuzz*` definitions in
  # internal/ does not match the number of matrix entries in the fuzz job.
  # When a developer adds a new fuzz target without updating this file, this
  # job surfaces the gap before the next scheduled run goes silently stale.
  #
  # Matrix entry count is hard-coded (MATRIX_COUNT) and must be updated
  # whenever a matrix entry is added or removed. The step below computes
  # the live count from source and compares the two.
  fuzz-drift-check:
    name: Fuzz matrix drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check fuzz matrix is current
        run: |
          live_file="$(mktemp)"
          matrix_file="$(mktemp)"
          trap 'rm -f "$live_file" "$matrix_file"' EXIT
          grep -RhoE --include='*.go' '^func Fuzz[A-Za-z0-9_]+' internal/ \
            | awk '{print $2}' | sort -u > "$live_file"
          grep -Eo 'fuzz_func:[[:space:]]*"?Fuzz[A-Za-z0-9_]+' .github/workflows/fuzz.yml \
            | sed -E 's/.*(Fuzz[A-Za-z0-9_]+).*/\1/' | sort -u > "$matrix_file"
          echo "Live fuzz targets: $(wc -l < "$live_file" | tr -d ' ')"
          echo "Matrix entry count: $(wc -l < "$matrix_file" | tr -d ' ')"
          missing="$(comm -23 "$live_file" "$matrix_file")"
          extra="$(comm -13 "$live_file" "$matrix_file")"
          if [ -n "$missing$extra" ]; then
            echo ""
            echo "FAIL: fuzz matrix is out of sync with internal/ Fuzz* functions."
            [ -n "$missing" ] && echo "  Missing in matrix:" && echo "$missing" | sed 's/^/    /'
            [ -n "$extra" ] && echo "  Extra in matrix (no live target):" && echo "$extra" | sed 's/^/    /'
            echo "  Update .github/workflows/fuzz.yml matrix to match."
            exit 1
          fi
          echo "OK: matrix set matches live fuzz targets."

  fuzz:
    name: Fuzz (${{ matrix.fuzz_func }})
    runs-on: ubuntu-latest
    # Belt-and-braces against a fuzz target hanging outside the per-test
    # -fuzztime budget; 15 minutes is well above the expected duration of
    # 60s per matrix entry plus checkout/setup overhead.
    timeout-minutes: 15
    strategy:
      # Let every target run even when one crashes so we collect all
      # failing corpora in a single pass.
      fail-fast: false
      matrix:
        include:
          # internal/api (13 targets)
          - package: internal/api
            fuzz_func: FuzzHandleAddAlias
          - package: internal/api
            fuzz_func: FuzzHandleBulkAction
          - package: internal/api
            fuzz_func: FuzzHandleCreateConnection
          - package: internal/api
            fuzz_func: FuzzHandleFieldUpdate
          - package: internal/api
            fuzz_func: FuzzHandleImageFetch
          - package: internal/api
            fuzz_func: FuzzHandleLidarrArtistAdd
          - package: internal/api
            fuzz_func: FuzzHandleNFOConflictCheck
          - package: internal/api
            fuzz_func: FuzzHandleSetupFederated
          - package: internal/api
            fuzz_func: FuzzHandleSetupLocal
          - package: internal/api
            fuzz_func: FuzzHandleUpdateConnection
          - package: internal/api
            fuzz_func: FuzzInboundWebhookGeneric
          - package: internal/api
            fuzz_func: FuzzInboundWebhookJellyfin
          - package: internal/api
            fuzz_func: FuzzInboundWebhookLidarr
          # internal/config (1 target)
          - package: internal/config
            fuzz_func: FuzzConfigLoad
          # internal/encryption (1 target)
          - package: internal/encryption
            fuzz_func: FuzzEncryptionDecrypt
          # internal/image (5 targets)
          - package: internal/image
            fuzz_func: FuzzDetectFormat
          - package: internal/image
            fuzz_func: FuzzExifMetaParse
          - package: internal/image
            fuzz_func: FuzzImageHashHexParse
          - package: internal/image
            fuzz_func: FuzzPerceptualHash
          - package: internal/image
            fuzz_func: FuzzPerceptualHashDeterminism
          # internal/nfo (2 targets)
          - package: internal/nfo
            fuzz_func: FuzzParse
          - package: internal/nfo
            fuzz_func: FuzzParseWriteRoundTrip
          # internal/provider/discogs (1 target)
          # Note: the codebase defines FuzzDiscogsResponses, not FuzzProviderResponseDecoders_Discogs
          - package: internal/provider/discogs
            fuzz_func: FuzzDiscogsResponses
          # internal/provider/musicbrainz (2 targets)
          # Note: the codebase defines FuzzMusicBrainzResponses, not FuzzProviderResponseDecoders_MB
          - package: internal/provider/musicbrainz
            fuzz_func: FuzzMusicBrainzDiffSnapshot
          - package: internal/provider/musicbrainz
            fuzz_func: FuzzMusicBrainzResponses
          # internal/provider/wikidata (1 target)
          # Note: the codebase defines FuzzWikidataResponses, not FuzzProviderResponseDecoders_Wikidata
          - package: internal/provider/wikidata
            fuzz_func: FuzzWikidataResponses
          # internal/provider/wikipedia (1 target)
          # Note: the codebase defines FuzzWikipediaResponses, not FuzzProviderResponseDecoders_Wikipedia
          - package: internal/provider/wikipedia
            fuzz_func: FuzzWikipediaResponses
          # internal/scraper (1 target)
          - package: internal/scraper
            fuzz_func: FuzzScraperConfigRoundTrip
          # internal/settingsio (1 target)
          - package: internal/settingsio
            fuzz_func: FuzzImportEnvelope

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          # Disable the built-in module/build cache so actions/cache below
          # owns the cache lifecycle (keyed per package + go.sum hash).
          cache: false

      - name: Restore fuzz corpus and build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Per-fuzz-function paths and keys: two matrix entries per package
          # run concurrently and each writes new corpus into testdata/fuzz/<name>/.
          # Sharing a path or key would let one job's save-cache stomp the
          # other's new entries.
          path: |
            ~/.cache/go-build
            ${{ matrix.package }}/testdata/fuzz/${{ matrix.fuzz_func }}
          # Bust corpus when go.sum changes: new/upgraded deps may open or
          # close code paths, making old inputs misleading.
          key: fuzz-corpus-${{ matrix.package }}-${{ matrix.fuzz_func }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            fuzz-corpus-${{ matrix.package }}-${{ matrix.fuzz_func }}-

      - name: Run fuzz target (${{ matrix.fuzz_func }})
        run: |
          go test \
            -fuzz=^${{ matrix.fuzz_func }}$ \
            -fuzztime=60s \
            -run=^$ \
            ./${{ matrix.package }}

      - name: Upload crash corpus on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.fuzz_func }}
          # Upload the entire fuzz testdata directory for the failing package.
          # This includes both the seed corpus and any new inputs that triggered
          # the crash so a developer can reproduce with:
          #   go test -run=FuzzXxx/corpus-entry ./internal/<pkg>/...
          path: ${{ matrix.package }}/testdata/fuzz/${{ matrix.fuzz_func }}
          if-no-files-found: warn
          retention-days: 90
