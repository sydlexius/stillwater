name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'internal/api/openapi.yaml'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'internal/api/openapi.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    env:
      REDOCLY_CLI_VERSION: 2.30.3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs/site/requirements.txt

      - name: Install MkDocs and plugins
        # --require-hashes refuses to install any wheel/sdist whose SHA-256
        # does not match the recorded hash in requirements.txt, closing the
        # OpenSSF Scorecard PinnedDependenciesID gap (alert #78). Source-of-
        # truth for top-level pins is docs/site/requirements.in; regenerate
        # the lockfile via `pip-compile --generate-hashes` after editing.
        run: pip install --require-hashes -r docs/site/requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --config-file docs/site/mkdocs.yml

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Lint OpenAPI spec
        run: npx --yes "@redocly/cli@${REDOCLY_CLI_VERSION}" lint internal/api/openapi.yaml

      - name: Build API reference
        run: |
          mkdir -p docs/site/site/api
          npx --yes "@redocly/cli@${REDOCLY_CLI_VERSION}" build-docs internal/api/openapi.yaml \
            --output docs/site/site/api/index.html

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/site/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
