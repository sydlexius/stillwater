# Security scanning pipeline
#
# Jobs:
#   govulncheck       - Go dependency vulnerability scan (push/PR/weekly)
#   hadolint          - Dockerfile best-practice linting (push/PR)
#   trivy             - Container image CVE scan (MEDIUM+), SARIF upload (weekly/manual)
#   sbom              - SBOM generation (Syft) + vulnerability scan (Grype) on releases
#   dockle            - CIS benchmark check for container images (weekly/manual)
#   grype-ignore-expiry - Fail when .grype.yaml ignore entries pass their review-by date (push/PR/weekly)
#   zizmor            - GitHub Actions workflow static analysis, SARIF upload (weekly/manual)
#   source-cve-scan   - Source-tree SBOM (Syft) + vulnerability scan (Grype) (weekly/manual)

name: Security

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 3 * * 1' # weekly, Monday 03:30 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # REQUIRED status check ("Go Vulnerability Check" in the "Protect main"
  # ruleset -- verified live via `gh api repos/.../rulesets/13340463`, #2445).
  # The job always runs and always reports a result; only the expensive
  # install+scan steps are gated on the `relevant` filter, per the maintainer's
  # directive to scope this specifically to go.mod/go.sum (not any Go source
  # change -- a new call path into an already-vetted dependency graph is an
  # accepted gap, matching docs/pr-workflow.md's advisory-local-run framing).
  # Fail-closed: `schedule` (weekly) and `workflow_dispatch` always run the
  # real scan regardless of the filter, since dorny/paths-filter cannot
  # resolve a diff for those triggers and treating that ambiguity as "skip"
  # would silently stop the periodic full-repo scan.
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check relevant paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        # Only runs on push/pull_request (the only events this filter can
        # diff); schedule/workflow_dispatch skip it entirely and are handled
        # by the `run` condition below.
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        with:
          filters: |
            relevant:
              - 'go.mod'
              - 'go.sum'

      - name: Set up Go
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: govulncheck ./...

      - name: Skip (no dependency changes)
        if: steps.filter.outputs.relevant != 'true' && github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        run: echo "No go.mod/go.sum changes; govulncheck skipped (dependency set unchanged)."

  # NOT a required status check (verified live, #2445). Job always runs (so
  # future promotion to required needs no wrapper change); only the actual
  # lint step is gated on the `docker` filter, since a diff touching no
  # Docker-relevant files cannot change hadolint's findings. Fail-closed:
  # workflow_dispatch always runs for real (no diff to filter against).
  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check relevant paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        with:
          filters: |
            docker:
              - 'build/docker/**'
              - 'Dockerfile*'

      - name: Lint Dockerfile
        if: steps.filter.outputs.docker == 'true' || github.event_name == 'workflow_dispatch'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: build/docker/Dockerfile

      - name: Skip (no Dockerfile changes)
        if: steps.filter.outputs.docker != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Dockerfile/build/docker changes; hadolint skipped."

  trivy:
    name: Container Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build image for scanning
        run: docker build -f build/docker/Dockerfile -t stillwater:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: stillwater:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  sbom:
    name: SBOM and Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build image for scanning
        run: docker build -f build/docker/Dockerfile -t stillwater:sbom .

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: stillwater:sbom
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-release-assets: ${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Scan SBOM with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom.cdx.json
          fail-build: true
          severity-cutoff: high
          output-format: table

  dockle:
    name: Container Best Practices
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build image for scanning
        run: docker build -f build/docker/Dockerfile -t stillwater:dockle .

      - name: Install Dockle
        env:
          DOCKLE_VERSION: '0.4.15'
        run: |
          curl -sL "https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-64bit.tar.gz" -o dockle.tar.gz
          tar xz -C /usr/local/bin dockle < dockle.tar.gz
          rm dockle.tar.gz

      - name: Run Dockle
        # CIS-DI-0001 (non-root USER) is intentionally suppressed: the image
        # starts as root so the entrypoint can remap PUID/PGID at runtime,
        # then drops privileges via su-exec before executing the application.
        run: dockle --exit-code 1 --exit-level warn --ignore CIS-DI-0001 stillwater:dockle

  grype-ignore-expiry:
    name: Grype Ignore Expiry Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for expired ignore entries
        run: |
          if [ ! -f .grype.yaml ]; then
            echo "No .grype.yaml found, nothing to check."
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          errors=0
          vuln=""
          review_by=""
          reason=""
          while IFS= read -r line; do
            # Strip leading whitespace, then skip comments and blank lines
            trimmed=${line#"${line%%[![:space:]]*}"}
            case "$trimmed" in ''|'#'*) continue ;; esac
            case "$trimmed" in
              *"vulnerability:"*)
                # Check previous entry had valid review-by and reason
                if [ -n "$vuln" ]; then
                  if [ -z "$review_by" ]; then
                    echo "::error::Grype ignore missing review-by: $vuln"
                    errors=$((errors + 1))
                  fi
                  if [ -z "$reason" ]; then
                    echo "::error::Grype ignore missing reason: $vuln"
                    errors=$((errors + 1))
                  fi
                fi
                vuln=$(echo "$trimmed" | sed 's/.*vulnerability:[[:space:]]*//; s/"//g')
                review_by=""
                reason=""
                ;;
              *"review-by:"*)
                review_by=$(echo "$trimmed" | sed 's/.*review-by:[[:space:]]*//; s/"//g')
                if ! echo "$review_by" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
                  echo "::error::Invalid review-by format for $vuln: $review_by (expected YYYY-MM-DD)"
                  errors=$((errors + 1))
                elif ! date -ud "$review_by" +%s >/dev/null 2>&1; then
                  echo "::error::Invalid review-by date for $vuln: $review_by"
                  errors=$((errors + 1))
                # review-by is the last valid day; entry expires the day after
                elif [ "$today" '>' "$review_by" ]; then
                  echo "::error::Grype ignore expired: $vuln (review-by: $review_by)"
                  errors=$((errors + 1))
                else
                  days_left=$(( ( $(date -ud "$review_by" +%s) - $(date -ud "$today" +%s) ) / 86400 ))
                  echo "OK: $vuln (review-by: $review_by, ${days_left} days remaining)"
                fi
                ;;
              *"reason:"*)
                reason=$(echo "$trimmed" | sed 's/.*reason:[[:space:]]*//; s/"//g')
                ;;
            esac
          done < .grype.yaml
          # Check the last entry in the file
          if [ -n "$vuln" ]; then
            if [ -z "$review_by" ]; then
              echo "::error::Grype ignore missing review-by: $vuln"
              errors=$((errors + 1))
            fi
            if [ -z "$reason" ]; then
              echo "::error::Grype ignore missing reason: $vuln"
              errors=$((errors + 1))
            fi
          fi
          if [ "$errors" -gt 0 ]; then
            echo "::error::${errors} Grype ignore policy error(s). Review and fix the entries listed above."
            exit 1
          fi
          echo "All Grype ignore entries are within their review-by window."

  zizmor:
    name: GitHub Actions Lint (zizmor)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: "true"

  source-cve-scan:
    name: Source Tree CVE Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: source-sbom.cdx.json
          upload-artifact: true

      - name: Scan SBOM with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: source-sbom.cdx.json
          fail-build: true
          severity-cutoff: high
          output-format: table
