# Security scanning pipeline
#
# Jobs:
#   govulncheck  - Go dependency vulnerability scan (push/PR/weekly)
#   hadolint     - Dockerfile best-practice linting (push/PR)
#   trivy        - Container image CVE scan, SARIF upload (weekly/manual)
#   sbom         - SBOM generation (Syft) + vulnerability scan (Grype) on releases
#   dockle       - CIS benchmark check for container images (weekly/manual)

name: Security

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 3 * * 1' # weekly, Monday 03:30 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: build/docker/Dockerfile

  trivy:
    name: Container Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build image for scanning
        run: docker build -f build/docker/Dockerfile -t stillwater:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: stillwater:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  sbom:
    name: SBOM and Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build image for scanning
        run: docker build -f build/docker/Dockerfile -t stillwater:sbom .

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: stillwater:sbom
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-release-assets: ${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Scan SBOM with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom.cdx.json
          fail-build: true
          severity-cutoff: high

  dockle:
    name: Container Best Practices
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build image for scanning
        run: docker build -f build/docker/Dockerfile -t stillwater:dockle .

      - name: Install Dockle
        env:
          DOCKLE_VERSION: '0.4.15'
        run: |
          curl -sL "https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-64bit.tar.gz" -o dockle.tar.gz
          tar xz -C /usr/local/bin dockle < dockle.tar.gz
          rm dockle.tar.gz

      - name: Run Dockle
        run: dockle --exit-code 1 --exit-level warn stillwater:dockle
