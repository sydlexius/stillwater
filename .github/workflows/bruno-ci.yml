# Bruno API integration tests
#
# Builds the Stillwater binary, starts an ephemeral instance against a
# temporary SQLite database, then runs the full Bruno collection to catch
# oneOf/discriminator drift and request-body shape regressions before they
# reach main.
#
# Triggers:
#   pull_request / push to main  -- path-filtered to relevant surfaces
#   workflow_dispatch            -- manual run at any time

name: Bruno API Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  bruno:
    name: Bruno API Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      # Required for Codecov OIDC token exchange (use_oidc: true).
      id-token: write
    # Belt-and-braces against an inadvertently hanging Bruno request or stuck
    # ephemeral server. The full pipeline (build + 4 tools + Bruno + cleanup)
    # comfortably finishes inside 10 min; 15 leaves headroom for runner cold
    # starts without letting a runaway burn an hour of compute.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check relevant paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            relevant:
              - 'api/bruno/**'
              - 'internal/api/**'
              - 'internal/database/migrations/**'
              - 'cmd/stillwater/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/bruno-ci.yml'
              - '.github/bruno/**'

      - name: Set up Go
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .github/bruno/package-lock.json

      - name: Generate templ
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        run: go tool templ generate

      # Install Tailwind via the shared composite action (single source of
      # truth for the linux-x64 binary version + SHA). The project's input.css
      # uses v4 syntax (@import "tailwindcss"), so the standalone binary that
      # bundles tailwindcss is required rather than an npm install. See
      # .github/actions/setup-tailwind for the version/SHA and the note on why
      # this differs from the Dockerfile's musl binary.
      - uses: ./.github/actions/setup-tailwind
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'

      - name: Build Tailwind CSS
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        run: tailwindcss -i web/static/css/input.css -o web/static/css/styles.css --minify

      - name: Build binary
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.1.0-dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PKG=github.com/sydlexius/stillwater/internal/version
          CGO_ENABLED=0 go build \
            -cover \
            -coverpkg=./... \
            -trimpath \
            -ldflags="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}" \
            -o stillwater ./cmd/stillwater

      - name: Install Bruno CLI
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        # Bruno CLI is pinned via .github/bruno/package-lock.json. `npm ci`
        # enforces SHA-512 integrity for the full transitive tree, and the
        # lockfile + npm-ecosystem entry in .github/dependabot.yml gives
        # Dependabot ownership of bumps. Bumping = open .github/bruno, run
        # `npm install <pkg>@<new>`, commit both files.
        run: |
          cd .github/bruno
          npm ci --no-audit --no-fund
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Pick a free port
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        id: port
        run: |
          PORT=$(python3 -c 'import socket; s=socket.socket(); s.bind(("",0)); p=s.getsockname()[1]; s.close(); print(p)')
          echo "port=${PORT}" >> "$GITHUB_OUTPUT"

      - name: Create coverage directory
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        run: mkdir -p "${{ runner.temp }}/bruno-coverage"

      - name: Start Stillwater
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        id: server
        env:
          SW_DB_PATH: ${{ runner.temp }}/stillwater-ci.db
          SW_PORT: ${{ steps.port.outputs.port }}
          SW_LOG_FORMAT: text
          SW_LOG_LEVEL: warn
          SW_BACKUP_ENABLED: "false"
          GOCOVERDIR: ${{ runner.temp }}/bruno-coverage
        run: |
          ./stillwater > "${{ runner.temp }}/stillwater-ci.log" 2>&1 &
          echo "pid=$!" >> "$GITHUB_OUTPUT"

      - name: Wait for server ready and capture CSRF token
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        id: csrf
        env:
          PORT: ${{ steps.port.outputs.port }}
          PID: ${{ steps.server.outputs.pid }}
        run: |
          # Drive readiness off an absolute deadline (60s wall clock) and
          # check the server PID before each probe so a startup crash fails
          # fast instead of burning the full poll loop. The health endpoint
          # sets a csrf_token cookie on its first response; capture it for
          # the login step and the Bruno collection.
          echo "Polling http://127.0.0.1:${PORT}/api/v1/health ..."
          DEADLINE=$(( $(date +%s) + 60 ))
          while [ "$(date +%s)" -lt "${DEADLINE}" ]; do
            if ! kill -0 "${PID}" 2>/dev/null; then
              echo "Stillwater exited before becoming ready"
              cat "${{ runner.temp }}/stillwater-ci.log" || true
              exit 1
            fi
            HEALTH_RESP=$(curl -sf -D - --max-time 5 "http://127.0.0.1:${PORT}/api/v1/health" 2>/dev/null || true)
            if echo "${HEALTH_RESP}" | grep -q '"status":"ok"'; then
              CSRF=$(echo "${HEALTH_RESP}" \
                | grep -i "^set-cookie:" \
                | grep "csrf_token=" \
                | sed 's/.*csrf_token=\([^;]*\).*/\1/' \
                | tr -d '[:space:]')
              if [ -z "${CSRF}" ]; then
                echo "Server ready but no csrf_token cookie in response"
                cat "${{ runner.temp }}/stillwater-ci.log" || true
                exit 1
              fi
              echo "Server is ready"
              echo "csrf=${CSRF}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready within 60s"
          cat "${{ runner.temp }}/stillwater-ci.log" || true
          exit 1

      - name: Bootstrap admin account
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        env:
          PORT: ${{ steps.port.outputs.port }}
          ADMIN_USER: ci-admin
          ADMIN_PASS: ci-ephemeral-pw
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null --max-time 10 -w "%{http_code}" \
            -X POST "http://127.0.0.1:${PORT}/api/v1/auth/setup" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${ADMIN_USER}\",\"password\":\"${ADMIN_PASS}\"}")
          if [ "${HTTP_STATUS}" != "201" ]; then
            echo "Setup returned unexpected status ${HTTP_STATUS}"
            exit 1
          fi
          echo "Admin account created"

      - name: Obtain session token
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        id: session
        env:
          PORT: ${{ steps.port.outputs.port }}
          CSRF_TOKEN: ${{ steps.csrf.outputs.csrf }}
          ADMIN_USER: ci-admin
          ADMIN_PASS: ci-ephemeral-pw
        run: |
          # Login and capture the session cookie value from the Set-Cookie header.
          # The login endpoint is CSRF-exempt but we include the token anyway for
          # safety; subsequent mutating requests from Bruno will require it.
          SESSION=$(curl -sf -D - --max-time 10 \
            -X POST "http://127.0.0.1:${PORT}/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -H "X-CSRF-Token: ${CSRF_TOKEN}" \
            -d "{\"username\":\"${ADMIN_USER}\",\"password\":\"${ADMIN_PASS}\"}" \
            | grep -i "^set-cookie:" \
            | grep "session=" \
            | sed 's/.*session=\([^;]*\).*/\1/' \
            | tr -d '[:space:]')
          if [ -z "${SESSION}" ]; then
            echo "Failed to extract session cookie from login response"
            exit 1
          fi
          echo "session=${SESSION}" >> "$GITHUB_OUTPUT"

      - name: Run Bruno collection
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        id: bruno
        # Bruno's exit code IS the gate: a non-zero exit means at least one
        # in-script `expect` assertion failed, which is what M49's charter
        # asked CI to surface (oneOf/discriminator drift, request-body
        # shape regressions). Per-test green is the contract; transport
        # health below is now belt-and-braces against a server crash that
        # silently produces 0 tests.
        env:
          PORT: ${{ steps.port.outputs.port }}
          SESSION_TOKEN: ${{ steps.session.outputs.session }}
          # STILLWATER_CSRF_TOKEN is read by the collection.bru pre-request script
          # and injected as X-CSRF-Token on all mutating requests so state-changing
          # endpoints pass the CSRF gate without modifying individual .bru files.
          STILLWATER_CSRF_TOKEN: ${{ steps.csrf.outputs.csrf }}
        # Bruno CLI requires execution from the collection root (the directory
        # that contains bruno.json). The --reporter-html path must be absolute
        # so it resolves correctly after the cd.
        run: |
          mkdir -p "${{ runner.temp }}/bruno-results"
          cd api/bruno
          # Step-scoped watchdog so a hung Bruno invocation does not consume
          # the full 15-min job timeout (which would also skip the always()
          # cleanup + failure-artifact steps below). 300s SIGTERM, 30s
          # SIGKILL grace. set -o pipefail so the bru exit code survives the
          # pipe to tee.
          set -o pipefail
          # --disable-cookies opts out of Bruno 3.x's per-collection cookie
          # jar. Without it, Set-Cookie responses from earlier requests are
          # stored and later merged into the request such that the explicit
          # `Cookie: session={{sessionToken}}` header on subsequent .bru
          # files loses its session= value -- authenticated POSTs then fall
          # through authMw as anonymous and get 401. Bruno 1.22.0 did not
          # have a cookie jar, so the tests were written against that
          # behaviour; restoring it here keeps the collection contract.
          timeout --signal=TERM --kill-after=30s 300s \
            bru run \
              --env ci \
              --env-var "baseUrl=http://127.0.0.1:${PORT}" \
              --env-var "sessionToken=${SESSION_TOKEN}" \
              --disable-cookies \
              --output "${{ runner.temp }}/bruno-results/bruno-results.html" \
              --format html \
              --reporter-json "${{ runner.temp }}/bruno-results/bruno-results.json" \
              -r \
              . | tee "${{ runner.temp }}/bruno.log"

      - name: Gate on transport health
        if: steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
        env:
          BRUNO_REPORT: ${{ runner.temp }}/bruno-results/bruno-results.json
        run: |
          set -euo pipefail
          # Belt-and-braces against the (rare) case where every request hits
          # a connection failure but Bruno still exits 0 -- e.g. all .bru
          # files were excluded by a filter. With the assertion gate active
          # the only realistic path to zero-transport-and-zero-failures is a
          # misscoped run, so errorRequests must be zero.
          if [ ! -s "${BRUNO_REPORT}" ]; then
            echo "Bruno JSON report missing or empty: ${BRUNO_REPORT}" >&2
            exit 1
          fi
          # Bruno 3.x writes an array of iteration objects; sum summary fields
          # across iterations so the gate stays correct if --iterations >1
          # is ever enabled. errorRequests = transport-level failures (no
          # response received); totalRequests = transport-level attempts.
          read -r TOTAL ERRORS < <(jq -r \
            '([.[].summary.totalRequests] | add) as $t |
             ([.[].summary.errorRequests] | add) as $e |
             "\($t) \($e)"' "${BRUNO_REPORT}")
          if [ -z "${TOTAL}" ] || [ "${TOTAL}" = "0" ]; then
            echo "Bruno reported 0 total requests; treating as failure" >&2
            exit 1
          fi
          REACHED=$(( TOTAL - ERRORS ))
          echo "Bruno transport: ${REACHED}/${TOTAL} requests reached server (errorRequests=${ERRORS})"
          if [ "${ERRORS}" -ne 0 ]; then
            echo "${ERRORS} transport-level errors -- failing" >&2
            exit 1
          fi

      - name: Stop server
        if: always() && (steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch')
        env:
          PID: ${{ steps.server.outputs.pid }}
        run: |
          if [ -n "${PID}" ]; then
            kill "${PID}" 2>/dev/null || true
            wait "${PID}" 2>/dev/null || true
          fi

      - name: Convert Bruno coverage
        if: always() && (steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch')
        run: |
          COVERDIR="${{ runner.temp }}/bruno-coverage"
          if [ -d "${COVERDIR}" ] && [ -n "$(ls -A "${COVERDIR}" 2>/dev/null)" ]; then
            go tool covdata textfmt -i="${COVERDIR}" -o=bruno-coverage.out
          else
            echo "Coverage directory missing or empty; skipping conversion"
          fi

      # Bruno coverage is deliberately NOT uploaded to Codecov.
      #
      # Codecov posts its commit status after `after_n_builds` uploads arrive,
      # and that value defaults to 1. This job finishes minutes before ci.yml's
      # merged Go profile does, so uploading here made Bruno the FIRST upload:
      # Codecov computed codecov/patch from Bruno-only coverage, which exercises
      # almost none of a Go diff, and posted a red 0% while the 11 test shards
      # were still running. Measured on PR #2752 -- Bruno API Tests completed
      # 05:13:39Z, codecov/patch fired 05:13:46Z.
      #
      # Raising after_n_builds is not a fix: the upload count is variable. This
      # step is conditional, so a PR where Bruno is not relevant produces only
      # ONE upload, and after_n_builds: 2 would leave the status pending forever
      # -- worse than firing early. Removing this upload makes the count
      # deterministically 1 on every path, so the default is correct and no
      # tuning is needed.
      #
      # Nothing gated on this upload: codecov.yml has no flag-scoped status
      # (nothing keys on `flags:`), and the required Coverage Floor check reads
      # ci.yml's merged profile, which never included Bruno. The Bruno suite
      # itself still runs and still gates -- only the coverage upload is gone.

      - name: Upload test results on failure
        if: failure() && (steps.filter.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bruno-results
          path: ${{ runner.temp }}/bruno-results/
          retention-days: 7
