version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 5
    # Sub-actions of one repo share a commit SHA, but Dependabot names each
    # subpath as its own dependency and will happily bump one and not the rest.
    # These groups force a single PR per family so the pins cannot drift apart.
    #
    # codeql-action is the family that already broke: init writes a config file
    # stamped with its own version, and a stale analyze refuses to load it
    # ("Loaded a configuration file for version X, but running version Y"),
    # failing every CodeQL job. actions/cache is consistent today but is exposed
    # to the identical split, so it is grouped pre-emptively.
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"
      actions-cache:
        patterns:
          - "actions/cache*"

  - package-ecosystem: docker
    directory: /build/docker
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    commit-message:
      prefix: "docker"
    labels:
      - dependencies
      - docker
    open-pull-requests-limit: 5

  # Bruno CLI is pinned via .github/bruno/package-lock.json and installed by
  # the bruno-ci workflow with `npm ci`. Only direct dep is @usebruno/cli;
  # transitives are locked by SHA-512 integrity in the lockfile.
  - package-ecosystem: npm
    directory: /.github/bruno
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 3

  # Root npm project: the CSS linter (stylelint + plugins) and the a11y/UAT
  # harness (playwright, axe-core, jsdom). Dev-only -- nothing here ships in the
  # binary or the container.
  #
  # This entry buys SCHEDULED VERSION updates, which are config-driven and so
  # never ran for this tree. It is NOT what makes security alerts reach it:
  # security updates are alert-driven and already reach unlisted directories
  # (#2695 bumped /docs/hero/captions, which is likewise unlisted, two minutes
  # after its advisory landed). The point is to keep the tree current between
  # advisories rather than letting a CVE be the first thing that moves it.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
    labels:
      - dependencies
    open-pull-requests-limit: 3

  # Hero-caption renderer (Remotion + React), used to produce the docs hero
  # video. Not part of any build or CI path, so updates are informational -- but
  # it carries a full React/TypeScript tree and was likewise uncovered.
  - package-ecosystem: npm
    directory: /docs/hero/captions
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
    labels:
      - dependencies
      - documentation
    open-pull-requests-limit: 2

  # Docs site uses pip-compile with --generate-hashes; Dependabot detects the
  # autogen header on requirements.txt and updates both .in and .txt together
  # for direct deps. Transitive security alerts in the lockfile (see #1437)
  # still need manual pip-compile --upgrade-package runs.
  - package-ecosystem: pip
    directory: /docs/site
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    commit-message:
      prefix: "docs"
    labels:
      - dependencies
      - documentation
    open-pull-requests-limit: 3
