# Environment setup for the Copilot Coding Agent.
#
# Runs before the agent starts working on an issue. Installs the same
# toolchain CI uses so the agent can build, test, lint, and use gh.

name: Copilot Setup Steps

on: copilot_setup

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

steps:
  - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

  - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
    with:
      go-version-file: go.mod

  - name: Install goimports
    run: go install golang.org/x/tools/cmd/goimports@v0.43.0

  - name: Install Tailwind CSS
    uses: ./.github/actions/setup-tailwind

  - name: Install golangci-lint
    run: |
      curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
        | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2

  - name: Verify build
    run: make build
