language: en-US
reviews:
  auto_review:
    enabled: true
    drafts: false
    auto_pause_after_reviewed_commits: 0
  path_filters:
    - "!**/*.csv"
    - "!**/*.env*"
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_instructions: |
    After completing your full review, end your summary comment
    with the exact phrase on its own line:
    "This is the Way."
chat:
  auto_reply: true
