# Alternative pre-commit entrypoint for contributors who use the
# pre-commit framework (https://pre-commit.com). The canonical hook
# wired via `core.hooksPath = .githooks` is `.githooks/pre-commit`,
# which mirrors these checks in plain bash and is what CI expects.
# Tool version pins below should stay in sync with the canonical hook and CI
# (the tracked tools: markdownlint-cli2, golangci-lint, typos, and Tailwind).
# scripts/check-tool-versions.sh asserts these agree across all entrypoints
# and runs in the pre-push gate, so a drift here fails before push.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # styles.css is generated by `tailwindcss --minify`, which emits no
      # trailing newline. end-of-file-fixer would append one, diverging the
      # committed file from `make generate` output and failing CI's Generated
      # Files gate. Both whitespace hooks skip the generated CSS for that
      # reason; the hand-written input.css stays covered.
      - id: trailing-whitespace
        exclude: ^web/static/css/styles\.css$
      - id: end-of-file-fixer
        exclude: ^web/static/css/styles\.css$
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict

  - repo: https://github.com/crate-ci/typos
    # Keep in sync with .github/workflows/docs.yml (crate-ci/typos SHA pin).
    # Dependabot bumps the docs.yml pin; run `make sync-tool-versions` to mirror
    # the new version here (Dependabot cannot edit pre-commit rev: pins itself).
    rev: v1.47.0
    hooks:
      - id: typos

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/golangci/golangci-lint
    # rev must match the version pinned in .github/workflows/ci.yml's golangci-lint-action step to prevent cross-version //nolint drift; see #1560
    rev: v2.12.2
    hooks:
      - id: golangci-lint

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      - id: templ-generate
        name: templ-generate
        language: system
        entry: bash -c 'go tool templ generate && { git diff -z --name-only -- "*_templ.go"; git ls-files -z --others --exclude-standard -- "*_templ.go"; } | xargs -0 git add --' --
        files: '\.templ$'
        pass_filenames: false

      # Mirrors the tailwind-generate section in .githooks/pre-commit (the
      # canonical hook). When a .templ or input.css change lands in a commit,
      # styles.css must be regenerated; this hook fails if it drifts so
      # contributors don't ship a commit that CI's Gate / Generated Files job
      # will reject (#1656).
      - id: tailwind-generate
        name: tailwind-generate
        language: system
        # always_run + an inline git diff gate is required (instead of the
        # usual files: regex) because pre-commit's files: matcher excludes
        # deleted paths from the candidate set even when pass_filenames is
        # false. Without always_run, deleting the last consumer of a Tailwind
        # class set would slip past this hook while the canonical
        # .githooks/pre-commit catches it. See pre-commit/pre-commit#749.
        always_run: true
        entry: |
          bash -c 'set -e; staged=$(git diff --cached --name-only --diff-filter=ACMRD -- "*.templ" "web/static/css/input.css"); if [ -z "$staged" ]; then exit 0; fi; if ! command -v tailwindcss >/dev/null 2>&1; then echo "tailwindcss not found on PATH. Install it (see README) so staged .templ / input.css changes can regenerate web/static/css/styles.css before commit."; exit 1; fi; tailwindcss -i web/static/css/input.css -o web/static/css/styles.css --minify; dirty=$(git diff --name-only -- web/static/css/styles.css); if [ -n "$dirty" ]; then echo "tailwind styles.css is stale; run make tailwind && git add web/static/css/styles.css"; exit 1; fi' --
        pass_filenames: false

      - id: gofmt
        name: gofmt
        language: system
        entry: bash -c 'out=$(gofmt -l "$@"); [ -z "$out" ] || { echo "Unformatted files:"; echo "$out"; exit 1; }' --
        types: [go]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]
