# Alternative pre-commit entrypoint for contributors who use the
# pre-commit framework (https://pre-commit.com). The canonical hook
# wired via `core.hooksPath = .githooks` is `.githooks/pre-commit`,
# which mirrors these checks in plain bash and is what CI expects.
# Tool version pins below should stay in sync with the canonical hook
# (notably: markdownlint-cli2 v0.22.1, golangci-lint v2.12.2, typos v1.44.0).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict

  - repo: https://github.com/crate-ci/typos
    rev: v1.44.0
    hooks:
      - id: typos

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/golangci/golangci-lint
    # rev must match the version pinned in .github/workflows/ci.yml's golangci-lint-action step to prevent cross-version //nolint drift; see #1560
    rev: v2.12.2
    hooks:
      - id: golangci-lint

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      - id: templ-generate
        name: templ-generate
        language: system
        entry: bash -c 'go tool templ generate && { git diff -z --name-only -- "*_templ.go"; git ls-files -z --others --exclude-standard -- "*_templ.go"; } | xargs -0 git add --' --
        files: '\.templ$'
        pass_filenames: false

      - id: gofmt
        name: gofmt
        language: system
        entry: bash -c 'out=$(gofmt -l "$@"); [ -z "$out" ] || { echo "Unformatted files:"; echo "$out"; exit 1; }' --
        types: [go]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]
