# typos-cli configuration
# https://github.com/crate-ci/typos

[files]
extend-exclude = [
    "*.min.js",
    "*.min.css",
    "go.sum",
    "*_templ.go",
    "docs/milestone-55/prototypes/standalone/*.html",
    "docs/prototypes/**",
]

[default.extend-identifiers]
# Go variable names that are not typos
fpr = "fpr"  # FieldProviderResult in internal/provider/orchestrator.go

[default.extend-words]
# Project / standard names that look like typos.
# in-toto (https://in-toto.io) is the SLSA attestation format; ".intoto.jsonl"
# is the canonical file suffix that OpenSSF Scorecard's Signed-Releases check
# recognizes. Without this allowlist, typos rewrites it to ".into.jsonl" and
# silently breaks Scorecard provenance detection.
intoto = "intoto"
# "catalogue" is British English, used consistently in doc filenames and prose
# (rules-catalogue.md, provider catalogue, etc.).
catalogue = "catalogue"
# "chambre" (from "Musique de chambre" = Chamber Music, the fr translation of
# the Chamber Music genre tag) is correct French but accent-free, so typos
# flags it as a misspelling of English "chamber". Other French display values
# carry diacritics and are not flagged, so this is the only entry needed.
chambre = "chambre"
# "correspondant" / "correspondants" (= matching) and "limite" (= limit) are
# correct French in the fr.json Tag Sources strings, but typos reads them as
# misspelled English "correspondent" / "limit" and would rewrite them.
correspondant = "correspondant"
correspondants = "correspondants"
limite = "limite"
# "sur" (= on/over) is a common French preposition used in the fr.json
# capped message ("{count} artistes sur {total} chargés"). typos flags it
# as a misspelling of English "sure".
sur = "sur"
