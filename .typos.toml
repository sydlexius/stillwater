# typos-cli configuration
# https://github.com/crate-ci/typos

[files]
extend-exclude = [
    "*.min.js",
    "*.min.css",
    "go.sum",
    "*_templ.go",
    "docs/milestone-55/prototypes/standalone/*.html",
    "docs/prototypes/**",
    # Dumped fixture data for the #1756 README hero (docs/hero). It is generated
    # DB content (discography/NFO/metadata blobs, multilingual titles), not
    # prose, and is regenerated by docs/hero/seed-fixture.sh.
    "docs/hero/seed/*.sql",
]

[default.extend-identifiers]
# Go variable names that are not typos
fpr = "fpr"  # FieldProviderResult in internal/provider/orchestrator.go

[default.extend-words]
# Project / standard names that look like typos.
# in-toto (https://in-toto.io) is the SLSA attestation format; ".intoto.jsonl"
# is the canonical file suffix that OpenSSF Scorecard's Signed-Releases check
# recognizes. Without this allowlist, typos rewrites it to ".into.jsonl" and
# silently breaks Scorecard provenance detection.
intoto = "intoto"
# "catalogue" is British English, used consistently in doc filenames and prose
# (rules-catalogue.md, provider catalogue, etc.).
catalogue = "catalogue"
# "chambre" (from "Musique de chambre" = Chamber Music, the fr translation of
# the Chamber Music genre tag) is correct French but accent-free, so typos
# flags it as a misspelling of English "chamber". Other French display values
# carry diacritics and are not flagged, so this is the only entry needed.
chambre = "chambre"
# "correspondant" / "correspondants" (= matching) and "limite" (= limit) are
# correct French in the fr.json Tag Sources strings, but typos reads them as
# misspelled English "correspondent" / "limit" and would rewrite them.
correspondant = "correspondant"
correspondants = "correspondants"
limite = "limite"
# "sur" (= on/over) is a common French preposition used in the fr.json
# capped message ("{count} artistes sur {total} chargés"). typos flags it
# as a misspelling of English "sure".
sur = "sur"
# French words used in the artist_duplicates merge modal translations.
# Each is a correct French word flagged by the English-oriented spell checker:
# "conflit" (= conflict), "groupe" (= group), "cours" (= in progress, as in
# "en cours"), "termine" (= finishes/ends), "contient" (= contains).
conflit = "conflit"
groupe = "groupe"
cours = "cours"
termine = "termine"
contient = "contient"
# AIMD (Additive Increase / Multiplicative Decrease) is a network-congestion
# control algorithm; its abbreviation is not a misspelling of "aimed".
AIMD = "AIMD"
aimd = "aimd"
# French words in the fr.json next/ logs viewer strings (M55 #1338), correct
# French flagged by the English-oriented checker: "Composant" (= Component) and
# "presse" (as in "presse-papiers" = clipboard).
Composant = "Composant"
presse = "presse"
# "Essentiels" (= Essentials) is the fr translation of the next/ settings rail
# "Essentials" group heading; correct French, flagged as misspelled English.
Essentiels = "Essentiels"
# "existantes" (= existing, fem. plural) is correct French in the fr.json
# settings.behavior.description string; typos reads it as misspelled English.
existantes = "existantes"
# "exemple" (= example) is correct French in the fr.json settings.behavior
# description ("par exemple ..."); typos reads it as misspelled English.
exemple = "exemple"
# "authentification" (= authentication) is correct French in the fr.json
# settings.next.section.auth rail label; typos reads it as misspelled English.
authentification = "authentification"
# "Handel" is the composer George Frideric Handel, named in the #1756 hero
# fixture (docs/hero); typos reads it as a misspelling of "Handle".
Handel = "Handel"
# "nd" is the Creative Commons NoDerivatives license abbreviation (e.g. CC BY-ND),
# used in the docs/hero/fetch-portraits.sh license-reject guard; typos reads the
# bare token as a misspelling of "and".
nd = "nd"
