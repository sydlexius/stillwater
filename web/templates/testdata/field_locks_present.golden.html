<section id="next-field-locks-art-1" class="sw-dash-card" aria-labelledby="next-field-locks-heading-art-1"><div class="body"><div class="flex items-center gap-2 mb-2"><h2 id="next-field-locks-heading-art-1" class="sw-next-subhead" style="margin:0">Locked fields</h2><span class="sw-context-help" id="next-help-locked-fields-panel-art-1"><button type="button" class="sw-context-help-btn" aria-label="Help: Locked fields" aria-expanded="false" aria-controls="next-help-locked-fields-panel-art-1-popover" onclick="swContextHelpToggle(this)" onkeydown="if(event.key==='Escape')swContextHelpClose(this)">?</button> <span id="next-help-locked-fields-panel-art-1-popover" role="tooltip" class="sw-context-help-popover" aria-hidden="true">These fields are individually pinned. Even on an unlocked artist, pinned fields are skipped by provider refreshes, fill-empty merges, and NFO imports. Unlocking the artist does not clear field pins -- they are independent. <a href="https://sydlexius.github.io/stillwater/core-concepts/field-locks#layer-2-field-locks-per-field-protection" target="_blank" rel="noopener" class="sw-context-help-link">Read more →</a></span></span></div><div class="flex flex-wrap gap-2"><span class="sw-next-field-lock-chip inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs" style="background:var(--swd-warn-soft);color:var(--swd-warn)">biography <button type="button" class="ml-1 hover:opacity-75" style="color:var(--swd-warn)" hx-delete="/api/v1/artists/art-1/field-locks/biography" hx-swap="none" hx-trigger="click" hx-on::after-request="(function(btn, ev){ if (ev.detail.successful) { var chip = btn.closest('.sw-next-field-lock-chip'); var panel = btn.closest('[id^=\'next-field-locks-\']'); chip.remove(); if (panel && !panel.querySelector('.sw-next-field-lock-chip')) { panel.remove(); } } else { alert(btn.getAttribute('data-unlock-error') || 'Unlock failed. Please try again.'); } })(this, event)" data-unlock-error="Unlock failed. Please try again." aria-label="Unlock field">x</button></span><span class="sw-next-field-lock-chip inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs" style="background:var(--swd-warn-soft);color:var(--swd-warn)">genres <button type="button" class="ml-1 hover:opacity-75" style="color:var(--swd-warn)" hx-delete="/api/v1/artists/art-1/field-locks/genres" hx-swap="none" hx-trigger="click" hx-on::after-request="(function(btn, ev){ if (ev.detail.successful) { var chip = btn.closest('.sw-next-field-lock-chip'); var panel = btn.closest('[id^=\'next-field-locks-\']'); chip.remove(); if (panel && !panel.querySelector('.sw-next-field-lock-chip')) { panel.remove(); } } else { alert(btn.getAttribute('data-unlock-error') || 'Unlock failed. Please try again.'); } })(this, event)" data-unlock-error="Unlock failed. Please try again." aria-label="Unlock field">x</button></span></div></div></section>
