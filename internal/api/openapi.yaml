      tags: [Artists]
      summary: Link a Discogs ID to the artist and refresh
      operationId: discogsLink
      description: >
        Persists the selected numeric Discogs ID on the artist and runs a
        metadata refresh. Two guards apply: a locked discogs_id field is refused
        with 409 (field_locked), and because the refresh may write artist.nfo the
        request is subject to the NFO conflict gate (409 when blocked). Returns an
        HTML fragment when the HX-Request header is set.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                discogs_id:
                  type: string
                  description: Numeric Discogs artist ID.
              required: [discogs_id]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                discogs_id:
                  type: string
              required: [discogs_id]
      responses:
        "200":
          description: Linked and refreshed (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  artist_id:
                    type: string
                  discogs_id:
                    type: string
            text/html:
              schema:
                type: string
        "400":
          description: Missing or non-numeric discogs_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: discogs_id field locked or conflict gate blocked the write
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ConflictWriteBlock"
                  - $ref: "#/components/schemas/FieldLockedError"
                discriminator:
                  propertyName: error
                  mapping:
                    field_locked: "#/components/schemas/FieldLockedError"
                    nfo_write_blocked: "#/components/schemas/ConflictWriteBlock"
                    round_trip_write_blocked: "#/components/schemas/ConflictWriteBlock"
        "500":
          description: Failed to link Discogs ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Artist service not configured / unavailable
          content:
            application/json:
