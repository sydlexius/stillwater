      summary: List rules
      description: >
        Returns all rules with their filesystem_dependent flag set. Also
        includes has_local_library indicating whether at least one library
        with a filesystem path exists. Filesystem-dependent rules cannot
        be enabled when has_local_library is false.
      operationId: listRules
      responses:
        "200":
          description: List of rules with local library status
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                    description: List of configured rules.
                  has_local_library:
                    type: boolean
                    description: True when at least one library with a filesystem path exists

  /rules/{id}:
    put:
      tags: [Rules]
      summary: Update rule
      operationId: updateRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                automation_mode:
                  type: string
                  enum: [auto, manual]
                  description: Automation mode for this rule. Use the enabled flag to disable a rule; "disabled" is not a valid automation_mode value.
                config:
                  type: object
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request (e.g., unsupported automation_mode value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict when enabling a filesystem-dependent rule without any local library path configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/{id}/results:
    get:
      tags: [Rules]
      summary: List per-artist results for a single rule (drill-down)
      operationId: listRuleResults
      description: >
        Returns a paginated list of artists with their current pass/fail
        state for the given rule (#699 slice 2). The JSON envelope matches
        /reports/compliance so the front-end pagination component can be
        reused unchanged. Unknown rule IDs return 200 with an empty rows
        array rather than 404 -- friendlier for a UI that polls during
        rule (re)configuration.
      parameters:
        - name: id
          in: path
          required: true
          description: Rule ID.
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 1-indexed page number. Out-of-range values are clamped by the handler (page < 1 becomes 1; pathologically large values that would overflow offset math are clamped to max-int / page_size).
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          required: false
          description: Page size. The handler clamps to [1, 200] (default 50); the schema does not declare strict bounds because the server accepts any integer and clamps server-side.
          schema:
            type: integer
            default: 50
        - name: passed
          in: query
          required: false
          description: Tri-state filter on pass/fail. Empty == any.
          allowEmptyValue: true
          schema:
            type: string
            enum: [passed, failed, any, ""]
            default: any
      responses:
        "200":
          description: Paginated drill-down list (empty when the rule has no rule_results rows yet).
          content:
            application/json:
              schema:
                type: object
                required: [rows, total, page, page_size]
                properties:
                  rows:
                    type: array
                    description: One row per artist evaluated against this rule, joined with artist display name and (first) library membership.
                    items:
                      type: object
                      required: [artist_id, rule_id, passed, evaluated_at, first_failed_at, last_passed_at, artist_name, is_excluded]
                      properties:
                        artist_id:
                          type: string
                        rule_id:
                          type: string
                        passed:
                          type: boolean
                        violation_id:
                          type: string
                          description: Stable identifier for the current violation, omitted when passed.
                        violation_message:
                          type: string
                          description: Human-readable failure message, omitted when passed.
                        evaluated_at:
                          type: string
                          format: date-time
                        first_failed_at:
                          type: [string, "null"]
                          format: date-time
                        last_passed_at:
                          type: [string, "null"]
                          format: date-time
                        artist_name:
                          type: string
                        is_excluded:
                          type: boolean
                          description: True if the artist is currently excluded from rule evaluations. The row is still returned so callers can render an "(excluded)" badge.
                        library_name:
                          type: string
                          description: First library the artist belongs to, empty when none.
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/{id}/run:
    post:
      tags: [Rules]
      summary: Start async evaluation of a single rule
      description: >
        Launches rule evaluation in a background goroutine and returns immediately.
        Shares the status slot with run-all; poll GET /rules/run-all/status for progress.
        Defaults to incremental scope (only artists flagged dirty since their last
        evaluation are processed). Pass scope=all to force evaluation against every
        eligible artist.
      operationId: runRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [incremental, all]
            default: incremental
          description: >
            Which artists to evaluate. Defaults to "incremental" (only artists
            flagged dirty since their last evaluation). "all" is the admin
            "Re-evaluate All" path that forces a full sweep.
      responses:
        "202":
          description: Rule evaluation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleRunStatus"
        "400":
          description: Invalid scope query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A rule evaluation is already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/run-all:
    post:
      tags: [Rules]
      summary: Run all enabled rules (async)
      description: >
        Starts an asynchronous run of all enabled rules.
        Returns 202 immediately; poll GET /rules/run-all/status for completion status.
        Defaults to incremental scope (only artists flagged dirty since their last
        evaluation are processed). Pass scope=all for the "Re-evaluate All" admin
        sweep that re-evaluates every eligible artist.
      operationId: runAllRules
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [incremental, all]
            default: incremental
          description: >
            Which artists to evaluate. Defaults to "incremental" (only artists
            flagged dirty since their last evaluation). "all" forces a full sweep.
      responses:
        "202":
          description: Run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleRunStatus"
        "400":
          description: Invalid scope query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A run is already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message explaining why the run could not start.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/run-all/status:
    get:
      tags: [Rules]
      summary: Get async rule-run status
      description: >
        Returns the current status of the most recent rule evaluation,
        whether triggered by run-all or a single-rule run. Both share
        the same status slot; only one can run at a time.
      operationId: getRunAllRulesStatus
      responses:
        "200":
          description: Current run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleRunStatus"

  /rules/status:
    get:
      tags: [Rules]
      summary: Get rule scheduler status
      description: Returns the current state of the rule evaluation scheduler.
      operationId: getRulesStatus
      responses:
        "200":
          description: Scheduler status
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_evaluation_at:
                    type: [string, "null"]
                    format: date-time
                    description: When the last rule evaluation completed (UTC, RFC 3339).
                  interval_minutes:
                    type: integer
                    description: Minutes between scheduled rule evaluations.
                  next_evaluation_at:
                    type: [string, "null"]
                    format: date-time
                    description: When the next scheduled evaluation will run (UTC, RFC 3339).
                  scheduler_enabled:
                    type: boolean
                    description: Whether the automatic rule scheduler is enabled.

  /bulk/fetch-metadata:
    post:
      tags: [Bulk Operations]
      summary: Start bulk metadata fetch
      operationId: bulkFetchMetadata
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [prompt_no_match, yolo, auto_exact, auto_similar]
                  default: prompt_no_match
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object
        "409":
          description: Another job is already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bulk/fetch-images:
    post:
      tags: [Bulk Operations]
      summary: Start bulk image fetch
      operationId: bulkFetchImages
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  default: prompt_no_match
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object

  /bulk/jobs:
    get:
      tags: [Bulk Operations]
      summary: List recent bulk jobs
      operationId: listBulkJobs
      responses:
        "200":
          description: Recent jobs (last 20)
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      type: object
                    description: List of bulk operation jobs.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bulk/jobs/{id}:
    get:
      tags: [Bulk Operations]
      summary: Get bulk job details
      operationId: getBulkJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job with items
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    type: object
                    description: Bulk job details.
                  items:
                    type: array
                    items:
                      type: object
                    description: Individual items within the bulk job.
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bulk/jobs/{id}/cancel:
    post:
      tags: [Bulk Operations]
      summary: Cancel running bulk job
      operationId: cancelBulkJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job canceling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/bulk-actions:
    post:
      tags: [Bulk Operations]
      summary: Start a bulk action over an explicit artist ID list
      operationId: startBulkAction
      description: >
        Runs the requested action for each artist in the supplied ID list.
        Only one bulk action may run at a time; concurrent starts are rejected
        with 409 Conflict. The accepted actions are run_rules,
        re_identify_auto (legacy alias: re_identify), scan,
        fetch_images, lock, and unlock. The review flow is started separately
        via POST /artists/re-identify/wizard. Progress is reported via
        GET /artists/bulk-actions/status and a bulk.completed SSE event is
        published when the run finishes. lock / unlock are idempotent:
        already-locked artists count as Skipped on lock, and not-locked
        artists count as Skipped on unlock.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, ids]
              properties:
                action:
                  type: string
                  enum: [run_rules, re_identify, re_identify_auto, scan, fetch_images, lock, unlock]
                  description: >
                    Action to apply to each artist in the list. The legacy
                    value re_identify is an alias for re_identify_auto; the
                    wizard variant (re_identify_review) is dispatched
                    separately via POST /artists/re-identify/wizard.
                    lock / unlock set source="user" via the artist service
                    and are idempotent (no-op calls report as Skipped).
                ids:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: string
                    pattern: "^[A-Za-z0-9_-]{1,64}$"
                  description: Artist IDs to process (max 1000 per request).
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                type: object
                required: [status, action, total]
                properties:
                  status:
                    type: string
                    enum: [running]
                  action:
                    type: string
                    enum: [run_rules, re_identify_auto, scan, fetch_images, lock, unlock]
                    description: >
                      Canonical action value as emitted by the handler.
                      The legacy alias re_identify is normalized to
                      re_identify_auto on entry, so this response will
                      never carry the legacy value.
                  total:
                    type: integer
        "400":
          description: Invalid request body or IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Another bulk action is already running
          content:
            application/json:
              schema:
                type: object
                required: [status, message]
                properties:
                  status:
                    type: string
                    enum: [running]
                  message:
                    type: string
        "503":
          description: Required service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/bulk-actions/status:
    get:
      tags: [Bulk Operations]
      summary: Get the current bulk-action progress
      operationId: getBulkActionStatus
      responses:
        "200":
          description: Returns live progress while a bulk action is running, or the most recent terminal snapshot (completed, failed, or canceled) once it has finished. Returns status=idle only when no snapshot exists yet (process has never run a bulk action since startup).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, running, completed, failed, canceled]
                  action:
                    type: string
                    enum: [run_rules, re_identify_auto, scan, fetch_images, lock, unlock]
                    description: >
                      Canonical emitted action value. The legacy alias
                      re_identify is normalized on entry by
                      handleBulkAction, so the snapshot never carries it.
                  total:
                    type: integer
                  processed:
                    type: integer
                  succeeded:
                    type: integer
                  skipped:
                    type: integer
                  failed:
                    type: integer
                  current_name:
                    type: string

  /artists/bulk-actions/cancel:
    post:
      tags: [Bulk Operations]
      summary: Cancel the in-flight bulk action
      operationId: cancelBulkAction
      description: >
        Signals the running bulk action goroutine to stop at its next iteration.
        The action's progress snapshot is finalized with status=canceled so
        clients can distinguish canceled runs from normal completion.
      responses:
        "200":
          description: Cancellation requested
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [canceling]
        "409":
          description: No bulk action is currently running
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string

  /artists/bulk-identify:
    post:
      tags: [Bulk Operations]
      summary: Start bulk artist identification
      operationId: startBulkIdentify
      description: >
        Processes unidentified artists (missing MusicBrainz ID) through a 3-tier
        pipeline: connection-based matching, album comparison, and name-only search.
        Returns 409 if a job is already running.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                library_id:
                  type: string
                  description: Optional library ID to scope the identification to a single library.
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                    description: Current state of the identification process.
                  total:
                    type: integer
                    description: Number of unidentified artists to process.
        "200":
          description: No unidentified artists found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [completed]
                    description: Current state of the identification process.
                  message:
                    type: string
                    description: Human-readable result detail.
                  total:
                    type: integer
                    description: Total number of artists to identify.
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Job already running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                    description: Status indicating a conflict.
                  message:
                    type: string
                    description: Human-readable result detail.
        "500":
          description: Failed to list artists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Artist service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Bulk Operations]
      summary: Get bulk identification progress
      operationId: getBulkIdentifyProgress
      responses:
        "200":
          description: Current progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifyProgress"
    delete:
      tags: [Bulk Operations]
      summary: Cancel bulk identification
      operationId: cancelBulkIdentify
      responses:
        "200":
          description: Cancellation status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, canceling, completed, canceled]
                    description: >
                      Current job status. "canceling" when a running job has been
                      asked to stop; "completed" or "canceled" if the job already
                      finished; "idle" if no job exists.
                  message:
                    type: string
                    description: Human-readable result detail.
                required:
                  - status
                  - message

  /artists/bulk-identify/link:
    post:
      tags: [Bulk Operations]
      summary: Link artist to MusicBrainz ID and refresh
      operationId: bulkIdentifyLink
      description: >
        Links an artist to a MusicBrainz ID and attempts a full metadata refresh.
        If the artist exists in the bulk-identify review queue, it is removed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artist_id, mbid]
              properties:
                artist_id:
                  type: string
                mbid:
                  type: string
                  description: MusicBrainz artist ID to link.
                discogs_id:
                  type: string
                  description: Optional Discogs artist ID.
      responses:
        "200":
          description: Artist linked and refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [linked]
                    description: Result status of the link operation.
                  artist_id:
                    type: string
                    description: ID of the linked artist.
                  mbid:
                    type: string
                    description: MusicBrainz ID that was linked.
        "400":
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to update artist or refresh metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Artist service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/re-identify/wizard:
    post:
      tags: [Bulk Operations]
      summary: Start an interactive re-identify wizard session
      operationId: startReIdentifyWizard
      description: >
        Creates a new wizard session over the supplied artist IDs and returns
        a session_id the UI uses to walk through per-artist candidate review.
        Candidates are fetched on demand (with the next step pre-fetched in
        the background). Sessions are in-memory and TTL-bounded; they are not
        persisted across restarts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: string
                    pattern: "^[A-Za-z0-9_-]{1,64}$"
      responses:
        "202":
          description: Wizard session created
          content:
            application/json:
              schema:
                type: object
                required: [session_id, total, index, skipped_ids, skipped_errors]
                properties:
                  session_id: {type: string}
                  total:      {type: integer}
                  index:      {type: integer}
                  skipped_ids:
                    type: array
                    description: |
                      IDs the start endpoint had to drop because the
                      underlying artist record was missing or could not be
                      loaded. Always present; empty when no IDs were skipped.
                    items: {type: string}
                  skipped_errors:
                    type: array
                    description: |
                      Per-skipped-ID reason classification. Reason is
                      "not_found" when the ID resolved to no such record,
                      or "load_error" for any other backend failure.
                    items:
                      type: object
                      required: [id, reason]
                      properties:
                        id:     {type: string}
                        reason:
                          type: string
                          enum: [not_found, load_error]
        "400": {description: Invalid request body}
        "503": {description: Artist service not configured}

  /artists/re-identify/wizard/{sid}/step/{idx}/accept:
    post:
      tags: [Bulk Operations]
      summary: Accept a candidate for the current wizard step
      operationId: acceptReIdentifyWizardStep
      parameters:
        - in: path
          name: sid
          required: true
          schema: {type: string}
        - in: path
          name: idx
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mbid]
              properties:
                mbid:       {type: string}
                discogs_id: {type: string}
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [mbid]
              properties:
                mbid:       {type: string}
                discogs_id: {type: string}
      responses:
        "200":
          description: >
            Wizard advanced. The response body is one of two shapes:
            {status: advanced, index: <next>} when there is another
            step, or {status: done, session_id: <sid>} when the
            advance landed on the final step.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [status, index]
                    properties:
                      status: {type: string, enum: [advanced]}
                      index:  {type: integer}
                  - type: object
                    required: [status, session_id]
                    properties:
                      status:     {type: string, enum: [done]}
                      session_id: {type: string}
                discriminator:
                  propertyName: status
        "400": {description: Missing or invalid mbid}
        "404": {description: Wizard session not found or artist missing}

  /artists/re-identify/wizard/{sid}/step/{idx}/skip:
    post:
      tags: [Bulk Operations]
      summary: Skip the current wizard step without changes
      operationId: skipReIdentifyWizardStep
      parameters:
        - in: path
          name: sid
          required: true
          schema: {type: string}
        - in: path
          name: idx
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: >
            Wizard advanced. The response body is one of two shapes:
            {status: advanced, index: <next>} when there is another
            step, or {status: done, session_id: <sid>} when the
            advance landed on the final step.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [status, index]
                    properties:
                      status: {type: string, enum: [advanced]}
                      index:  {type: integer}
                  - type: object
                    required: [status, session_id]
                    properties:
                      status:     {type: string, enum: [done]}
                      session_id: {type: string}
                discriminator:
                  propertyName: status
        "404": {description: Wizard session not found}

  /artists/re-identify/wizard/{sid}/step/{idx}/decline:
    post:
      tags: [Bulk Operations]
      summary: Mark the current wizard step as no-match
      operationId: declineReIdentifyWizardStep
      parameters:
        - in: path
          name: sid
          required: true
          schema: {type: string}
        - in: path
          name: idx
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: >
            Wizard advanced. The response body is one of two shapes:
            {status: advanced, index: <next>} when there is another
            step, or {status: done, session_id: <sid>} when the
            advance landed on the final step.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [status, index]
                    properties:
                      status: {type: string, enum: [advanced]}
                      index:  {type: integer}
                  - type: object
                    required: [status, session_id]
                    properties:
                      status:     {type: string, enum: [done]}
                      session_id: {type: string}
                discriminator:
                  propertyName: status
        "404": {description: Wizard session not found}

  /artists/re-identify/wizard/{sid}/step/{idx}/retry:
    post:
      tags: [Bulk Operations]
      summary: Retry candidate lookup for a wizard step whose previous fetch failed
      operationId: retryReIdentifyWizardStep
      parameters:
        - in: path
          name: sid
          required: true
          schema: {type: string}
        - in: path
          name: idx
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: |
            Step fragment HTML re-rendered after the retry. The body is
            an HTMX swap-ready partial: the candidate list when the retry
            succeeded, the error banner again when it failed.
          content:
            text/html:
              schema: {type: string}
        "400": {description: Invalid step index}
        "404": {description: Wizard session not found}
        "503": {description: Artist service not configured}

  /artists/re-identify/wizard/{sid}/save-exit:
    post:
      tags: [Bulk Operations]
      summary: End the wizard early and leave remaining artists in review
      operationId: saveExitReIdentifyWizard
      parameters:
        - in: path
          name: sid
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Wizard closed; undecided artists moved to the review queue
          content:
            application/json:
              schema:
                type: object
                required: [status, accepted, skipped, declined, leftover]
                properties:
                  status:   {type: string, enum: [saved]}
                  accepted: {type: integer}
                  skipped:  {type: integer}
                  declined: {type: integer}
                  leftover: {type: integer}
        "404":
          description: Wizard session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports/health:
    get:
      tags: [Reports]
      summary: Get library health summary
      operationId: getHealthReport
      responses:
        "200":
          description: Health summary (returns HTML dashboard fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSummary"
            text/html:
              schema:
                type: string

  /reports/health/history:
    get:
      tags: [Reports]
      summary: Get health history for charting
      operationId: getHealthHistory
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Health history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      type: object
                    description: List of historical health snapshots.

  /reports/compliance/count:
    get:
      tags: [Reports]
      summary: Sidebar count badge for the compliance report
      description: >-
        HTML fragment endpoint used by the sidebar's Compliance child link
        (#1715). Returns an empty body when no non-compliant artists exist
        (health_score < 100) OR when the query fails (fail-safe: handler logs
        at warn and returns 200 + empty body so the sidebar simply does not
        render the child). Clients MUST NOT interpret an empty body as a
        definitive "zero non-compliant artists" signal -- it is "no actionable
        nav child to render right now." When at least one non-compliant artist
        exists, returns a populated <a> link element with the count and the
        chart-bar glyph (three ascending bars). Admin-only; the
        sidebar omits the placeholder for non-admin viewers so a healthy session
        never makes the call. The handler memoizes the count for five minutes so
        per-tab sidebar polling collapses to at most one query per window.
        Non-administrators receive a 403 JSON response.
      operationId: getComplianceCountBadge
      parameters:
        - name: ch
          in: query
          description: >-
            Channel hint. Pass `next` when calling from the next/ sidebar to
            receive /next/ hrefs and the chart-bar SVG glyph inline. Omit (or
            pass any other value) for the stable sidebar fragment (no glyph,
            stable hrefs).
          schema:
            type: string
            enum: [next]
      responses:
        "200":
          description: >-
            HTML fragment for HTMX innerHTML swap. Empty body when count is
            zero OR when the query is unavailable/fails (fail-safe); populated
            <a> element with chart-bar glyph and badge pill when count > 0.
          content:
            text/html:
              schema:
                type: string
        "403":
          description: Non-administrators receive a 403 JSON response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports/compliance:
    get:
      tags: [Reports]
      summary: Get compliance report
      operationId: getComplianceReport
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [compliant, non_compliant]
        - name: sort
          in: query
          description: |
            Sort column. Unknown values are rejected with 400 Bad Request.
            Empty defaults to "name".
          schema:
            type: string
            enum: [name, sort_name, type, origin, health_score, updated_at, created_at, nfo_exists, thumb, fanart, logo, mbid]
            default: name
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Paginated compliance report
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      type: object
                      required:
                        - artist
                        - health_score
                        - violations
                        - rules_passed_count
                        - rules_evaluated_count
                      properties:
                        artist:
                          type: object
                          description: Artist record.
                        health_score:
                          type: number
                          format: float
                          description: Stored health score for the artist (0-100).
                        violations:
                          type: array
                          items:
                            type: object
                          description: Active violations (open, pending_choice) for the artist.
                        rules_passed_count:
                          type: integer
                          description: |
                            Number of enabled rules the artist currently passes,
                            taken from the rule_results table (issue #699). Zero
                            when no rule_results rows exist for the artist, or
                            when count lookup is unavailable.
                        rules_evaluated_count:
                          type: integer
                          description: |
                            Total number of rules the artist has an outcome row
                            for, taken from the rule_results table. Zero when no
                            rule_results rows exist for the artist, or when
                            count lookup is unavailable. The ratio
                            rules_passed_count / rules_evaluated_count is the
                            coarse "rules satisfied" signal for this artist.
                    description: Compliance report rows.
                  total:
                    type: integer
                    description: Total number of matching records.
                  page:
                    type: integer
                    description: Current page number (1-based).
                  page_size:
                    type: integer
                    description: Number of records per page.
        "400":
          description: Invalid sort or order parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks:
    get:
      tags: [Webhooks]
      summary: List webhooks
      operationId: listWebhooks
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"
    post:
      tags: [Webhooks]
      summary: Create webhook
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                type:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                    enum:
                      - artist.new
                      - metadata.fixed
                      - review.needed
                      - rule.violation
                      - bulk.completed
                      - scan.completed
                      - lidarr.artist.add
                      - lidarr.download
                      - emby.artist.update
                      - emby.library.scan
                      - jellyfin.artist.update
                      - jellyfin.library.scan
                      - fs.dir.created
                      - fs.dir.removed
                      - fs.unexpected.write
                enabled:
                  type: boolean
              required: [name, url]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                type:
                  type: string
              required: [name, url]
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

  /webhooks/{id}:
    get:
      tags: [Webhooks]
      summary: Get webhook
      operationId: getWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
    put:
      tags: [Webhooks]
      summary: Update webhook
      operationId: updateWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                type:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                    enum:
                      - artist.new
                      - metadata.fixed
                      - review.needed
                      - rule.violation
                      - bulk.completed
                      - scan.completed
                      - lidarr.artist.add
                      - lidarr.download
                      - emby.artist.update
                      - emby.library.scan
                      - jellyfin.artist.update
                      - jellyfin.library.scan
                      - fs.dir.created
                      - fs.dir.removed
                      - fs.unexpected.write
                enabled:
                  type: boolean
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
    delete:
      tags: [Webhooks]
      summary: Delete webhook
      operationId: deleteWebhook
