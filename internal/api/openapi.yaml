      operationId: listLibraries
      responses:
        "200":
          description: All libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
    post:
      tags: [Libraries]
      summary: Create library
      operationId: createLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                  default: regular
              required: [name]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                  default: regular
              required: [name]
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Duplicate library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /libraries/{id}:
    get:
      tags: [Libraries]
      summary: Get library
      operationId: getLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Library with artist count
          content:
            application/json:
              schema:
                type: object
                properties:
                  library:
                    $ref: "#/components/schemas/Library"
                  artist_count:
                    type: integer
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Libraries]
      summary: Update library
      operationId: updateLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                fs_watch:
                  type: integer
                fs_poll_interval:
                  type: integer
                  description: Seconds between polls (60, 300, 900, or 1800)
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Libraries]
      summary: Delete library
      operationId: deleteLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deleteArtists
          in: query
          description: When true, cascade-delete artists instead of dereferencing them
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Library deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /libraries/{libId}/operation/status:
    get:
      tags: [Libraries]
      summary: Get library operation status
      operationId: getLibraryOpStatus
      parameters:
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current operation status (or idle)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"

  # --- Connection extras ---

  /connections/clobber-check:
    get:
      tags: [Connections]
      summary: Check for NFO/image write conflicts
      description: >
        When no library has a filesystem path configured, returns an empty
        risk list immediately since there are no on-disk files to conflict
        with. Otherwise checks all enabled connections for NFO/image writing
        configuration that could overwrite Stillwater-managed files.
      operationId: clobberCheck
      responses:
        "200":
          description: Clobber risk assessment (returns HTML warnings when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_risk:
                    type: boolean
                  risks:
                    type: array
                    items:
                      type: object
                      properties:
                        connection_id:
                          type: string
                        connection_name:
                          type: string
                        connection_type:
                          type: string
                        nfo_writer:
                          type: boolean
                        library_name:
                          type: string
                        error:
                          type: string
            text/html:
              schema:
                type: string

  /connections/{id}/features:
    patch:
      tags: [Connections]
      summary: Update connection feature flags
      operationId: updateConnectionFeatures
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                feature_library_import:
                  type: boolean
                feature_nfo_write:
                  type: boolean
                feature_image_write:
                  type: boolean
                feature_metadata_push:
                  type: boolean
                feature_trigger_refresh:
                  type: boolean
      responses:
        "200":
          description: Features updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/platform-settings:
    get:
      tags: [Connections]
      summary: Get platform fetcher/saver settings
      operationId: getPlatformSettings
      description: >
        Returns the current fetcher, saver, and metadata downloader configuration
        for all music libraries on the connected platform. For Emby/Jellyfin this
        is per-library; for Lidarr it is global metadata consumers.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform settings for the connection
          content:
            application/json:
              schema:
                oneOf:
                  - title: EmbyJellyfinPlatformSettings
                    type: object
                    required: [connection_type, libraries]
                    properties:
                      connection_type:
                        type: string
                        enum: [emby, jellyfin]
                      libraries:
                        type: array
                        description: Per-library fetcher/saver settings.
                        items:
                          type: object
                          properties:
                            library_id:
                              type: string
                            library_name:
                              type: string
                            image_fetchers:
                              type: array
                              items:
                                type: string
                            metadata_fetchers:
                              type: array
                              items:
                                type: string
                            metadata_savers:
                              type: array
                              items:
                                type: string
                            has_conflicts:
                              type: boolean
                            needs_lockdata:
                              type: boolean
                              description: Jellyfin only. Indicates NFO lockdata injection is required.
                            enable_internet_providers:
                              type: boolean
                              description: Jellyfin only. Whether internet providers are enabled for this library.
                      note:
                        type: string
                        description: Platform-specific advisory note.
                  - title: LidarrPlatformSettings
                    type: object
                    required: [connection_type, metadata_consumers]
                    properties:
                      connection_type:
                        type: string
                        enum: [lidarr]
                      metadata_consumers:
                        type: array
                        description: Global metadata consumers.
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            consumer_name:
                              type: string
                            metadata_type:
                              type: string
                            enabled:
                              type: boolean
                      note:
                        type: string
                        description: Platform-specific advisory note.
                discriminator:
                  propertyName: connection_type
                  mapping:
                    emby: "#/components/schemas/EmbyJellyfinPlatformSettings"
                    jellyfin: "#/components/schemas/EmbyJellyfinPlatformSettings"
                    lidarr: "#/components/schemas/LidarrPlatformSettings"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Platform unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/platform-settings/disable:
    post:
      tags: [Connections]
      summary: Disable conflicting platform settings
      operationId: disablePlatformSettings
      description: >
        Disables conflicting fetchers, savers, and metadata downloaders on the
        connected platform. For Emby/Jellyfin this operates per-library (requires
        library_id). For Lidarr this disables a global metadata consumer (requires
        consumer_id).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                library_id:
                  type: string
                  description: Required for Emby/Jellyfin connections.
                consumer_id:
                  type: integer
                  description: Required for Lidarr connections.
      responses:
        "200":
          description: Settings disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  note:
                    type: string
                    description: Platform-specific advisory note (Jellyfin NFO lockdata).
        "400":
          description: Missing required field for connection type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Platform unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/platform-summary:
    get:
      tags: [Connections]
      summary: Get platform settings management summary
      operationId: getPlatformSummary
      description: >
        Returns an aggregate summary of platform fetcher/saver management status
        for a connection. Used for connection card badges.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform settings summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_libraries:
                    type: integer
                    description: Total number of music libraries (Emby/Jellyfin).
                  managed_libraries:
                    type: integer
                    description: Number of libraries with no conflicting settings (Emby/Jellyfin).
                  total_consumers:
                    type: integer
                    description: Total number of metadata consumers (Lidarr).
                  has_conflicts:
                    type: boolean
                    description: Whether any library or consumer has conflicting settings.
                  needs_lockdata:
                    type: boolean
                    description: Jellyfin only. Indicates NFO lockdata injection is required.
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Platform unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries:
    get:
      tags: [Connections]
      summary: Discover libraries on connection
      operationId: discoverLibraries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available libraries (returns HTML checklist when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    external_id:
                      type: string
                    name:
                      type: string
                    imported:
                      type: boolean
            text/html:
              schema:
                type: string
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/import:
    post:
      tags: [Connections]
      summary: Import libraries from connection
      description: >
        After creating each library, automatically starts a background
        populate operation to fetch artists from the connection. Poll
        GET /api/v1/libraries/{libId}/operation/status for progress.
      operationId: importLibraries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraries:
                  type: array
                  items:
                    type: object
                    properties:
                      external_id:
                        type: string
                      name:
                        type: string
                    required: [external_id, name]
              required: [libraries]
      responses:
        "201":
          description: Libraries imported
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/{libId}/populate:
    post:
      tags: [Connections]
      summary: Populate artists from connection into library
      operationId: populateLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Populate operation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"
        "409":
          description: Operation already running or connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/{libId}/scan:
    post:
      tags: [Connections]
      summary: Scan library via connection API
      operationId: scanLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Scan operation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"
        "409":
          description: Operation already running or connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Provider extras ---

  /providers/priorities/{field}/{provider}/toggle:
    put:
      tags: [Providers]
      summary: Toggle provider for a metadata field
      operationId: toggleFieldProvider
      parameters:
        - name: field
          in: path
          required: true
          schema:
            type: string
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider toggled (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "404":
          description: Field not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /providers/websearch:
    get:
      tags: [Providers]
      summary: List web search image providers
      operationId: getWebSearchProviders
      responses:
        "200":
          description: Web search providers with enabled state
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        display_name:
                          type: string
                        enabled:
                          type: boolean

  /providers/websearch/{name}/toggle:
    put:
      tags: [Providers]
      summary: Enable or disable a web search provider
      operationId: setWebSearchEnabled
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
              required: [enabled]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
              required: [enabled]
      responses:
        "200":
          description: Provider state updated (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "400":
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Scraper ---

  /scraper/config:
    get:
      tags: [Scraper]
      summary: Get global scraper configuration
      operationId: getScraperConfig
      responses:
        "200":
          description: Scraper config with field mappings and fallback chains
          content:
            application/json:
              schema:
                type: object
    put:
      tags: [Scraper]
      summary: Update global scraper configuration
      operationId: updateScraperConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Config saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scraper/config/connections/{id}:
    get:
      tags: [Scraper]
      summary: Get connection scraper config overrides
      operationId: getConnectionScraperConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Merged config with override indicators
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: object
                  raw:
                    type: object
                  overrides:
                    type: object
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Scraper]
      summary: Update connection scraper config overrides
      operationId: updateConnectionScraperConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Config saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Scraper]
      summary: Reset connection scraper config to global defaults
      operationId: resetConnectionScraperConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Config reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scraper/providers:
    get:
      tags: [Scraper]
      summary: List scraper providers with capabilities
      operationId: listScraperProviders
      responses:
        "200":
          description: Provider capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        display_name:
                          type: string
                        requires_auth:
                          type: boolean
                        has_key:
                          type: boolean
                        metadata_fields:
                          type: array
                          items:
                            type: string
                        image_fields:
                          type: array
                          items:
                            type: string

  # --- Notifications ---

  /notifications/counts:
    get:
      tags: [Notifications]
      summary: Get violation counts by severity
      operationId: getNotificationCounts
      responses:
        "200":
          description: Counts by severity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                  warning:
                    type: integer
                  info:
                    type: integer
                  total:
                    type: integer

  /notifications/badge:
    get:
      tags: [Notifications]
      summary: Get notification badge HTML fragment
      description: Returns an HTML fragment for HTMX polling. Not a JSON endpoint.
      operationId: getNotificationBadge
      responses:
        "200":
          description: Badge HTML fragment
          content:
            text/html:
              schema:
                type: string

  /notifications:
    get:
      tags: [Notifications]
      summary: List rule violations with optional filtering and sorting
      operationId: listNotifications
      parameters:
        - name: status
          in: query
          description: Filter by violation status. "active" returns open + pending_choice.
          schema:
            type: string
            enum: [active, open, dismissed, resolved, pending_choice]
            default: active
        - name: sort
          in: query
          description: Sort column
          schema:
            type: string
            enum: [severity, artist_name, rule_id, created_at]
            default: severity
        - name: order
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: severity
          in: query
          description: Filter by severity level
          schema:
            type: string
            enum: [error, warning, info]
        - name: category
          in: query
          description: Filter by rule category
          schema:
            type: string
            enum: [nfo, image, metadata]
        - name: rule_id
          in: query
          description: Filter by specific rule ID
          schema:
            type: string
        # group_by is supported on the HTML endpoint (/notifications/table) only.
        # It is not included here because the JSON response is always a flat array.
      responses:
        "200":
          description: Violations matching filter
          content:
            application/json:
              schema:
                type: object
                properties:
                  violations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Violation"
                  count:
                    type: integer

  /notifications/{id}/dismiss:
    post:
      tags: [Notifications]
      summary: Dismiss a violation
      operationId: dismissViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/resolve:
    post:
      tags: [Notifications]
      summary: Resolve a violation
      operationId: resolveViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/apply-candidate:
    post:
      tags: [Notifications]
      summary: Apply an image candidate from a pending-choice violation
      operationId: applyViolationCandidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                image_type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, image_type]
      responses:
        "200":
          description: Candidate applied and violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid request or URL mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/bulk-dismiss:
    post:
      tags: [Notifications]
      summary: Bulk dismiss violations
      operationId: bulkDismissViolations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Violation IDs to dismiss (omit to dismiss all)
      responses:
        "200":
          description: Count of dismissed violations
          content:
            application/json:
              schema:
                type: object
                properties:
                  dismissed:
                    type: integer

  /notifications/{id}/fix:
    post:
      tags: [Notifications]
      summary: Apply recommended fix for a violation
      description: |
        Applies the recommended fix for a single violation. For open fixable
        violations, routes through the appropriate fixer (NFO generation,
        metadata fetch, image fetch, directory rename, etc.). Returns the
        fix result with status and message. When the fix modifies NFO files,
        image files, or renames an artist directory, the response may include
        an undo_id that can be passed to
        POST /fix-undo/{undoId} within 30 seconds to revert it.
        Metadata-only fixes, dismissed violations, and failed fixes do not
        produce an undo_id.
      operationId: fixViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fix result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [fixed, dismissed, failed]
                    description: Fix result state
                  message:
                    type: string
                    description: Human-readable result description
                  undo_id:
                    type: string
                    description: |
                      Opaque token used to revert this fix via
                      POST /fix-undo/{undoId}. Present only when
                      the fix modified filesystem files and an undo entry was
                      registered. Absent for metadata-only fixes, dismissed
                      violations, and failed fixes.
                  undo_expires_in:
                    type: integer
                    description: |
                      Number of seconds until the undo window closes. Present
                      only when undo_id is set.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /fix-undo/{undoId}:
    post:
      tags: [Notifications]
      summary: Revert a recently applied fix
      description: |
        Reverts a fix that was applied within the undo window (30 seconds).
        The undoId is returned by POST /notifications/{id}/fix when the fix
        modified filesystem files. The undo entry is single-use and expires
        after 30 seconds. Returns 410 Gone when the window has elapsed or
        the token has already been used. On success, attempts to reopen the
        violation so it reappears as fixable in the notifications list;
        reopening may fail even when the revert itself succeeds, in which
        case the response status is still "reverted" with a warning message.
      operationId: undoFix
      parameters:
        - name: undoId
          in: path
          required: true
          schema:
            type: string
          description: Opaque undo token returned by the fix endpoint
      responses:
        "200":
          description: Revert succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [reverted]
                    description: Always "reverted" on success
                  message:
                    type: string
                    description: Human-readable confirmation
        "410":
          description: Invalid, expired, or already-used undo token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Undo store not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/fix-all:
    post:
      tags: [Notifications]
      summary: Start async bulk fix for fixable violations
      description: |
        Starts an asynchronous operation that applies the recommended fix for
        all open fixable violations (pending_choice violations that require
        user candidate selection are excluded). Returns 202 with the total
        count. Poll /notifications/fix-all/status for progress.
      operationId: fixAllViolations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Optional subset of violation IDs. Omit to fix all fixable.
      responses:
        "202":
          description: Fix-all operation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                  total:
                    type: integer
        "200":
          description: No fixable violations found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [completed]
                  message:
                    type: string
                  total:
                    type: integer
        "400":
          description: Malformed JSON body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Fix-all already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                  message:
                    type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/fix-all/status:
    get:
      tags: [Notifications]
      summary: Get fix-all operation progress
      description: Returns the current state of the most recent fix-all operation.
      operationId: fixAllStatus
      responses:
        "200":
          description: Fix-all progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, running, completed]
                  total:
                    type: integer
                  processed:
                    type: integer
                  fixed:
                    type: integer
                  skipped:
                    type: integer
                  failed:
                    type: integer
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/export:
    get:
      tags: [Notifications]
      summary: Export filtered violations as CSV or JSON
      description: |
        Streams the current filtered violation list as a CSV file download.
        Respects the same filter and sort parameters as the list endpoint.
        Use format=json query param or Accept: application/json header for JSON output.
      operationId: exportNotifications
      parameters:
        - name: status
          in: query
          description: Filter by violation status. "active" returns open + pending_choice.
          schema:
            type: string
            enum: [active, open, dismissed, resolved, pending_choice]
            default: active
        - name: severity
          in: query
          schema:
            type: string
            enum: [error, warning, info]
        - name: category
          in: query
          schema:
            type: string
            enum: [nfo, image, metadata]
        - name: rule_id
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [severity, artist_name, rule_id, created_at]
            default: severity
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: format
          in: query
          description: Set to "json" for JSON output instead of CSV.
          schema:
            type: string
            enum: [json]
      responses:
        "200":
          description: CSV file download (or JSON when format=json)
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: object
                properties:
                  violations:
                    type: array
                    items:
                      type: object
                      properties:
                        artist_name:
                          type: string
                        library_name:
                          type: string
                        rule_id:
                          type: string
                        severity:
                          type: string
                          enum: [error, warning, info]
                        message:
                          type: string
                        status:
                          type: string
                          enum: [open, dismissed, resolved, pending_choice]
                        age:
                          type: string
                          description: Human-readable age (e.g. "5h", "3d")
                  count:
                    type: integer

  /notifications/resolved:
    delete:
      tags: [Notifications]
      summary: Clear old resolved violations
      description: Permanently deletes resolved violations older than 7 days.
      operationId: clearResolvedViolations
      responses:
        "200":
          description: Resolved violations cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /violations/trend:
    get:
      tags: [Reports]
      summary: Get daily violation creation and resolution counts
      operationId: getViolationTrend
      parameters:
        - name: days
          in: query
          description: Number of past days to include. Values outside 1-365 default to 30.
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Daily violation trend data
          content:
            application/json:
              schema:
                type: object
                required: [trend]
                properties:
                  trend:
                    type: array
                    items:
                      type: object
                      required: [date, created, resolved]
                      properties:
                        date:
                          type: string
                          format: date
                          description: Calendar date (YYYY-MM-DD)
                        created:
                          type: integer
                          description: Number of violations created on this date
                        resolved:
                          type: integer
                          description: Number of violations resolved on this date
        "500":
          description: Internal server error

  # --- Report extras ---

  /reports/health/by-library:
    get:
      tags: [Reports]
      summary: Get per-library health breakdown
      operationId: getHealthByLibrary
      responses:
        "200":
          description: Per-library health scores (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  libraries:
                    type: array
                    items:
                      type: object
                      properties:
                        library_id:
                          type: string
                        library_name:
                          type: string
                        total_artists:
                          type: integer
                        compliant_artists:
                          type: integer
                        score:
                          type: number
                        missing_nfo:
                          type: integer
                        missing_thumb:
                          type: integer
                        missing_fanart:
                          type: integer
                        missing_mbid:
                          type: integer
                  overall:
                    type: object
            text/html:
              schema:
                type: string

  /reports/compliance/export:
    get:
      tags: [Reports]
      summary: Export compliance report as CSV
      operationId: exportComplianceReport
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            default: name
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
        - name: library_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [compliant, non_compliant]
        - name: health_min
          in: query
          schema:
            type: integer
        - name: health_max
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  /reports/metadata-completeness:
    get:
      tags: [Reports]
      summary: Get aggregate metadata completeness report
      description: >
        Returns field-level coverage percentages across all non-excluded artists.
        Artist type-aware fields (formed for groups, born for persons) are only
        counted for applicable artists. When library_id is provided the report
        is scoped to that library.
      operationId: getMetadataCompleteness
      parameters:
        - name: library_id
          in: query
          schema:
            type: string
          description: Scope the report to a specific library. Omit to include all libraries.
      responses:
        "200":
          description: Metadata completeness report (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_score:
                    type: number
                    format: float
                    description: Mean field-coverage percentage across all applicable field/artist pairs.
                  total_artists:
                    type: integer
                    description: Number of non-excluded artists included in the report.
                  field_coverage:
                    type: array
                    description: Per-field breakdown sorted by percentage ascending (worst coverage first).
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Human-readable field name.
                        count:
                          type: integer
                          description: Number of artists with this field populated.
                        total:
                          type: integer
                          description: Number of artists for which this field is applicable.
                        percentage:
                          type: number
                          format: float
                          description: count/total*100 rounded to one decimal place.
                      required: [field, count, total, percentage]
                  library_coverage:
                    type: array
                    description: Per-library summary. Omitted when only one or no library exists.
                    items:
                      type: object
                      properties:
                        library_id:
                          type: string
                        library_name:
                          type: string
                        total_artists:
                          type: integer
                        score:
                          type: number
                          format: float
                        fields:
                          type: array
                          description: Per-field coverage breakdown for this library.
                          items:
                            type: object
                            properties:
                              field:
                                type: string
                                description: Human-readable field name.
                              count:
                                type: integer
                                description: Number of artists with this field populated.
                              total:
                                type: integer
                                description: Number of artists for which this field is applicable.
                              percentage:
                                type: number
                                format: float
                                description: count/total*100 rounded to one decimal place.
                            required: [field, count, total, percentage]
                  lowest_completeness:
                    type: array
                    description: Bottom artists by health score.
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        library_id:
                          type: string
                        health_score:
                          type: number
                          format: float
                      required: [id, name, library_id, health_score]
                required: [overall_score, total_artists, field_coverage, lowest_completeness]
            text/html:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Inbound webhooks ---

  /webhooks/inbound/lidarr:
    post:
      tags: [Webhooks]
      summary: Receive Lidarr webhook event
      description: >
        Accepts inbound webhook events from Lidarr. Responds immediately with 200
        and processes the event asynchronously. Uses standard authentication
        (session cookie, bearer token, or API key query parameter).
      operationId: handleLidarrWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventType:
                  type: string
                  description: Lidarr event type (Test, ArtistAdded, Grab, Download, AlbumImport)
                artist:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    path:
                      type: string
                    mbId:
                      type: string
                    foreignArtistId:
                      type: string
              required: [eventType]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/inbound/emby:
    post:
      tags: [Webhooks]
      summary: Receive Emby webhook event
      description: >
        Accepts inbound webhook events from Emby. Responds immediately with 200
        and processes the event asynchronously. Uses standard authentication
        (session cookie, bearer token, or API key query parameter).
      operationId: handleEmbyWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Event:
                  type: string
                  description: >
                    Emby event type (system.notificationtest, library.new,
                    item.updated, library.changed)
                Item:
                  type: object
                  properties:
                    Id:
                      type: string
                    Name:
                      type: string
                    Type:
                      type: string
                      description: Media type, e.g. MusicAlbum
                    ProviderIds:
                      type: object
                      additionalProperties:
                        type: string
                    Path:
                      type: string
                    ArtistItems:
                      type: array
                      description: Related artist references (Emby 4.9+)
                      items:
                        type: object
                        properties:
                          Id:
                            type: string
                          Name:
                            type: string
              required: [Event]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/inbound/jellyfin:
    post:
      tags: [Webhooks]
      summary: Receive Jellyfin webhook event
      description: >
        Accepts inbound webhook events from the Jellyfin webhook plugin. Responds
        immediately with 200 and processes the event asynchronously. Uses standard
        authentication (session cookie, bearer token, or API key query parameter).
      operationId: handleJellyfinWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                NotificationType:
                  type: string
                  description: Jellyfin event type (Test, ItemAdded, ItemUpdated, LibraryChanged)
                ItemId:
                  type: string
                ItemType:
                  type: string
                  description: Media type, e.g. MusicAlbum
                Name:
                  type: string
                Artist:
                  type: string
                  description: Artist name from the Jellyfin webhook plugin
                Provider_musicbrainzalbumartist:
                  type: string
                  description: MusicBrainz album artist ID from the Jellyfin webhook plugin
              required: [NotificationType]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Settings extras ---

  /settings/logging:
    get:
      tags: [Settings]
      summary: Get logging configuration
      operationId: getLogging
      responses:
        "200":
          description: Current logging config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggingConfig"
    put:
      tags: [Settings]
      summary: Update logging configuration
      operationId: updateLogging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoggingConfig"
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                level:
                  type: string
                  enum: [trace, debug, info, warn, error]
                format:
                  type: string
                  enum: [text, json]
                file_path:
                  type: string
                file_max_size_mb:
                  type: integer
                file_max_files:
                  type: integer
                file_max_age_days:
                  type: integer
      responses:
        "200":
          description: Updated logging config (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggingConfig"
            text/html:
              schema:
                type: string
        "400":
          description: Invalid level or format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs/files:
    get:
      tags: [Logs]
      summary: List available log files
      description: Returns the log files available for browsing. The current (actively written) file is listed first, followed by rotated backups newest-first. Returns an empty array when file logging is not configured.
      operationId: listLogFiles
      responses:
        "200":
          description: Available log files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogFileInfo"
        "500":
          description: Internal server error (e.g. filesystem permission issue)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Logging manager not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Logs]
      summary: Delete rotated log files
      description: Deletes all rotated log files (all except the current actively-written file). Returns the number of files deleted and bytes freed. Does nothing if file logging is not configured.
      operationId: deleteLogFiles
      responses:
        "200":
          description: Rotated files deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted, bytes_freed]
                properties:
                  deleted:
                    type: integer
                    description: Number of files deleted
                  bytes_freed:
                    type: integer
                    format: int64
                    description: Total bytes freed
        "500":
          description: Internal server error (e.g. filesystem permission issue)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Logging manager not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs:
    get:
      tags: [Logs]
      summary: Get recent log entries
      description: Returns log entries from the in-memory ring buffer, or from a specific log file when the file parameter is provided. Supports filtering by level, search text, and component. Returns JSON for API clients or HTML fragments when the HX-Request header is set.
      operationId: getLogs
      parameters:
        - name: file
          in: query
          description: Filename of a log file to read (e.g. stillwater-2024-03-28T10-00-00.000.log). Must be a plain filename with no path separators. When set, reads from disk instead of the ring buffer; the after filter is ignored. Requires file logging to be configured.
          schema:
            type: string
        - name: level
          in: query
          description: Minimum log level to include. Omit to return all levels.
          schema:
            type: string
            enum: [trace, debug, info, warn, error]
        - name: search
          in: query
          description: Case-insensitive substring search on log message
          schema:
            type: string
        - name: component
          in: query
          description: Exact match on the component attribute
          schema:
            type: string
        - name: after
          in: query
          description: Only return entries after this RFC3339Nano timestamp (ring buffer only; ignored when file is set)
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of entries to return (default 100, max 500)
          schema:
            type: integer
            default: 100
            minimum: 0
            maximum: 500
      responses:
        "200":
          description: Log entries (newest first for JSON, oldest first for HTML)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
            text/html:
              schema:
                type: string
                description: HTML fragment of styled log entry divs for HTMX polling
        "400":
          description: Invalid query parameter (bad level, unparsable after, invalid limit, or invalid filename)
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
        "503":
          description: Logging manager or ring buffer not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Logs]
      summary: Clear log buffer
      description: Removes all entries from the in-memory ring buffer. Returns JSON for API clients or an HTML fragment when the HX-Request header is set.
      operationId: clearLogs
      responses:
        "200":
          description: Buffer cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: cleared
            text/html:
              schema:
                type: string
                description: HTML fragment confirming the buffer was cleared
        "503":
          description: Logging manager or ring buffer not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/maintenance/status:
    get:
      tags: [Settings]
      summary: Get database maintenance status
      operationId: getMaintenanceStatus
      responses:
        "200":
          description: Maintenance status (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceStatus"
            text/html:
              schema:
                type: string

  /settings/maintenance/optimize:
    post:
      tags: [Settings]
      summary: Trigger database optimization
      operationId: maintenanceOptimize
      responses:
        "200":
          description: Optimization completed (returns HTML status fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /settings/maintenance/vacuum:
    post:
      tags: [Settings]
      summary: Trigger database vacuum
      operationId: maintenanceVacuum
      responses:
        "200":
          description: Vacuum completed (returns HTML status fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /settings/maintenance/schedule:
    put:
      tags: [Settings]
      summary: Configure maintenance schedule
      operationId: updateMaintenanceSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                interval_hours:
                  type: integer
              required: [enabled]
      responses:
        "200":
          description: Schedule updated (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /settings/export:
    post:
      tags: [Settings]
      summary: Export settings as encrypted file
      operationId: exportSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
              required: [passphrase]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
              required: [passphrase]
      responses:
        "200":
          description: Encrypted settings JSON file download
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  app_version:
                    type: string
                  created_at:
                    type: string
                    format: date-time
                  salt:
                    type: string
                  data:
                    type: string
        "400":
          description: Missing passphrase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/import:
    post:
      tags: [Settings]
      summary: Import settings from encrypted file
      operationId: importSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                envelope:
                  type: object
              required: [passphrase, envelope]
          multipart/form-data:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                file:
                  type: string
                  format: binary
              required: [passphrase, file]
      responses:
        "200":
          description: Import results with counts per category (returns HTML summary when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: integer
                  connections:
                    type: integer
                  platform_profiles:
                    type: integer
                  webhooks:
                    type: integer
                  provider_keys:
                    type: integer
                  priorities:
                    type: integer
            text/html:
              schema:
                type: string
        "400":
          description: Invalid request or decryption error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File exceeds 10MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/nfo-output:
    get:
      tags: [Settings]
      summary: Get NFO output field mapping
      description: Returns the current NFO field mapping configuration that controls how genre, style, and mood data is written to NFO XML elements for Emby, Jellyfin, and Kodi compatibility.
      operationId: getNFOOutput
      responses:
        "200":
          description: Current NFO field mapping.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NFOFieldMap"
        "500":
          description: Internal server error reading NFO output settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: NFO settings service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Settings]
      summary: Update NFO output field mapping
      description: Updates the NFO field mapping configuration. Controls how genre, style, and mood source categories map to NFO XML elements.
      operationId: updateNFOOutput
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NFOFieldMap"
      responses:
        "200":
          description: Updated NFO field mapping.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NFOFieldMap"
        "400":
          description: Validation error (invalid genre_sources or advanced_remap values).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error writing NFO output settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: NFO settings service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/cache/stats:
    get:
      tags: [Settings]
      summary: Get image cache statistics
      description: Returns the current size, file count, and artist count for the pathless-artist image cache.
      operationId: getCacheStats
      responses:
        "200":
          description: Cache statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheStats"
  /settings/cache:
    delete:
      tags: [Settings]
      summary: Clear the image cache
      description: Deletes all files in the pathless-artist image cache and resets image existence flags. Uses best-effort deletion.
      operationId: clearCache
      responses:
        "200":
          description: Summary of the clear operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheClearResult"

  # --- Artist field editing ---

  /artists/{id}/fields/{field}/display:
    get:
      tags: [Artists]
      summary: Get field display view
      operationId: getFieldDisplay
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field value (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                  value:
                    type: string
            text/html:
              schema:
                type: string
        "400":
          description: Non-editable field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/fields/{field}/edit:
    get:
      tags: [Artists]
      summary: Get field edit view
      operationId: getFieldEdit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field value for editing (returns HTML edit form when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                  value:
                    type: string
            text/html:
              schema:
                type: string

  /artists/{id}/fields/{field}:
    patch:
      tags: [Artists]
      summary: Update a single metadata field
      description: |
        Updates one metadata field on the artist. Supported fields:
        biography, genres, styles, moods, formed, born, disbanded, died,
        years_active, type, gender, name, sort_name, disambiguation,
        musicbrainz_id, audiodb_id, discogs_id, wikidata_id, deezer_id.

        Validation rules: name must be non-empty (rejects empty or
        whitespace-only strings); musicbrainz_id must be a valid UUID when
        non-empty (an empty string clears the stored ID).
      operationId: updateField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
      responses:
        "200":
          description: Field updated (returns HTML display fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  field:
                    type: string
                  value:
                    type: string
            text/html:
              schema:
                type: string
        "400":
          description: Unknown field, invalid value, or validation failure (e.g. empty name or malformed MBID)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Artists]
      summary: Clear a single metadata field
      operationId: clearField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field cleared (returns HTML display fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  field:
                    type: string
            text/html:
              schema:
                type: string
        "400":
          description: Unknown field or field cannot be cleared (e.g. name must remain non-empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/fields/{field}/providers:
    get:
      tags: [Artists]
      summary: Compare field value across providers
      operationId: getFieldProviders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider comparison results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        value:
                          type: string
                        values:
                          type: array
                          items:
                            type: string
                        has_data:
                          type: boolean
                        error:
                          type: string
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/members:
    delete:
      tags: [Artists]
      summary: Clear all band members
      operationId: clearMembers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members cleared (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /artists/{id}/members/from-provider:
    post:
      tags: [Artists]
      summary: Save band members from provider data
      operationId: saveMembersFromProvider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  mbid:
                    type: string
                  instruments:
                    type: array
                    items:
                      type: string
                  vocal_type:
                    type: string
                  date_joined:
                    type: string
                  date_left:
                    type: string
                  is_active:
                    type: boolean
      responses:
        "200":
          description: Members saved (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Artist refresh and disambiguation ---

  /artists/{id}/refresh:
    post:
      tags: [Artists]
      summary: Refresh artist metadata from providers
      description: >
        Triggers a full metadata refresh. If the artist has no MusicBrainz ID,
        returns a disambiguation prompt instead.
      operationId: refreshArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refresh result or disambiguation prompt (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        provider:
                          type: string
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/search:
    post:
      tags: [Artists]
      summary: Search providers for disambiguation
      operationId: refreshSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
      responses:
        "200":
          description: Disambiguation candidates (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
            text/html:
              schema:
                type: string
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/link:
    post:
      tags: [Artists]
      summary: Link artist to provider ID and refresh
      operationId: refreshLink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mbid:
                  type: string
                discogs_id:
                  type: string
                source:
                  type: string
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                mbid:
                  type: string
                discogs_id:
                  type: string
                source:
                  type: string
      responses:
        "200":
          description: Linked and refreshed (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        provider:
                          type: string
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- MusicBrainz contribution ---

  /artists/{id}/musicbrainz/diffs:
    get:
      tags: [Artists]
      operationId: getArtistMusicBrainzDiffs
      summary: Get metadata diffs between Stillwater and MusicBrainz
      description: >
        Returns computed diffs between the current Stillwater metadata and the
        last-known MusicBrainz values captured during the most recent provider
        refresh. Only fields where the Stillwater value is non-empty and differs
        from the MusicBrainz snapshot are included.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diff results
          content:
            application/json:
              schema:
                type: object
                properties:
                  artist_id:
                    type: string
                  musicbrainz_id:
                    type: string
                  diffs:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Metadata field name
                        stillwater_value:
                          type: string
                          description: Current value in Stillwater
                        musicbrainz_value:
                          type: string
                          description: Last-known value from MusicBrainz
                        source:
                          type: string
                          description: Provider that sourced the current Stillwater value
                  contribution_mode:
                    type: string
                    enum: [disabled, web_form, api]
                    description: Current MusicBrainz contribution setting
                  last_fetched_at:
                    type: string
                    format: date-time
                    description: When the MusicBrainz snapshots were last captured
        "404":
          description: Artist not found or has no MusicBrainz ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/reidentify:
    post:
      tags: [Artists]
      summary: Clear provider IDs and prompt re-identification
      operationId: reidentifyArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider IDs cleared, disambiguation required (returns HTML disambiguation form when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  artist:
                    type: string
                  message:
                    type: string
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/run-rules:
    post:
      tags: [Artists, Rules]
      summary: Run all enabled rules scoped to a single artist
      operationId: runArtistRules
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rules ran successfully; returns violation count and link to notifications view (JSON) or an inline HTML fragment (HTMX)
          content:
            application/json:
              schema:
                type: object
                properties:
                  violations_found:
                    type: integer
                    description: Number of violations detected for this artist
                  notifications_url:
                    type: string
                    description: URL to the notifications page
            text/html:
              schema:
                type: string
                description: Inline result fragment for HTMX callers
        "404":
          description: Artist not found (non-HTMX callers only; HTMX callers receive a 200 with an inline error fragment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Rule evaluation failed (non-HTMX callers only; HTMX callers receive a 200 with an inline error fragment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured (non-HTMX callers only; HTMX callers receive a 200 with an inline error fragment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Additional image routes ---

  /artists/{id}/images/websearch:
    get:
      tags: [Images]
      summary: Search web for artist images
      operationId: webImageSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Web search image results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
            text/html:
              schema:
                type: string

  /artists/{id}/images/logo/trim:
    post:
      tags: [Images]
      summary: Trim transparent padding from logo
      operationId: trimLogo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Logo trimmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
        "404":
          description: Artist or logo not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/list:
    get:
      tags: [Images]
      summary: List all fanart images with metadata
      operationId: listFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: management
          in: query
          required: false
          description: When true and request is HTMX, returns the management gallery variant with per-slot controls
          schema:
            type: boolean
      responses:
        "200":
          description: Fanart gallery items (returns HTML gallery when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    index:
                      type: integer
                    filename:
                      type: string
                    width:
                      type: integer
                    height:
                      type: integer
                    size:
                      type: integer
                      format: int64
            text/html:
              schema:
                type: string

  /artists/{id}/images/fanart/{index}/file:
    get:
      tags: [Images]
      summary: Serve fanart image by index
      operationId: serveFanartByIndex
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Artist not found or index out of range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/batch:
    delete:
      tags: [Images]
      summary: Delete selected fanart by indices
      operationId: batchDeleteFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                indices:
                  type: array
                  items:
                    type: integer
              required: [indices]
      responses:
        "200":
          description: Fanart deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  deleted:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Warnings from batch deletion, including file removal failures, renumbering issues, and platform sync errors. Empty only when there are no warnings.
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/fetch-batch:
    post:
      tags: [Images]
      summary: Fetch multiple fanart images from URLs
      operationId: batchFetchFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  maxItems: 20
              required: [urls]
      responses:
        "200":
          description: Fetch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  saved:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    description: Warnings from syncing fanart to connected platforms after batch fetch. Empty when there are no sync issues.
                    items:
                      type: string
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/reorder:
    post:
      tags: [Images]
      summary: Reorder local fanart files
      operationId: reorderFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order:
                  type: array
                  description: Permutation of current slot indices defining the new order. order[i] = current slot that becomes new slot i.
                  items:
                    type: integer
              required: [order]
      responses:
        "200":
          description: Fanart reordered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    description: Warnings from syncing reordered fanart to connected platforms. Empty only when there are no sync issues.
                    items:
                      type: string
        "400":
          description: Invalid permutation or length mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/{slot}/assign:
    post:
      tags: [Images]
      summary: Assign a platform backdrop to a local fanart slot
      operationId: assignFanartSlot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                  description: ID of the platform connection to download from
                platform_index:
                  type: integer
                  minimum: 0
                  description: 0-based index of the backdrop on the platform
              required: [connection_id, platform_index]
      responses:
        "200":
          description: Backdrop assigned to slot
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  slot:
                    type: integer
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    description: Warnings from syncing fanart to connected platforms after assignment. Empty only when there are no sync issues.
                    items:
                      type: string
        "400":
          description: Invalid slot (gap), missing connection, or bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Failed to download backdrop from platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/{slot}:
    delete:
      tags: [Images]
      summary: Delete a single fanart slot and renumber remaining
      operationId: deleteFanartSlot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fanart slot deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  deleted:
                    type: string
                    description: Filename of the deleted file
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    description: Warnings from fanart deletion, including renumbering issues and platform sync errors. Empty only when there are no warnings.
                    items:
                      type: string
        "400":
          description: Slot out of range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/platform-backdrops:
    get:
      tags: [Images]
      summary: List available backdrops from all connected platforms
      operationId: listPlatformBackdrops
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform backdrops grouped by connection (returns HTML panel when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  connections:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlatformBackdropConnection"
            text/html:
              schema:
                type: string

  /artists/{id}/platform-backdrops/{connectionId}/{index}/thumbnail:
    get:
      tags: [Images]
      summary: Proxy a platform backdrop image through Stillwater
      operationId: getPlatformBackdropThumbnail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proxied backdrop image
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: No platform mapping or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Failed to fetch backdrop from platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/fanart-sync-state:
    get:
      tags: [Images]
      summary: Get per-image sync state for fanart slots across connected platforms
      operationId: getFanartSyncState
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: >
            Per-slot sync state. When no Emby/Jellyfin connections exist, returns
            state "no_connections" with an empty slots array. For HTMX requests,
            returns HTML badge fragments with OOB swap targets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: "#/components/schemas/FanartSyncSlot"
                  state:
                    type: string
                    description: >
                      Only present when value is "no_connections", indicating no
                      Emby/Jellyfin connections are configured for this artist
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /images/random-backdrop:
    get:
      tags: [Images]
      summary: Random artist backdrop redirect
      operationId: randomBackdrop
      description: >
        Picks a random artist that has at least one fanart/backdrop image and
        returns a 307 redirect to that artist's fanart file endpoint. Used by
        the ambient backdrop feature to display a blurred background image in
        the layout shell. Returns 404 if no artists have fanart images.
      responses:
        "307":
          description: Redirect to artist fanart file endpoint
        "404":
          description: No artists with fanart images found

  /artists/{id}/images/{type}/file:
    get:
      tags: [Images]
      summary: Serve artist image file
      operationId: serveImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Artist or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}/info:
    get:
      tags: [Images]
      summary: Get image metadata (dimensions, size)
      operationId: getImageInfo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image metadata (returns HTML badge when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  filename:
                    type: string
                  width:
                    type: integer
                  height:
                    type: integer
                  size:
                    type: integer
                    format: int64
                  modified:
                    type: string
                    format: date-time
            text/html:
              schema:
                type: string
        "404":
          description: Artist or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}:
    delete:
      tags: [Images]
      summary: Delete artist image
      operationId: deleteImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image deleted (returns HTML preview card when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  deleted:
                    type: array
                    items:
                      type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
            text/html:
              schema:
                type: string
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Push extras ---

  /artists/{id}/push/images:
    post:
      tags: [Push]
      summary: Push images to platform
      operationId: pushImages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                platform_artist_id:
                  type: string
                  description: >-
                    Platform-specific artist ID. If omitted, the server
                    looks up a stored mapping from the artist_platform_ids
                    table. Returns 400 if no stored mapping exists.
                image_types:
                  type: array
                  items:
                    type: string
                    enum: [thumb, fanart, logo, banner]
                  description: Types to push (defaults to all four)
              required: [connection_id]
      responses:
        "200":
          description: Push results
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploaded:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/push/images/{type}:
    delete:
      tags: [Push]
      summary: Delete a single image from a platform
      operationId: deletePushImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                platform_artist_id:
                  type: string
                  description: >-
                    Platform-specific artist ID. If omitted, the server
                    looks up a stored mapping from the artist_platform_ids
                    table. Returns 400 if no stored mapping exists.
              required: [connection_id]
      responses:
        "200":
          description: Image deleted
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: deleted
        "400":
          description: >-
            Invalid request (invalid image type, missing connection_id,
            connection disabled, or no stored platform ID mapping)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Platform delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /events/stream:
    get:
      summary: SSE event stream
      description: |
        Server-Sent Events endpoint that streams real-time system events to
        connected browser clients. Events include scan completions, rule
        violations, bulk operation results, and artist updates.

        The connection sends a heartbeat comment every 30 seconds to keep
        the connection alive. Clients should auto-reconnect on disconnect.

        Event format follows the SSE specification with named events:
        ```
        event: scan.completed
        data: {"type":"scan.completed","title":"Scan completed","message":"Library scan finished","timestamp":"...","data":{}}
        ```
      operationId: getEventStream
      tags:
        - Events
      responses:
        "200":
          description: SSE stream established. Events are sent as text/event-stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE formatted event stream with named events and JSON data payloads.
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: SSE hub not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
