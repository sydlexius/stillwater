                  enum: [regular, classical]
                  default: regular
              required: [name]
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Duplicate library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /libraries/{id}:
    get:
      tags: [Libraries]
      summary: Get library
      operationId: getLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Library with artist count
          content:
            application/json:
              schema:
                type: object
                properties:
                  library:
                    $ref: "#/components/schemas/Library"
                  artist_count:
                    type: integer
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Libraries]
      summary: Update library
      operationId: updateLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                fs_watch:
                  type: integer
                fs_poll_interval:
                  type: integer
                  description: Seconds between polls (60, 300, 900, or 1800)
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Libraries]
      summary: Delete library
      operationId: deleteLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deleteArtists
          in: query
          description: When true, cascade-delete artists instead of dereferencing them
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Library deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

