            type: string
        - name: aliasId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alias deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/{id}/images/upload:
    post:
      tags: [Images]
      summary: Upload image file
      operationId: uploadImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: skip_crop
          in: query
          schema:
            type: string
            enum: ["true"]
          description: >
            When set to "true", skip geometry checking and save the image even
            if the aspect ratio does not match the slot requirement.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [file, type]
      responses:
        "200":
          description: Image saved, or needs_crop when the aspect ratio does not match the slot requirement
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: '"ok" when saved successfully, "needs_crop" when the image requires cropping before saving.'
                  saved:
                    type: array
                    items:
                      type: string
                    description: Filenames of images saved to disk.
                  type:
                    type: string
                    description: Image type (e.g. thumb, fanart, logo, banner).
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
                  count:
                    type: integer
                    description: Total number of fanart images now on disk for this artist. Present only when type is fanart.
                  needs_crop:
                    type: boolean
                    description: True when the uploaded image aspect ratio does not match the target slot. The image is not saved; the client should present a crop UI.
                  required_ratio:
                    type: number
                    description: The aspect ratio (width/height) required by the target slot. Present only when needs_crop is true.
                  actual_ratio:
                    type: number
                    description: The actual aspect ratio of the uploaded image. Present only when needs_crop is true.
                  width:
                    type: integer
                    description: Width of the uploaded image in pixels. Present only when needs_crop is true.
                  height:
                    type: integer
                    description: Height of the uploaded image in pixels. Present only when needs_crop is true.
                  image_data:
                    type: string
                    description: Base64-encoded data URI of the uploaded image. Present only when needs_crop is true, for use in a client-side crop tool.
                  append:
                    type: boolean
                    description: True when type is fanart and a primary fanart already exists, meaning the eventual crop-save should append a new numbered fanart rather than replace the primary. Present only when needs_crop is true.
        "409":
          description: Write blocked by the conflict ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictWriteBlock"
        "413":
          description: File exceeds 25MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fetch:
    post:
      tags: [Images]
      summary: Fetch image from URL
      operationId: fetchImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: skip_crop
          in: query
          schema:
            type: string
            enum: ["true"]
          description: >
            When set to "true", skip geometry checking and save the image even
            if the aspect ratio does not match the slot requirement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, type]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                url:
                  type: string
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, type]
      responses:
        "200":
          description: Image fetched and saved, or needs_crop when the aspect ratio does not match the slot requirement
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: '"ok" when saved successfully, "needs_crop" when the image requires cropping before saving.'
                  saved:
                    type: array
                    items:
                      type: string
                    description: Filenames of images saved to disk.
                  type:
                    type: string
                    description: Image type (e.g. thumb, fanart, logo, banner).
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
                  count:
                    type: integer
                    description: Total number of fanart images now on disk for this artist. Present only when type is fanart.
                  needs_crop:
                    type: boolean
                    description: True when the fetched image aspect ratio does not match the target slot. The image is not saved; the client should present a crop UI.
                  required_ratio:
                    type: number
                    description: The aspect ratio (width/height) required by the target slot. Present only when needs_crop is true.
                  actual_ratio:
                    type: number
                    description: The actual aspect ratio of the fetched image. Present only when needs_crop is true.
                  width:
                    type: integer
                    description: Width of the fetched image in pixels. Present only when needs_crop is true.
                  height:
                    type: integer
                    description: Height of the fetched image in pixels. Present only when needs_crop is true.
                  image_data:
                    type: string
                    description: Base64-encoded data URI of the fetched image. Present only when needs_crop is true, for use in a client-side crop tool.
                  append:
                    type: boolean
                    description: True when type is fanart and a primary fanart already exists, meaning the eventual crop-save should append a new numbered fanart rather than replace the primary. Present only when needs_crop is true.
        "204":
          description: Image fetched and saved (HTMX request); HX-Refresh response header tells the client to reload.
        "400":
          description: Invalid request (missing or unsupported URL, unsupported image type, malformed body, or non-public URL)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Write blocked by the conflict ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictWriteBlock"
        "502":
          description: Upstream image fetch failed (network error, non-2xx response, or decode failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/search:
    get:
      tags: [Images]
      summary: Search providers for images
      operationId: searchImages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
        - name: sort
          in: query
          description: Sort order for results. Defaults to likes descending.
          schema:
            type: string
            enum: [likes, resolution]
            default: likes
      responses:
        "200":
          description: Image search results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: [array, "null"]
                    items:
                      type: object
                    description: List of available images from providers. May be null when no providers returned results.
                  errors:
                    type: [array, "null"]
                    items:
                      type: string
                    description: Errors encountered during the image search. May be null when no errors occurred.
            text/html:
              schema:
                type: string
        "400":
          description: Invalid sort parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/crop:
    post:
      tags: [Images]
      summary: Crop and save image
      operationId: cropImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                image_data:
                  type: string
                  description: Base64-encoded image data
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
                x:
                  type: integer
                y:
                  type: integer
                width:
                  type: integer
                height:
                  type: integer
                append:
                  type: boolean
                  description: When type is fanart and a primary fanart already exists, true appends the crop result as a new numbered fanart instead of replacing the primary.
              required: [image_data, type]
      responses:
        "200":
          description: Image cropped and saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the crop operation.
                  saved:
                    type: array
                    items:
                      type: string
                    description: Filenames of images saved to disk.
                  type:
                    type: string
                    description: Image type (e.g. thumb, fanart, logo, banner).
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
                  count:
                    type: integer
                    description: Total number of fanart images now on disk for this artist. Present only when type is fanart.
        "409":
          description: Write blocked by the conflict ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictWriteBlock"

  /artists/{id}/nfo/conflict:
    get:
      tags: [NFO]
      summary: Check for external NFO modifications
      description: >
        For pathless artists, always returns no conflict since there is
        no on-disk NFO file to be modified externally.
      operationId: checkNFOConflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conflict check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_conflict:
                    type: boolean
                    description: Whether an NFO conflict was detected.
                  reason:
                    type: string
                    description: Explanation of the conflict.
                  external_writer:
                    type: string
                    description: Name of the external tool that wrote the NFO.
                  last_modified:
                    type: string
                    format: date-time
                    description: Present when the NFO file exists and is accessible; contains the file's last-modified timestamp regardless of conflict status. Omitted when the file does not exist or cannot be accessed (pathless artists, missing file, or filesystem errors).
        "404":
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /history/{id}/revert:
    post:
      tags: [History]
      summary: Revert a metadata change
      operationId: revertHistory
      description: >
        Restores the old value from a metadata_changes record back to the
        artist field. Creates a new history entry with source "revert".
      parameters:
        - name: id
          in: path
          required: true
          description: Metadata change record ID.
          schema:
            type: string
      responses:
        "200":
          description: Change reverted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reverted:
                    type: boolean
                    description: >
                      True when a write occurred (the field differed from OldValue
                      and was updated). False when the revert was a no-op because
                      the field already equalled OldValue.
                  noop:
                    type: boolean
                    description: >
                      True when the revert was a no-op (field already at OldValue,
                      no write or history record created). Always the inverse of
                      reverted.
                  change_id:
                    type: string
                    description: ID of the original change that was targeted for revert.
                required: [reverted, noop, change_id]
            text/html:
              schema:
                type: string
                description: >
                  When the request includes an HX-Request header, returns an HTML
                  fragment instead of JSON. Depending on where the request
                  originated, this may be an activity-card fragment, an
                  artist-history row fragment, or a fallback confirmation block
                  if the new history record cannot be located.
        "400":
          description: Field is not revertible, or change source is "revert".
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Change not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: History service is not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /history:
    get:
      tags: [History]
      summary: List global metadata change history
      operationId: listGlobalHistory
      description: >
        Returns paginated metadata change records across all artists,
        ordered by most recent first.
      parameters:
        - name: limit
          in: query
          description: >
            Maximum number of records to return (10-500). Defaults to the
            caller's page_size preference when omitted.
          schema:
            type: integer
            minimum: 10
            maximum: 500
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: artist_id
          in: query
          description: Filter to a single artist.
          schema:
            type: string
        - name: field
          in: query
          description: >
            Filter by field name. Repeat the parameter to include multiple
            fields (e.g. ?field=biography&field=genres).
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: source
          in: query
          description: >
            Filter by change source. Repeat the parameter to include multiple
            sources (e.g. ?source=manual&source=scan). Use wildcard suffix for
            prefix matching (e.g. ?source=provider:* matches all provider sources).
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: from
          in: query
          description: >
            Include changes on or after this timestamp. Accepts RFC 3339 date-time
            (e.g. 2024-01-15T00:00:00Z) or a plain date (YYYY-MM-DD, interpreted
            as midnight UTC on that day).
          schema:
            oneOf:
              - type: string
                format: date-time
              - type: string
                format: date
        - name: to
          in: query
          description: >
            Include changes on or before this timestamp. Accepts RFC 3339 date-time
            (e.g. 2024-01-15T23:59:59Z) or a plain date (YYYY-MM-DD). A date-only
            value is treated as end-of-UTC-day (23:59:59.999999999) so the full
            day is included.
          schema:
            oneOf:
              - type: string
                format: date-time
              - type: string
                format: date
      responses:
        "200":
          description: Paginated list of metadata changes with artist names.
          content:
            application/json:
              schema:
                type: object
                properties:
                  changes:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/MetadataChange"
                        - type: object
                          required: [artist_name]
                          properties:
                            artist_name:
                              type: string
                              description: Display name of the artist this change belongs to.
                    description: List of metadata change records.
                  total:
                    type: integer
                    description: Total number of matching records.
                  limit:
                    type: integer
                    description: Maximum number of records returned.
                  offset:
                    type: integer
                    description: Number of records skipped from the start.
                required: [changes, total, limit, offset]
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: History service is not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

