      summary: Get all settings
      operationId: getSettings
      responses:
        "200":
          description: Key-value settings map
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
    put:
      tags: [Settings]
      summary: Update settings
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /settings/backup:
    post:
      tags: [Backup]
      summary: Create database backup
      operationId: createBackup
      responses:
        "200":
          description: Backup info (returns HTML backup list when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupInfo"
            text/html:
              schema:
                type: string

  /settings/backup/history:
    get:
      tags: [Backup]
      summary: List backup files
      operationId: listBackups
      responses:
        "200":
          description: List of backups (returns HTML backup table when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BackupInfo"
            text/html:
              schema:
                type: string

  /settings/backup/{filename}:
    get:
      tags: [Backup]
      summary: Download backup file
      operationId: downloadBackup
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    delete:
      tags: [Backup]
      summary: Delete a backup file
      operationId: deleteBackup
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup deleted (returns HTML backup list when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "400":
          description: Invalid filename
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scanner/run:
    post:
      tags: [Scanner]
      summary: Trigger filesystem scan
      operationId: runScanner
      responses:
        "202":
          description: Scan started
          content:
            application/json:
              schema:
                type: object
        "409":
          description: Scan already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scanner/status:
    get:
      tags: [Scanner]
      summary: Get scan status
      operationId: getScannerStatus
      responses:
        "200":
          description: Current or last scan status
          content:
            application/json:
              schema:
                type: object

  # --- API Documentation ---

  /docs:
    get:
      tags: [Docs]
      summary: Interactive API reference
      security: []
      operationId: getAPIDocs
      responses:
        "200":
          description: Scalar API reference HTML page
          content:
            text/html:
              schema:
                type: string

  /docs/openapi.yaml:
    get:
      tags: [Docs]
      summary: OpenAPI specification
      security: []
      operationId: getOpenAPISpec
      responses:
        "200":
          description: OpenAPI spec in YAML format
          content:
            application/yaml:
              schema:
                type: string

  # --- Libraries ---

  /libraries:
    get:
      tags: [Libraries]
      summary: List libraries
      operationId: listLibraries
      responses:
        "200":
          description: All libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
    post:
      tags: [Libraries]
      summary: Create library
      operationId: createLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                  default: regular
              required: [name]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                  default: regular
              required: [name]
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Duplicate library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /libraries/{id}:
    get:
      tags: [Libraries]
      summary: Get library
      operationId: getLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Library with artist count
          content:
            application/json:
              schema:
                type: object
                properties:
                  library:
                    $ref: "#/components/schemas/Library"
                  artist_count:
                    type: integer
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Libraries]
      summary: Update library
      operationId: updateLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                fs_watch:
                  type: integer
                fs_poll_interval:
                  type: integer
                  description: Seconds between polls (60, 300, 900, or 1800)
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Libraries]
      summary: Delete library
      operationId: deleteLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deleteArtists
          in: query
          description: When true, cascade-delete artists instead of dereferencing them
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Library deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /libraries/{libId}/operation/status:
    get:
      tags: [Libraries]
      summary: Get library operation status
      operationId: getLibraryOpStatus
      parameters:
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current operation status (or idle)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"

  # --- Connection extras ---

  /connections/clobber-check:
    get:
      tags: [Connections]
      summary: Check for NFO/image write conflicts
      description: >
        When no library has a filesystem path configured, returns an empty
        risk list immediately since there are no on-disk files to conflict
        with. Otherwise checks all enabled connections for NFO/image writing
        configuration that could overwrite Stillwater-managed files.
      operationId: clobberCheck
      responses:
        "200":
          description: Clobber risk assessment (returns HTML warnings when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_risk:
                    type: boolean
                  risks:
                    type: array
                    items:
                      type: object
                      properties:
                        connection_id:
                          type: string
                        connection_name:
                          type: string
                        connection_type:
                          type: string
                        nfo_writer:
                          type: boolean
                        library_name:
                          type: string
                        error:
                          type: string
            text/html:
              schema:
                type: string

  /connections/{id}/features:
    patch:
      tags: [Connections]
      summary: Update connection feature flags
      operationId: updateConnectionFeatures
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                feature_library_import:
                  type: boolean
                feature_nfo_write:
                  type: boolean
                feature_image_write:
                  type: boolean
      responses:
        "200":
          description: Features updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries:
    get:
      tags: [Connections]
      summary: Discover libraries on connection
      operationId: discoverLibraries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available libraries (returns HTML checklist when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    external_id:
                      type: string
                    name:
                      type: string
                    imported:
                      type: boolean
            text/html:
              schema:
                type: string
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/import:
    post:
      tags: [Connections]
      summary: Import libraries from connection
      description: >
        After creating each library, automatically starts a background
        populate operation to fetch artists from the connection. Poll
        GET /api/v1/libraries/{libId}/operation/status for progress.
      operationId: importLibraries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraries:
                  type: array
                  items:
                    type: object
                    properties:
                      external_id:
                        type: string
                      name:
                        type: string
                    required: [external_id, name]
              required: [libraries]
      responses:
        "201":
          description: Libraries imported
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/{libId}/populate:
    post:
      tags: [Connections]
      summary: Populate artists from connection into library
      operationId: populateLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Populate operation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"
        "409":
          description: Operation already running or connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/{libId}/scan:
    post:
      tags: [Connections]
      summary: Scan library via connection API
      operationId: scanLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Scan operation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"
        "409":
          description: Operation already running or connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Provider extras ---

  /providers/priorities/{field}/{provider}/toggle:
    put:
      tags: [Providers]
      summary: Toggle provider for a metadata field
      operationId: toggleFieldProvider
      parameters:
        - name: field
          in: path
          required: true
          schema:
            type: string
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider toggled (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "404":
          description: Field not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /providers/websearch:
    get:
      tags: [Providers]
      summary: List web search image providers
      operationId: getWebSearchProviders
      responses:
        "200":
          description: Web search providers with enabled state
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        display_name:
                          type: string
                        enabled:
                          type: boolean

  /providers/websearch/{name}/toggle:
    put:
      tags: [Providers]
      summary: Enable or disable a web search provider
      operationId: setWebSearchEnabled
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
              required: [enabled]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
              required: [enabled]
      responses:
        "200":
          description: Provider state updated (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "400":
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Scraper ---

  /scraper/config:
    get:
      tags: [Scraper]
      summary: Get global scraper configuration
      operationId: getScraperConfig
      responses:
        "200":
          description: Scraper config with field mappings and fallback chains
          content:
            application/json:
              schema:
                type: object
    put:
      tags: [Scraper]
      summary: Update global scraper configuration
      operationId: updateScraperConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Config saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scraper/config/connections/{id}:
    get:
      tags: [Scraper]
      summary: Get connection scraper config overrides
      operationId: getConnectionScraperConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Merged config with override indicators
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: object
                  raw:
                    type: object
                  overrides:
                    type: object
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Scraper]
      summary: Update connection scraper config overrides
      operationId: updateConnectionScraperConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Config saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Scraper]
      summary: Reset connection scraper config to global defaults
      operationId: resetConnectionScraperConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Config reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scraper/providers:
    get:
      tags: [Scraper]
      summary: List scraper providers with capabilities
      operationId: listScraperProviders
      responses:
        "200":
          description: Provider capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        display_name:
                          type: string
                        requires_auth:
                          type: boolean
                        has_key:
                          type: boolean
                        metadata_fields:
                          type: array
                          items:
                            type: string
                        image_fields:
                          type: array
                          items:
                            type: string

  # --- Notifications ---

  /notifications/counts:
    get:
      tags: [Notifications]
      summary: Get violation counts by severity
      operationId: getNotificationCounts
      responses:
        "200":
          description: Counts by severity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                  warning:
                    type: integer
                  info:
                    type: integer
                  total:
                    type: integer

  /notifications/badge:
    get:
      tags: [Notifications]
      summary: Get notification badge HTML fragment
      description: Returns an HTML fragment for HTMX polling. Not a JSON endpoint.
      operationId: getNotificationBadge
      responses:
        "200":
          description: Badge HTML fragment
          content:
            text/html:
              schema:
                type: string

  /notifications:
    get:
      tags: [Notifications]
      summary: List rule violations
      operationId: listNotifications
      parameters:
        - name: status
          in: query
          description: Filter by violation status
          schema:
            type: string
            enum: [open, dismissed, resolved, pending_choice]
            default: open
      responses:
        "200":
          description: Violations matching filter
          content:
            application/json:
              schema:
                type: object
                properties:
                  violations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Violation"
                  count:
                    type: integer

  /notifications/{id}/dismiss:
    post:
      tags: [Notifications]
      summary: Dismiss a violation
      operationId: dismissViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/resolve:
    post:
      tags: [Notifications]
      summary: Resolve a violation
      operationId: resolveViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/apply-candidate:
    post:
      tags: [Notifications]
      summary: Apply an image candidate from a pending-choice violation
      operationId: applyViolationCandidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                image_type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, image_type]
      responses:
        "200":
          description: Candidate applied and violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid request or URL mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/bulk-dismiss:
    post:
      tags: [Notifications]
      summary: Bulk dismiss violations
      operationId: bulkDismissViolations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Violation IDs to dismiss (omit to dismiss all)
      responses:
        "200":
          description: Count of dismissed violations
          content:
            application/json:
              schema:
                type: object
                properties:
                  dismissed:
                    type: integer

  /notifications/resolved:
    delete:
      tags: [Notifications]
      summary: Clear old resolved violations
      description: Permanently deletes resolved violations older than 7 days.
      operationId: clearResolvedViolations
      responses:
        "200":
          description: Resolved violations cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  # --- Report extras ---

  /reports/health/by-library:
    get:
      tags: [Reports]
      summary: Get per-library health breakdown
      operationId: getHealthByLibrary
      responses:
        "200":
          description: Per-library health scores (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  libraries:
                    type: array
                    items:
                      type: object
                      properties:
                        library_id:
                          type: string
                        library_name:
                          type: string
                        total_artists:
                          type: integer
                        compliant_artists:
                          type: integer
                        score:
                          type: number
                        missing_nfo:
                          type: integer
                        missing_thumb:
                          type: integer
                        missing_fanart:
                          type: integer
                        missing_mbid:
                          type: integer
                  overall:
                    type: object
            text/html:
              schema:
                type: string

  /reports/compliance/export:
    get:
      tags: [Reports]
      summary: Export compliance report as CSV
      operationId: exportComplianceReport
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            default: name
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
        - name: library_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [compliant, non_compliant]
        - name: health_min
          in: query
          schema:
            type: integer
        - name: health_max
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  # --- Inbound webhooks ---

  /webhooks/inbound/lidarr:
    post:
      tags: [Webhooks]
      summary: Receive Lidarr webhook event
      description: >
        Accepts inbound webhook events from Lidarr. Responds immediately with 200
        and processes the event asynchronously. Uses standard authentication
        (session cookie, bearer token, or API key query parameter).
      operationId: handleLidarrWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventType:
                  type: string
                  description: Lidarr event type (Test, ArtistAdded, Grab, Download, AlbumImport)
                artist:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    path:
                      type: string
                    mbId:
                      type: string
                    foreignArtistId:
                      type: string
              required: [eventType]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/inbound/emby:
    post:
      tags: [Webhooks]
      summary: Receive Emby webhook event
      description: >
        Accepts inbound webhook events from Emby. Responds immediately with 200
        and processes the event asynchronously. Uses standard authentication
        (session cookie, bearer token, or API key query parameter).
      operationId: handleEmbyWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Event:
                  type: string
                  description: >
                    Emby event type (system.notificationtest, library.new,
                    item.updated, library.changed)
                Item:
                  type: object
                  properties:
                    Id:
                      type: string
                    Name:
                      type: string
                    Type:
                      type: string
                      description: Media type, e.g. MusicAlbum
                    ProviderIds:
                      type: object
                      additionalProperties:
                        type: string
                    Path:
                      type: string
                    ArtistItems:
                      type: array
                      description: Related artist references (Emby 4.9+)
                      items:
                        type: object
                        properties:
                          Id:
                            type: string
                          Name:
                            type: string
              required: [Event]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/inbound/jellyfin:
    post:
      tags: [Webhooks]
      summary: Receive Jellyfin webhook event
      description: >
        Accepts inbound webhook events from the Jellyfin webhook plugin. Responds
        immediately with 200 and processes the event asynchronously. Uses standard
        authentication (session cookie, bearer token, or API key query parameter).
      operationId: handleJellyfinWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                NotificationType:
                  type: string
                  description: Jellyfin event type (Test, ItemAdded, ItemUpdated, LibraryChanged)
                ItemId:
                  type: string
                ItemType:
                  type: string
                  description: Media type, e.g. MusicAlbum
                Name:
                  type: string
                Artist:
                  type: string
                  description: Artist name from the Jellyfin webhook plugin
                Provider_musicbrainzalbumartist:
                  type: string
                  description: MusicBrainz album artist ID from the Jellyfin webhook plugin
              required: [NotificationType]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Settings extras ---

  /settings/logging:
    get:
      tags: [Settings]
      summary: Get logging configuration
      operationId: getLogging
      responses:
        "200":
          description: Current logging config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggingConfig"
    put:
      tags: [Settings]
      summary: Update logging configuration
      operationId: updateLogging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoggingConfig"
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                level:
                  type: string
                  enum: [debug, info, warn, error]
                format:
                  type: string
                  enum: [text, json]
                file_path:
                  type: string
                file_max_size_mb:
                  type: integer
                file_max_files:
                  type: integer
                file_max_age_days:
                  type: integer
      responses:
        "200":
          description: Updated logging config (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggingConfig"
            text/html:
              schema:
                type: string
        "400":
          description: Invalid level or format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/maintenance/status:
    get:
      tags: [Settings]
      summary: Get database maintenance status
      operationId: getMaintenanceStatus
      responses:
        "200":
          description: Maintenance status (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceStatus"
            text/html:
              schema:
                type: string

  /settings/maintenance/optimize:
    post:
      tags: [Settings]
      summary: Trigger database optimization
      operationId: maintenanceOptimize
      responses:
        "200":
          description: Optimization completed (returns HTML status fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /settings/maintenance/vacuum:
    post:
      tags: [Settings]
      summary: Trigger database vacuum
      operationId: maintenanceVacuum
      responses:
        "200":
          description: Vacuum completed (returns HTML status fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /settings/maintenance/schedule:
    put:
      tags: [Settings]
      summary: Configure maintenance schedule
      operationId: updateMaintenanceSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                interval_hours:
                  type: integer
              required: [enabled]
      responses:
        "200":
          description: Schedule updated (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /settings/export:
    post:
      tags: [Settings]
      summary: Export settings as encrypted file
      operationId: exportSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
              required: [passphrase]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
              required: [passphrase]
      responses:
        "200":
          description: Encrypted settings JSON file download
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  app_version:
                    type: string
                  created_at:
                    type: string
                    format: date-time
                  salt:
                    type: string
                  data:
                    type: string
        "400":
          description: Missing passphrase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/import:
    post:
      tags: [Settings]
      summary: Import settings from encrypted file
      operationId: importSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                envelope:
                  type: object
              required: [passphrase, envelope]
          multipart/form-data:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                file:
                  type: string
                  format: binary
              required: [passphrase, file]
      responses:
        "200":
          description: Import results with counts per category (returns HTML summary when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: integer
                  connections:
                    type: integer
                  platform_profiles:
                    type: integer
                  webhooks:
                    type: integer
                  provider_keys:
                    type: integer
                  priorities:
                    type: integer
            text/html:
              schema:
                type: string
        "400":
          description: Invalid request or decryption error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File exceeds 10MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

