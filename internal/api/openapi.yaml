          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs:
    get:
      tags: [Logs]
      summary: Get recent log entries
      description: Returns log entries from the in-memory ring buffer, or from a specific log file when the file parameter is provided. Supports filtering by level, search text, and component. Returns JSON for API clients or HTML fragments when the HX-Request header is set.
      operationId: getLogs
      parameters:
        - name: file
          in: query
          description: Filename of a log file to read (e.g. stillwater-2024-03-28T10-00-00.000.log). Must be a plain filename with no path separators. When set, reads from disk instead of the ring buffer; the after filter is ignored. Requires file logging to be configured.
          schema:
            type: string
        - name: level
          in: query
          description: Minimum log level to include. Omit to return all levels.
          schema:
            type: string
            enum: [trace, debug, info, warn, error]
        - name: search
          in: query
          description: Case-insensitive substring search on log message
          schema:
            type: string
        - name: component
          in: query
          description: Exact match on the component attribute
          schema:
            type: string
        - name: after
          in: query
          description: Only return entries after this RFC3339Nano timestamp (ring buffer only; ignored when file is set)
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of entries to return (default 100, max 500)
          schema:
            type: integer
            default: 100
            minimum: 0
            maximum: 500
      responses:
        "200":
          description: Log entries (newest first for JSON, oldest first for HTML)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
            text/html:
              schema:
                type: string
                description: HTML fragment of styled log entry divs for HTMX polling
        "400":
          description: Invalid query parameter (bad level, unparsable after, invalid limit, or invalid filename)
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    description: Error message describing the failure.
        "503":
          description: Logging manager or ring buffer not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Logs]
      summary: Clear log buffer
      description: Removes all entries from the in-memory ring buffer. Returns JSON for API clients or an HTML fragment when the HX-Request header is set.
      operationId: clearLogs
      responses:
        "200":
          description: Buffer cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: cleared
                    description: Result status of the log operation.
            text/html:
              schema:
                type: string
                description: HTML fragment confirming the buffer was cleared
        "503":
          description: Logging manager or ring buffer not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs/stream:
    get:
      tags: [Logs]
      summary: Stream live log entries (SSE)
      description: |
        Server-Sent Events endpoint that streams structured log records to the
        log viewer in real time. Admin only.

        On connect the server emits a `connected` frame (carrying
        `data.replayed`, the number of backfilled entries), then backfills up to
        500 recent entries from the in-memory ring buffer (filtered, oldest
        first) before live-tailing new records as `logs.line` events. Each
        `logs.line` frame's `id:` is the entry's RFC3339Nano timestamp; the
        browser EventSource echoes the last id back as the `Last-Event-ID`
        header on reconnect, and the server uses it as a resume cursor so only
        entries newer than the last one seen are replayed.

        When a slow client cannot keep up, the per-subscriber buffer overflows;
        the server sheds lines and emits a `logs.throttled` frame carrying
        `data.dropped` (the number of lines dropped) so the client can surface a
        throttle banner. A heartbeat comment is sent every 30 seconds to keep
        the connection alive.

        Unlike the general `/events/stream` hub, this is a dedicated stream: the
        raw log firehose is delivered only to clients that open this endpoint and
        is never fanned out to every connected tab.
      operationId: streamLogs
      parameters:
        - name: level
          in: query
          description: Minimum log level to include. Omit to return all levels.
          schema:
            type: string
            enum: [trace, debug, info, warn, error]
        - name: scope
          in: query
          description: Exact match on the component attribute.
          schema:
            type: string
        - name: q
          in: query
          description: Case-insensitive substring search on the log message.
          schema:
            type: string
        - name: last_event_id
          in: query
          description: RFC3339Nano resume cursor fallback for non-browser clients that cannot send the Last-Event-ID header. Mirrors the Last-Event-ID header; header takes precedence.
          schema:
            type: string
            format: date-time
        - name: Last-Event-ID
          in: header
          description: |
            RFC3339Nano timestamp of the last entry the client saw, echoed
            automatically by the browser EventSource on reconnect. Used as a
            resume cursor so the backfill only replays newer entries. A
            last_event_id query parameter is accepted as a fallback for
            non-browser clients.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: SSE stream established. Entries are sent as text/event-stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE formatted stream with logs.line / logs.throttled named events and JSON log-entry payloads.
        "400":
          description: Invalid query parameter (e.g. unrecognized level)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Streaming not supported by the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Logging manager or log stream not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs/components:
    get:
      tags: [Logs]
      summary: List distinct log components
      description: |
        Returns the distinct component values currently present in the in-memory
        log ring buffer, sorted alphabetically. Admin only.

        This is the vocabulary the live log viewer renders as Component filter
        pills: the natural set of components the user can filter the stream on
        (the `/logs/stream` `scope` parameter is an exact component match).
        Records with no derived component are omitted; the array is always
        present (empty when the buffer holds no components).
      operationId: listLogComponents
      responses:
        "200":
          description: Distinct component values.
          content:
            application/json:
              schema:
                type: object
                required: [components]
                properties:
                  components:
                    type: array
                    uniqueItems: true
                    items:
                      type: string
                      minLength: 1
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Logging manager or log buffer not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

