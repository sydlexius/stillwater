openapi: 3.1.0
info:
  title: Stillwater API
  version: 0.25.0
  description: Artist metadata and image management for Emby, Jellyfin, and Kodi.
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html
servers:
  - url: http://localhost:1973/api/v1
    description: Local development
security:
  - cookieAuth: []
  - bearerAuth: []
  - apiKeyAuth: []
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
    bearerAuth:
      type: http
      scheme: bearer
      description: API token (sw_ prefix) via Authorization header
    apiKeyAuth:
      type: apiKey
      in: query
      name: apikey
      description: "Deprecated: prefer bearerAuth (Authorization header). Query-string tokens risk leakage via logs and referrers."
      x-deprecated: true
  schemas:
    DuplicateGroup:
      type: object
      description: >-
        One detected near-duplicate group. Returned by the duplicates
        report (both the canonical /reports/duplicates path and the
        deprecated /artists/duplicates alias).
      properties:
        artists:
          type: array
          items:
            $ref: "#/components/schemas/Artist"
          description: Artists in this duplicate group.
        reason:
          type: string
          description: >-
            Human-readable explanation of why these artists are considered
            duplicates (e.g. "shared MusicBrainz ID: abc123",
            "shared alias: The Beatles").
      required: [artists, reason]
    VocabConfig:
      type: object
      additionalProperties: false
      description: >
        User-configurable tag filtering for genre, style, and mood metadata.
        An exclude list drops tags matching any pattern; per-field caps limit
        how many tags are written. All fields default to a no-op (empty
        exclude list, zero caps) so this configuration changes nothing until
        the user sets it.
      properties:
        exclude:
          type: array
          description: >
            Patterns matched case-insensitively against every genre, style,
            and mood tag. A tag matching any pattern is dropped. "*" is a
            wildcard matching any run of characters (for example "seen*"
            matches "seen live"). Regex is not supported.
          items:
            type: string
          example: ["seen live", "*-core"]
        max_genres:
          type: integer
          minimum: 0
          default: 0
          description: Maximum number of genres to write. 0 means unlimited.
        max_styles:
          type: integer
          minimum: 0
          default: 0
          description: Maximum number of styles to write. 0 means unlimited.
        max_moods:
          type: integer
          minimum: 0
          default: 0
          description: Maximum number of moods to write. 0 means unlimited.
    EmbyJellyfinPlatformSettings:
      type: object
      required: [connection_type, libraries]
      properties:
        connection_type:
          type: string
          enum: [emby, jellyfin]
          description: Platform type of the connection.
        libraries:
          type: array
          description: Per-library fetcher/saver settings.
          items:
            type: object
            properties:
              library_id:
                type: string
                description: ID of the library.
              library_name:
                type: string
                description: Display name of the library on the platform.
              image_fetchers:
                type: array
                items:
                  type: string
                description: Image fetcher plugins enabled for this library.
              metadata_fetchers:
                type: array
                items:
                  type: string
                description: Metadata fetcher plugins enabled for this library.
              metadata_savers:
                type: array
                items:
                  type: string
                description: Metadata saver plugins enabled for this library.
              has_conflicts:
                type: boolean
                description: Whether conflicting plugin settings were detected.
              needs_lockdata:
                type: boolean
                description: Jellyfin only. Indicates NFO lockdata injection is required.
              enable_internet_providers:
                type: boolean
                description: Jellyfin only. Whether internet providers are enabled for this library.
        note:
          type: string
          description: Platform-specific advisory note.
    LidarrPlatformSettings:
      type: object
      required: [connection_type, metadata_consumers]
      properties:
        connection_type:
          type: string
          enum: [lidarr]
          description: Platform type of the connection.
        metadata_consumers:
          type: array
          description: Global metadata consumers.
          items:
            type: object
            properties:
              id:
                type: integer
                description: Unique identifier.
              consumer_name:
                type: string
                description: Display name of the metadata consumer plugin.
              metadata_type:
                type: string
                description: Type of metadata this consumer handles.
              enabled:
                type: boolean
                description: Whether this metadata consumer is enabled.
        note:
          type: string
          description: Platform-specific advisory note.
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        details:
          type: array
          items:
            type: string
          description: Validation error details. Present when validation fails, containing one or more error messages.
      required: [error]
    MergeRequest:
      type: object
      description: Body for POST /artists/merge.
      properties:
        survivor_id:
          type: string
          description: Artist ID that survives the merge.
        loser_ids:
          type: array
          items:
            type: string
          description: >-
            Artist IDs to fold into the survivor. At least one entry. Must
            not contain survivor_id or duplicates.
          minItems: 1
        dry_run:
          type: boolean
          description: >-
            When true, perform the pre-flight collision walk and return the
            would-be result without touching the filesystem or the
            database. Use this to populate a confirmation UI before
            committing the merge.
          default: false
      required: [survivor_id, loser_ids]
    MergeMovedItem:
      type: object
      description: One filesystem rename performed by the merge.
      properties:
        name:
          type: string
          description: Child basename (album subdir or loose file).
        from:
          type: string
          description: Absolute source path under the loser.
        to:
          type: string
          description: Absolute destination path under the survivor.
      required: [name, from, to]
    MergeDeletedItem:
      type: object
      description: >-
        One loose file deleted from a loser directory because the same filename
        already existed under the survivor. Present in dry-run responses as a
        preview and in commit responses as a record of what was removed.
      properties:
        name:
          type: string
          description: File basename.
        path:
          type: string
          description: Absolute path of the file that was (or would be) deleted from the loser directory.
      required: [name, path]
    MergeConflict:
      type: object
      description: >-
        One would-be filesystem collision found by the pre-flight walk.
        Populated alongside HTTP 409 collisions; nothing has been moved.
      properties:
        name:
          type: string
          description: Conflicting child basename.
        survivor_path:
          type: string
          description: Existing entry under the survivor directory.
        loser_path:
          type: string
          description: Conflicting entry under the loser directory.
      required: [name, survivor_path, loser_path]
    MergeResult:
      type: object
      description: Structured outcome of a merge call (dry-run or committed).
      properties:
        dry_run:
          type: boolean
          description: Mirrors the request's dry_run flag.
        survivor_id:
          type: string
          description: ID of the surviving artist.
        survivor_path:
          type: string
          description: Filesystem path of the surviving artist directory.
        survivor_override:
          type: boolean
          description: >-
            True when the caller chose a survivor that did not match the
            precedence recommendation (MB-canonical basename > most
            content). The merge proceeds; the flag exists so the UI can
            surface the deviation.
        moved:
          type: array
          items:
            $ref: "#/components/schemas/MergeMovedItem"
          description: >-
            Every filesystem rename performed (album subdirs first, then
            non-colliding loose files). Empty on dry-run. Album-subdirectory
            collisions return HTTP 409 with the MergeCollisionsResponse shape.
            Loose-file same-name collisions that are safely superseded by a
            survivor regular file are represented in `deleted`.
        deleted:
          type: array
          items:
            $ref: "#/components/schemas/MergeDeletedItem"
          description: >-
            Loose files removed from loser directories because the same
            filename already existed under the survivor. The survivor's
            copy is authoritative; the loser's redundant copy is deleted so
            the loser directory can be emptied and unlinked. On dry-run this
            previews which files WOULD be deleted; on commit it lists what
            WAS actually removed.
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/MergeConflict"
          description: >-
            Always empty on the 200 success body; collisions return HTTP
            409 with the MergeCollisionsResponse shape. The field is kept
            here so dry-run callers that share a single payload decoder
            still see a consistent schema.
        removed:
          type: array
          items:
            type: string
          description: >-
            Loser artist IDs whose on-disk directories were actually
            unlinked by the merge. A loser whose directory was left in
            place (destination-appeared race or unexpected filesystem
            content) is NOT listed here; see warnings for the reason.
        warnings:
          type: array
          items:
            type: string
          description: >-
            Non-fatal observations (symlinks skipped, destination-appeared
            race left a subdirectory in place, the standing reminder that
            connected platforms still index the loser path until the
            operator triggers a refresh).
        losers_deleted:
          type: array
          items:
            type: string
          description: Loser artist IDs whose rows were deleted by the merge transaction.
      required: [survivor_id, survivor_path]
    MergeCollisionsResponse:
      description: >-
        409 response body returned when the orchestrator refused to merge.
        Discriminated by the `error` field. The `collisions` variant
        always carries a `conflicts` array (possibly empty); the
        `merge_in_progress` variant never carries `conflicts`.
      oneOf:
        - $ref: "#/components/schemas/MergeCollisionConflict"
        - $ref: "#/components/schemas/MergeInProgressError"
      discriminator:
        propertyName: error
        mapping:
          collisions: "#/components/schemas/MergeCollisionConflict"
          merge_in_progress: "#/components/schemas/MergeInProgressError"
    MergeCollisionConflict:
      type: object
      description: >-
        Pre-flight walk found same-name album collisions; nothing was
        moved. The conflicts list enumerates each one with both the
        survivor-side existing path and the would-be loser source.
      properties:
        error:
          type: string
          enum: [collisions]
        survivor_id:
          type: string
        survivor_path:
          type: string
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/MergeConflict"
      required: [error, conflicts]
    MergeInProgressError:
      type: object
      description: >-
        Another merge is already in flight for some group; the caller
        should back off and retry shortly. No filesystem or database
        state was touched by this request.
      properties:
        error:
          type: string
          enum: [merge_in_progress]
      required: [error]
    FieldLockedError:
      type: object
      description: >-
        Returned when attempting to modify a user-locked field. Shared
        across link endpoints, so `field` is a plain string rather than an
        endpoint-specific enum since the discriminator operates on `error`.
      properties:
        error:
          type: string
          enum: [field_locked]
        field:
          type: string
        reason:
          type: string
      required: [error, field, reason]
    ConflictWriteBlock:
      type: object
      description: >
        Envelope returned with HTTP 409 when Stillwater's conflict gate blocks
        a write due to an active conflict on any axis: a connected media
        server configured to write the same axis back to disk (`image` or
        `nfo`), or a round-trip overlap between two enabled connections
        whose library paths share a filesystem root (`round_trip`). Clients
        should surface `reason` to the user and offer the "Let Stillwater
        manage" toggle from the ledger.
      properties:
        error:
          type: string
          description: >
            Stable machine-readable conflict code of the form
            "{axis}_write_blocked" (e.g. image_write_blocked,
            nfo_write_blocked, round_trip_write_blocked). Matches the
            generic Error envelope so clients that ignore the conflict
            fields still see a familiar shape.
        axis:
          type: string
          enum: [image, nfo, round_trip]
          description: Which write axis triggered the block.
        reason:
          type: string
          description: Human-readable explanation safe for UI display.
        ledger:
          type: object
          description: Full ledger snapshot that caused the block.
      required: [error, axis, reason, ledger]
    NFOFieldMap:
      type: object
      description: Configures how genre, style, and mood categories map to NFO XML elements for platform compatibility.
      properties:
        default_behavior:
          type: boolean
          description: When true, writes each category to its native element (Kodi-compatible passthrough). Ignores moods_as_styles and genre_sources, but advanced_remap still takes higher precedence when non-null.
        moods_as_styles:
          type: boolean
          description: When true, mood values are additionally written as style elements for Emby/Jellyfin Tag visibility.
        genre_sources:
          type: array
          items:
            type: string
            enum: [genres, styles, moods]
          description: Which source categories feed the genre XML element.
        advanced_remap:
          type: [object, "null"]
          description: Full source-to-element mapping matrix. Overrides all other settings when non-null.
          properties:
            genre:
              type: array
              description: Source categories that feed the NFO genre element.
              items:
                type: string
                enum: [genres, styles, moods]
            style:
              type: array
              description: Source categories that feed the NFO style element.
              items:
                type: string
                enum: [genres, styles, moods]
            mood:
              type: array
              description: Source categories that feed the NFO mood element.
              items:
                type: string
                enum: [genres, styles, moods]
          additionalProperties: false
    PortableSettingsEnvelopeImport:
      type: object
      description: |
        Import-side wrapper for a previously exported settings file. The shape
        is intentionally permissive: the importer accepts envelope versions
        1.0-1.4, and earlier versions do not carry the per-section counters
        that current writers emit. Required fields are limited to the core
        crypto envelope (version + app_version + created_at + salt + data);
        the optional `summary` block is informational only on the import path.
      required: [version, app_version, created_at, salt, data]
      properties:
        version:
          type: string
          description: |
            Envelope format version. Importer accepts `1.0`-`1.4`. Each minor
            bump adds optional fields without breaking older readers (1.1:
            rules/scraper_configs/user_preferences; 1.2: libraries/api_tokens;
            1.3: users; 1.4: user stable IDs and connection feature toggles
            including pre-Stillwater config snapshot).
        app_version:
          type: string
          description: Application version that produced the export.
        created_at:
          type: string
          format: date-time
          description: When the export was created (UTC, RFC 3339).
        salt:
          type: string
          description: Base64-encoded PBKDF2 salt used to derive the symmetric key from the passphrase.
        data:
          type: string
          description: Base64-encoded ciphertext (nonce + AES-GCM payload) of the inner Payload struct.
        summary:
          type: object
          description: |
            Plaintext per-section row counts for sanity-checking without
            decryption. Optional on import: legacy envelopes pre-1.2 do not
            carry libraries/api_tokens/users counters, so all section fields
            are optional here. The export-side schema is the strict counterpart.
          properties:
            settings: { type: integer }
            connections: { type: integer }
            platform_profiles: { type: integer }
            webhooks: { type: integer }
            provider_keys: { type: integer }
            priorities: { type: integer }
            rules: { type: integer }
            scraper_configs: { type: integer }
            user_preferences: { type: integer }
            libraries: { type: integer }
            libraries_skipped: { type: integer }
            api_tokens: { type: integer }
            api_tokens_skipped: { type: integer }
            users_imported: { type: integer }
            ownership_reassigned: { type: integer }
    PortableSettingsEnvelopeExport:
      type: object
      description: |
        Export-side wrapper produced by the current writer (envelope version
        1.4). Strict shape: every counter the writer emits is marked required
        so generated clients can rely on the field's presence without
        defensive null checks. The import-side schema is the permissive
        counterpart that accepts older envelope versions.
      required: [version, app_version, created_at, salt, data, summary]
      properties:
        version:
          type: string
          description: |
            Envelope format version. Current writer emits `1.4`. Each minor
            bump adds optional fields without breaking older readers (1.1:
            rules/scraper_configs/user_preferences; 1.2: libraries/api_tokens;
            1.3: users; 1.4: user stable IDs and connection feature toggles
            including pre-Stillwater config snapshot).
        app_version:
          type: string
          description: Application version that produced the export.
        created_at:
          type: string
          format: date-time
          description: When the export was created (UTC, RFC 3339).
        salt:
          type: string
          description: Base64-encoded PBKDF2 salt used to derive the symmetric key from the passphrase.
        data:
          type: string
          description: Base64-encoded ciphertext (nonce + AES-GCM payload) of the inner Payload struct.
        summary:
          type: object
          description: |
            Plaintext per-section row counts for sanity-checking without
            decryption. All counters the current writer emits are required.
          required:
            [settings, connections, platform_profiles, webhooks, provider_keys, priorities,
             rules, scraper_configs, user_preferences,
             libraries, libraries_skipped, api_tokens, api_tokens_skipped,
             users_imported, ownership_reassigned]
          properties:
            settings:
              type: integer
              description: Number of plain-KV settings rows.
            connections:
              type: integer
              description: Number of platform connections.
            platform_profiles:
              type: integer
              description: Number of platform profiles.
            webhooks:
              type: integer
              description: Number of outbound webhooks.
            provider_keys:
              type: integer
              description: Number of provider API key rows.
            priorities:
              type: integer
              description: Number of provider-priority entries.
            rules:
              type: integer
              description: Number of rule configurations (envelope >= 1.1).
            scraper_configs:
              type: integer
              description: Number of scraper configuration scopes (envelope >= 1.1).
            user_preferences:
              type: integer
              description: Number of user-preference rows (envelope >= 1.1).
            libraries:
              type: integer
              description: Number of libraries (envelope >= 1.2).
            libraries_skipped:
              type: integer
              description: Number of libraries skipped because the source-side connection has no equivalent on the target instance.
            api_tokens:
              type: integer
              description: Number of API tokens (envelope >= 1.2). Token plaintexts are never carried; only the stored hash + metadata.
            api_tokens_skipped:
              type: integer
              description: Number of API tokens skipped (e.g. owner absent on target and admin-fallback not requested).
            users_imported:
              type: integer
              description: Number of users recreated from the envelope's Users block (envelope >= 1.3). Pre-existing users on the target are NOT counted.
            ownership_reassigned:
              type: integer
              description: Number of API tokens whose owner was absent on the target and were reassigned to the importing admin via admin_fallback_tokens=true.
    Status:
      type: object
      properties:
        status:
          type: string
          description: Current status text.
    ConnectionResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique connection identifier.
        name:
          type: string
          description: User-assigned display name for this connection.
        type:
          type: string
          enum: [emby, jellyfin, lidarr]
          description: Platform type of the connection.
        url:
          type: string
          description: Base URL of the platform server.
        has_key:
          type: boolean
          description: Whether the connection has an API key configured.
        has_platform_user_id:
          type: boolean
          description: Whether the connection has a platform user ID configured for personalized metadata.
        enabled:
          type: boolean
          description: Whether the connection is active and will be used for operations.
        status:
          type: string
          description: Current connectivity state (e.g. connected, unreachable).
        status_message:
          type: string
          description: Human-readable detail about the connection status.
        last_checked_at:
          type: [string, "null"]
          format: date-time
          description: When the connection was last health-checked (UTC, RFC 3339). Null when the connection has never been tested.
        created_at:
          type: string
          format: date-time
          description: When the connection was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the connection was last modified (UTC, RFC 3339).
        feature_library_import:
          type: boolean
          description: Whether Stillwater imports libraries from this connection.
        feature_nfo_write:
          type: boolean
          description: Whether Stillwater writes NFO files to this connection.
        feature_image_write:
          type: boolean
          description: Whether Stillwater writes images to this connection.
        feature_metadata_push:
          type: boolean
          description: Whether Stillwater pushes metadata updates to this platform via API.
        feature_trigger_refresh:
          type: boolean
          description: Whether Stillwater asks the platform to refresh artist metadata after push.
        verify_path_after_update:
          type: boolean
          description: When true, issues a follow-up GET after rename PUT to verify path wasn't coerced. Lidarr only.
        library_count:
          type: integer
          description: Number of libraries associated with this connection. Present in the single-connection detail response only, not in the list response.
        artist_count:
          type: integer
          description: Total number of artists across all libraries for this connection. Present in the single-connection detail response only, not in the list response.
    Webhook:
      type: object
      properties:
        id:
          type: string
          description: Unique webhook identifier.
        name:
          type: string
          description: User-assigned display name for this webhook.
        url:
          type: string
          description: Destination URL that receives webhook payloads.
        type:
          type: string
          description: Webhook delivery type.
        events:
          type: array
          description: Event types this webhook subscribes to.
          items:
            type: string
            enum:
              - artist.new
              - metadata.fixed
              - review.needed
              - rule.violation
              - bulk.completed
              - scan.completed
              - lidarr.artist.add
              - lidarr.download
              - emby.artist.update
              - emby.library.scan
              - jellyfin.artist.update
              - jellyfin.library.scan
              - fs.dir.created
              - fs.dir.removed
              - fs.unexpected.write
        enabled:
          type: boolean
          description: Whether this webhook is active and will fire on matching events.
        created_at:
          type: string
          format: date-time
          description: When the webhook was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the webhook was last modified (UTC, RFC 3339).
    IdentifyProgress:
      type: object
      properties:
        status:
          type: string
          enum: [idle, running, completed, canceled, failed]
          description: Current state of the identification process. "failed" surfaces when the bulk-identify pipeline recovers from a panic; the slot is released and a subsequent POST starts a fresh job.
        total:
          type: integer
          description: Total number of unidentified artists to process.
        processed:
          type: integer
          description: Number of artists processed so far.
        auto_linked:
          type: integer
          description: Artists automatically linked via connection or high-confidence match.
        queued:
          type: integer
          description: Artists added to the review queue for manual linking.
        unmatched:
          type: integer
          description: Artists with no matching candidates found.
        failed:
          type: integer
          description: Artists that failed during processing.
        current_name:
          type: string
          description: Name of the artist currently being processed.
        review_queue:
          type: array
          description: Artists requiring manual review and linking.
          items:
            $ref: "#/components/schemas/IdentifyCandidate"
    IdentifyCandidate:
      type: object
      properties:
        artist_id:
          type: string
          description: ID of the unidentified artist.
        artist_name:
          type: string
          description: Display name of the unidentified artist.
        artist_path:
          type: string
          description: Filesystem path to the artist directory.
        tier:
          type: string
          enum: [connection, album, name, wizard]
          description: >
            The pipeline tier that produced this candidate. The wizard
            value marks entries pushed onto the review queue by
            POST /artists/re-identify/wizard/{sid}/save-exit when the
            user ends a review session with undecided artists.
        candidates:
          type: array
          description: Ranked list of potential MusicBrainz matches.
          items:
            $ref: "#/components/schemas/ScoredCandidate"
    ScoredCandidate:
      type: object
      properties:
        provider_id:
          type: string
          description: Provider-specific identifier for this candidate.
        name:
          type: string
          description: Candidate artist name from the provider.
        sort_name:
          type: string
          description: Sort-friendly form of the candidate name.
        type:
          type: string
          description: Artist type (e.g. person, group).
        disambiguation:
          type: string
          description: Provider disambiguation comment to distinguish similar names.
        origin:
          type: string
          description: Country or region of origin associated with the candidate.
        score:
          type: integer
          description: Provider match score (higher is better).
        musicbrainz_id:
          type: string
          description: MusicBrainz artist ID (MBID) for the candidate.
        source:
          type: string
          description: Provider that supplied this candidate.
        album_comparison:
          $ref: "#/components/schemas/AlbumComparison"
        confidence:
          type: number
          format: double
          description: Confidence score from 0.0 to 1.0.
        reason:
          type: string
          description: Human-readable reason for the confidence score.
    AlbumComparison:
      type: object
      description: Comparison of local and remote album catalogs for an artist match candidate.
      properties:
        matches:
          type: array
          description: Albums found in both local and remote catalogs.
          items:
            type: object
            properties:
              local_name:
                type: string
                description: Album name from the local library.
              remote_name:
                type: string
                description: Album name from the remote provider.
              matched:
                type: boolean
                description: Whether the local and remote names were considered a match.
        local_only:
          type: array
          description: Album names present locally but not found in the remote catalog.
          items:
            type: string
        remote_only:
          type: array
          description: Album names present remotely but not found in the local library.
          items:
            type: string
        match_count:
          type: integer
          description: Number of albums matched between local and remote.
        local_count:
          type: integer
          description: Total number of albums in the local library.
        remote_count:
          type: integer
          description: Total number of albums in the remote catalog.
        match_percent:
          type: integer
          description: Percentage of local albums matched (0-100).
    HealthSummary:
      type: object
      properties:
        score:
          type: number
          description: Overall health score from 0.0 (worst) to 1.0 (best).
        total_artists:
          type: integer
          description: Total number of tracked artists.
        compliant_artists:
          type: integer
          description: Number of artists with no open violations.
        missing_nfo:
          type: integer
          description: Number of artists missing an NFO file.
        missing_thumb:
          type: integer
          description: Number of artists missing a thumbnail image.
        missing_fanart:
          type: integer
          description: Number of artists missing fanart.
        missing_mbid:
          type: integer
          description: Number of artists missing a MusicBrainz ID.
        top_violations:
          type: array
          description: Most common violation types across all artists.
          items:
            type: object
            properties:
              rule_id:
                type: string
                description: Identifier of the rule.
              rule_name:
                type: string
                description: Display name of the rule.
              count:
                type: integer
                description: Number of open violations for this rule.
              severity:
                type: string
                description: Severity level of the rule (error, warning, info).
        rule_pass_rates:
          type: array
          description: Per-rule pass/fail aggregates for the dashboard widget (#699 slice 2). Omitted when pass-rate data is unavailable (for example, no evaluated rules yet, or the aggregate lookup failed and the handler logged a warning).
          items:
            type: object
            required: [rule_id, rule_name, severity, passed, failed, evaluated, pass_rate]
            properties:
              rule_id:
                type: string
              rule_name:
                type: string
              severity:
                type: string
                enum: [error, warning, info]
              passed:
                type: integer
              failed:
                type: integer
              evaluated:
                type: integer
              pass_rate:
                type: number
                format: float
                description: passed / evaluated as a 0.0-1.0 fraction. Returned rows always have evaluated > 0 (the SQL omits rules with no rule_results rows).
    BackupInfo:
      type: object
      properties:
        filename:
          type: string
          description: Name of the backup file.
        size:
          type: integer
          description: File size in bytes.
        created_at:
          type: string
          format: date-time
          description: When the backup was created (UTC, RFC 3339).
    RuleRunStatus:
      type: object
      properties:
        running:
          type: boolean
          description: Whether a rule evaluation is currently in progress.
        status:
          type: string
          enum: [idle, running, completed, failed]
          description: Current state of the rule run.
        scope:
          type: string
          enum: [incremental, all]
          description: >
            Which artists this run targeted. "incremental" (the default for
            the user-facing Run Rules button) re-evaluates only artists
            flagged dirty since their last evaluation. "all" forces a
            full sweep -- the "Re-evaluate All" admin escape hatch.
        rule_id:
          type: string
          description: >
            Present for single-rule runs: both the POST /rules/{id}/run 202
            acknowledgment and any GET /rules/run-all/status snapshot while a
            single-rule run is in flight. Omitted for full-sweep (run-all)
            responses.
        artists_processed:
          type: integer
          description: Number of artists actually evaluated during this run.
        artists_total:
          type: integer
          description: >
            Total number of eligible (non-excluded, non-locked) artists in
            the catalog at run start. Lets the UI render
            "evaluating N of M (M-N unchanged)" for incremental scope.
        artists_skipped:
          type: integer
          description: >
            Eligible artists not processed by this run because they were
            clean (rules_evaluated_at already covered their dirty_since).
            May be omitted when zero (the `omitempty` contract). When
            present, this counts skipped-because-clean artists for
            scope=incremental; for scope=all it is zero -- the field is
            only populated on incremental runs, so a partial failure on
            a full sweep is not misread as "unchanged".
        violations_found:
          type: integer
          description: Total number of violations detected during evaluation
        violations_auto_fixed:
          type: integer
          description: Number of violations that were automatically fixed
        violations_remaining:
          type: integer
          description: Number of active violations remaining, filtered by notification badge severity settings
        fixes_attempted:
          type: integer
          description: Number of automated fix attempts made.
        fixes_succeeded:
          type: integer
          description: Number of automated fixes that succeeded.
        started_at:
          type: string
          format: date-time
          description: When the rule run started (UTC, RFC 3339).
        completed_at:
          type: string
          format: date-time
          description: When the rule run finished (UTC, RFC 3339).
        last_evaluation_at:
          type: string
          format: date-time
          description: >
            The scheduler's last-evaluation stamp (the same value
            /rules/status surfaces), captured atomically with this run-all
            completion so a client polling this endpoint sees "completed"
            and the fresh stamp together in one response (#2152). Set only
            on a successful run-all completion when a scheduler is
            configured; omitted for single-rule runs and while a run is
            still in progress or failed.
        error:
          type: string
          description: Error message if the run failed. Omitted on success.
    Library:
      type: object
      description: A media library that Stillwater monitors for artists.
      properties:
        id:
          type: string
          description: Unique library identifier.
        name:
          type: string
          description: User-assigned display name for this library.
        path:
          type: string
          description: Filesystem root path of the library.
        type:
          type: string
          enum: [regular]
          description: Library classification. Only "regular" is supported as of v1.3.0.
          x-enum-descriptions:
            regular: Standard artist-centric library.
        source:
          type: string
          enum: [manual, emby, jellyfin, lidarr]
          description: How the library was added to Stillwater.
        connection_id:
          type: string
          description: ID of the platform connection this library belongs to. Omitted for manual libraries.
        external_id:
          type: string
          description: Platform-specific library identifier. Omitted for manual libraries.
        fs_watch:
          type: integer
          description: Filesystem watch mode (0=disabled, 1=notify, 2=poll).
        fs_poll_interval:
          type: integer
          description: Polling interval in seconds when fs_watch is poll mode.
        shared_fs_status:
          type: string
          description: Shared-filesystem detection status. Empty string means unknown (not yet evaluated).
          enum: ["", "none", "suspected", "confirmed"]
        shared_fs_evidence:
          type: string
          description: JSON array of evidence strings describing how the shared-filesystem status was determined
        shared_fs_peer_library_ids:
          type: string
          description: Comma-separated IDs of peer libraries associated with the shared-filesystem evidence
        nfo_lock_data:
          type: boolean
          description: When true, NFOs written for artists in this library carry <lockdata>true</lockdata>, telling Emby and Jellyfin to refuse metadata refreshes for those artists. Off (false) by default; opt-in per library.
        fs_notify_supported:
          type: boolean
          description: Whether the OS supports inotify/fsevents for this path.
        created_at:
          type: string
          format: date-time
          description: When the library was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the library was last modified (UTC, RFC 3339).
    SharedFilesystemStatus:
      type: object
      properties:
        has_overlaps:
          type: boolean
          description: True when shared-filesystem overlaps exist
        libraries:
          type: array
          description: Libraries involved in shared-filesystem overlaps.
          items:
            $ref: '#/components/schemas/SharedFilesystemEntry'
        dismissed:
          type: boolean
          description: True when the user has permanently dismissed the warning
        image_fetcher_warnings:
          type: array
          description: Platform image fetcher warnings. Present when shared-filesystem overlaps exist and either image fetchers are enabled or the fetcher check could not be completed.
          items:
            $ref: '#/components/schemas/ImageFetcherWarning'
    ImageFetcherWarning:
      type: object
      required: [risk_level, message]
      properties:
        platform:
          type: string
          description: Platform type, either "emby" or "jellyfin"
          enum: ["emby", "jellyfin"]
        library_name:
          type: string
          description: Name of the platform library with image fetchers enabled
        fetcher_names:
          type: array
          items:
            type: string
          description: Names of enabled image fetchers (e.g., "TheAudioDb", "FanArt")
        risk_level:
          type: string
          description: Risk level of the image fetcher conflict. "warn" for Emby (adds missing images only), "critical" for Jellyfin (can replace existing images and strip EXIF data).
          enum: ["warn", "critical"]
        message:
          type: string
          description: Human-readable warning message describing the risk and recommended action
    SharedFilesystemEntry:
      type: object
      properties:
        library_id:
          type: string
          description: ID of the library.
        library_name:
          type: string
          description: Display name of the library.
        path:
          type: string
          description: Root filesystem path of the library.
        overlap_with:
          type: string
          description: ID of the library that shares the same path or parent.
    SharedFilesystemRecheckResult:
      type: object
      properties:
        shared_libraries:
          type: integer
          description: Current count of libraries whose shared-filesystem status is set by evidence
    FilesystemBrowseResult:
      type: object
      required: [path, entries, parent]
      properties:
        path:
          type: string
          description: The resolved absolute path that was listed.
        entries:
          type: array
          items:
            type: string
          description: Names of direct subdirectories within path, sorted case-insensitively. Hidden directories are excluded.
        parent:
          type: string
          description: Parent directory of path. Empty string when path is the filesystem root.
    LibraryOpResult:
      type: object
      properties:
        library_id:
          type: string
          description: ID of the library the operation ran on.
        library_name:
          type: string
          description: Display name of the library.
        operation:
          type: string
          enum: [populate, scan]
          description: Type of library operation.
        status:
          type: string
          enum: [running, completed, failed]
          description: Current state of the operation.
        message:
          type: string
          description: Human-readable result or error message.
        started_at:
          type: string
          format: date-time
          description: When the operation started (UTC, RFC 3339).
        completed_at:
          type: string
          format: date-time
          description: When the operation finished (UTC, RFC 3339).
    APIToken:
      type: object
      properties:
        id:
          type: string
          description: Unique token identifier.
        name:
          type: string
          description: User-assigned display name for this token.
        scopes:
          type: string
          description: Comma-separated permission scopes granted to this token.
        user_id:
          type: string
          description: ID of the user who owns this token.
        status:
          type: string
          enum: [active, revoked]
          description: "Token lifecycle state: active or revoked"
        created_at:
          type: string
          format: date-time
          description: When the token was created (UTC, RFC 3339).
        last_used_at:
          type: string
          format: date-time
          description: When the token was last used for authentication (UTC, RFC 3339).
        revoked_at:
          type: string
          format: date-time
          description: When the token was revoked (UTC, RFC 3339). Omitted if active.
    Violation:
      type: object
      properties:
        id:
          type: string
          description: Unique violation identifier.
        rule_id:
          type: string
          description: ID of the rule that generated this violation.
        artist_id:
          type: string
          description: ID of the artist this violation applies to.
        artist_name:
          type: string
          description: Display name of the artist.
        library_name:
          type: string
          description: Name of the library the artist belongs to. Empty if unknown.
        severity:
          type: string
          enum: [error, warning, info]
          description: Violation severity level.
        message:
          type: string
          description: Human-readable description of the violation.
        fixable:
          type: boolean
          description: Whether this violation can be automatically fixed.
        status:
          type: string
          enum: [open, dismissed, resolved, pending_choice]
          description: Current lifecycle state of the violation.
        candidates:
          type: array
          description: Fix candidates for image violations. Omitted for non-image rules.
          items:
            type: object
            properties:
              url:
                type: string
                description: Source URL of the candidate image.
              width:
                type: integer
                description: Image width in pixels.
              height:
                type: integer
                description: Image height in pixels.
              source:
                type: string
                description: Provider that supplied this candidate.
              image_type:
                type: string
                description: Type of image (e.g. thumb, fanart, logo, banner).
        dismissed_at:
          type: string
          format: date-time
          description: When the violation was dismissed (UTC, RFC 3339). Omitted if not dismissed.
        resolved_at:
          type: string
          format: date-time
          description: When the violation was resolved (UTC, RFC 3339). Omitted if not resolved.
        created_at:
          type: string
          format: date-time
          description: When the violation was first detected (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the violation was last updated (UTC, RFC 3339).
    LogFileInfo:
      type: object
      description: Metadata for a log file available for browsing in the log viewer.
      properties:
        name:
          type: string
          description: Filename (no path components)
        size:
          type: integer
          format: int64
          description: File size in bytes
        mod_time:
          type: string
          format: date-time
          description: Last modified time of the file
        is_current:
          type: boolean
          description: True when this is the actively written log file
      required:
        - name
        - size
        - mod_time
        - is_current
    LogEntry:
      type: object
      description: A single log record captured by the in-memory ring buffer.
      properties:
        time:
          type: string
          format: date-time
          description: Timestamp of the log entry
        level:
          type: string
          enum: [trace, debug, info, warn, error]
          description: Severity level
        message:
          type: string
          description: Log message text
        component:
          type: string
          description: Component that emitted the log entry (e.g. scanner, provider, api). Omitted when not set.
        attrs:
          type: object
          additionalProperties: true
          description: Additional structured attributes from the log record
      required:
        - time
        - level
        - message
    LoggingConfig:
      type: object
      properties:
        level:
          type: string
          enum: [trace, debug, info, warn, error]
          description: Minimum log severity to emit.
        format:
          type: string
          enum: [text, json]
          description: Log output format.
        file_path:
          type: string
          description: Path to the log file on disk.
        file_max_size_mb:
          type: integer
          description: Maximum log file size in megabytes before rotation.
        file_max_files:
          type: integer
          description: Maximum number of rotated log files to retain.
        file_max_age_days:
          type: integer
          description: Maximum age in days before a rotated log file is deleted.
    MaintenanceStatus:
      type: object
      properties:
        db_file_size:
          type: integer
          format: int64
          description: Size of the main database file in bytes.
        wal_file_size:
          type: integer
          format: int64
          description: Size of the WAL (write-ahead log) file in bytes.
        page_count:
          type: integer
          format: int64
          description: Total number of pages in the database.
        page_size:
          type: integer
          format: int64
          description: Database page size in bytes.
        last_optimize_at:
          type: string
          format: date-time
          description: When the database was last optimized (UTC, RFC 3339).
        schedule_enabled:
          type: boolean
          description: Whether automatic maintenance is enabled.
        schedule_interval_hours:
          type: integer
          description: Hours between automatic maintenance runs.
    PlatformBackdropConnection:
      type: object
      properties:
        connection_id:
          type: string
          description: ID of the platform connection.
        connection_name:
          type: string
          description: Display name of the platform connection.
        connection_type:
          type: string
          enum: [emby, jellyfin]
          description: Platform type of the connection.
        backdrops:
          type: array
          description: Backdrop images available on this connection.
          items:
            $ref: "#/components/schemas/PlatformBackdropItem"
    PlatformBackdropItem:
      type: object
      properties:
        index:
          type: integer
          description: 0-based index of the backdrop on the platform
        thumbnail_url:
          type: string
          description: Proxy URL to fetch the backdrop thumbnail through Stillwater
    MetadataChange:
      type: object
      description: A single field-level metadata change recorded for an artist.
      properties:
        id:
          type: string
          description: Unique change record ID (UUID).
        artist_id:
          type: string
          description: ID of the artist this change belongs to.
        field:
          type: string
          description: The metadata field that changed (e.g. "biography", "genres", "thumb").
        old_value:
          type: string
          description: The previous value. Empty string when the field was previously unset.
        new_value:
          type: string
          description: The new value. Empty string when the field was cleared.
        source:
          type: string
          description: >
            Origin of the change. One of "manual", "scan", "import",
            "revert", "provider:<name>" (e.g. "provider:musicbrainz"),
            or "rule:<rule_id>" (e.g. "rule:missing_mbid").
        created_at:
          type: string
          format: date-time
          description: Timestamp when the change was recorded (UTC, RFC 3339).
      required: [id, artist_id, field, old_value, new_value, source, created_at]
    Artist:
      type: object
      description: A music artist or group with full metadata.
      properties:
        id:
          type: string
          description: Unique artist identifier.
        name:
          type: string
          description: Primary display name of the artist.
        sort_name:
          type: string
          description: Name used for alphabetical sorting.
        type:
          type: string
          description: Artist type, e.g. "person" or "group".
        gender:
          type: string
          description: Gender of the artist (e.g. male, female, other). Empty when unknown.
        origin:
          type: string
          description: Country or region of origin for the artist (e.g. United States, Mandeville, Louisiana). Empty when unknown.
        disambiguation:
          type: string
          description: Text to distinguish similarly named artists.
        musicbrainz_id:
          type: string
          description: MusicBrainz artist ID (MBID).
        audiodb_id:
          type: string
          description: TheAudioDB artist ID.
        discogs_id:
          type: string
          description: Discogs artist ID.
        wikidata_id:
          type: string
          description: Wikidata entity ID.
        deezer_id:
          type: string
          description: Deezer artist ID.
        spotify_id:
          type: string
          description: Spotify artist ID.
        genres:
          type:
            - array
            - "null"
          items:
            type: string
          description: Genre tags associated with the artist.
        styles:
          type:
            - array
            - "null"
          items:
            type: string
          description: Style tags associated with the artist.
        moods:
          type:
            - array
            - "null"
          items:
            type: string
          description: Mood tags associated with the artist.
        years_active:
          type: string
          description: Period(s) the artist was active (e.g. 1990-2005).
        born:
          type: string
          description: Birth date or year for a person artist.
        formed:
          type: string
          description: Formation date or year for a group.
        died:
          type: string
          description: Death date or year for a person artist.
        disbanded:
          type: string
          description: Disbandment date or year for a group.
        biography:
          type: string
          description: Biographical text for the artist.
        path:
          type: string
          description: Filesystem path to the artist directory. Empty for pathless (platform-only) artists.
        library_id:
          type: string
          description: ID of the artist's primary library, derived from the
            artist_libraries membership table (oldest membership wins;
            ties are resolved by lowest library_id).
            Empty when the artist has no library memberships.
        nfo_exists:
          type: boolean
          description: Whether an NFO file exists on disk for this artist.
        thumb_exists:
          type: boolean
          description: Whether a thumbnail image exists for this artist.
        fanart_exists:
          type: boolean
          description: Whether at least one fanart image exists for this artist.
        fanart_count:
          type: integer
          description: Number of fanart images on disk for this artist.
        logo_exists:
          type: boolean
          description: Whether a logo image exists for this artist.
        banner_exists:
          type: boolean
          description: Whether a banner image exists for this artist.
        thumb_low_res:
          type: boolean
          description: Whether the thumbnail is below the minimum resolution threshold.
        fanart_low_res:
          type: boolean
          description: Whether the primary fanart is below the minimum resolution threshold.
        logo_low_res:
          type: boolean
          description: Whether the logo is below the minimum resolution threshold.
        banner_low_res:
          type: boolean
          description: Whether the banner is below the minimum resolution threshold.
        thumb_placeholder:
          type: string
          description: Base64-encoded placeholder for the thumb image. Omitted when not set.
        fanart_placeholder:
          type: string
          description: Base64-encoded placeholder for the fanart image. Omitted when not set.
        logo_placeholder:
          type: string
          description: Base64-encoded placeholder for the logo image. Omitted when not set.
        banner_placeholder:
          type: string
          description: Base64-encoded placeholder for the banner image. Omitted when not set.
        health_score:
          type: number
          format: double
          description: Metadata completeness score from 0.0 (worst) to 1.0 (best).
        is_excluded:
          type: boolean
          description: Whether the artist is excluded from rules and automated operations.
        exclusion_reason:
          type: string
          description: Reason the artist is excluded from rules and metadata operations. Omitted when not excluded.
        is_classical:
          type: boolean
          description: Whether the artist is classified as classical.
        locked:
          type: boolean
          description: When true, automated operations will not modify this artist.
        lock_source:
          type: string
          description: Source that applied the lock (e.g. "user"). Omitted when not locked.
        locked_at:
          type: string
          format: date-time
          description: Timestamp when the lock was applied. Omitted when not locked.
        locked_fields:
          type: array
          uniqueItems: true
          items:
            type: string
          description: Lowercased field names locked at the field level. Values are deduplicated. Independent of the whole-artist lock. Round-trips to Emby's LockedFields.
        audiodb_id_fetched_at:
          type: string
          format: date-time
          description: When the AudioDB ID was last fetched. Omitted when never fetched.
        discogs_id_fetched_at:
          type: string
          format: date-time
          description: When the Discogs ID was last fetched. Omitted when never fetched.
        wikidata_id_fetched_at:
          type: string
          format: date-time
          description: When the Wikidata ID was last fetched. Omitted when never fetched.
        lastfm_fetched_at:
          type: string
          format: date-time
          description: When Last.fm metadata was last fetched. Omitted when never fetched.
        metadata_sources:
          type: object
          additionalProperties:
            type: string
          description: Map of field name to provider name indicating which provider supplied each field. Omitted when empty.
        last_scanned_at:
          type: string
          format: date-time
          description: When the artist directory was last scanned. Omitted when never scanned.
        created_at:
          type: string
          format: date-time
          description: When the artist record was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the artist record was last modified (UTC, RFC 3339).
      required:
        - id
        - name
        - sort_name
        - type
        - gender
        - origin
        - disambiguation
        - musicbrainz_id
        - audiodb_id
        - discogs_id
        - wikidata_id
        - deezer_id
        - spotify_id
        - genres
        - styles
        - moods
        - years_active
        - born
        - formed
        - died
        - disbanded
        - biography
        - path
        - library_id
        - nfo_exists
        - thumb_exists
        - fanart_exists
        - fanart_count
        - logo_exists
        - banner_exists
        - thumb_low_res
        - fanart_low_res
        - logo_low_res
        - banner_low_res
        - health_score
        - is_excluded
        - is_classical
        - locked
        - created_at
        - updated_at
    BandMember:
      type: object
      description: A member of a band or group.
      properties:
        id:
          type: string
          description: Unique band member record identifier.
        artist_id:
          type: string
          description: ID of the parent artist (band/group).
        member_name:
          type: string
          description: Display name of the band member.
        member_mbid:
          type: string
          description: MusicBrainz ID for this member. Omitted when not set.
        instruments:
          type:
            - array
            - "null"
          items:
            type: string
          description: Instruments played by this member. Null when unknown.
        vocal_type:
          type: string
          description: Vocal range or type (e.g. "tenor"). Omitted when not set.
        date_joined:
          type: string
          description: Year or date the member joined the group. Omitted when unknown.
        date_left:
          type: string
          description: Year or date the member left the group. Omitted for current members.
        is_original_member:
          type: boolean
          description: Whether this member was part of the original lineup.
        sort_order:
          type: integer
          description: Display order of this member relative to others in the band.
        created_at:
          type: string
          format: date-time
          description: When this record was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When this record was last modified (UTC, RFC 3339).
      required:
        - id
        - artist_id
        - member_name
        - instruments
        - is_original_member
        - sort_order
        - created_at
        - updated_at
    CacheStats:
      type: object
      required: [size_bytes, file_count, artist_count]
      properties:
        size_bytes:
          type: integer
          format: int64
          description: Total size of the image cache in bytes.
        file_count:
          type: integer
          description: Number of files in the image cache.
        artist_count:
          type: integer
          description: Number of unique artist directories in the cache.
    CacheClearResult:
      type: object
      required: [files_deleted, bytes_freed]
      properties:
        files_deleted:
          type: integer
          description: Number of files removed from the cache.
        bytes_freed:
          type: integer
          format: int64
          description: Total bytes freed by the clear operation.
    UpdateCheckResult:
      type: object
      required: [current, channel, update_available]
      properties:
        current:
          type: string
          description: Running binary version.
          example: "v0.9.6"
        latest:
          type: string
          description: >-
            Latest version available on the configured channel. Empty when the
            current channel has no matching release (e.g. after switching from
            a channel with available builds to one without).
          example: "v1.0.0"
        channel:
          type: string
          enum: [stable, prerelease, nightly]
          description: Release channel used for this check.
        update_available:
          type: boolean
          description: True when latest is strictly newer than current.
        release_url:
          type: string
          description: >-
            URL to the GitHub release page for the latest version. Empty/omitted
            when the check found no matching release on the current channel.
        published_at:
          type: string
          format: date-time
          description: >-
            Publication timestamp of the latest release (RFC 3339). Empty/omitted
            when the check found no matching release on the current channel.
    UpdateStatus:
      type: object
      required: [state, progress, is_docker, update_available, restart_required, skipped_versions]
      properties:
        state:
          type: string
          enum: [idle, checking, downloading, applying, error]
          description: Current phase of the update lifecycle.
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Approximate completion percentage (0-100).
        error:
          type: string
          description: Error message when state is "error". Omitted otherwise.
        last_checked:
          type: string
          format: date-time
          description: RFC 3339 timestamp of the most recent check. Absent if never checked.
        is_docker:
          type: boolean
          description: True when running inside a Docker container. Apply is unsupported in this case.
        update_available:
          type: boolean
          description: True when the most recent check found a newer version on the configured channel.
        latest:
          type: string
          description: >-
            Tag name of the latest matching release. Empty when no check has
            succeeded yet OR when the most recent successful check found no
            matching release on the current channel (e.g. after a channel switch).
        release_url:
          type: string
          description: >-
            URL to the GitHub release page for the latest version. Absent when no
            check has succeeded yet OR when the most recent successful check
            found no matching release on the current channel. The sidebar
            update-available badge uses this URL as the anchor href.
        restart_required:
          type: boolean
          description: >-
            True after a successful Apply has replaced the on-disk binary. The
            running process still serves the old version until it is restarted;
            the UI uses this to show a persistent "restart to finish update"
            banner. The flag is sticky in-memory and is cleared only when the
            process actually restarts (which discards the in-memory state).
        pending_version:
          type: string
          description: >-
            Tag of the binary that was just installed and is waiting for a
            restart to take effect. Present only when restart_required is true.
        latest_version:
          type: string
          description: >-
            Tag name of the latest matching release — same value as the `latest`
            field, exposed under the more descriptive `latest_version` key for
            use by the JS hydration layer.
        auto_update:
          type: boolean
          description: >-
            True when the scheduler is configured to apply updates automatically.
            Mirrors the auto_update field in UpdateConfig so the JS hydration
            layer can refresh the Updates tab without a full page reload.
        last_auto_applied:
          type: string
          format: date-time
          description: >-
            RFC 3339 timestamp of the last successful auto-apply. Absent when
            no auto-apply has occurred in this installation.
        last_auto_applied_version:
          type: string
          description: >-
            Release tag that was installed by the last auto-apply. Absent when
            last_auto_applied is unset.
        skipped_versions:
          type: array
          items:
            type: string
          description: >-
            Persisted list of release tags the scheduler must not auto-apply.
            Always present (empty array when no versions are skipped).
    UpdateConfig:
      type: object
      # Only `channel` and `auto_check` are required so the schema stays
      # backward-compatible with the original W2/M36 clients that predate the
      # enabled / check_interval_hours fields. The handler and service both
      # default missing fields (enabled=true, check_interval_hours=24,
      # auto_update=false) when they are absent from a PUT body.
      required: [channel, auto_check]
      properties:
        channel:
          type: string
          enum: [stable, prerelease, nightly]
          description: >-
            Release channel to track. "stable" follows non-prerelease semver tags;
            "prerelease" also includes release candidates and beta builds;
            "nightly" follows date-stamped nightly builds (nightly-YYYYMMDD).
        enabled:
          type: boolean
          description: >-
            Top-level kill switch for the updater. When false, the background
            auto-check loop is a no-op and manual Apply is rejected with a
            403. Default: true.
        auto_check:
          type: boolean
          description: >-
            When true (and `enabled` is also true), the updater periodically
            checks for new releases in the background at `check_interval_hours`.
            Default: false.
        auto_update:
          type: boolean
          description: >-
            When true (and `enabled`, `auto_check` are also true), the
            scheduler calls Apply automatically after a successful check
            finds a newer release. Docker hosts ignore this flag (the
            scheduler no-ops on Docker; orchestration handles container
            image refresh). The skip-this-version list (see
            `/updates/skips`) gates which candidate tags are eligible.
            Default: false.
        check_interval_hours:
          type: integer
          minimum: 0
          description: >-
            How often the background auto-check loop polls GitHub, in hours.
            The persisted minimum is 1; a request value of 0 is coerced to
            the default (24) by the service layer (the handler only rejects
            negative values; the coercion runs inside Service.SetConfig so
            older clients that omit the field still validate). Negative
            values are rejected on PUT with a 400.
        last_auto_applied:
          type: string
          format: date-time
          readOnly: true
          description: >-
            RFC3339 timestamp of the last successful auto-apply. Read-only
            output: written by the scheduler after a successful Apply, not
            by user PUT.
        last_auto_applied_version:
          type: string
          readOnly: true
          description: >-
            Tag of the release installed in the last auto-apply. Empty when
            `last_auto_applied` is unset.
        skipped_versions:
          type: array
          readOnly: true
          items:
            type: string
          description: >-
            Read-only mirror of the persisted skip list, always present
            (empty array when no versions are skipped). Mutate via the
            `/updates/skips` POST/DELETE endpoints (PUT here ignores the
            field).

    ForeignFileEntry:
      type: object
      description: |
        One row in the foreign_files ledger. A foreign file is an image whose
        basename matches a media-server naming pattern but whose EXIF
        ImageDescription does not carry the Stillwater provenance tag.

        The list endpoint collapses multiple ledger rows that share the same
        non-empty content_hash into a single entry (display-time dedup). The
        representative entry is the row with the smallest id. Rows with an
        empty content_hash (recorded before migration 008) are never collapsed.
        duplicate_count reflects how many ledger rows share this file's hash;
        a value of 1 means no duplicates exist.
      properties:
        id:
          type: string
        artist_id:
          type: string
        artist_name:
          type: string
        file_path:
          type: string
          description: Absolute path on disk; surfaced verbatim so the UI can show it.
        file_name:
          type: string
          description: Basename, e.g. "backdrop.jpg".
        content_hash:
          type: string
          description: |
            Lowercase hex sha256 of the file's bytes. Used as the dedupe
            key for allowlisting so two files sharing a basename but with
            different byte content can each be allowlisted independently.
            Empty for rows recorded before migration 008; the scanner
            backfills on the next pass.
        size_bytes:
          type: integer
          format: int64
        detected_at:
          type: string
          format: date-time
        duplicate_count:
          type: integer
          minimum: 1
          description: |
            Number of ledger rows that share this file's content_hash (always
            >= 1). A value greater than 1 means the same physical file is
            referenced by multiple artist records or path spellings; the list
            collapses them into this single entry. The UI shows a hint badge
            when duplicate_count > 1.
      required: [id, artist_id, artist_name, file_path, file_name, content_hash, size_bytes, detected_at, duplicate_count]

    ForeignAllowlistEntry:
      type: object
      description: |
        One row in the foreign_file_allowlist table. scope=global matches
        every artist (artist_id is empty); scope=artist matches a specific
        artist (artist_id required). Matching keys on content_hash so
        identical byte sequences cannot be allowlisted twice in the same
        scope; file_name is preserved for human readability in the UI.
      properties:
        id:
          type: string
        scope:
          type: string
          enum: [global, artist]
        artist_id:
          type: string
        artist_name:
          type: string
        file_name:
          type: string
        content_hash:
          type: string
          description: |
            Lowercase hex sha256 of the allowlisted byte sequence; the
            dedupe key. Empty only for legacy rows that have not yet been
            rewritten by an allowlist mutation against the new schema.
        note:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, scope, file_name, content_hash, note, created_at]

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                    description: Health check result (e.g. ok).
                  version:
                    type: string
                    description: Application version string.
                  commit:
                    type: string
                    description: Git commit SHA of the running build.
                  time:
                    type: string
                    format: date-time
                    description: Current server time (UTC, RFC 3339).

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates a user and sets a session cookie. Behavior depends on the
        instance-level auth.method setting: for "local", validates against the
        local user database; for "emby" or "jellyfin", authenticates against
        the configured media server via its AuthenticateByName API.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        "200":
          description: Login successful, session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Media server unreachable (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/oidc/login:
    get:
      tags: [Auth]
      summary: Initiate OIDC login
      description: |
        Initiates the OpenID Connect authorization code flow with PKCE.
        Generates state, nonce, and code verifier parameters, stores them in
        HTTP-only cookies, and redirects the user to the configured identity
        provider's authorization endpoint. The IdP will redirect back to the
        callback endpoint after authentication.
      security: []
      operationId: oidcLogin
      responses:
        "302":
          description: Redirect to identity provider authorization endpoint
        "404":
          description: OIDC provider is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error generating security parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC callback
      description: |
        Handles the identity provider's redirect after authentication. Validates
        the state parameter against the stored cookie, exchanges the authorization
        code for tokens using PKCE, verifies the ID token and nonce, then runs the
        standard login/provisioning flow (user lookup, auto-provision if enabled,
        session creation). On success, sets a session cookie and redirects to the
        application root.
      security: []
      operationId: oidcCallback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from the identity provider
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State parameter for CSRF validation
        - name: error
          in: query
          schema:
            type: string
          description: Error code returned by the identity provider (e.g. access_denied)
        - name: error_description
          in: query
          schema:
            type: string
          description: Human-readable error description from the identity provider
      responses:
        "302":
          description: |
            Redirect to the application root on success (with session cookie set),
            or redirect to the login page with an error query parameter on failure.
            All outcomes use browser redirects since this endpoint is hit via a
            full-page navigation from the identity provider, not an HTMX request.

  /auth/setup:
    post:
      tags: [Auth]
      summary: Create initial admin account
      description: |
        Creates the initial administrator account during first-time setup.
        Built-in auth methods: "local" creates a username/password account;
        "emby" or "jellyfin" authenticates against a media server and
        auto-creates the first server connection. Additional values registered
        in the server's auth.Registry (e.g. "oidc") are also accepted and
        resolved by their provider, bypassing media-server auth.
      security: []
      operationId: setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auth_method:
                  type: string
                  default: local
                  description: |
                    Authentication method for this instance. Built-in values
                    are "local" (username + password), "emby", and "jellyfin"
                    (federated against a media server). Any string registered
                    in the server's auth.Registry is also accepted (e.g.
                    "oidc"); the registry path bypasses media-server auth and
                    expects the provider to resolve an identity directly.
                username:
                  type: string
                password:
                  type: string
                  description: Must be at least 8 characters for local auth
                server_url:
                  type: string
                  format: uri
                  description: Media server URL, required when auth_method is emby or jellyfin
              required: [username, password]
              allOf:
                - if:
                    properties:
                      auth_method:
                        enum: [emby, jellyfin]
                    required: [auth_method]
                  then:
                    required: [server_url]
      responses:
        "201":
          description: Admin account created (and auto-logged in for federated auth)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Request validation failed (missing fields, password policy, or invalid server URL)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Media server rejected the supplied credentials (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Media server user is not an administrator (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Admin account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error while creating the admin account (e.g. federated identity rejected by the user service)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Media server unreachable (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /setup/restore:
    post:
      tags: [Auth]
      summary: Restore a Stillwater backup during OOBE
      description: |
        Applies a previously exported settings envelope (passphrase-encrypted
        with AES-256-GCM) into the current instance, including local user
        accounts. Intended for the "Restore from backup" branch of the
        pre-admin setup page so a user can stand up a new install with their
        prior credentials, library config, and platform integrations intact.

        The endpoint is gated on "no admin user exists yet" AND
        `onboarding.completed != "true"`. The admin-existence check enforces
        that restore happens before any admin account is created -- the user
        signs in with their pre-existing credentials and no orphaned
        throwaway admin row gets left behind. Once OOBE finishes, the
        secondary onboarding flag locks the route. Rate-limited identically
        to login and admin creation. CSRF-exempt (entry point: no session
        exists yet to attach a token to).

        On success the response sets `HX-Redirect` (HTMX) or includes a
        `redirect` field (JSON) pointing at the root so the user signs in
        with the restored credentials.
      security: []
      operationId: setupRestore
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, passphrase]
              properties:
                file:
                  type: string
                  format: binary
                  description: Backup envelope produced by POST /settings/export
                passphrase:
                  type: string
                  description: Passphrase used at export time (PBKDF2 key derivation)
      responses:
        "200":
          description: |
            Restore applied. JSON clients receive `redirect` in the response
            body and navigate themselves. HTMX clients receive a generic HTML
            fragment plus an `HX-Redirect` response header, which HTMX
            consumes to drive the browser to the post-restore sign-in page.
          headers:
            HX-Redirect:
              schema:
                type: string
              description: |
                Present on responses to HTMX requests (HX-Request: true with
                an Accept header that does not include application/json).
                HTMX follows this URL after the swap completes. Absent on
                JSON responses; clients use the body's `redirect` field
                instead.
          content:
            application/json:
              schema:
                type: object
                required: [status, redirect, users_imported, connections, libraries, api_tokens]
                properties:
                  status: { type: string, enum: [restored] }
                  redirect: { type: string }
                  users_imported: { type: integer }
                  connections: { type: integer }
                  libraries: { type: integer }
                  api_tokens: { type: integer }
            text/html:
              schema:
                type: string
                description: |
                  HTMX swap fragment returned alongside the `HX-Redirect`
                  header so the OOBE wizard's container can show a brief
                  "Restoring..." copy while the browser navigates.
        "400":
          description: Invalid request or client-side restore error (missing file/passphrase, malformed multipart body, wrong passphrase, corrupt envelope, or unsupported envelope version)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: An admin already exists, or onboarding has already completed; restore is no longer reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A user account on the target collides with the backup under a different id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Backup file exceeds the 10MB upload limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Too many requests; the loginRL middleware throttles brute-force attempts at the passphrase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error applying the envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Restore service is not configured on this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      operationId: logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getMe
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    description: Unique identifier of the authenticated user.
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/tokens:
    post:
      tags: [Auth]
      summary: Create API token
      operationId: createAPIToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                scopes:
                  type: string
                  description: Comma-separated scopes (default "read")
                  default: read
              required: [name]
      responses:
        "201":
          description: Token created (plaintext token returned only once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Unique identifier for the newly created token.
                  token:
                    type: string
                    description: Plaintext API token value. Only returned once at creation.
                  name:
                    type: string
                    description: User-assigned display name for this token.
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Auth]
      summary: List API tokens
      operationId: listAPITokens
      responses:
        "200":
          description: List of API tokens (no plaintext values).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIToken"

  /auth/tokens/{id}:
    delete:
      tags: [Auth]
      summary: Revoke API token
      operationId: revokeAPIToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/tokens/{id}/permanent:
    delete:
      tags: [Auth]
      summary: Permanently delete a token
      operationId: deleteAPIToken
      description: Permanently removes a revoked token. Anonymizes associated audit log entries. Cannot delete active tokens.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Token permanently deleted
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Token is still active and must be revoked first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{id}/account/permanent:
    delete:
      tags: [Auth]
      summary: Permanently delete a user account
      operationId: deleteUserAccount
      description: |
        Permanently removes a user account and records the deletion in the
        audit log. Distinct from `DELETE /api/v1/users/{id}` (deactivation,
        currently undocumented), which only flips `is_active` to 0; this
        endpoint actually wipes the row. Admin-only. The protected bootstrap
        administrator and the signed-in admin's own account cannot be
        deleted from this surface (use Account Settings for self-account
        actions). The last active administrator cannot be deleted.

        The 4-segment path shape sidesteps a `net/http` ServeMux conflict
        between a hypothetical `/users/{id}/account` and the pre-existing
        `/users/invites/{id}`; both would otherwise match `/users/invites/account`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 200
                  description: Optional free-text reason stored verbatim in audit_log.detail.
      responses:
        "204":
          description: User permanently deleted
        "400":
          description: Malformed JSON body or reason exceeds 200 runes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden (administrator role required, or self-delete attempted from the admin users panel)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Protected bootstrap admin or last active administrator cannot be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists:
    get:
      tags: [Artists]
      summary: List artists
      operationId: listArtists
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
        - name: sort
          in: query
          description: |
            Sort column. Unknown values are rejected with 400 Bad Request.
            Empty defaults to "name".
          schema:
            type: string
            enum: [name, sort_name, type, origin, health_score, updated_at, created_at]
            default: name
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
        - name: ids
          in: query
          description: |
            Comma-separated list of artist IDs to restrict the result to.
            Used by the off-page bulk-selection "Show selected" affordance
            (#1227). Tokens that do not match the canonical ID shape
            (^[A-Za-z0-9_-]{1,64}$) are dropped server-side. The slice is
            capped at 1000 (artist.MaxListIDs) so the chip cannot exceed
            the bulk-action endpoint's hard limit.
          schema:
            type: string
        - name: filter_missing_meta
          in: query
          description: Include (+y) or exclude (-y) artists with missing metadata
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_missing_images
          in: query
          description: Include (+y) or exclude (-y) artists with missing images
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_missing_mbid
          in: query
          description: Include (+y) or exclude (-y) artists with no MusicBrainz ID
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_excluded
          in: query
          description: Include (+y) or exclude (-y) artists marked as excluded
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_locked
          in: query
          description: Include (+y) or exclude (-y) artists that are locked
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_type_person
          in: query
          description: Include (+y) or exclude (-y) artists of type "person"
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_type_group
          in: query
          description: Include (+y) or exclude (-y) artists of type "group"
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_type_orchestra
          in: query
          description: Include (+y) or exclude (-y) artists of type "orchestra" or "choir"
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_type_other
          in: query
          description: Include (+y) or exclude (-y) artists of any other or unset type (not person, group, orchestra, or choir)
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_biography
          in: query
          description: Include (+y) artists with a biography, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_years_active
          in: query
          description: Include (+y) artists with years_active set, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_formed
          in: query
          description: Include (+y) artists with a formed date, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_disbanded
          in: query
          description: Include (+y) artists with a disbanded date, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_born
          in: query
          description: Include (+y) artists with a birth date, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_died
          in: query
          description: Include (+y) artists with a death date, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_gender
          in: query
          description: Include (+y) artists with gender set, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_type
          in: query
          description: Include (+y) artists with artist type set, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_country
          in: query
          description: Include (+y) artists with country of origin set, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_genres
          in: query
          description: Include (+y) artists with genres, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_styles
          in: query
          description: Include (+y) artists with styles, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_moods
          in: query
          description: Include (+y) artists with moods, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_members
          in: query
          description: Include (+y) artists with band members recorded, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_discography
          in: query
          description: >-
            Include (+y) artists that have an NFO file (which may contain discography entries),
            exclude (-y) those without. Discography entries are parsed from artist.nfo on demand
            and are not persisted to the database; nfo_exists is the best available DB-level proxy.
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_thumb
          in: query
          description: Include (+y) artists with a thumb image, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_fanart
          in: query
          description: Include (+y) artists with fanart, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_logo
          in: query
          description: Include (+y) artists with a logo image, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_banner
          in: query
          description: Include (+y) artists with a banner image, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_in_emby
          in: query
          description: Include (+y) artists present in an Emby library, exclude (-y) those not present
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_in_jellyfin
          in: query
          description: Include (+y) artists present in a Jellyfin library, exclude (-y) those not present
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_lidarr
          in: query
          description: Include (+y) artists with a Lidarr mapping, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_has_violations
          in: query
          description: Include (+y) artists with open rule violations, exclude (-y) those without
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: library_id
          in: query
          description: Filter artists by library ID
          schema:
            type: string
        - name: "filter_library_{id}"
          in: query
          description: >-
            Per-library include/exclude filter. Replace {id} with a library ID;
            an unset library is unconstrained. Two modes apply. When one or more
            libraries use +y the filter is an exclusive whitelist: results are
            restricted to artists that belong to at least one included library
            and whose library memberships fall entirely within the included
            set, and any -y entries are ignored while whitelist mode is active.
            When no library uses +y, each -y drops artists belonging to that
            library. Multiple filter_library_{id} params may be combined.
          schema:
            type: string
            enum: ["+y", "-y"]
      responses:
        "200":
          description: Paginated artist list
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: array
                    items:
                      $ref: "#/components/schemas/Artist"
                    description: List of artist records.
                  total:
                    type: integer
                    description: Total number of matching records.
                  page:
                    type: integer
                    description: Current page number (1-based).
                  page_size:
                    type: integer
                    description: Number of records per page.
        "400":
          description: Invalid sort or order parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/badge:
    get:
      tags: [Artists]
      summary: Get artist count badge HTML fragment
      operationId: getArtistsBadge
      description: >-
        Returns an HTML fragment containing the total artist count, used by
        the sidebar badge. Lightweight endpoint that fetches only the count.
      responses:
        "200":
          description: HTML fragment with artist count
          content:
            text/html:
              schema:
                type: string
        "500":
          description: Service error
          content:
            text/html:
              schema:
                type: string

  /reports/duplicates:
    get:
      tags: [Reports]
      summary: Find duplicate artists
      description: >-
        Detects near-duplicate artist groups (shared MusicBrainz ID or
        identity-key collision). Canonical path; replaces the legacy
        /artists/duplicates alias which is kept for one release per #1615.
      operationId: getDuplicatesReport
      responses:
        "200":
          description: List of duplicate groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DuplicateGroup"

  /reports/duplicates/count:
    get:
      tags: [Reports]
      summary: Sidebar count badge for the duplicates report
      description: >-
        HTML fragment endpoint used by the sidebar's Duplicates child link
        (#1665). Returns an empty body when no near-duplicate groups are
        detected OR when the detector itself fails (the handler's
        fail-safe path logs at warn and returns 200 + empty body so the
        sidebar simply doesn't render the child; surfacing the failure
        inline would clutter every sidebar refresh). Clients MUST NOT
        interpret an empty body as a definitive "zero duplicates" signal --
        it is "no actionable nav child to render right now," whether
        because count is zero or detection couldn't run. When at least
        one group exists, returns a populated <a> link element with the
        group count. Admin-only; the sidebar omits the placeholder for
        non-admin viewers so a healthy session never makes the call. The
        handler memoizes the detector result for five minutes so per-tab
        sidebar polling collapses to at most one detection run per
        window; successful (non-dry-run) merges invalidate the cache.
      operationId: getDuplicatesCountBadge
      responses:
        "200":
          description: >-
            HTML fragment for HTMX innerHTML swap. Empty body when count
            is zero OR when detection is unavailable/fails (fail-safe);
            populated <a> element with badge pill when count > 0.
          content:
            text/html:
              schema:
                type: string
        "403":
          description: Caller is not an administrator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/duplicates:
    get:
      tags: [Artists]
      deprecated: true
      summary: Find duplicate artists (deprecated alias)
      description: >-
        Deprecated alias for /reports/duplicates kept for one release per
        the #1615 IA move; remove in M53. Returns an identical payload to
        the canonical endpoint.
      operationId: getDuplicates
      responses:
        "200":
          description: List of duplicate groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DuplicateGroup"

  /artists/merge:
    post:
      tags: [Artists]
      summary: Merge near-duplicate artists
      description: >-
        Consolidate two or more near-duplicate artists (as surfaced by the
        near-duplicate detector that backs the duplicates settings view) by
        moving each loser's album subdirectories under the survivor's
        directory and then deleting the loser artist rows. A pre-flight
        collision walk catches same-name album-subdir conflicts before any
        filesystem mutation, so a halt leaves zero half-state on disk.

        Admin-only. A process-wide serializer rejects concurrent merge
        requests with 409 merge_in_progress so a stuck or slow merge cannot
        pile callers up behind it.
      operationId: mergeArtists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeRequest"
      responses:
        "200":
          description: Merge committed (or dry-run completed).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeResult"
        "400":
          description: Malformed body, missing IDs, or survivor in loser list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Administrator role required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: >-
            Either another merge is in progress (error: merge_in_progress)
            or the pre-flight walk detected one or more collisions (error:
            collisions, body carries a conflicts array). Nothing has been
            moved in either case.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeCollisionsResponse"
        "422":
          description: >-
            The supplied IDs no longer co-resolve into a single duplicate
            group. The `error` field distinguishes the two recovery paths:
            `stale_group` (the loser/survivor combination no longer forms
            a group, typically a concurrent edit between page load and
            submit; reload the duplicates view and resubmit) and
            `survivor_missing` (the survivor_id is not a member of the
            resolved group; pick a different survivor from the
            reloaded group).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "423":
          description: One or more group members are locked; merge refused.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/duplicates/ignore:
    post:
      tags: [Artists]
      summary: Ignore a suspected-duplicate group
      description: >-
        Persist a server-side ignore for a near-duplicate group so it stops
        surfacing on the duplicates page and in the sidebar count. The group is
        identified by its member artist IDs, from which the server derives a
        canonical signature (member IDs sorted and joined with "|"). The write is
        idempotent: re-ignoring the same group returns 200 without creating a
        duplicate row. The signature is an exact-match key, so if the detector
        later regroups the same artists differently the new group resurfaces for
        review.

        Admin-only.
      operationId: ignoreDuplicateGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_ids]
              properties:
                member_ids:
                  type: array
                  items:
                    type: string
                  description: Artist IDs of the group's members.
                group_key:
                  type: string
                  description: >-
                    Optional non-authoritative display context (the group's
                    display key) stored for the manage-ignored view.
                reason:
                  type: string
                  description: >-
                    Optional non-authoritative detection reason stored for the
                    manage-ignored view.
      responses:
        "200":
          description: Ignore persisted (or already present; idempotent).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ignored:
                    type: boolean
                  signature:
                    type: string
                    description: The canonical group signature that was persisted.
        "400":
          description: Malformed body or no usable member IDs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: >-
            Authentication required. The auth middleware rejects the request
            before the handler runs, emitting the body via http.Error, so the
            content type is text/plain (the body text happens to read
            `{"error":"unauthorized"}`) rather than the JSON Error schema.
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: >-
            Administrator role required. Emitted by the in-handler admin gate
            (requireForeignAdmin) via http.Error, so the body is plain text
            ("Forbidden: administrator role required"), not the JSON Error
            schema.
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: >-
            Persisting the ignore failed. The wrapped driver error is logged
            server-side; the response carries a generic JSON envelope
            (error: internal) so no internal detail leaks to the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: >-
            The database is not configured on this instance, so the ignore
            cannot be persisted (error: unavailable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/duplicates/ignored:
    get:
      tags: [Artists]
      summary: List ignored duplicate groups
      description: >-
        Return the near-duplicate groups an administrator has ignored
        server-side (#2219), for the manage-ignored view. Each item carries the
        row id (used to restore it), the canonical signature, the display
        context captured at ignore time (group_key, reason), a derived
        member_count, and the created_at timestamp.

        Admin-only.
      operationId: listIgnoredDuplicateGroups
      responses:
        "200":
          description: The ignored groups, newest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        signature:
                          type: string
                        group_key:
                          type: string
                        reason:
                          type: string
                        member_count:
                          type: integer
                        created_at:
                          type: string
                  count:
                    type: integer
        "401":
          description: >-
            Authentication required. The auth middleware rejects the request
            before the handler runs (http.Error), so the body is text/plain.
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: >-
            Administrator role required. Emitted by the route-level RequireAdmin
            middleware as a JSON envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: >-
            Listing the ignored groups failed. The wrapped error is logged
            server-side; the response carries a generic JSON envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: >-
            The database is not configured on this instance (error: unavailable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/duplicates/ignored/{id}:
    delete:
      tags: [Artists]
      summary: Restore (un-ignore) a duplicate group
      description: >-
        Remove one server-side ignore by its row id (#2219), so the group
        resurfaces on the duplicates page and is counted again in the sidebar
        pill (the count cache is invalidated, so the pill re-increments on the
        next poll). Returns the refreshed manage-ignored table fragment (HTML)
        for the HTMX swap.

        Admin-only; CSRF-protected (state-changing).
      operationId: restoreIgnoredDuplicateGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ignored-group row id (from the list endpoint).
      responses:
        "200":
          description: >-
            The ignore was removed. The body is the refreshed manage-ignored
            table fragment (text/html) for the HTMX outerHTML swap.
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Missing id path value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: >-
            Authentication required. The auth middleware rejects the request
            before the handler runs (http.Error), so the body is text/plain.
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: >-
            Administrator role required. Emitted by the route-level RequireAdmin
            middleware as a JSON envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: >-
            No ignored group matched the id (error: not_found) -- e.g. it was
            already restored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: >-
            Removing the ignore failed. The wrapped error is logged server-side;
            the response carries a generic JSON envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: >-
            The database is not configured on this instance (error: unavailable).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

