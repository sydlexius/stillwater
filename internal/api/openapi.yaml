openapi: 3.1.0
info:
  title: Stillwater API
  version: 0.25.0
  description: Artist metadata and image management for Emby, Jellyfin, and Kodi.
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html
servers:
  - url: http://localhost:1973/api/v1
    description: Local development
security:
  - cookieAuth: []
  - bearerAuth: []
  - apiKeyAuth: []
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
    bearerAuth:
      type: http
      scheme: bearer
      description: API token (sw_ prefix) via Authorization header
    apiKeyAuth:
      type: apiKey
      in: query
      name: apikey
      description: "Deprecated: prefer bearerAuth (Authorization header). Query-string tokens risk leakage via logs and referrers."
      x-deprecated: true
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        details:
          type: array
          items:
            type: string
          description: Validation error details. Present when validation fails, containing one or more error messages.
      required: [error]
    NFOFieldMap:
      type: object
      description: Configures how genre, style, and mood categories map to NFO XML elements for platform compatibility.
      properties:
        default_behavior:
          type: boolean
          description: When true, writes each category to its native element (Kodi-compatible passthrough). Ignores moods_as_styles and genre_sources, but advanced_remap still takes higher precedence when non-null.
        moods_as_styles:
          type: boolean
          description: When true, mood values are additionally written as style elements for Emby/Jellyfin Tag visibility.
        genre_sources:
          type: array
          items:
            type: string
            enum: [genres, styles, moods]
          description: Which source categories feed the genre XML element.
        advanced_remap:
          type: object
          nullable: true
          description: Full source-to-element mapping matrix. Overrides all other settings when non-null.
          properties:
            genre:
              type: array
              items:
                type: string
                enum: [genres, styles, moods]
            style:
              type: array
              items:
                type: string
                enum: [genres, styles, moods]
            mood:
              type: array
              items:
                type: string
                enum: [genres, styles, moods]
          additionalProperties: false
    Status:
      type: object
      properties:
        status:
          type: string
    ConnectionResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [emby, jellyfin, lidarr]
        url:
          type: string
        has_key:
          type: boolean
          description: Whether the connection has an API key configured.
        has_platform_user_id:
          type: boolean
          description: Whether the connection has a platform user ID configured for personalized metadata.
        enabled:
          type: boolean
        status:
          type: string
        status_message:
          type: string
        last_checked_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        feature_library_import:
          type: boolean
          description: Whether Stillwater imports libraries from this connection.
        feature_nfo_write:
          type: boolean
          description: Whether Stillwater writes NFO files to this connection.
        feature_image_write:
          type: boolean
          description: Whether Stillwater writes images to this connection.
        feature_metadata_push:
          type: boolean
          description: Whether Stillwater pushes metadata updates to this platform via API.
        feature_trigger_refresh:
          type: boolean
          description: Whether Stillwater asks the platform to refresh artist metadata after push.
        library_count:
          type: integer
          description: Number of libraries associated with this connection. Present in the single-connection detail response only, not in the list response.
        artist_count:
          type: integer
          description: Total number of artists across all libraries for this connection. Present in the single-connection detail response only, not in the list response.
    Webhook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
        type:
          type: string
        events:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    IdentifyProgress:
      type: object
      properties:
        status:
          type: string
          enum: [idle, running, completed, canceled]
        total:
          type: integer
          description: Total number of unidentified artists to process.
        processed:
          type: integer
          description: Number of artists processed so far.
        auto_linked:
          type: integer
          description: Artists automatically linked via connection or high-confidence match.
        queued:
          type: integer
          description: Artists added to the review queue for manual linking.
        unmatched:
          type: integer
          description: Artists with no matching candidates found.
        failed:
          type: integer
          description: Artists that failed during processing.
        current_name:
          type: string
          description: Name of the artist currently being processed.
        review_queue:
          type: array
          description: Artists requiring manual review and linking.
          items:
            $ref: "#/components/schemas/IdentifyCandidate"
    IdentifyCandidate:
      type: object
      properties:
        artist_id:
          type: string
        artist_name:
          type: string
        artist_path:
          type: string
        tier:
          type: string
          enum: [connection, album, name]
          description: The pipeline tier that produced this candidate.
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/ScoredCandidate"
    ScoredCandidate:
      type: object
      properties:
        provider_id:
          type: string
        name:
          type: string
        sort_name:
          type: string
        type:
          type: string
        disambiguation:
          type: string
        country:
          type: string
        score:
          type: integer
        musicbrainz_id:
          type: string
        source:
          type: string
        album_comparison:
          $ref: "#/components/schemas/AlbumComparison"
        confidence:
          type: number
          format: double
          description: Confidence score from 0.0 to 1.0.
        reason:
          type: string
          description: Human-readable reason for the confidence score.
    AlbumComparison:
      type: object
      properties:
        matches:
          type: array
          items:
            type: object
            properties:
              local_name:
                type: string
              remote_name:
                type: string
              matched:
                type: boolean
        local_only:
          type: array
          items:
            type: string
        remote_only:
          type: array
          items:
            type: string
        match_count:
          type: integer
        local_count:
          type: integer
        remote_count:
          type: integer
        match_percent:
          type: integer
          description: Percentage of local albums matched (0-100).
    HealthSummary:
      type: object
      properties:
        score:
          type: number
        total_artists:
          type: integer
        compliant_artists:
          type: integer
        missing_nfo:
          type: integer
        missing_thumb:
          type: integer
        missing_fanart:
          type: integer
        missing_mbid:
          type: integer
        top_violations:
          type: array
          items:
            type: object
            properties:
              rule_id:
                type: string
              rule_name:
                type: string
              count:
                type: integer
              severity:
                type: string
        tier_excellent:
          type: integer
          description: Number of artists with health score 80-100.
        tier_good:
          type: integer
          description: Number of artists with health score 60-79.
        tier_fair:
          type: integer
          description: Number of artists with health score 40-59.
        tier_poor:
          type: integer
          description: Number of artists with health score 20-39.
        tier_critical:
          type: integer
          description: Number of artists with health score 0-19.
    BackupInfo:
      type: object
      properties:
        filename:
          type: string
        size:
          type: integer
        created_at:
          type: string
          format: date-time
    RuleRunStatus:
      type: object
      properties:
        running:
          type: boolean
        status:
          type: string
          enum: [idle, running, completed, failed]
        artists_processed:
          type: integer
        violations_found:
          type: integer
          description: Total number of violations detected during evaluation
        violations_auto_fixed:
          type: integer
          description: Number of violations that were automatically fixed
        violations_remaining:
          type: integer
          description: Number of active violations remaining, filtered by notification badge severity settings
        fixes_attempted:
          type: integer
        fixes_succeeded:
          type: integer
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error:
          type: string
    Library:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [regular, classical]
        source:
          type: string
          enum: [manual, emby, jellyfin, lidarr]
        connection_id:
          type: string
        external_id:
          type: string
        fs_watch:
          type: integer
        fs_poll_interval:
          type: integer
        shared_fs_status:
          type: string
          description: Shared-filesystem detection status. Empty string means unknown (not yet evaluated).
          enum: ["", "none", "suspected", "confirmed"]
        shared_fs_evidence:
          type: string
          description: JSON array of evidence strings describing how the shared-filesystem status was determined
        shared_fs_peer_library_ids:
          type: string
          description: Comma-separated IDs of peer libraries associated with the shared-filesystem evidence
        fs_notify_supported:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SharedFilesystemStatus:
      type: object
      properties:
        has_overlaps:
          type: boolean
          description: True when shared-filesystem overlaps exist
        libraries:
          type: array
          items:
            $ref: '#/components/schemas/SharedFilesystemEntry'
        dismissed:
          type: boolean
          description: True when the user has permanently dismissed the warning
        image_fetcher_warnings:
          type: array
          description: Platform image fetcher warnings. Present when shared-filesystem overlaps exist and either image fetchers are enabled or the fetcher check could not be completed.
          items:
            $ref: '#/components/schemas/ImageFetcherWarning'
    ImageFetcherWarning:
      type: object
      required: [risk_level, message]
      properties:
        platform:
          type: string
          description: Platform type, either "emby" or "jellyfin"
          enum: ["emby", "jellyfin"]
        library_name:
          type: string
          description: Name of the platform library with image fetchers enabled
        fetcher_names:
          type: array
          items:
            type: string
          description: Names of enabled image fetchers (e.g., "TheAudioDb", "FanArt")
        risk_level:
          type: string
          description: Risk level of the image fetcher conflict. "warn" for Emby (adds missing images only), "critical" for Jellyfin (can replace existing images and strip EXIF data).
          enum: ["warn", "critical"]
        message:
          type: string
          description: Human-readable warning message describing the risk and recommended action
    SharedFilesystemEntry:
      type: object
      properties:
        library_id:
          type: string
        library_name:
          type: string
        path:
          type: string
        overlap_with:
          type: string
    SharedFilesystemRecheckResult:
      type: object
      properties:
        shared_libraries:
          type: integer
          description: Current count of libraries whose shared-filesystem status is set by evidence
    FilesystemBrowseResult:
      type: object
      required: [path, entries, parent]
      properties:
        path:
          type: string
          description: The resolved absolute path that was listed.
        entries:
          type: array
          items:
            type: string
          description: Names of direct subdirectories within path, sorted case-insensitively. Hidden directories are excluded.
        parent:
          type: string
          description: Parent directory of path. Empty string when path is the filesystem root.
    LibraryOpResult:
      type: object
      properties:
        library_id:
          type: string
        library_name:
          type: string
        operation:
          type: string
          enum: [populate, scan]
        status:
          type: string
          enum: [running, completed, failed]
        message:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    APIToken:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: string
        user_id:
          type: string
        status:
          type: string
          enum: [active, revoked]
          description: "Token lifecycle state: active or revoked"
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    Violation:
      type: object
      properties:
        id:
          type: string
        rule_id:
          type: string
        artist_id:
          type: string
        artist_name:
          type: string
        library_name:
          type: string
          description: Name of the library the artist belongs to. Empty if unknown.
        severity:
          type: string
          enum: [error, warning, info]
        message:
          type: string
        fixable:
          type: boolean
        status:
          type: string
          enum: [open, dismissed, resolved, pending_choice]
        candidates:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              width:
                type: integer
              height:
                type: integer
              source:
                type: string
              image_type:
                type: string
        dismissed_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LogFileInfo:
      type: object
      description: Metadata for a log file available for browsing in the log viewer.
      properties:
        name:
          type: string
          description: Filename (no path components)
        size:
          type: integer
          format: int64
          description: File size in bytes
        mod_time:
          type: string
          format: date-time
          description: Last modified time of the file
        is_current:
          type: boolean
          description: True when this is the actively written log file
      required:
        - name
        - size
        - mod_time
        - is_current
    LogEntry:
      type: object
      description: A single log record captured by the in-memory ring buffer.
      properties:
        time:
          type: string
          format: date-time
          description: Timestamp of the log entry
        level:
          type: string
          enum: [trace, debug, info, warn, error]
          description: Severity level
        message:
          type: string
          description: Log message text
        component:
          type: string
          description: Component that emitted the log entry (e.g. scanner, provider, api). Omitted when not set.
        attrs:
          type: object
          additionalProperties: true
          description: Additional structured attributes from the log record
      required:
        - time
        - level
        - message
    LoggingConfig:
      type: object
      properties:
        level:
          type: string
          enum: [trace, debug, info, warn, error]
        format:
          type: string
          enum: [text, json]
        file_path:
          type: string
        file_max_size_mb:
          type: integer
        file_max_files:
          type: integer
        file_max_age_days:
          type: integer
    MaintenanceStatus:
      type: object
      properties:
        db_file_size:
          type: integer
          format: int64
        wal_file_size:
          type: integer
          format: int64
        page_count:
          type: integer
          format: int64
        page_size:
          type: integer
          format: int64
        last_optimize_at:
          type: string
          format: date-time
        schedule_enabled:
          type: boolean
        schedule_interval_hours:
          type: integer
    PlatformBackdropConnection:
      type: object
      properties:
        connection_id:
          type: string
        connection_name:
          type: string
        connection_type:
          type: string
          enum: [emby, jellyfin]
        backdrops:
          type: array
          items:
            $ref: "#/components/schemas/PlatformBackdropItem"
    PlatformBackdropItem:
      type: object
      properties:
        index:
          type: integer
          description: 0-based index of the backdrop on the platform
        thumbnail_url:
          type: string
          description: Proxy URL to fetch the backdrop thumbnail through Stillwater
    FanartSyncSlotConnection:
      type: object
      properties:
        connection_id:
          type: string
        name:
          type: string
          description: Display name of the connection
        type:
          type: string
          enum: [emby, jellyfin]
        synced:
          type: boolean
          description: Whether the platform has a backdrop at this index
    FanartSyncSlot:
      type: object
      properties:
        index:
          type: integer
          description: 0-based fanart slot index
        state:
          type: string
          enum: [synced, partial, unsynced]
          description: Aggregate sync state across all reachable connections
        connections:
          type: array
          items:
            $ref: "#/components/schemas/FanartSyncSlotConnection"
    MetadataChange:
      type: object
      description: A single field-level metadata change recorded for an artist.
      properties:
        id:
          type: string
          description: Unique change record ID (UUID).
        artist_id:
          type: string
          description: ID of the artist this change belongs to.
        field:
          type: string
          description: The metadata field that changed (e.g. "biography", "genres", "thumb").
        old_value:
          type: string
          description: The previous value. Empty string when the field was previously unset.
        new_value:
          type: string
          description: The new value. Empty string when the field was cleared.
        source:
          type: string
          description: >
            Origin of the change. One of "manual", "scan", "import",
            "provider:<name>" (e.g. "provider:musicbrainz"), or
            "rule:<rule_id>" (e.g. "rule:missing_mbid").
        created_at:
          type: string
          format: date-time
          description: Timestamp when the change was recorded (UTC, RFC 3339).
      required: [id, artist_id, field, old_value, new_value, source, created_at]
    Artist:
      type: object
      description: A music artist or group with full metadata.
      properties:
        id:
          type: string
        name:
          type: string
        sort_name:
          type: string
        type:
          type: string
          description: Artist type, e.g. "person" or "group".
        gender:
          type: string
        disambiguation:
          type: string
        musicbrainz_id:
          type: string
        audiodb_id:
          type: string
        discogs_id:
          type: string
        wikidata_id:
          type: string
        deezer_id:
          type: string
        spotify_id:
          type: string
        genres:
          type:
            - array
            - "null"
          items:
            type: string
        styles:
          type:
            - array
            - "null"
          items:
            type: string
        moods:
          type:
            - array
            - "null"
          items:
            type: string
        years_active:
          type: string
        born:
          type: string
        formed:
          type: string
        died:
          type: string
        disbanded:
          type: string
        biography:
          type: string
        path:
          type: string
          description: Filesystem path to the artist directory. Empty for pathless (platform-only) artists.
        library_id:
          type: string
        nfo_exists:
          type: boolean
        thumb_exists:
          type: boolean
        fanart_exists:
          type: boolean
        fanart_count:
          type: integer
        logo_exists:
          type: boolean
        banner_exists:
          type: boolean
        thumb_low_res:
          type: boolean
        fanart_low_res:
          type: boolean
        logo_low_res:
          type: boolean
        banner_low_res:
          type: boolean
        thumb_placeholder:
          type: string
          description: Base64-encoded placeholder for the thumb image. Omitted when not set.
        fanart_placeholder:
          type: string
          description: Base64-encoded placeholder for the fanart image. Omitted when not set.
        logo_placeholder:
          type: string
          description: Base64-encoded placeholder for the logo image. Omitted when not set.
        banner_placeholder:
          type: string
          description: Base64-encoded placeholder for the banner image. Omitted when not set.
        health_score:
          type: number
          format: double
        is_excluded:
          type: boolean
        exclusion_reason:
          type: string
          description: Reason the artist is excluded from rules and metadata operations. Omitted when not excluded.
        is_classical:
          type: boolean
        locked:
          type: boolean
          description: When true, automated operations will not modify this artist.
        lock_source:
          type: string
          description: Source that applied the lock (e.g. "user"). Omitted when not locked.
        locked_at:
          type: string
          format: date-time
          description: Timestamp when the lock was applied. Omitted when not locked.
        audiodb_id_fetched_at:
          type: string
          format: date-time
          description: When the AudioDB ID was last fetched. Omitted when never fetched.
        discogs_id_fetched_at:
          type: string
          format: date-time
          description: When the Discogs ID was last fetched. Omitted when never fetched.
        wikidata_id_fetched_at:
          type: string
          format: date-time
          description: When the Wikidata ID was last fetched. Omitted when never fetched.
        lastfm_fetched_at:
          type: string
          format: date-time
          description: When Last.fm metadata was last fetched. Omitted when never fetched.
        metadata_sources:
          type: object
          additionalProperties:
            type: string
          description: Map of field name to provider name indicating which provider supplied each field. Omitted when empty.
        last_scanned_at:
          type: string
          format: date-time
          description: When the artist directory was last scanned. Omitted when never scanned.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - sort_name
        - type
        - gender
        - disambiguation
        - musicbrainz_id
        - audiodb_id
        - discogs_id
        - wikidata_id
        - deezer_id
        - spotify_id
        - genres
        - styles
        - moods
        - years_active
        - born
        - formed
        - died
        - disbanded
        - biography
        - path
        - library_id
        - nfo_exists
        - thumb_exists
        - fanart_exists
        - fanart_count
        - logo_exists
        - banner_exists
        - thumb_low_res
        - fanart_low_res
        - logo_low_res
        - banner_low_res
        - health_score
        - is_excluded
        - is_classical
        - locked
        - created_at
        - updated_at
    BandMember:
      type: object
      description: A member of a band or group.
      properties:
        id:
          type: string
        artist_id:
          type: string
        member_name:
          type: string
        member_mbid:
          type: string
          description: MusicBrainz ID for this member. Omitted when not set.
        instruments:
          type:
            - array
            - "null"
          items:
            type: string
        vocal_type:
          type: string
          description: Vocal range or type (e.g. "tenor"). Omitted when not set.
        date_joined:
          type: string
          description: Year or date the member joined the group. Omitted when unknown.
        date_left:
          type: string
          description: Year or date the member left the group. Omitted for current members.
        is_original_member:
          type: boolean
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - artist_id
        - member_name
        - instruments
        - is_original_member
        - sort_order
        - created_at
        - updated_at
    CacheStats:
      type: object
      required: [size_bytes, file_count, artist_count]
      properties:
        size_bytes:
          type: integer
          format: int64
          description: Total size of the image cache in bytes.
        file_count:
          type: integer
          description: Number of files in the image cache.
        artist_count:
          type: integer
          description: Number of unique artist directories in the cache.
    CacheClearResult:
      type: object
      required: [files_deleted, bytes_freed]
      properties:
        files_deleted:
          type: integer
          description: Number of files removed from the cache.
        bytes_freed:
          type: integer
          format: int64
          description: Total bytes freed by the clear operation.

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                  commit:
                    type: string
                  time:
                    type: string
                    format: date-time

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates a user and sets a session cookie. Behavior depends on the
        instance-level auth.method setting: for "local", validates against the
        local user database; for "emby" or "jellyfin", authenticates against
        the configured media server via its AuthenticateByName API.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        "200":
          description: Login successful, session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Media server unreachable (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/oidc/login:
    get:
      tags: [Auth]
      summary: Initiate OIDC login
      description: |
        Initiates the OpenID Connect authorization code flow with PKCE.
        Generates state, nonce, and code verifier parameters, stores them in
        HTTP-only cookies, and redirects the user to the configured identity
        provider's authorization endpoint. The IdP will redirect back to the
        callback endpoint after authentication.
      security: []
      operationId: oidcLogin
      responses:
        "302":
          description: Redirect to identity provider authorization endpoint
        "404":
          description: OIDC provider is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error generating security parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC callback
      description: |
        Handles the identity provider's redirect after authentication. Validates
        the state parameter against the stored cookie, exchanges the authorization
        code for tokens using PKCE, verifies the ID token and nonce, then runs the
        standard login/provisioning flow (user lookup, auto-provision if enabled,
        session creation). On success, sets a session cookie and redirects to the
        application root.
      security: []
      operationId: oidcCallback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from the identity provider
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State parameter for CSRF validation
        - name: error
          in: query
          schema:
            type: string
          description: Error code returned by the identity provider (e.g. access_denied)
        - name: error_description
          in: query
          schema:
            type: string
          description: Human-readable error description from the identity provider
      responses:
        "302":
          description: |
            Redirect to the application root on success (with session cookie set),
            or redirect to the login page with an error query parameter on failure.
            All outcomes use browser redirects since this endpoint is hit via a
            full-page navigation from the identity provider, not an HTMX request.

  /auth/setup:
    post:
      tags: [Auth]
      summary: Create initial admin account
      description: |
        Creates the initial administrator account during first-time setup.
        Supports three auth methods: "local" creates a username/password account,
        "emby" or "jellyfin" authenticates against a media server and auto-creates
        the first server connection.
      security: []
      operationId: setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auth_method:
                  type: string
                  enum: [local, emby, jellyfin]
                  default: local
                  description: Authentication method for this instance
                username:
                  type: string
                password:
                  type: string
                  description: Must be at least 8 characters for local auth
                server_url:
                  type: string
                  format: uri
                  description: Media server URL, required when auth_method is emby or jellyfin
              required: [username, password]
      responses:
        "201":
          description: Admin account created (and auto-logged in for federated auth)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "403":
          description: Media server user is not an administrator (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Admin account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Media server unreachable (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      operationId: logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getMe
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/tokens:
    post:
      tags: [Auth]
      summary: Create API token
      operationId: createAPIToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                scopes:
                  type: string
                  description: Comma-separated scopes (default "read")
                  default: read
              required: [name]
      responses:
        "201":
          description: Token created (plaintext token returned only once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  token:
                    type: string
                  name:
                    type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Auth]
      summary: List API tokens
      operationId: listAPITokens
      responses:
        "200":
          description: List of API tokens (no plaintext values).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIToken"

  /auth/tokens/{id}:
    delete:
      tags: [Auth]
      summary: Revoke API token
      operationId: revokeAPIToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/tokens/{id}/permanent:
    delete:
      tags: [Auth]
      summary: Permanently delete a token
      operationId: deleteAPIToken
      description: Permanently removes a revoked token. Anonymizes associated audit log entries. Cannot delete active tokens.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Token permanently deleted
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Token is still active and must be revoked first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists:
    get:
      tags: [Artists]
      summary: List artists
      operationId: listArtists
      parameters:
        - name: page
