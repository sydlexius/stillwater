                  field:
                    type: string
                  value:
                    type: string
            text/html:
              schema:
                type: string

  /artists/{id}/fields/{field}:
    patch:
      tags: [Artists]
      summary: Update a single metadata field
      operationId: updateField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
      responses:
        "200":
          description: Field updated (returns HTML display fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  field:
                    type: string
                  value:
                    type: string
            text/html:
              schema:
                type: string
        "400":
          description: Non-editable field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
