                $ref: "#/components/schemas/Error"

  /reports/metadata-completeness:
    get:
      tags: [Reports]
      summary: Get aggregate metadata completeness report
      description: >
        Returns field-level coverage percentages across all non-excluded artists.
        Artist type-aware fields (formed for groups, born for persons) are only
        counted for applicable artists. When library_id is provided the report
        is scoped to that library.
      operationId: getMetadataCompleteness
      parameters:
        - name: library_id
          in: query
          schema:
            type: string
          description: Scope the report to a specific library. Omit to include all libraries.
      responses:
        "200":
          description: Metadata completeness report (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_score:
                    type: number
                    format: float
                    description: Mean field-coverage percentage across all applicable field/artist pairs.
                  total_artists:
                    type: integer
                    description: Number of non-excluded artists included in the report.
                  field_coverage:
                    type: array
                    description: Per-field breakdown sorted by percentage ascending (worst coverage first).
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Human-readable field name.
                        count:
                          type: integer
                          description: Number of artists with this field populated.
                        total:
                          type: integer
                          description: Number of artists for which this field is applicable.
                        percentage:
                          type: number
                          format: float
                          description: count/total*100 rounded to one decimal place.
                      required: [field, count, total, percentage]
                  library_coverage:
                    type: array
                    description: Per-library summary. Omitted when only one or no library exists.
                    items:
                      type: object
                      properties:
                        library_id:
                          type: string
                          description: ID of the library.
                        library_name:
                          type: string
                          description: Display name of the library.
                        total_artists:
                          type: integer
                          description: Total number of artists in this library.
                        score:
                          type: number
                          format: float
                          description: Health score from 0.0 (worst) to 1.0 (best).
                        fields:
                          type: array
                          description: Per-field coverage breakdown for this library.
                          items:
                            type: object
                            properties:
                              field:
                                type: string
                                description: Human-readable field name.
                              count:
                                type: integer
                                description: Number of artists with this field populated.
                              total:
                                type: integer
                                description: Number of artists for which this field is applicable.
                              percentage:
                                type: number
                                format: float
                                description: count/total*100 rounded to one decimal place.
                            required: [field, count, total, percentage]
                  lowest_completeness:
                    type: array
                    description: Bottom artists by health score.
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Unique identifier.
                        name:
                          type: string
                          description: Display name of the artist.
                        library_id:
                          type: string
                          description: ID of the library.
                        health_score:
                          type: number
                          format: float
                          description: Metadata completeness score from 0.0 to 1.0.
                      required: [id, name, library_id, health_score]
                required: [overall_score, total_artists, field_coverage, lowest_completeness]
            text/html:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports/rule-pass-rates:
    get:
      tags: [Reports]
      summary: Per-rule pass-rate aggregate for the dashboard widget
      operationId: getReportRulePassRates
      description: >
        Returns one row per enabled rule with pass/fail/evaluated counts
        and a 0.0-1.0 pass_rate. Ordered by pass_rate ascending so the
        worst-performing rules surface first. Rules with no evaluations
        yet are omitted so the widget can render "no data yet" rather
        than 0% (which would imply 100% failing) (#699 slice 2).
      responses:
        "200":
          description: List of per-rule pass-rate rows. The rates field is always present (empty array when no rules have been evaluated yet).
          content:
            application/json:
              schema:
                type: object
                required: [rates]
                properties:
                  rates:
                    type: array
                    items:
                      type: object
                      required: [rule_id, rule_name, severity, passed, failed, evaluated, pass_rate]
                      properties:
                        rule_id:
                          type: string
                        rule_name:
                          type: string
                        severity:
                          type: string
                          enum: [error, warning, info]
                        passed:
                          type: integer
                        failed:
                          type: integer
                        evaluated:
                          type: integer
                        pass_rate:
                          type: number
                          format: float
                          description: passed / evaluated as a 0.0-1.0 fraction. Returned rows always have evaluated > 0 (the SQL omits rules with no rule_results rows).
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

