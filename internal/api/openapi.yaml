        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /webhooks/{id}/test:
    post:
      tags: [Webhooks]
      summary: Send test webhook event
      operationId: testWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test event sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /shared-filesystem/status:
    get:
      operationId: getSharedFilesystemStatus
      tags: [SharedFilesystem]
      summary: Get shared-filesystem overlap status
      description: Returns information about libraries with shared-filesystem overlaps and dismiss state.
      responses:
        "200":
          description: Shared-filesystem status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedFilesystemStatus"
  /shared-filesystem/dismiss:
    post:
      operationId: dismissSharedFilesystem
      tags: [SharedFilesystem]
      summary: Dismiss the shared-filesystem warning permanently
      responses:
        "200":
          description: Warning dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /shared-filesystem/recheck:
    post:
      operationId: recheckSharedFilesystem
      tags: [SharedFilesystem]
      summary: Get current shared-filesystem status count
      description: Returns the current count of libraries whose shared-filesystem status is set by evidence.
      responses:
        "200":
          description: Recheck result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedFilesystemRecheckResult"

  /filesystem/browse:
    get:
      tags: [Filesystem]
      operationId: browseFilesystem
      summary: Browse filesystem directories
      description: >
        Returns the direct subdirectories of the given absolute path.
        Only directories are returned; files are excluded. Hidden directories
        (those whose names start with a dot) are also excluded.
        Browsing is confined to the allowed browse roots: the configured
        library roots (the default music library path plus the paths of
        registered libraries) and each root's parent directory, so a new
        library can be picked from a sibling location. The filesystem root
        is never allowed; paths outside the allowed roots are rejected.
        Requires administrator role.
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Absolute filesystem path to list. Must be an absolute path; traversal segments (e.g. "..") are normalized by the server via filepath.Clean before listing.
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilesystemBrowseResult"
        "400":
          description: Invalid path (not absolute, not a directory, or symlink resolution failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden (administrator role required, path outside the allowed browse roots, or no library root configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to read directory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings:
    get:
      tags: [Settings]
      summary: Get all settings
      operationId: getSettings
      responses:
        "200":
          description: Key-value settings map
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
    put:
      tags: [Settings]
      summary: Update settings
      operationId: updateSettings
      description: >
        Update one or more settings as key-value string pairs.
        Known keys include:
        auto_fetch_images (true/false),
        show_platform_debug (true/false),
        notif_badge_enabled (true/false),
        notif_badge_severity_error (true/false),
        notif_badge_severity_warning (true/false),
        notif_badge_severity_info (true/false),
        rule_schedule.interval_minutes (integer as string; 0 to disable, or >= 5),
        backup_retention_count (positive integer as string),
        backup_max_age_days (integer as string),
        cache.image.max_size_mb (integer as string),
        provider.name_similarity_threshold (0-100 integer as string;
        minimum similarity score for provider name matching,
        set to 0 to disable validation, default 60),
        images.backdrop.target_count (1-10 integer as string;
        target number of backdrop/fanart images per artist, default 1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /settings/vocab:
    get:
      tags: [Settings]
      summary: Get metadata vocabulary configuration
      operationId: getVocabConfig
      description: >
        Returns the current metadata_vocab configuration: a case-insensitive
        exclude pattern list and per-field tag count caps (max_genres,
        max_styles, max_moods) for genres, styles, and moods. When the setting
        has never been saved, the response is the default no-op config (empty
        exclude list and zero caps).
      responses:
        "200":
          description: Current vocab config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabConfig"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden (admin required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Settings]
      summary: Update metadata vocabulary configuration
      operationId: putVocabConfig
      description: >
        Replaces the full metadata_vocab configuration. The "exclude" pattern
        list and each count cap (max_genres, max_styles, max_moods) are
        optional and default to no-op values when omitted. Unknown top-level
        keys are rejected, exclude patterns must be non-blank, and caps must
        not be negative.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocabConfig"
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: false
              properties:
                exclude:
                  type: string
                  description: >
                    Newline-separated exclude patterns. Each non-blank line
                    becomes one entry in the exclude list. Blank lines are
                    ignored. The same case-insensitive wildcard (* glob) rules
                    apply as for the JSON path.
                max_genres:
                  type: integer
                  minimum: 0
                  description: Maximum number of genre tags to keep (0 = unlimited).
                max_styles:
                  type: integer
                  minimum: 0
                  description: Maximum number of style tags to keep (0 = unlimited).
                max_moods:
                  type: integer
                  minimum: 0
                  description: Maximum number of mood tags to keep (0 = unlimited).
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden (admin required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /preferences:
    get:
      tags: [Preferences]
      summary: Get all user preferences
      operationId: getPreferences
      description: >
        Returns all preference keys for the authenticated user, merged with defaults.
        Preferences are per-user appearance settings (theme, sidebar
        state, typography, etc.).
      responses:
        "200":
          description: >
            All preference keys with the user's values merged over defaults.
            The response always contains exactly these keys.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  theme:
                    type: string
                    enum: [dark, light, system]
                    description: UI color theme (e.g. dark, light).
                  sidebar_state:
                    type: string
                    enum: [full, icon-only, hidden]
                    description: Sidebar visibility mode (full, icon-only, or hidden).
                  content_width:
                    type: string
                    enum: [narrow, wide]
                    description: Content area maximum width preference.
                  font_family:
                    type: string
                    enum: [system, inter, atkinson]
                    description: Preferred font family for the UI.
                  font_size:
                    type: string
                    enum: [small, medium, large, x-large, xx-large]
                    description: Base font size preference.
                  letter_spacing:
                    type: string
                    enum: [normal, wide, extra-wide]
                    description: Letter spacing adjustment preference.
                  thumbnail_size:
                    type: string
                    enum: [small, medium, large]
                    description: Thumbnail display size preference.
                  reduced_motion:
                    type: string
                    enum: [system, on, off]
                    description: Whether reduced-motion animations are preferred.
                  lite_mode:
                    type: string
                    enum: [off, on, auto]
                    description: Whether lite mode is active to reduce UI complexity.
                  language:
                    type: string
                    enum: [en]
                    description: Preferred UI language code.
                  notification_enabled:
                    type: string
                    enum: ["true", "false"]
                    description: Whether browser notifications are enabled.
                  page_size:
                    type: string
                    pattern: "^(?:[1-9][0-9]|[1-4][0-9]{2}|500)$"
                    description: Number of items per page (integer 10-500 as a string).
                    example: "50"
                  metadata_languages:
                    type: string
                    description: >
                      JSON array of BCP 47 language tags in priority order for
                      metadata resolution (e.g. '["en","ja"]').
                    example: '["en"]'
                  auto_fetch_images:
                    type: string
                    enum: ["true", "false"]
                    description: >
                      Whether to automatically search providers when opening
                      the image search panel.
                  metadata_name_romanization_fallback:
                    type: string
                    enum: ["true", "false"]
                    description: >
                      When the top metadata language is Latin-script and
                      MusicBrainz has no tagged alias in that language,
                      whether to use the MB sort-name as a romanized display
                      name for member artists (e.g. 青木達之 becomes
                      Tatsuyuki Aoki). Defaults to "true".
                  bg_opacity:
                    type: string
                    pattern: "^(?:[2-9][0-9]|100)$"
                    description: >
                      Background glass opacity percentage (integer 20-100
                      as a string).
                    example: "85"
                  density:
                    type: string
                    enum: [compact, comfortable, spacious]
                    description: >
                      Layout density preference (M55 #1774). Controls
                      spacing/density of list views via data-density on the
                      page root.
                  mono_font:
                    type: string
                    enum: [system, jetbrains, cascadia]
                    description: >
                      Monospace font preference (M55 #1774). Controls the
                      font used for kbd badges, IDs, and timestamps via
                      data-mono on the page root.
                  kbd_hints:
                    type: string
                    enum: [show, hide]
                    description: >
                      Keyboard shortcut hint visibility (M55 #1774). Controls
                      whether keyboard hints render via data-kbd on the page
                      root.
                  saved_views:
                    type: string
                    description: >
                      Saved filter views (M55 #1777). JSON array of
                      {name, params, created_at} objects (max 20 entries).
                      Defaults to "[]".
                    example: "[]"
                required:
                  - theme
                  - sidebar_state
                  - content_width
                  - font_family
                  - font_size
                  - letter_spacing
                  - thumbnail_size
                  - reduced_motion
                  - lite_mode
                  - language
                  - notification_enabled
                  - page_size
                  - metadata_languages
                  - auto_fetch_images
                  - metadata_name_romanization_fallback
                  - bg_opacity
                  - density
                  - mono_font
                  - kbd_hints
                  - saved_views
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [Preferences]
      summary: Merge a partial set of user preferences
      operationId: patchPreferences
      description: >
        Merges a partial set of preferences for the authenticated user in a
        single request. Only the keys present in the body are written; absent
        keys are left untouched (merge semantics). Scalar preferences take a
        JSON string value (e.g. {"theme": "dark"}); the artist-detail layout
        keys (artist_detail_section_order, artist_detail_hidden_sections) take a
        JSON array of section identifiers. Every entry is validated before any
        write, so an unknown key or invalid value rejects the whole request with
        400 and applies nothing.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: >
                Map of preference key to value, merged into the user's existing
                preferences. Scalar keys take a JSON string; the artist-detail
                layout keys take a JSON array of strings. An empty object is a
                valid no-op. metadata_languages is not patchable here (use
                PUT /preferences/{key}, which has reset-to-default semantics).
              additionalProperties: false
              properties:
                theme: { type: string }
                sidebar_state: { type: string }
                content_width: { type: string }
                font_family: { type: string }
                font_size: { type: string, enum: [small, medium, large, x-large, xx-large] }
                letter_spacing: { type: string }
                thumbnail_size: { type: string }
                reduced_motion: { type: string }
                lite_mode: { type: string }
                language: { type: string }
                notification_enabled: { type: string }
                auto_fetch_images: { type: string }
                metadata_name_romanization_fallback: { type: string }
                page_size: { type: string }
                bg_opacity: { type: string, example: "85" }
                artist_detail_section_order:
                  type: array
                  items: { type: string }
                artist_detail_hidden_sections:
                  type: array
                  items: { type: string }
                density: { type: string, enum: [compact, comfortable, spacious] }
                mono_font: { type: string, enum: [system, jetbrains, cascadia] }
                kbd_hints: { type: string, enum: [show, hide] }
                saved_views:
                  type: array
                  maxItems: 20
                  items:
                    type: object
                    properties:
                      name: { type: string, maxLength: 50 }
                      params: { type: string, maxLength: 2000 }
                      created_at: { type: string }
              patternProperties:
                "^suppress_confirm_":
                  type: string
              example:
                theme: dark
                artist_detail_section_order: ["bio", "artwork", "providers"]
      responses:
        "200":
          description: >
            The canonical stored form of the keys that were written. An empty
            request body returns an empty object (no-op).
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        "400":
          description: Unknown preference key or invalid value (nothing written)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /preferences/{key}:
    get:
      tags: [Preferences]
      summary: Get a single user preference
      operationId: getPreference
      description: >
        Returns the value of a single preference key for the authenticated user.
        For known fixed keys the value is merged with the compiled default when no
        row exists. For suppress_confirm_* keys a missing row returns "false".
      parameters:
        - name: key
          in: path
          required: true
          description: >
            A known preference key (theme, sidebar_state, etc.) or a
            suppress_confirm_* key of the form suppress_confirm_{action} where
            {action} contains only lowercase letters, digits, and underscores.
          schema:
            oneOf:
              - type: string
                enum:
                  - theme
                  - sidebar_state
                  - content_width
                  - font_family
                  - font_size
                  - letter_spacing
                  - thumbnail_size
                  - reduced_motion
                  - lite_mode
                  - language
                  - notification_enabled
                  - page_size
                  - metadata_languages
                  - auto_fetch_images
                  - metadata_name_romanization_fallback
                  - bg_opacity
                  - density
                  - mono_font
                  - kbd_hints
              - type: string
                pattern: "^suppress_confirm_[a-z0-9_]+$"
      responses:
        "200":
          description: Preference value
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key:
                    type: string
                    description: The preference key that was requested.
                  value:
                    type: string
                    description: >
                      The current value of the preference. For known fixed
                      keys, returns the stored value or the compiled default
                      when no row exists. For suppress_confirm_* keys, returns
                      "true" or "false".
        "400":
          description: Unknown preference key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Preferences]
      summary: Update a user preference
      operationId: updatePreference
      parameters:
        - name: key
          in: path
          required: true
          description: >
            A known preference key or a suppress_confirm_* key of the form
            suppress_confirm_{action}. suppress_confirm_* keys accept only
            "true" or "false".
          schema:
            oneOf:
              - type: string
                enum:
                  - theme
                  - sidebar_state
                  - content_width
                  - font_family
                  - font_size
                  - letter_spacing
                  - thumbnail_size
                  - reduced_motion
                  - lite_mode
                  - language
                  - notification_enabled
                  - page_size
                  - metadata_languages
                  - auto_fetch_images
                  - metadata_name_romanization_fallback
                  - bg_opacity
                  - density
                  - mono_font
                  - kbd_hints
              - type: string
                pattern: "^suppress_confirm_[a-z0-9_]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
      responses:
        "200":
          description: Preference updated
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key:
                    type: string
                    description: The preference key that was updated.
                  value:
                    type: string
                    description: The new value after the update.
        "400":
          description: Invalid key or value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/backup:
    post:
      tags: [Backup]
