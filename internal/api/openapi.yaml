  # --- Notifications ---

  /notifications/counts:
    get:
      tags: [Notifications]
      summary: Get violation counts by severity
      operationId: getNotificationCounts
      responses:
        "200":
          description: Counts by severity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                  warning:
                    type: integer
                  info:
                    type: integer
                  total:
                    type: integer

  /notifications/badge:
    get:
      tags: [Notifications]
      summary: Get notification badge HTML fragment
      description: Returns an HTML fragment for HTMX polling. Not a JSON endpoint.
      operationId: getNotificationBadge
      responses:
        "200":
          description: Badge HTML fragment
          content:
            text/html:
              schema:
                type: string

  /notifications:
    get:
      tags: [Notifications]
      summary: List rule violations
      operationId: listNotifications
      parameters:
        - name: status
          in: query
          description: Filter by violation status
          schema:
            type: string
            enum: [open, dismissed, resolved, pending_choice]
            default: open
      responses:
        "200":
          description: Violations matching filter
          content:
            application/json:
              schema:
                type: object
                properties:
                  violations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Violation"
                  count:
                    type: integer

  /notifications/{id}/dismiss:
    post:
      tags: [Notifications]
      summary: Dismiss a violation
      operationId: dismissViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/resolve:
    post:
      tags: [Notifications]
      summary: Resolve a violation
      operationId: resolveViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/apply-candidate:
    post:
      tags: [Notifications]
      summary: Apply an image candidate from a pending-choice violation
      operationId: applyViolationCandidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                image_type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, image_type]
      responses:
        "200":
          description: Candidate applied and violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid request or URL mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/bulk-dismiss:
    post:
      tags: [Notifications]
      summary: Bulk dismiss violations
      operationId: bulkDismissViolations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Violation IDs to dismiss (omit to dismiss all)
      responses:
        "200":
          description: Count of dismissed violations
          content:
            application/json:
              schema:
                type: object
                properties:
                  dismissed:
                    type: integer

