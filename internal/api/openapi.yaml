  # --- Artist refresh and disambiguation ---

  /artists/{id}/refresh:
    post:
      tags: [Artists]
      summary: Refresh artist metadata from providers
      description: >
        Triggers a full metadata refresh. If the artist has no MusicBrainz ID,
        returns a disambiguation prompt instead.
      operationId: refreshArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refresh result or disambiguation prompt (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        provider:
                          type: string
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/search:
    post:
      tags: [Artists]
      summary: Search providers for disambiguation
      operationId: refreshSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
      responses:
        "200":
          description: Disambiguation candidates (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
            text/html:
              schema:
                type: string
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/link:
    post:
      tags: [Artists]
