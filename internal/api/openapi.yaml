  /events/stream:
    get:
      summary: SSE event stream
      description: |
        Server-Sent Events endpoint that streams real-time system events to
        connected browser clients. Events include scan completions, rule
        violations, bulk operation results, artist updates, and the
        next-channel events settings.changed, dashboard.action-resolved, and
        activity.recent. Log events (`logs.line`, `logs.throttled`) are
        deliberately NOT delivered on this stream -- they are reserved for a
        dedicated logs stream so a high-volume log feed never fans out to every
        connected tab.

        Each event carries a monotonic `id:` frame. The browser EventSource
        echoes the last id back as the `Last-Event-ID` header on reconnect; the
        server then replays the events the client missed from a bounded ring
        buffer (1000 events / 5 minutes, whichever is hit first). The initial
        `connected` frame carries `data.replayed` (count replayed) and
        `data.bufferLoss` (true when the gap could not be bridged, in which case
        the client should refetch derived state). A heartbeat comment is sent
        every 30 seconds to keep the connection alive.

        See the SSE event catalog (Contributing > Architecture > SSE event
        catalog) for the full event list, frame format, and reconnect semantics.

        Event format follows the SSE specification with named events:
        ```
        id: 42
        event: scan.completed
        data: {"id":"42","type":"scan.completed","title":"Scan completed","message":"Library scan finished","timestamp":"...","data":{}}
        ```
      operationId: getEventStream
      tags:
        - Events
      responses:
        "200":
          description: SSE stream established. Events are sent as text/event-stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE formatted event stream with named events and JSON data payloads.
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: SSE hub not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /foreign-files:
    get:
      summary: List detected foreign image files
      description: |
        Returns one entry per distinct file (by content_hash) from the
        foreign_files ledger, joined with the owning artist name. Ledger rows
        sharing the same non-empty content_hash are collapsed into one entry
        (display-time dedup); the representative row is the one with the
        smallest id. Rows with an empty content_hash (pre-migration-008) are
        never collapsed.

        Foreign files are images matching media-server naming patterns
        ("backdrop*", "fanart*", "poster*", "logo*", "banner*", "thumb*",
        "clearart*", "disc*", "landscape*") that lack Stillwater EXIF
        provenance. Recorded by the periodic foreign-file scanner; never
        modified by this endpoint.
      operationId: listForeignFiles
      tags:
        - Foreign Files
      responses:
        "200":
          description: Ledger snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ForeignFileEntry"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Administrator role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Foreign-file scanner not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /foreign-files/count:
    get:
      tags: [Reports]
      summary: Sidebar count badge for foreign files
      description: >-
        HTML fragment endpoint used by the sidebar's Foreign Files child link
        (#1778). Non-administrators receive a 403 JSON response. Returns an
        empty body when no foreign files are in the ledger or when the count
        lookup fails (fail-safe; the sidebar template only renders this
        placeholder for administrators, so a healthy session never triggers the
        403 path). When at least one file exists, the stable branch returns a
        populated <a> link element (pointing at the canonical
        /reports/foreign-files path) with the file count. The ?ch=next query
        parameter selects the promoted-sidebar behavior: the entry is static, so
        the response injects only the count-pill span. Unlike the
        duplicates-count endpoint, this endpoint is not cached; the foreign-file
        count already has its own DB-level summarization via
        foreignSummaryForBanner.
      operationId: getForeignFilesCountBadge
      parameters:
        - in: query
          name: ch
          schema:
            type: string
            enum: [next]
          required: false
          description: >-
            Channel hint. Set to "next" when the caller is the promoted
            sidebar; the entry is static, so the response injects only the
            count-pill span (no href, no icon). Omit for the stable sidebar,
            which returns a full <a> link to the canonical
            /reports/foreign-files path.
      responses:
        "200":
          description: >-
            HTML fragment. Empty body when count is zero; populated <a> link
            when count > 0. Non-administrators receive 403 (see below).
          content:
            text/html:
              schema:
                type: string
        "403":
          description: Administrator role required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /foreign-files/dismiss:
    post:
      summary: Bulk allowlist every active foreign file globally
      description: |
        Inserts a global-scope allowlist row for every distinct resolved
        content_hash across active foreign_files entries (the stored hash
        when present, otherwise hashed from file bytes for legacy rows) and
        clears the ledger. Subsequent scans suppress matching byte content
        across every artist (file_name is display-only). Returns the
        re-rendered conflict banner so HTMX can swap it in place.
      operationId: dismissForeignFiles
      tags:
        - Foreign Files
      responses:
        "200":
          description: Empty foreign-files table partial (text/html) after dismissal.
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Administrator role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error listing foreign files for dismissal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Foreign-file scanner not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /foreign-files/{id}/allowlist:
    post:
      summary: Allowlist a single ledger row (artist-scoped)
      description: |
        Adds an artist-scoped allowlist entry matching (entry.artist_id,
        resolved content_hash) and removes the ledger row; the hash is the
        stored value when present, otherwise hashed from file bytes for
        legacy rows. file_name is display-only and not part of matching
        semantics. The file remains on disk; future scans will not
        re-record it for that artist.
      operationId: allowlistForeignFile
      tags:
        - Foreign Files
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Allowlisted.
        "400":
          description: Missing or invalid foreign-file id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Foreign-file row not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Administrator role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error writing the allowlist row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Foreign-file scanner not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /foreign-files/{id}/file:
    delete:
      summary: Delete the file from disk and clear the ledger row
      description: |
        Atomically removes the file from disk via internal/filesystem
        (rename-to-tomb then unlink) and removes the matching ledger row.
        Does not create an allowlist entry; the file is gone, so re-detection
        is moot.
      operationId: deleteForeignFile
      tags:
        - Foreign Files
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
