          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Settings export service not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/import:
    post:
      tags: [Settings]
      summary: Import settings from encrypted file
      operationId: importSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                envelope:
                  $ref: "#/components/schemas/PortableSettingsEnvelopeImport"
                admin_fallback_tokens:
                  type: boolean
                  description: Opt-in. When true, API tokens whose original owner is absent on the target after the envelope's Users block has been applied are reassigned to the importing admin instead of skipped. The reassignment count surfaces in the response under ownership_reassigned.
              required: [passphrase, envelope]
          multipart/form-data:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                file:
                  type: string
                  format: binary
                admin_fallback_tokens:
                  type: string
                  description: Opt-in. Truthy values ("1", "true", "on") request the same admin-fallback behavior as the JSON field of the same name.
              required: [passphrase, file]
      responses:
        "200":
          description: Import results with counts per category (returns HTML summary when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                required: [settings, connections, platform_profiles, webhooks, provider_keys, priorities, rules, scraper_configs, user_preferences, libraries, libraries_skipped, api_tokens, api_tokens_skipped, users_imported, ownership_reassigned]
                properties:
                  settings:
                    type: integer
                    description: Number of settings entries imported.
                  connections:
                    type: integer
                    description: Number of connections imported.
                  platform_profiles:
                    type: integer
                    description: Number of platform profiles imported.
                  webhooks:
                    type: integer
                    description: Number of webhooks imported.
                  provider_keys:
                    type: integer
                    description: Number of provider API keys imported.
                  priorities:
                    type: integer
                    description: Number of provider priority entries imported.
                  rules:
                    type: integer
                    description: Number of rule configurations imported.
                  scraper_configs:
                    type: integer
                    description: Number of scraper configuration scopes imported.
                  user_preferences:
                    type: integer
                    description: Number of user preference entries imported.
                  libraries:
                    type: integer
                    description: Number of libraries imported (envelope >= 1.2).
                  libraries_skipped:
                    type: integer
                    description: Number of libraries skipped because the source-side connection has no equivalent on the target instance.
                  api_tokens:
                    type: integer
                    description: Number of API tokens imported (envelope >= 1.2).
                  api_tokens_skipped:
                    type: integer
                    description: Number of API tokens skipped (e.g. owner absent on target and admin-fallback not requested).
                  users_imported:
                    type: integer
                    description: Number of users recreated from the envelope's Users block (envelope >= 1.3). Users that already existed on the target are NOT counted.
                  ownership_reassigned:
                    type: integer
                    description: Number of API tokens whose owner was absent on the target and were reassigned to the importing admin via admin_fallback_tokens=true.
            text/html:
              schema:
                type: string
        "400":
          description: Invalid request or client-side import error (wrong passphrase / unsupported envelope version / corrupt envelope / malformed JSON)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File exceeds 10MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error while applying the import (decryption succeeded but persistence failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Settings import service not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/nfo-output:
