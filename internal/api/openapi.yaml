          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider comparison results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        value:
                          type: string
                        values:
                          type: array
                          items:
                            type: string
                        has_data:
                          type: boolean
                        error:
                          type: string
            text/html:
              schema:
                type: string
