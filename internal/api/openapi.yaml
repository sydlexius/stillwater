  /filesystem/browse:
    get:
      tags: [Filesystem]
      operationId: browseFilesystem
      summary: Browse filesystem directories
      description: >
        Returns the direct subdirectories of the given absolute path.
        Only directories are returned; files are excluded. Hidden directories
        (those whose names start with a dot) are also excluded.
        Requires administrator role.
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Absolute filesystem path to list. Must be an absolute path; traversal segments (e.g. "..") are normalized by the server via filepath.Clean before listing.
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilesystemBrowseResult"
        "400":
          description: Invalid path (not absolute, not a directory, or symlink resolution failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden (administrator role required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to read directory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings:
    get:
      tags: [Settings]
      summary: Get all settings
      operationId: getSettings
      responses:
        "200":
          description: Key-value settings map
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
    put:
      tags: [Settings]
      summary: Update settings
      operationId: updateSettings
      description: >
        Update one or more settings as key-value string pairs.
        Known keys include:
        auto_fetch_images (true/false),
        notif_badge_enabled (true/false),
        notif_badge_severity_error (true/false),
        notif_badge_severity_warning (true/false),
        notif_badge_severity_info (true/false),
        rule_schedule.interval_minutes (integer as string; 0 to disable, or >= 5),
        backup_retention_count (positive integer as string),
        backup_max_age_days (integer as string),
        cache.image.max_size_mb (integer as string),
        provider.name_similarity_threshold (0-100 integer as string;
        minimum similarity score for provider name matching,
        set to 0 to disable validation, default 60),
        images.backdrop.target_count (1-10 integer as string;
        target number of backdrop/fanart images per artist, default 1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /preferences:
    get:
      tags: [Preferences]
      summary: Get all user preferences
      operationId: getPreferences
      description: >
        Returns all preference keys for the authenticated user, merged with defaults.
        Preferences are per-user appearance settings (theme, glass intensity, sidebar
        state, typography, etc.).
      responses:
        "200":
          description: >
            All 12 preference keys with the user's values merged over defaults.
            The response always contains exactly these keys.
          content:
            application/json:
              schema:
                type: object
                properties:
                  theme:
                    type: string
                    enum: [dark, light, system]
                  glass_intensity:
                    type: string
                    enum: [light, medium, heavy]
                  sidebar_state:
                    type: string
                    enum: [full, icon-only, hidden]
                  content_width:
                    type: string
                    enum: [narrow, wide]
                  font_family:
                    type: string
                    enum: [system, inter, atkinson]
                  font_size:
                    type: string
                    enum: [small, medium, large]
                  letter_spacing:
                    type: string
                    enum: [normal, wide, extra-wide]
                  thumbnail_size:
                    type: string
                    enum: [small, medium, large]
                  reduced_motion:
                    type: string
                    enum: [system, on, off]
                  lite_mode:
                    type: string
                    enum: [off, on, auto]
                  language:
                    type: string
                    enum: [en]
                  notification_enabled:
                    type: string
                    enum: ["true", "false"]
                required:
                  - theme
                  - glass_intensity
                  - sidebar_state
                  - content_width
                  - font_family
                  - font_size
                  - letter_spacing
                  - thumbnail_size
                  - reduced_motion
                  - lite_mode
                  - language
                  - notification_enabled
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /preferences/{key}:
    get:
      tags: [Preferences]
      summary: Get a single user preference
      operationId: getPreference
      description: >
        Returns the value of a single preference key for the authenticated user.
        For known fixed keys the value is merged with the compiled default when no
        row exists. For suppress_confirm_* keys a missing row returns "false".
      parameters:
        - name: key
          in: path
          required: true
          description: >
            A known preference key (theme, glass_intensity, etc.) or a
            suppress_confirm_* key of the form suppress_confirm_{action} where
            {action} contains only lowercase letters, digits, and underscores.
          schema:
            oneOf:
              - type: string
                enum:
                  - theme
                  - glass_intensity
                  - sidebar_state
                  - content_width
                  - font_family
                  - font_size
                  - letter_spacing
                  - thumbnail_size
                  - reduced_motion
                  - lite_mode
                  - language
                  - notification_enabled
              - type: string
                pattern: "^suppress_confirm_[a-z0-9_]+$"
      responses:
        "200":
          description: Preference value
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key:
                    type: string
                    description: The preference key that was requested.
                  value:
                    type: string
                    description: >
                      The current value of the preference. For known fixed
                      keys, returns the stored value or the compiled default
                      when no row exists. For suppress_confirm_* keys, returns
                      "true" or "false".
        "400":
          description: Unknown preference key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Preferences]
      summary: Update a user preference
      operationId: updatePreference
      parameters:
        - name: key
          in: path
          required: true
          description: >
            A known preference key or a suppress_confirm_* key of the form
            suppress_confirm_{action}. suppress_confirm_* keys accept only
            "true" or "false".
          schema:
            oneOf:
              - type: string
                enum:
                  - theme
                  - glass_intensity
                  - sidebar_state
                  - content_width
                  - font_family
                  - font_size
                  - letter_spacing
                  - thumbnail_size
                  - reduced_motion
                  - lite_mode
                  - language
                  - notification_enabled
              - type: string
                pattern: "^suppress_confirm_[a-z0-9_]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
      responses:
        "200":
          description: Preference updated
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key:
                    type: string
                    description: The preference key that was updated.
                  value:
                    type: string
                    description: The new value after the update.
        "400":
          description: Invalid key or value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

