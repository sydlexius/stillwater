                $ref: "#/components/schemas/Error"
        "503":
          description: NFO settings service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/cache/stats:
    get:
      tags: [Settings]
      summary: Get image cache statistics
