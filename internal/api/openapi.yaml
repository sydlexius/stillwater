openapi: 3.1.0
info:
  title: Stillwater API
  version: 0.25.0
  description: Artist metadata and image management for Emby, Jellyfin, and Kodi.
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html
servers:
  - url: http://localhost:1973/api/v1
    description: Local development
security:
  - cookieAuth: []
  - bearerAuth: []
  - apiKeyAuth: []
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
    bearerAuth:
      type: http
      scheme: bearer
      description: API token (sw_ prefix) via Authorization header
    apiKeyAuth:
      type: apiKey
      in: query
      name: apikey
      description: "Deprecated: prefer bearerAuth (Authorization header). Query-string tokens risk leakage via logs and referrers."
      x-deprecated: true
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        details:
          type: array
          items:
            type: string
          description: Validation error details. Present when validation fails, containing one or more error messages.
      required: [error]
    Status:
      type: object
      properties:
        status:
          type: string
    ConnectionResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [emby, jellyfin, lidarr]
        url:
          type: string
        has_key:
          type: boolean
          description: Whether the connection has an API key configured.
        has_platform_user_id:
          type: boolean
          description: Whether the connection has a platform user ID configured for personalized metadata.
        enabled:
          type: boolean
        status:
          type: string
        status_message:
          type: string
        last_checked_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        library_count:
          type: integer
          description: Number of libraries associated with this connection. Present in the single-connection detail response only, not in the list response.
        artist_count:
          type: integer
          description: Total number of artists across all libraries for this connection. Present in the single-connection detail response only, not in the list response.
    Webhook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
        type:
          type: string
        events:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    HealthSummary:
      type: object
      properties:
        score:
          type: number
        total_artists:
          type: integer
        compliant_artists:
          type: integer
        missing_nfo:
          type: integer
        missing_thumb:
          type: integer
        missing_fanart:
          type: integer
        missing_mbid:
          type: integer
        top_violations:
          type: array
          items:
            type: object
            properties:
              rule_id:
                type: string
              rule_name:
                type: string
              count:
                type: integer
              severity:
                type: string
    BackupInfo:
      type: object
      properties:
        filename:
          type: string
        size:
          type: integer
        created_at:
          type: string
          format: date-time
    RuleRunStatus:
      type: object
      properties:
        running:
          type: boolean
        status:
          type: string
          enum: [idle, running, completed, failed]
        artists_processed:
          type: integer
        violations_found:
          type: integer
        fixes_attempted:
          type: integer
        fixes_succeeded:
          type: integer
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error:
          type: string
    Library:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [regular, classical]
        source:
          type: string
          enum: [manual, emby, jellyfin, lidarr]
        connection_id:
          type: string
        external_id:
          type: string
        fs_watch:
          type: integer
        fs_poll_interval:
          type: integer
        fs_notify_supported:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LibraryOpResult:
      type: object
      properties:
        library_id:
          type: string
        library_name:
          type: string
        operation:
          type: string
          enum: [populate, scan]
        status:
          type: string
          enum: [running, completed, failed]
        message:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    APIToken:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: string
        user_id:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    Violation:
      type: object
      properties:
        id:
          type: string
        rule_id:
          type: string
        artist_id:
          type: string
        artist_name:
          type: string
        severity:
          type: string
          enum: [error, warning, info]
        message:
          type: string
        fixable:
          type: boolean
        status:
          type: string
          enum: [open, dismissed, resolved, pending_choice]
        candidates:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              width:
                type: integer
              height:
                type: integer
              source:
                type: string
              image_type:
                type: string
        dismissed_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LoggingConfig:
      type: object
      properties:
        level:
          type: string
          enum: [debug, info, warn, error]
        format:
          type: string
          enum: [text, json]
        file_path:
          type: string
        file_max_size_mb:
          type: integer
        file_max_files:
          type: integer
        file_max_age_days:
          type: integer
    MaintenanceStatus:
      type: object
      properties:
        db_file_size:
          type: integer
          format: int64
        wal_file_size:
          type: integer
          format: int64
        page_count:
          type: integer
          format: int64
        page_size:
          type: integer
          format: int64
        last_optimize_at:
          type: string
          format: date-time
        schedule_enabled:
          type: boolean
        schedule_interval_hours:
          type: integer
    PlatformBackdropConnection:
      type: object
      properties:
        connection_id:
          type: string
        connection_name:
          type: string
        connection_type:
          type: string
          enum: [emby, jellyfin]
        backdrops:
          type: array
          items:
            $ref: "#/components/schemas/PlatformBackdropItem"
    PlatformBackdropItem:
      type: object
      properties:
        index:
          type: integer
          description: 0-based index of the backdrop on the platform
        thumbnail_url:
          type: string
          description: Proxy URL to fetch the backdrop thumbnail through Stillwater
    FanartSyncSlotConnection:
      type: object
      properties:
        connection_id:
          type: string
        name:
          type: string
          description: Display name of the connection
        type:
          type: string
          enum: [emby, jellyfin]
        synced:
          type: boolean
          description: Whether the platform has a backdrop at this index
    FanartSyncSlot:
      type: object
      properties:
        index:
          type: integer
          description: 0-based fanart slot index
        state:
          type: string
          enum: [synced, partial, unsynced]
          description: Aggregate sync state across all reachable connections
        connections:
          type: array
          items:
            $ref: "#/components/schemas/FanartSyncSlotConnection"

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                  commit:
                    type: string
                  time:
                    type: string
                    format: date-time

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        "200":
          description: Login successful, session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/setup:
    post:
      tags: [Auth]
      summary: Create initial admin account
      security: []
      operationId: setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                  minLength: 8
              required: [username, password]
      responses:
        "201":
          description: Admin account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "409":
          description: Admin account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      operationId: logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getMe
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/tokens:
    post:
      tags: [Auth]
      summary: Create API token
      operationId: createAPIToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                scopes:
                  type: string
                  description: Comma-separated scopes (default "read")
                  default: read
              required: [name]
      responses:
        "201":
          description: Token created (plaintext token returned only once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  token:
                    type: string
                  name:
                    type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Auth]
      summary: List API tokens
      operationId: listAPITokens
      responses:
        "200":
          description: List of API tokens (no plaintext values)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIToken"

  /auth/tokens/{id}:
    delete:
      tags: [Auth]
      summary: Revoke API token
      operationId: revokeAPIToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists:
    get:
      tags: [Artists]
      summary: List artists
      operationId: listArtists
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
        - name: sort
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated artist list
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer

  /artists/duplicates:
    get:
      tags: [Artists]
      summary: Find duplicate artists
      operationId: getDuplicates
      responses:
        "200":
          description: List of duplicate groups
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /artists/{id}:
    get:
      tags: [Artists]
      summary: Get artist details
      operationId: getArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artist with band members
          content:
            application/json:
              schema:
                type: object
                properties:
                  artist:
                    type: object
                  members:
                    type: array
                    items:
                      type: object
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/health:
    get:
      tags: [Artists, Rules]
      summary: Evaluate artist health
      operationId: evaluateArtistHealth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Health evaluation result
          content:
            application/json:
              schema:
                type: object

  /artists/{id}/aliases:
    get:
      tags: [Aliases]
      summary: List artist aliases
      operationId: listAliases
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of aliases
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    alias:
                      type: string
                    source:
                      type: string
    post:
      tags: [Aliases]
      summary: Add alias to artist
      operationId: addAlias
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  type: string
                source:
                  type: string
              required: [alias]
      responses:
        "201":
          description: Alias created
          content:
            application/json:
              schema:
                type: object

  /artists/{id}/aliases/{aliasId}:
    delete:
      tags: [Aliases]
      summary: Remove alias
      operationId: removeAlias
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: aliasId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alias deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/{id}/images/upload:
    post:
      tags: [Images]
      summary: Upload image file
      operationId: uploadImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [file, type]
      responses:
        "200":
          description: Image saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  saved:
                    type: array
                    items:
                      type: string
                  type:
                    type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
                  count:
                    type: integer
                    description: Total number of fanart images now on disk for this artist. Present only when type is fanart.
        "413":
          description: File exceeds 25MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fetch:
    post:
      tags: [Images]
      summary: Fetch image from URL
      operationId: fetchImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, type]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                url:
                  type: string
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, type]
      responses:
        "200":
          description: Image fetched and saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  saved:
                    type: array
                    items:
                      type: string
                  type:
                    type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
                  count:
                    type: integer
                    description: Total number of fanart images now on disk for this artist. Present only when type is fanart.

  /artists/{id}/images/search:
    get:
      tags: [Images]
      summary: Search providers for images
      operationId: searchImages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image search results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                  errors:
                    type: array
                    items:
                      type: string
            text/html:
              schema:
                type: string

  /artists/{id}/images/crop:
    post:
      tags: [Images]
      summary: Crop and save image
      operationId: cropImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                image_data:
                  type: string
                  description: Base64-encoded image data
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
                x:
                  type: integer
                y:
                  type: integer
                width:
                  type: integer
                height:
                  type: integer
              required: [image_data, type]
      responses:
        "200":
          description: Image cropped and saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  saved:
                    type: array
                    items:
                      type: string
                  type:
                    type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.

  /artists/{id}/nfo/diff:
    get:
      tags: [NFO]
      summary: Get NFO field-level diff
      description: >
        For pathless artists (no filesystem path), returns a virtual NFO
        generated from database fields instead of reading from disk.
      operationId: getNFODiff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: compare_to
          in: query
          description: Snapshot ID to compare against (defaults to latest)
          schema:
            type: string
      responses:
        "200":
          description: NFO diff result (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
            text/html:
              schema:
                type: string

  /artists/{id}/nfo/conflict:
    get:
      tags: [NFO]
      summary: Check for external NFO modifications
      description: >
        For pathless artists, always returns no conflict since there is
        no on-disk NFO file to be modified externally.
      operationId: checkNFOConflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conflict check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_conflict:
                    type: boolean
                  reason:
                    type: string
                  external_writer:
                    type: string
                  last_modified:
                    type: string
                    format: date-time
                    description: Present when the NFO file exists and is accessible; contains the file's last-modified timestamp regardless of conflict status. Omitted when the file does not exist or cannot be accessed (pathless artists, missing file, or filesystem errors).

  /artists/{id}/nfo/snapshots:
    get:
      tags: [NFO]
      summary: List NFO snapshots
      operationId: listNFOSnapshots
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of snapshots
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots:
                    type: array
                    items:
                      type: object

  /artists/{id}/nfo/snapshots/{snapshotId}/restore:
    post:
      tags: [NFO]
      summary: Restore NFO from snapshot
      description: >
        For pathless artists, applies the snapshot fields to the database
        and pushes updated metadata to connected platforms instead of
        writing to disk.
      operationId: restoreNFOSnapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: NFO restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/{id}/platform-ids:
    get:
      tags: [Platform IDs]
      summary: List platform artist ID mappings
      operationId: getPlatformIDs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of platform artist ID mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    artist_id:
                      type: string
                    connection_id:
                      type: string
                    platform_artist_id:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time

  /artists/{id}/platform-ids/{connectionId}:
    put:
      tags: [Platform IDs]
      summary: Set platform artist ID mapping
      operationId: setPlatformID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                platform_artist_id:
                  type: string
              required: [platform_artist_id]
      responses:
        "200":
          description: Platform ID set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags: [Platform IDs]
      summary: Delete platform artist ID mapping
