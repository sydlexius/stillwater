                $ref: "#/components/schemas/Error"
        "404":
          description: Foreign-file row not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Administrator role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Filesystem error during deletion.
          content:
            application/json:
