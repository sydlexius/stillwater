        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /connections:
    get:
      tags: [Connections]
      summary: List connections
      operationId: listConnections
      responses:
        "200":
          description: List of connections (API keys excluded)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectionResponse"
    post:
      tags: [Connections]
      summary: Create connection
      operationId: createConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [emby, jellyfin, lidarr]
                url:
                  type: string
                api_key:
                  type: string
                enabled:
                  type: boolean
                skip_test:
                  type: boolean
              required: [name, type, url]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [emby, jellyfin, lidarr]
                url:
                  type: string
                api_key:
                  type: string
                skip_test:
                  type: boolean
              required: [name, type, url]
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"

  /connections/{id}:
    get:
      tags: [Connections]
      summary: Get connection
      operationId: getConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Connections]
      summary: Update connection
      operationId: updateConnection
      parameters:
        - name: id
          in: path
