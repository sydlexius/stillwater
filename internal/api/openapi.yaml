      summary: Clear a single metadata field
      operationId: clearField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field cleared (returns HTML display fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
