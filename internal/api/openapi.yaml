  /artists/{id}/platform-state:
    get:
      tags: [Platform State]
      summary: Get artist platform state comparison card
      description: >-
        Fetches the current state of an artist on a platform connection and
        returns an HTML partial comparing Stillwater and platform metadata.
        Used by HTMX for lazy-loading platform state cards on the artist
        detail page.
      operationId: getPlatformState
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connection_id
          in: query
          required: true
          schema:
            type: string
        - name: readonly
          in: query
          required: false
          description: >-
            When "true", returns a read-only card with additional
            platform-only fields (sort name, tags, backdrop count, locked
            status). Defaults to the interactive comparison card.
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: HTML partial containing the platform state comparison card
          content:
            text/html:
              schema:
                type: string
        "400":
          description: >-
            Bad request (missing connection_id or connection disabled).
            HTMX requests receive an HTML error partial instead of JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
            text/html:
              schema:
                type: string
        "404":
          description: >-
            Artist, connection, or platform ID not found.
            HTMX requests receive an HTML error partial instead of JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
            text/html:
              schema:
                type: string
        "500":
          description: >-
            Internal server error. HTMX requests, including platform fetch
            failures, receive an HTML error partial instead of JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
            text/html:
              schema:
                type: string

