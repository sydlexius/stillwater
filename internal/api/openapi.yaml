        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                envelope:
                  type: object
              required: [passphrase, envelope]
          multipart/form-data:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                file:
                  type: string
                  format: binary
              required: [passphrase, file]
      responses:
        "200":
          description: Import results with counts per category (returns HTML summary when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: integer
                  connections:
                    type: integer
                  platform_profiles:
                    type: integer
                  webhooks:
                    type: integer
                  provider_keys:
                    type: integer
                  priorities:
                    type: integer
            text/html:
              schema:
                type: string
        "400":
          description: Invalid request or decryption error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File exceeds 10MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Artist field editing ---

  /artists/{id}/fields/{field}/display:
    get:
      tags: [Artists]
      summary: Get field display view
      operationId: getFieldDisplay
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field value (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                  value:
                    type: string
            text/html:
              schema:
                type: string
        "400":
          description: Non-editable field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/fields/{field}/edit:
    get:
      tags: [Artists]
      summary: Get field edit view
      operationId: getFieldEdit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field value for editing (returns HTML edit form when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                  value:
                    type: string
            text/html:
              schema:
                type: string

  /artists/{id}/fields/{field}:
    patch:
      tags: [Artists]
      summary: Update a single metadata field
      operationId: updateField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
      responses:
        "200":
          description: Field updated (returns HTML display fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  field:
                    type: string
                  value:
                    type: string
            text/html:
              schema:
                type: string
        "400":
          description: Non-editable field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Artists]
      summary: Clear a single metadata field
      operationId: clearField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field cleared (returns HTML display fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  field:
                    type: string
            text/html:
              schema:
                type: string

  /artists/{id}/fields/{field}/providers:
    get:
      tags: [Artists]
      summary: Compare field value across providers
      operationId: getFieldProviders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider comparison results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        value:
                          type: string
                        values:
                          type: array
                          items:
                            type: string
                        has_data:
                          type: boolean
                        error:
                          type: string
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/members:
    delete:
      tags: [Artists]
      summary: Clear all band members
      operationId: clearMembers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members cleared (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /artists/{id}/members/from-provider:
    post:
      tags: [Artists]
      summary: Save band members from provider data
      operationId: saveMembersFromProvider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  mbid:
                    type: string
                  instruments:
                    type: array
                    items:
                      type: string
                  vocal_type:
                    type: string
                  date_joined:
                    type: string
                  date_left:
                    type: string
                  is_active:
                    type: boolean
      responses:
        "200":
          description: Members saved (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Artist refresh and disambiguation ---

  /artists/{id}/refresh:
    post:
      tags: [Artists]
      summary: Refresh artist metadata from providers
      description: >
        Triggers a full metadata refresh. If the artist has no MusicBrainz ID,
        returns a disambiguation prompt instead.
      operationId: refreshArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refresh result or disambiguation prompt (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        provider:
                          type: string
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/search:
    post:
      tags: [Artists]
      summary: Search providers for disambiguation
      operationId: refreshSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
      responses:
        "200":
          description: Disambiguation candidates (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
            text/html:
              schema:
                type: string
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/link:
    post:
      tags: [Artists]
      summary: Link artist to provider ID and refresh
      operationId: refreshLink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mbid:
                  type: string
                discogs_id:
                  type: string
                source:
                  type: string
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                mbid:
                  type: string
                discogs_id:
                  type: string
                source:
                  type: string
      responses:
        "200":
          description: Linked and refreshed (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        provider:
                          type: string
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/reidentify:
    post:
      tags: [Artists]
      summary: Clear provider IDs and prompt re-identification
      operationId: reidentifyArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider IDs cleared, disambiguation required (returns HTML disambiguation form when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  artist:
                    type: string
                  message:
                    type: string
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Additional image routes ---

  /artists/{id}/images/websearch:
    get:
      tags: [Images]
      summary: Search web for artist images
      operationId: webImageSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Web search image results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
            text/html:
              schema:
                type: string

  /artists/{id}/images/logo/trim:
    post:
      tags: [Images]
      summary: Trim transparent padding from logo
      operationId: trimLogo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Logo trimmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Artist or logo not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/list:
    get:
      tags: [Images]
      summary: List all fanart images with metadata
      operationId: listFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fanart gallery items (returns HTML gallery when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    index:
                      type: integer
                    filename:
                      type: string
                    width:
                      type: integer
                    height:
                      type: integer
                    size:
                      type: integer
                      format: int64
            text/html:
              schema:
                type: string

  /artists/{id}/images/fanart/{index}/file:
    get:
      tags: [Images]
      summary: Serve fanart image by index
      operationId: serveFanartByIndex
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Artist not found or index out of range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/batch:
    delete:
      tags: [Images]
      summary: Delete selected fanart by indices
      operationId: batchDeleteFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                indices:
                  type: array
                  items:
                    type: integer
              required: [indices]
      responses:
        "200":
          description: Fanart deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  deleted:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/fetch-batch:
    post:
      tags: [Images]
      summary: Fetch multiple fanart images from URLs
      operationId: batchFetchFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  maxItems: 20
              required: [urls]
      responses:
        "200":
          description: Fetch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  saved:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}/file:
    get:
      tags: [Images]
      summary: Serve artist image file
      operationId: serveImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Artist or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}/info:
    get:
      tags: [Images]
      summary: Get image metadata (dimensions, size)
      operationId: getImageInfo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image metadata (returns HTML badge when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  filename:
                    type: string
                  width:
                    type: integer
                  height:
                    type: integer
                  size:
                    type: integer
                    format: int64
                  modified:
                    type: string
                    format: date-time
            text/html:
              schema:
                type: string
        "404":
          description: Artist or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}:
    delete:
      tags: [Images]
      summary: Delete artist image
      operationId: deleteImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image deleted (returns HTML preview card when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  deleted:
                    type: array
                    items:
                      type: string
            text/html:
              schema:
                type: string
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Push extras ---

  /artists/{id}/push/images:
    post:
      tags: [Push]
      summary: Push images to platform
      operationId: pushImages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                platform_artist_id:
                  type: string
                  description: >-
                    Platform-specific artist ID. If omitted, the server
                    looks up a stored mapping from the artist_platform_ids
                    table. Returns 400 if no stored mapping exists.
                image_types:
                  type: array
                  items:
                    type: string
                    enum: [thumb, fanart, logo, banner]
                  description: Types to push (defaults to all four)
              required: [connection_id]
      responses:
        "200":
          description: Push results
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploaded:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
