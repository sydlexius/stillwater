                      type: object
                      properties:
                        provider:
                          type: string
                          description: Internal provider identifier.
                        display_name:
                          type: string
                          description: Human-readable provider display name.
                        requires_auth:
                          type: boolean
                          description: Whether the provider requires API key authentication.
                        has_key:
                          type: boolean
                          description: Whether the provider has an API key configured.
                        metadata_fields:
                          type: array
                          items:
                            type: string
                          description: Metadata fields this provider can supply.
                        image_fields:
                          type: array
                          items:
                            type: string
                          description: Image types this provider can supply.
                    description: Available metadata scraper providers.

  # --- Notifications ---

  /notifications/counts:
    get:
      tags: [Notifications]
      summary: Get violation counts by severity
      operationId: getNotificationCounts
      responses:
        "200":
          description: Counts by severity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    description: Number of error-severity violations.
                  warning:
                    type: integer
                    description: Number of warning-severity violations.
                  info:
                    type: integer
                    description: Number of info-severity violations.
                  total:
                    type: integer
                    description: Total number of violations.

  /notifications/badge:
    get:
      tags: [Notifications]
      summary: Get notification badge HTML fragment
      description: Returns an HTML fragment for HTMX polling. Not a JSON endpoint.
      operationId: getNotificationBadge
      responses:
        "200":
          description: Badge HTML fragment
          content:
            text/html:
              schema:
                type: string

  /notifications:
    get:
      tags: [Notifications]
      summary: List rule violations with optional filtering and sorting
      operationId: listNotifications
      parameters:
        - name: status
          in: query
          description: Filter by violation status. "active" returns open + pending_choice.
          schema:
            type: string
            enum: [active, open, dismissed, resolved, pending_choice]
            default: active
        - name: sort
          in: query
          description: Sort column
          schema:
            type: string
            enum: [severity, artist_name, rule_id, created_at]
            default: severity
        - name: order
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: severity
          in: query
          description: Filter by severity level
          schema:
            type: string
            enum: [error, warning, info]
        - name: category
          in: query
          description: Filter by rule category
          schema:
            type: string
            enum: [nfo, image, metadata]
        - name: rule_id
          in: query
          description: Filter by specific rule ID
          schema:
            type: string
        # group_by is supported on the HTML endpoint (/notifications/table) only.
        # It is not included here because the JSON response is always a flat array.
      responses:
        "200":
          description: Violations matching filter
          content:
            application/json:
              schema:
                type: object
                properties:
                  violations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Violation"
                    description: List of violation records.
                  count:
                    type: integer
                    description: Total number of violations in this response.

  /notifications/{id}/dismiss:
    post:
      tags: [Notifications]
      summary: Dismiss a violation
      operationId: dismissViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/resolve:
    post:
      tags: [Notifications]
      summary: Resolve a violation
      operationId: resolveViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/apply-candidate:
    post:
      tags: [Notifications]
      summary: Apply an image candidate from a pending-choice violation
      operationId: applyViolationCandidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                image_type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, image_type]
      responses:
        "200":
          description: Candidate applied and violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid request or URL mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/bulk-dismiss:
    post:
      tags: [Notifications]
      summary: Bulk dismiss violations
      operationId: bulkDismissViolations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Violation IDs to dismiss (omit to dismiss all)
      responses:
        "200":
          description: Count of dismissed violations
          content:
            application/json:
              schema:
                type: object
                properties:
                  dismissed:
                    type: integer
                    description: Number of violations dismissed.

  /notifications/{id}/fix:
    post:
      tags: [Notifications]
      summary: Apply recommended fix for a violation
      description: |
        Applies the recommended fix for a single violation. For open fixable
        violations, routes through the appropriate fixer (NFO generation,
        metadata fetch, image fetch, directory rename, etc.). Returns the
        fix result with status and message. When the fix modifies NFO files,
        image files, or renames an artist directory, the response may include
        an undo_id that can be passed to
        POST /fix-undo/{undoId} within 30 seconds to revert it.
        Metadata-only fixes, dismissed violations, and failed fixes do not
        produce an undo_id.
      operationId: fixViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fix result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [fixed, dismissed, failed]
                    description: Fix result state
                  message:
                    type: string
                    description: Human-readable result description
                  undo_id:
                    type: string
                    description: |
                      Opaque token used to revert this fix via
                      POST /fix-undo/{undoId}. Present only when
                      the fix modified filesystem files and an undo entry was
                      registered. Absent for metadata-only fixes, dismissed
                      violations, and failed fixes.
                  undo_expires_in:
                    type: integer
                    description: |
                      Number of seconds until the undo window closes. Present
                      only when undo_id is set.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /fix-undo/{undoId}:
    post:
      tags: [Notifications]
      summary: Revert a recently applied fix
      description: |
        Reverts a fix that was applied within the undo window (30 seconds).
        The undoId is returned by POST /notifications/{id}/fix when the fix
        modified filesystem files. The undo entry is single-use and expires
        after 30 seconds. Returns 410 Gone when the window has elapsed or
        the token has already been used. On success, attempts to reopen the
        violation so it reappears as fixable in the notifications list;
        reopening may fail even when the revert itself succeeds, in which
        case the response status is still "reverted" with a warning message.
      operationId: undoFix
      parameters:
        - name: undoId
          in: path
          required: true
          schema:
            type: string
          description: Opaque undo token returned by the fix endpoint
      responses:
        "200":
          description: Revert succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [reverted]
                    description: Always "reverted" on success
                  message:
                    type: string
                    description: Human-readable confirmation
        "410":
          description: Invalid, expired, or already-used undo token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Undo store not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/fix-all:
    post:
      tags: [Notifications]
      summary: Start async bulk fix for fixable violations
      description: |
        Starts an asynchronous operation that applies the recommended fix for
        all open fixable violations (pending_choice violations that require
        user candidate selection are excluded). Returns 202 with the total
        count. Poll /notifications/fix-all/status for progress.
      operationId: fixAllViolations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Optional subset of violation IDs. Omit to fix all fixable.
      responses:
        "202":
          description: Fix-all operation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                    description: Current state of the fix-all operation.
                  total:
                    type: integer
                    description: Total number of violations.
        "200":
          description: No fixable violations found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [completed]
                    description: Current state of the fix-all operation.
                  message:
                    type: string
                    description: Human-readable result detail.
                  total:
                    type: integer
                    description: Total number of violations.
        "400":
          description: Malformed JSON body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Fix-all already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                    description: Current state of the fix-all operation.
                  message:
                    type: string
                    description: Human-readable result detail.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/fix-all/status:
    get:
      tags: [Notifications]
      summary: Get fix-all operation progress
      description: Returns the current state of the most recent fix-all operation.
      operationId: fixAllStatus
      responses:
        "200":
          description: Fix-all progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, running, completed]
                    description: Current state of the fix-all operation.
                  total:
                    type: integer
                    description: Total number of violations.
                  processed:
                    type: integer
                    description: Number of violations processed so far.
                  fixed:
                    type: integer
                    description: Number of violations fixed so far.
                  skipped:
                    type: integer
                    description: Number of violations skipped (not fixable).
                  failed:
                    type: integer
                    description: Number of fix attempts that failed.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/export:
    get:
      tags: [Notifications]
      summary: Export filtered violations as CSV or JSON
      description: |
        Streams the current filtered violation list as a CSV file download.
        Respects the same filter and sort parameters as the list endpoint.
        Use format=json query param or Accept: application/json header for JSON output.
      operationId: exportNotifications
      parameters:
        - name: status
          in: query
          description: Filter by violation status. "active" returns open + pending_choice.
          schema:
            type: string
            enum: [active, open, dismissed, resolved, pending_choice]
            default: active
        - name: severity
          in: query
          schema:
            type: string
            enum: [error, warning, info]
        - name: category
          in: query
          schema:
            type: string
            enum: [nfo, image, metadata]
        - name: rule_id
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [severity, artist_name, rule_id, created_at]
            default: severity
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: format
          in: query
          description: Set to "json" for JSON output instead of CSV.
          schema:
            type: string
            enum: [json]
      responses:
        "200":
          description: CSV file download (or JSON when format=json)
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: object
                properties:
                  violations:
                    type: array
                    items:
                      type: object
                      properties:
                        artist_name:
                          type: string
                          description: Display name of the artist.
                        library_name:
                          type: string
                          description: Name of the library the artist belongs to.
                        rule_id:
                          type: string
                          description: Identifier of the rule that triggered this violation.
                        severity:
                          type: string
                          enum: [error, warning, info]
                          description: Violation severity level (error, warning, info).
                        message:
                          type: string
                          description: Human-readable result detail.
                        status:
                          type: string
                          enum: [open, dismissed, resolved, pending_choice]
                          description: Violation lifecycle state.
                        age:
                          type: string
                          description: Human-readable age (e.g. "5h", "3d")
                    description: List of violation records.
                  count:
                    type: integer
                    description: Total number of violations in this response.

  /notifications/resolved:
    delete:
      tags: [Notifications]
      summary: Clear old resolved violations
      description: Permanently deletes resolved violations older than 7 days.
      operationId: clearResolvedViolations
      responses:
        "200":
          description: Resolved violations cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /violations/trend:
    get:
      tags: [Reports]
      summary: Get daily violation creation and resolution counts
      operationId: getViolationTrend
      parameters:
        - name: days
          in: query
          description: Number of past days to include. Values outside 1-365 default to 30.
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Daily violation trend data
          content:
            application/json:
              schema:
                type: object
                required: [trend]
                properties:
                  trend:
                    type: array
                    items:
                      type: object
                      required: [date, created, resolved]
                      properties:
                        date:
                          type: string
                          format: date
                          description: Calendar date (YYYY-MM-DD)
                        created:
                          type: integer
                          description: Number of violations created on this date
                        resolved:
                          type: integer
                          description: Number of violations resolved on this date
                    description: Violation count trend data points.
        "500":
          description: Internal server error

  # --- Report extras ---

  /reports/health/by-library:
    get:
      tags: [Reports]
      summary: Get per-library health breakdown
      operationId: getHealthByLibrary
      responses:
        "200":
          description: Per-library health scores (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  libraries:
                    type: array
                    items:
                      type: object
                      properties:
                        library_id:
                          type: string
                          description: ID of the library.
                        library_name:
                          type: string
                          description: Display name of the library.
                        total_artists:
                          type: integer
                          description: Total number of artists in this library.
                        compliant_artists:
                          type: integer
                          description: Number of artists with no open violations.
                        score:
                          type: number
                          description: Health score from 0.0 (worst) to 1.0 (best).
                        missing_nfo:
                          type: integer
                          description: Number of artists missing an NFO file.
                        missing_thumb:
                          type: integer
                          description: Number of artists missing a thumbnail image.
                        missing_fanart:
                          type: integer
                          description: Number of artists missing fanart.
                        missing_mbid:
                          type: integer
