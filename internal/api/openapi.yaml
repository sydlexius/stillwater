            text/html:
              schema:
                type: string

  /settings/maintenance/optimize:
    post:
      tags: [Settings]
      summary: Trigger database optimization
      operationId: maintenanceOptimize
      responses:
        "200":
          description: Optimization completed (returns HTML status fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /settings/maintenance/vacuum:
    post:
      tags: [Settings]
      summary: Trigger database vacuum
      operationId: maintenanceVacuum
      responses:
        "200":
          description: Vacuum completed (returns HTML status fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /settings/maintenance/schedule:
    put:
      tags: [Settings]
      summary: Configure maintenance schedule
      operationId: updateMaintenanceSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                interval_hours:
                  type: integer
              required: [enabled]
      responses:
        "200":
          description: Schedule updated (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /settings/export:
    post:
      tags: [Settings]
      summary: Export settings as encrypted file
      operationId: exportSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
              required: [passphrase]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
              required: [passphrase]
      responses:
        "200":
          description: Encrypted settings JSON file download
          content:
            application/json:
              schema:
                type: object
                required: [version, app_version, created_at, salt, data, summary]
                properties:
                  version:
                    type: string
                    description: Export format version number.
                  app_version:
                    type: string
                    description: Application version that created this export.
                  created_at:
                    type: string
                    format: date-time
                    description: When the export was created (UTC, RFC 3339).
                  salt:
                    type: string
                    description: Encryption salt for the settings payload.
                  data:
                    type: string
                    description: Encrypted settings payload.
                  summary:
                    type: object
                    description: Plaintext section counts for sanity-checking without decryption.
                    required: [settings, connections, platform_profiles, webhooks, provider_keys, priorities, rules, scraper_configs, user_preferences]
                    properties:
                      settings:
                        type: integer
                      connections:
                        type: integer
                      platform_profiles:
                        type: integer
                      webhooks:
                        type: integer
                      provider_keys:
                        type: integer
                      priorities:
                        type: integer
                      rules:
                        type: integer
                      scraper_configs:
                        type: integer
                      user_preferences:
                        type: integer
        "400":
          description: Missing passphrase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error while generating the export (collecting payload, encryption, or marshaling failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Settings export service not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/import:
    post:
      tags: [Settings]
      summary: Import settings from encrypted file
      operationId: importSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                envelope:
                  type: object
              required: [passphrase, envelope]
          multipart/form-data:
            schema:
              type: object
              properties:
                passphrase:
                  type: string
                file:
                  type: string
                  format: binary
              required: [passphrase, file]
      responses:
        "200":
          description: Import results with counts per category (returns HTML summary when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                required: [settings, connections, platform_profiles, webhooks, provider_keys, priorities, rules, scraper_configs, user_preferences]
                properties:
                  settings:
                    type: integer
                    description: Number of settings entries imported.
                  connections:
                    type: integer
                    description: Number of connections imported.
                  platform_profiles:
                    type: integer
                    description: Number of platform profiles imported.
                  webhooks:
                    type: integer
                    description: Number of webhooks imported.
                  provider_keys:
                    type: integer
                    description: Number of provider API keys imported.
                  priorities:
                    type: integer
                    description: Number of provider priority entries imported.
                  rules:
                    type: integer
                    description: Number of rule configurations imported.
                  scraper_configs:
                    type: integer
                    description: Number of scraper configuration scopes imported.
                  user_preferences:
                    type: integer
                    description: Number of user preference entries imported.
            text/html:
              schema:
                type: string
        "400":
          description: Invalid request or client-side import error (wrong passphrase / unsupported envelope version / corrupt envelope / malformed JSON)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File exceeds 10MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error while applying the import (decryption succeeded but persistence failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Settings import service not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/nfo-output:
