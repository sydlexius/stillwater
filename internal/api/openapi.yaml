openapi: 3.1.0
info:
  title: Stillwater API
  version: 0.25.0
  description: Artist metadata and image management for Emby, Jellyfin, and Kodi.
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html
servers:
  - url: http://localhost:1973/api/v1
    description: Local development
security:
  - cookieAuth: []
  - bearerAuth: []
  - apiKeyAuth: []
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
    bearerAuth:
      type: http
      scheme: bearer
      description: API token (sw_ prefix) via Authorization header
    apiKeyAuth:
      type: apiKey
      in: query
      name: apikey
      description: "Deprecated: prefer bearerAuth (Authorization header). Query-string tokens risk leakage via logs and referrers."
      x-deprecated: true
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        details:
          type: array
          items:
            type: string
          description: Validation error details. Present when validation fails, containing one or more error messages.
      required: [error]
    NFOFieldMap:
      type: object
      description: Configures how genre, style, and mood categories map to NFO XML elements for platform compatibility.
      properties:
        default_behavior:
          type: boolean
          description: When true, writes each category to its native element (Kodi-compatible passthrough). Ignores moods_as_styles and genre_sources, but advanced_remap still takes higher precedence when non-null.
        moods_as_styles:
          type: boolean
          description: When true, mood values are additionally written as style elements for Emby/Jellyfin Tag visibility.
        genre_sources:
          type: array
          items:
            type: string
            enum: [genres, styles, moods]
          description: Which source categories feed the genre XML element.
        advanced_remap:
          type: object
          nullable: true
          description: Full source-to-element mapping matrix. Overrides all other settings when non-null.
          properties:
            genre:
              type: array
              description: Source categories that feed the NFO genre element.
              items:
                type: string
                enum: [genres, styles, moods]
            style:
              type: array
              description: Source categories that feed the NFO style element.
              items:
                type: string
                enum: [genres, styles, moods]
            mood:
              type: array
              description: Source categories that feed the NFO mood element.
              items:
                type: string
                enum: [genres, styles, moods]
          additionalProperties: false
    Status:
      type: object
      properties:
        status:
          type: string
          description: Current status text.
    ConnectionResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique connection identifier.
        name:
          type: string
          description: User-assigned display name for this connection.
        type:
          type: string
          enum: [emby, jellyfin, lidarr]
          description: Platform type of the connection.
        url:
          type: string
          description: Base URL of the platform server.
        has_key:
          type: boolean
          description: Whether the connection has an API key configured.
        has_platform_user_id:
          type: boolean
          description: Whether the connection has a platform user ID configured for personalized metadata.
        enabled:
          type: boolean
          description: Whether the connection is active and will be used for operations.
        status:
          type: string
          description: Current connectivity state (e.g. connected, unreachable).
        status_message:
          type: string
          description: Human-readable detail about the connection status.
        last_checked_at:
          type: string
          format: date-time
          description: When the connection was last health-checked (UTC, RFC 3339).
        created_at:
          type: string
          format: date-time
          description: When the connection was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the connection was last modified (UTC, RFC 3339).
        feature_library_import:
          type: boolean
          description: Whether Stillwater imports libraries from this connection.
        feature_nfo_write:
          type: boolean
          description: Whether Stillwater writes NFO files to this connection.
        feature_image_write:
          type: boolean
          description: Whether Stillwater writes images to this connection.
        feature_metadata_push:
          type: boolean
          description: Whether Stillwater pushes metadata updates to this platform via API.
        feature_trigger_refresh:
          type: boolean
          description: Whether Stillwater asks the platform to refresh artist metadata after push.
        library_count:
          type: integer
          description: Number of libraries associated with this connection. Present in the single-connection detail response only, not in the list response.
        artist_count:
          type: integer
          description: Total number of artists across all libraries for this connection. Present in the single-connection detail response only, not in the list response.
    Webhook:
      type: object
      properties:
        id:
          type: string
          description: Unique webhook identifier.
        name:
          type: string
          description: User-assigned display name for this webhook.
        url:
          type: string
          description: Destination URL that receives webhook payloads.
        type:
          type: string
          description: Webhook delivery type.
        events:
          type: array
          description: Event types this webhook subscribes to.
          items:
            type: string
        enabled:
          type: boolean
          description: Whether this webhook is active and will fire on matching events.
        created_at:
          type: string
          format: date-time
          description: When the webhook was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the webhook was last modified (UTC, RFC 3339).
    IdentifyProgress:
      type: object
      properties:
        status:
          type: string
          enum: [idle, running, completed, canceled]
          description: Current state of the identification process.
        total:
          type: integer
          description: Total number of unidentified artists to process.
        processed:
          type: integer
          description: Number of artists processed so far.
        auto_linked:
          type: integer
          description: Artists automatically linked via connection or high-confidence match.
        queued:
          type: integer
          description: Artists added to the review queue for manual linking.
        unmatched:
          type: integer
          description: Artists with no matching candidates found.
        failed:
          type: integer
          description: Artists that failed during processing.
        current_name:
          type: string
          description: Name of the artist currently being processed.
        review_queue:
          type: array
          description: Artists requiring manual review and linking.
          items:
            $ref: "#/components/schemas/IdentifyCandidate"
    IdentifyCandidate:
      type: object
      properties:
        artist_id:
          type: string
          description: ID of the unidentified artist.
        artist_name:
          type: string
          description: Display name of the unidentified artist.
        artist_path:
          type: string
          description: Filesystem path to the artist directory.
        tier:
          type: string
          enum: [connection, album, name, wizard]
          description: >
            The pipeline tier that produced this candidate. The wizard
            value marks entries pushed onto the review queue by
            POST /artists/re-identify/wizard/{sid}/save-exit when the
            user ends a review session with undecided artists.
        candidates:
          type: array
          description: Ranked list of potential MusicBrainz matches.
          items:
            $ref: "#/components/schemas/ScoredCandidate"
    ScoredCandidate:
      type: object
      properties:
        provider_id:
          type: string
          description: Provider-specific identifier for this candidate.
        name:
          type: string
          description: Candidate artist name from the provider.
        sort_name:
          type: string
          description: Sort-friendly form of the candidate name.
        type:
          type: string
          description: Artist type (e.g. person, group).
        disambiguation:
          type: string
          description: Provider disambiguation comment to distinguish similar names.
        country:
          type: string
          description: ISO country code associated with the candidate.
        score:
          type: integer
          description: Provider match score (higher is better).
        musicbrainz_id:
          type: string
          description: MusicBrainz artist ID (MBID) for the candidate.
        source:
          type: string
          description: Provider that supplied this candidate.
        album_comparison:
          $ref: "#/components/schemas/AlbumComparison"
        confidence:
          type: number
          format: double
          description: Confidence score from 0.0 to 1.0.
        reason:
          type: string
          description: Human-readable reason for the confidence score.
    AlbumComparison:
      type: object
      description: Comparison of local and remote album catalogs for an artist match candidate.
      properties:
        matches:
          type: array
          description: Albums found in both local and remote catalogs.
          items:
            type: object
            properties:
              local_name:
                type: string
                description: Album name from the local library.
              remote_name:
                type: string
                description: Album name from the remote provider.
              matched:
                type: boolean
                description: Whether the local and remote names were considered a match.
        local_only:
          type: array
          description: Album names present locally but not found in the remote catalog.
          items:
            type: string
        remote_only:
          type: array
          description: Album names present remotely but not found in the local library.
          items:
            type: string
        match_count:
          type: integer
          description: Number of albums matched between local and remote.
        local_count:
          type: integer
          description: Total number of albums in the local library.
        remote_count:
          type: integer
          description: Total number of albums in the remote catalog.
        match_percent:
          type: integer
          description: Percentage of local albums matched (0-100).
    HealthSummary:
      type: object
      properties:
        score:
          type: number
          description: Overall health score from 0.0 (worst) to 1.0 (best).
        total_artists:
          type: integer
          description: Total number of tracked artists.
        compliant_artists:
          type: integer
          description: Number of artists with no open violations.
        missing_nfo:
          type: integer
          description: Number of artists missing an NFO file.
        missing_thumb:
          type: integer
          description: Number of artists missing a thumbnail image.
        missing_fanart:
          type: integer
          description: Number of artists missing fanart.
        missing_mbid:
          type: integer
          description: Number of artists missing a MusicBrainz ID.
        top_violations:
          type: array
          description: Most common violation types across all artists.
          items:
            type: object
            properties:
              rule_id:
                type: string
                description: Identifier of the rule.
              rule_name:
                type: string
                description: Display name of the rule.
              count:
                type: integer
                description: Number of open violations for this rule.
              severity:
                type: string
                description: Severity level of the rule (error, warning, info).
    BackupInfo:
      type: object
      properties:
        filename:
          type: string
          description: Name of the backup file.
        size:
          type: integer
          description: File size in bytes.
        created_at:
          type: string
          format: date-time
          description: When the backup was created (UTC, RFC 3339).
    RuleRunStatus:
      type: object
      properties:
        running:
          type: boolean
          description: Whether a rule evaluation is currently in progress.
        status:
          type: string
          enum: [idle, running, completed, failed]
          description: Current state of the rule run.
        scope:
          type: string
          enum: [incremental, all]
          description: >
            Which artists this run targeted. "incremental" (the default for
            the user-facing Run Rules button) re-evaluates only artists
            flagged dirty since their last evaluation. "all" forces a
            full sweep -- the "Re-evaluate All" admin escape hatch.
        rule_id:
          type: string
          description: >
            Present for single-rule runs: both the POST /rules/{id}/run 202
            acknowledgment and any GET /rules/run-all/status snapshot while a
            single-rule run is in flight. Omitted for full-sweep (run-all)
            responses.
        artists_processed:
          type: integer
          description: Number of artists actually evaluated during this run.
        artists_total:
          type: integer
          description: >
            Total number of eligible (non-excluded, non-locked) artists in
            the catalog at run start. Lets the UI render
            "evaluating N of M (M-N unchanged)" for incremental scope.
        artists_skipped:
          type: integer
          description: >
            Eligible artists not processed by this run because they were
            clean (rules_evaluated_at already covered their dirty_since).
            May be omitted when zero (the `omitempty` contract). When
            present, this counts skipped-because-clean artists for
            scope=incremental; for scope=all it is zero -- the field is
            only populated on incremental runs, so a partial failure on
            a full sweep is not misread as "unchanged".
        violations_found:
          type: integer
          description: Total number of violations detected during evaluation
        violations_auto_fixed:
          type: integer
          description: Number of violations that were automatically fixed
        violations_remaining:
          type: integer
          description: Number of active violations remaining, filtered by notification badge severity settings
        fixes_attempted:
          type: integer
          description: Number of automated fix attempts made.
        fixes_succeeded:
          type: integer
          description: Number of automated fixes that succeeded.
        started_at:
          type: string
          format: date-time
          description: When the rule run started (UTC, RFC 3339).
        completed_at:
          type: string
          format: date-time
          description: When the rule run finished (UTC, RFC 3339).
        error:
          type: string
          description: Error message if the run failed. Omitted on success.
    Library:
      type: object
      description: A media library that Stillwater monitors for artists.
      properties:
        id:
          type: string
          description: Unique library identifier.
        name:
          type: string
          description: User-assigned display name for this library.
        path:
          type: string
          description: Filesystem root path of the library.
        type:
          type: string
          enum: [regular, classical]
          description: Library classification.
        source:
          type: string
          enum: [manual, emby, jellyfin, lidarr]
          description: How the library was added to Stillwater.
        connection_id:
          type: string
          description: ID of the platform connection this library belongs to. Omitted for manual libraries.
        external_id:
          type: string
          description: Platform-specific library identifier. Omitted for manual libraries.
        fs_watch:
          type: integer
          description: Filesystem watch mode (0=disabled, 1=notify, 2=poll).
        fs_poll_interval:
          type: integer
          description: Polling interval in seconds when fs_watch is poll mode.
        shared_fs_status:
          type: string
          description: Shared-filesystem detection status. Empty string means unknown (not yet evaluated).
          enum: ["", "none", "suspected", "confirmed"]
        shared_fs_evidence:
          type: string
          description: JSON array of evidence strings describing how the shared-filesystem status was determined
        shared_fs_peer_library_ids:
          type: string
          description: Comma-separated IDs of peer libraries associated with the shared-filesystem evidence
        fs_notify_supported:
          type: boolean
          description: Whether the OS supports inotify/fsevents for this path.
        created_at:
          type: string
          format: date-time
          description: When the library was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the library was last modified (UTC, RFC 3339).
    SharedFilesystemStatus:
      type: object
      properties:
        has_overlaps:
          type: boolean
          description: True when shared-filesystem overlaps exist
        libraries:
          type: array
          description: Libraries involved in shared-filesystem overlaps.
          items:
            $ref: '#/components/schemas/SharedFilesystemEntry'
        dismissed:
          type: boolean
          description: True when the user has permanently dismissed the warning
        image_fetcher_warnings:
          type: array
          description: Platform image fetcher warnings. Present when shared-filesystem overlaps exist and either image fetchers are enabled or the fetcher check could not be completed.
          items:
            $ref: '#/components/schemas/ImageFetcherWarning'
    ImageFetcherWarning:
      type: object
      required: [risk_level, message]
      properties:
        platform:
          type: string
          description: Platform type, either "emby" or "jellyfin"
          enum: ["emby", "jellyfin"]
        library_name:
          type: string
          description: Name of the platform library with image fetchers enabled
        fetcher_names:
          type: array
          items:
            type: string
          description: Names of enabled image fetchers (e.g., "TheAudioDb", "FanArt")
        risk_level:
          type: string
          description: Risk level of the image fetcher conflict. "warn" for Emby (adds missing images only), "critical" for Jellyfin (can replace existing images and strip EXIF data).
          enum: ["warn", "critical"]
        message:
          type: string
          description: Human-readable warning message describing the risk and recommended action
    SharedFilesystemEntry:
      type: object
      properties:
        library_id:
          type: string
          description: ID of the library.
        library_name:
          type: string
          description: Display name of the library.
        path:
          type: string
          description: Root filesystem path of the library.
        overlap_with:
          type: string
          description: ID of the library that shares the same path or parent.
    SharedFilesystemRecheckResult:
      type: object
      properties:
        shared_libraries:
          type: integer
          description: Current count of libraries whose shared-filesystem status is set by evidence
    FilesystemBrowseResult:
      type: object
      required: [path, entries, parent]
      properties:
        path:
          type: string
          description: The resolved absolute path that was listed.
        entries:
          type: array
          items:
            type: string
          description: Names of direct subdirectories within path, sorted case-insensitively. Hidden directories are excluded.
        parent:
          type: string
          description: Parent directory of path. Empty string when path is the filesystem root.
    LibraryOpResult:
      type: object
      properties:
        library_id:
          type: string
          description: ID of the library the operation ran on.
        library_name:
          type: string
          description: Display name of the library.
        operation:
          type: string
          enum: [populate, scan]
          description: Type of library operation.
        status:
          type: string
          enum: [running, completed, failed]
          description: Current state of the operation.
        message:
          type: string
          description: Human-readable result or error message.
        started_at:
          type: string
          format: date-time
          description: When the operation started (UTC, RFC 3339).
        completed_at:
          type: string
          format: date-time
          description: When the operation finished (UTC, RFC 3339).
    APIToken:
      type: object
      properties:
        id:
          type: string
          description: Unique token identifier.
        name:
          type: string
          description: User-assigned display name for this token.
        scopes:
          type: string
          description: Comma-separated permission scopes granted to this token.
        user_id:
          type: string
          description: ID of the user who owns this token.
        status:
          type: string
          enum: [active, revoked]
          description: "Token lifecycle state: active or revoked"
        created_at:
          type: string
          format: date-time
          description: When the token was created (UTC, RFC 3339).
        last_used_at:
          type: string
          format: date-time
          description: When the token was last used for authentication (UTC, RFC 3339).
        revoked_at:
          type: string
          format: date-time
          description: When the token was revoked (UTC, RFC 3339). Omitted if active.
    Violation:
      type: object
      properties:
        id:
          type: string
          description: Unique violation identifier.
        rule_id:
          type: string
          description: ID of the rule that generated this violation.
        artist_id:
          type: string
          description: ID of the artist this violation applies to.
        artist_name:
          type: string
          description: Display name of the artist.
        library_name:
          type: string
          description: Name of the library the artist belongs to. Empty if unknown.
        severity:
          type: string
          enum: [error, warning, info]
          description: Violation severity level.
        message:
          type: string
          description: Human-readable description of the violation.
        fixable:
          type: boolean
          description: Whether this violation can be automatically fixed.
        status:
          type: string
          enum: [open, dismissed, resolved, pending_choice]
          description: Current lifecycle state of the violation.
        candidates:
          type: array
          description: Fix candidates for image violations. Omitted for non-image rules.
          items:
            type: object
            properties:
              url:
                type: string
                description: Source URL of the candidate image.
              width:
                type: integer
                description: Image width in pixels.
              height:
                type: integer
                description: Image height in pixels.
              source:
                type: string
                description: Provider that supplied this candidate.
              image_type:
                type: string
                description: Type of image (e.g. thumb, fanart, logo, banner).
        dismissed_at:
          type: string
          format: date-time
          description: When the violation was dismissed (UTC, RFC 3339). Omitted if not dismissed.
        resolved_at:
          type: string
          format: date-time
          description: When the violation was resolved (UTC, RFC 3339). Omitted if not resolved.
        created_at:
          type: string
          format: date-time
          description: When the violation was first detected (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the violation was last updated (UTC, RFC 3339).
    LogFileInfo:
      type: object
      description: Metadata for a log file available for browsing in the log viewer.
      properties:
        name:
          type: string
          description: Filename (no path components)
        size:
          type: integer
          format: int64
          description: File size in bytes
        mod_time:
          type: string
          format: date-time
          description: Last modified time of the file
        is_current:
          type: boolean
          description: True when this is the actively written log file
      required:
        - name
        - size
        - mod_time
        - is_current
    LogEntry:
      type: object
      description: A single log record captured by the in-memory ring buffer.
      properties:
        time:
          type: string
          format: date-time
          description: Timestamp of the log entry
        level:
          type: string
          enum: [trace, debug, info, warn, error]
          description: Severity level
        message:
          type: string
          description: Log message text
        component:
          type: string
          description: Component that emitted the log entry (e.g. scanner, provider, api). Omitted when not set.
        attrs:
          type: object
          additionalProperties: true
          description: Additional structured attributes from the log record
      required:
        - time
        - level
        - message
    LoggingConfig:
      type: object
      properties:
        level:
          type: string
          enum: [trace, debug, info, warn, error]
          description: Minimum log severity to emit.
        format:
          type: string
          enum: [text, json]
          description: Log output format.
        file_path:
          type: string
          description: Path to the log file on disk.
        file_max_size_mb:
          type: integer
          description: Maximum log file size in megabytes before rotation.
        file_max_files:
          type: integer
          description: Maximum number of rotated log files to retain.
        file_max_age_days:
          type: integer
          description: Maximum age in days before a rotated log file is deleted.
    MaintenanceStatus:
      type: object
      properties:
        db_file_size:
          type: integer
          format: int64
          description: Size of the main database file in bytes.
        wal_file_size:
          type: integer
          format: int64
          description: Size of the WAL (write-ahead log) file in bytes.
        page_count:
          type: integer
          format: int64
          description: Total number of pages in the database.
        page_size:
          type: integer
          format: int64
          description: Database page size in bytes.
        last_optimize_at:
          type: string
          format: date-time
          description: When the database was last optimized (UTC, RFC 3339).
        schedule_enabled:
          type: boolean
          description: Whether automatic maintenance is enabled.
        schedule_interval_hours:
          type: integer
          description: Hours between automatic maintenance runs.
    PlatformBackdropConnection:
      type: object
      properties:
        connection_id:
          type: string
          description: ID of the platform connection.
        connection_name:
          type: string
          description: Display name of the platform connection.
        connection_type:
          type: string
          enum: [emby, jellyfin]
          description: Platform type of the connection.
        backdrops:
          type: array
          description: Backdrop images available on this connection.
          items:
            $ref: "#/components/schemas/PlatformBackdropItem"
    PlatformBackdropItem:
      type: object
      properties:
        index:
          type: integer
          description: 0-based index of the backdrop on the platform
        thumbnail_url:
          type: string
          description: Proxy URL to fetch the backdrop thumbnail through Stillwater
    FanartSyncSlotConnection:
      type: object
      properties:
        connection_id:
          type: string
          description: ID of the platform connection.
        name:
          type: string
          description: Display name of the connection
        type:
          type: string
          enum: [emby, jellyfin]
          description: Platform type of the connection.
        synced:
          type: boolean
          description: Whether the platform has a backdrop at this index
    FanartSyncSlot:
      type: object
      properties:
        index:
          type: integer
          description: 0-based fanart slot index
        state:
          type: string
          enum: [synced, partial, unsynced]
          description: Aggregate sync state across all reachable connections
        connections:
          type: array
          description: Per-connection sync status for this fanart slot.
          items:
            $ref: "#/components/schemas/FanartSyncSlotConnection"
    MetadataChange:
      type: object
      description: A single field-level metadata change recorded for an artist.
      properties:
        id:
          type: string
          description: Unique change record ID (UUID).
        artist_id:
          type: string
          description: ID of the artist this change belongs to.
        field:
          type: string
          description: The metadata field that changed (e.g. "biography", "genres", "thumb").
        old_value:
          type: string
          description: The previous value. Empty string when the field was previously unset.
        new_value:
          type: string
          description: The new value. Empty string when the field was cleared.
        source:
          type: string
          description: >
            Origin of the change. One of "manual", "scan", "import",
            "revert", "provider:<name>" (e.g. "provider:musicbrainz"),
            or "rule:<rule_id>" (e.g. "rule:missing_mbid").
        created_at:
          type: string
          format: date-time
          description: Timestamp when the change was recorded (UTC, RFC 3339).
      required: [id, artist_id, field, old_value, new_value, source, created_at]
    Artist:
      type: object
      description: A music artist or group with full metadata.
      properties:
        id:
          type: string
          description: Unique artist identifier.
        name:
          type: string
          description: Primary display name of the artist.
        sort_name:
          type: string
          description: Name used for alphabetical sorting.
        type:
          type: string
          description: Artist type, e.g. "person" or "group".
        gender:
          type: string
          description: Gender of the artist (e.g. male, female, other). Empty when unknown.
        disambiguation:
          type: string
          description: Text to distinguish similarly named artists.
        musicbrainz_id:
          type: string
          description: MusicBrainz artist ID (MBID).
        audiodb_id:
          type: string
          description: TheAudioDB artist ID.
        discogs_id:
          type: string
          description: Discogs artist ID.
        wikidata_id:
          type: string
          description: Wikidata entity ID.
        deezer_id:
          type: string
          description: Deezer artist ID.
        spotify_id:
          type: string
          description: Spotify artist ID.
        genres:
          type:
            - array
            - "null"
          items:
            type: string
          description: Genre tags associated with the artist.
        styles:
          type:
            - array
            - "null"
          items:
            type: string
          description: Style tags associated with the artist.
        moods:
          type:
            - array
            - "null"
          items:
            type: string
          description: Mood tags associated with the artist.
        years_active:
          type: string
          description: Period(s) the artist was active (e.g. 1990-2005).
        born:
          type: string
          description: Birth date or year for a person artist.
        formed:
          type: string
          description: Formation date or year for a group.
        died:
          type: string
          description: Death date or year for a person artist.
        disbanded:
          type: string
          description: Disbandment date or year for a group.
        biography:
          type: string
          description: Biographical text for the artist.
        path:
          type: string
          description: Filesystem path to the artist directory. Empty for pathless (platform-only) artists.
        library_id:
          type: string
          description: ID of the library this artist belongs to.
        nfo_exists:
          type: boolean
          description: Whether an NFO file exists on disk for this artist.
        thumb_exists:
          type: boolean
          description: Whether a thumbnail image exists for this artist.
        fanart_exists:
          type: boolean
          description: Whether at least one fanart image exists for this artist.
        fanart_count:
          type: integer
          description: Number of fanart images on disk for this artist.
        logo_exists:
          type: boolean
          description: Whether a logo image exists for this artist.
        banner_exists:
          type: boolean
          description: Whether a banner image exists for this artist.
        thumb_low_res:
          type: boolean
          description: Whether the thumbnail is below the minimum resolution threshold.
        fanart_low_res:
          type: boolean
          description: Whether the primary fanart is below the minimum resolution threshold.
        logo_low_res:
          type: boolean
          description: Whether the logo is below the minimum resolution threshold.
        banner_low_res:
          type: boolean
          description: Whether the banner is below the minimum resolution threshold.
        thumb_placeholder:
          type: string
          description: Base64-encoded placeholder for the thumb image. Omitted when not set.
        fanart_placeholder:
          type: string
          description: Base64-encoded placeholder for the fanart image. Omitted when not set.
        logo_placeholder:
          type: string
          description: Base64-encoded placeholder for the logo image. Omitted when not set.
        banner_placeholder:
          type: string
          description: Base64-encoded placeholder for the banner image. Omitted when not set.
        health_score:
          type: number
          format: double
          description: Metadata completeness score from 0.0 (worst) to 1.0 (best).
        is_excluded:
          type: boolean
          description: Whether the artist is excluded from rules and automated operations.
        exclusion_reason:
          type: string
          description: Reason the artist is excluded from rules and metadata operations. Omitted when not excluded.
        is_classical:
          type: boolean
          description: Whether the artist is classified as classical.
        locked:
          type: boolean
          description: When true, automated operations will not modify this artist.
        lock_source:
          type: string
          description: Source that applied the lock (e.g. "user"). Omitted when not locked.
        locked_at:
          type: string
          format: date-time
          description: Timestamp when the lock was applied. Omitted when not locked.
        locked_fields:
          type: array
          uniqueItems: true
          items:
            type: string
          description: Lowercased field names locked at the field level. Values are deduplicated. Independent of the whole-artist lock. Round-trips to Emby's LockedFields.
        audiodb_id_fetched_at:
          type: string
          format: date-time
          description: When the AudioDB ID was last fetched. Omitted when never fetched.
        discogs_id_fetched_at:
          type: string
          format: date-time
          description: When the Discogs ID was last fetched. Omitted when never fetched.
        wikidata_id_fetched_at:
          type: string
          format: date-time
          description: When the Wikidata ID was last fetched. Omitted when never fetched.
        lastfm_fetched_at:
          type: string
          format: date-time
          description: When Last.fm metadata was last fetched. Omitted when never fetched.
        metadata_sources:
          type: object
          additionalProperties:
            type: string
          description: Map of field name to provider name indicating which provider supplied each field. Omitted when empty.
        last_scanned_at:
          type: string
          format: date-time
          description: When the artist directory was last scanned. Omitted when never scanned.
        created_at:
          type: string
          format: date-time
          description: When the artist record was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When the artist record was last modified (UTC, RFC 3339).
      required:
        - id
        - name
        - sort_name
        - type
        - gender
        - disambiguation
        - musicbrainz_id
        - audiodb_id
        - discogs_id
        - wikidata_id
        - deezer_id
        - spotify_id
        - genres
        - styles
        - moods
        - years_active
        - born
        - formed
        - died
        - disbanded
        - biography
        - path
        - library_id
        - nfo_exists
        - thumb_exists
        - fanart_exists
        - fanart_count
        - logo_exists
        - banner_exists
        - thumb_low_res
        - fanart_low_res
        - logo_low_res
        - banner_low_res
        - health_score
        - is_excluded
        - is_classical
        - locked
        - created_at
        - updated_at
    BandMember:
      type: object
      description: A member of a band or group.
      properties:
        id:
          type: string
          description: Unique band member record identifier.
        artist_id:
          type: string
          description: ID of the parent artist (band/group).
        member_name:
          type: string
          description: Display name of the band member.
        member_mbid:
          type: string
          description: MusicBrainz ID for this member. Omitted when not set.
        instruments:
          type:
            - array
            - "null"
          items:
            type: string
          description: Instruments played by this member. Null when unknown.
        vocal_type:
          type: string
          description: Vocal range or type (e.g. "tenor"). Omitted when not set.
        date_joined:
          type: string
          description: Year or date the member joined the group. Omitted when unknown.
        date_left:
          type: string
          description: Year or date the member left the group. Omitted for current members.
        is_original_member:
          type: boolean
          description: Whether this member was part of the original lineup.
        sort_order:
          type: integer
          description: Display order of this member relative to others in the band.
        created_at:
          type: string
          format: date-time
          description: When this record was created (UTC, RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: When this record was last modified (UTC, RFC 3339).
      required:
        - id
        - artist_id
        - member_name
        - instruments
        - is_original_member
        - sort_order
        - created_at
        - updated_at
    CacheStats:
      type: object
      required: [size_bytes, file_count, artist_count]
      properties:
        size_bytes:
          type: integer
          format: int64
          description: Total size of the image cache in bytes.
        file_count:
          type: integer
          description: Number of files in the image cache.
        artist_count:
          type: integer
          description: Number of unique artist directories in the cache.
    CacheClearResult:
      type: object
      required: [files_deleted, bytes_freed]
      properties:
        files_deleted:
          type: integer
          description: Number of files removed from the cache.
        bytes_freed:
          type: integer
          format: int64
          description: Total bytes freed by the clear operation.
    UpdateCheckResult:
      type: object
      required: [current, channel, update_available]
      properties:
        current:
          type: string
          description: Running binary version.
          example: "v0.9.6"
        latest:
          type: string
          description: >-
            Latest version available on the configured channel. Empty when the
            current channel has no matching release (e.g. after switching from
            a channel with available builds to one without).
          example: "v1.0.0"
        channel:
          type: string
          enum: [stable, prerelease]
          description: Release channel used for this check.
        update_available:
          type: boolean
          description: True when latest is strictly newer than current.
        release_url:
          type: string
          description: >-
            URL to the GitHub release page for the latest version. Empty/omitted
            when the check found no matching release on the current channel.
        published_at:
          type: string
          format: date-time
          description: >-
            Publication timestamp of the latest release (RFC 3339). Empty/omitted
            when the check found no matching release on the current channel.
    UpdateStatus:
      type: object
      required: [state, progress, is_docker, update_available]
      properties:
        state:
          type: string
          enum: [idle, checking, downloading, applying, error]
          description: Current phase of the update lifecycle.
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Approximate completion percentage (0-100).
        error:
          type: string
          description: Error message when state is "error". Omitted otherwise.
        last_checked:
          type: string
          format: date-time
          description: RFC 3339 timestamp of the most recent check. Absent if never checked.
        is_docker:
          type: boolean
          description: True when running inside a Docker container. Apply is unsupported in this case.
        update_available:
          type: boolean
          description: True when the most recent check found a newer version on the configured channel.
        latest:
          type: string
          description: >-
            Tag name of the latest matching release. Empty when no check has
            succeeded yet OR when the most recent successful check found no
            matching release on the current channel (e.g. after a channel switch).
        release_url:
          type: string
          description: >-
            URL to the GitHub release page for the latest version. Absent when no
            check has succeeded yet OR when the most recent successful check
            found no matching release on the current channel.
    UpdateConfig:
      type: object
      required: [channel, auto_check]
      properties:
        channel:
          type: string
          enum: [stable, prerelease]
          description: >-
            Release channel to track. "stable" follows non-prerelease semver tags;
            "prerelease" also includes release candidates and beta builds.
        auto_check:
          type: boolean
          description: When true, the updater periodically checks for new releases in the background.

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                    description: Health check result (e.g. ok).
                  version:
                    type: string
                    description: Application version string.
                  commit:
                    type: string
                    description: Git commit SHA of the running build.
                  time:
                    type: string
                    format: date-time
                    description: Current server time (UTC, RFC 3339).

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates a user and sets a session cookie. Behavior depends on the
        instance-level auth.method setting: for "local", validates against the
        local user database; for "emby" or "jellyfin", authenticates against
        the configured media server via its AuthenticateByName API.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        "200":
          description: Login successful, session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Media server unreachable (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/oidc/login:
    get:
      tags: [Auth]
      summary: Initiate OIDC login
      description: |
        Initiates the OpenID Connect authorization code flow with PKCE.
        Generates state, nonce, and code verifier parameters, stores them in
        HTTP-only cookies, and redirects the user to the configured identity
        provider's authorization endpoint. The IdP will redirect back to the
        callback endpoint after authentication.
      security: []
      operationId: oidcLogin
      responses:
        "302":
          description: Redirect to identity provider authorization endpoint
        "404":
          description: OIDC provider is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error generating security parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC callback
      description: |
        Handles the identity provider's redirect after authentication. Validates
        the state parameter against the stored cookie, exchanges the authorization
        code for tokens using PKCE, verifies the ID token and nonce, then runs the
        standard login/provisioning flow (user lookup, auto-provision if enabled,
        session creation). On success, sets a session cookie and redirects to the
        application root.
      security: []
      operationId: oidcCallback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from the identity provider
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State parameter for CSRF validation
        - name: error
          in: query
          schema:
            type: string
          description: Error code returned by the identity provider (e.g. access_denied)
        - name: error_description
          in: query
          schema:
            type: string
          description: Human-readable error description from the identity provider
      responses:
        "302":
          description: |
            Redirect to the application root on success (with session cookie set),
            or redirect to the login page with an error query parameter on failure.
            All outcomes use browser redirects since this endpoint is hit via a
            full-page navigation from the identity provider, not an HTMX request.

  /auth/setup:
    post:
      tags: [Auth]
      summary: Create initial admin account
      description: |
        Creates the initial administrator account during first-time setup.
        Supports three auth methods: "local" creates a username/password account,
        "emby" or "jellyfin" authenticates against a media server and auto-creates
        the first server connection.
      security: []
      operationId: setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auth_method:
                  type: string
                  enum: [local, emby, jellyfin]
                  default: local
                  description: Authentication method for this instance
                username:
                  type: string
                password:
                  type: string
                  description: Must be at least 8 characters for local auth
                server_url:
                  type: string
                  format: uri
                  description: Media server URL, required when auth_method is emby or jellyfin
              required: [username, password]
      responses:
        "201":
          description: Admin account created (and auto-logged in for federated auth)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "403":
          description: Media server user is not an administrator (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Admin account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Media server unreachable (federated auth only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      operationId: logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getMe
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    description: Unique identifier of the authenticated user.
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/tokens:
    post:
      tags: [Auth]
      summary: Create API token
      operationId: createAPIToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                scopes:
                  type: string
                  description: Comma-separated scopes (default "read")
                  default: read
              required: [name]
      responses:
        "201":
          description: Token created (plaintext token returned only once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Unique identifier for the newly created token.
                  token:
                    type: string
                    description: Plaintext API token value. Only returned once at creation.
                  name:
                    type: string
                    description: User-assigned display name for this token.
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Auth]
      summary: List API tokens
      operationId: listAPITokens
      responses:
        "200":
          description: List of API tokens (no plaintext values).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIToken"

  /auth/tokens/{id}:
    delete:
      tags: [Auth]
      summary: Revoke API token
      operationId: revokeAPIToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/tokens/{id}/permanent:
    delete:
      tags: [Auth]
      summary: Permanently delete a token
      operationId: deleteAPIToken
      description: Permanently removes a revoked token. Anonymizes associated audit log entries. Cannot delete active tokens.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Token permanently deleted
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Token is still active and must be revoked first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists:
    get:
      tags: [Artists]
      summary: List artists
      operationId: listArtists
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
        - name: sort
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
        - name: filter_missing_meta
          in: query
          description: Include (+y) or exclude (-y) artists with missing metadata
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_missing_images
          in: query
          description: Include (+y) or exclude (-y) artists with missing images
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_missing_mbid
          in: query
          description: Include (+y) or exclude (-y) artists with no MusicBrainz ID
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_excluded
          in: query
          description: Include (+y) or exclude (-y) artists marked as excluded
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_locked
          in: query
          description: Include (+y) or exclude (-y) artists that are locked
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_type_person
          in: query
          description: Include (+y) or exclude (-y) artists of type "person"
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_type_group
          in: query
          description: Include (+y) or exclude (-y) artists of type "group"
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: filter_type_orchestra
          in: query
          description: Include (+y) or exclude (-y) artists of type "orchestra"
          schema:
            type: string
            enum: ["+y", "-y"]
        - name: library_id
          in: query
          description: Filter artists by library ID
          schema:
            type: string
        - name: "filter_library_{id}"
          in: query
          description: >-
            Per-library include/exclude filter. Replace {id} with a library ID.
            Use +y to include only artists from that library, -y to exclude them.
            Multiple filter_library_{id} params may be combined.
          schema:
            type: string
            enum: ["+y", "-y"]
      responses:
        "200":
          description: Paginated artist list
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: array
                    items:
                      $ref: "#/components/schemas/Artist"
                    description: List of artist records.
                  total:
                    type: integer
                    description: Total number of matching records.
                  page:
                    type: integer
                    description: Current page number (1-based).
                  page_size:
                    type: integer
                    description: Number of records per page.

  /artists/badge:
    get:
      tags: [Artists]
      summary: Get artist count badge HTML fragment
      operationId: getArtistsBadge
      description: >-
        Returns an HTML fragment containing the total artist count, used by
        the sidebar badge. Lightweight endpoint that fetches only the count.
      responses:
        "200":
          description: HTML fragment with artist count
          content:
            text/html:
              schema:
                type: string
        "500":
          description: Service error
          content:
            text/html:
              schema:
                type: string

  /artists/duplicates:
    get:
      tags: [Artists]
      summary: Find duplicate artists
      operationId: getDuplicates
      responses:
        "200":
          description: List of duplicate groups
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    artists:
                      type: array
                      items:
                        $ref: "#/components/schemas/Artist"
                      description: Artists in this duplicate group.
                    reason:
                      type: string
                      description: >-
                        Human-readable explanation of why these artists are considered
                        duplicates (e.g. "shared MusicBrainz ID: abc123",
                        "shared alias: The Beatles").

  /artists/locked:
    get:
      tags: [Artists]
      summary: List locked artists
      operationId: listLockedArtists
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
        - name: sort
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Paginated list of locked artists
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: array
                    items:
                      $ref: "#/components/schemas/Artist"
                    description: List of locked artist records.
                  total:
                    type: integer
                    description: Total number of matching records.
                  page:
                    type: integer
                    description: Current page number (1-based).
                  page_size:
                    type: integer
                    description: Number of records per page.

  /artists/{id}/lock:
    post:
      tags: [Artists]
      summary: Lock an artist
      description: Prevents automated operations (rule fixers, metadata fetchers, image operations) from modifying this artist. Manual edits remain allowed.
      operationId: lockArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full Artist object with lock state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Artist is already locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Artists]
      summary: Unlock an artist
      description: Removes the metadata lock, allowing automated operations to modify this artist again.
      operationId: unlockArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full Artist object with lock state cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Artist is not locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/field-locks/{field}:
    post:
      tags: [Artists]
      summary: Lock a single metadata field
      description: |
        Adds the named field to the artist's locked-field set. This is persisted
        state that Stillwater mirrors to Emby's LockedFields via the connection
        sync path. Refresh-cycle enforcement (skipping locked fields on rewrite)
        is implemented per-rule at the refresh layer and is not guaranteed by
        this endpoint in isolation.
      operationId: lockArtistField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full Artist object with updated locked_fields list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Artists]
      summary: Unlock a single metadata field
      operationId: unlockArtistField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full Artist object with updated locked_fields list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/image-locks/{imageId}:
    post:
      tags: [Artists]
      summary: Lock a single artist image slot
      description: |
        Sets the locked flag on the matching artist_images row. This is
        persisted state. Whether a given refresh/rewrite path honours the flag
        is implemented per-publisher and is not guaranteed by this endpoint in
        isolation. The imageId must belong to the artist identified by the
        path id.
      operationId: lockArtistImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: imageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated image list for the artist
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
        "404":
          description: Image or artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Artists]
      summary: Unlock a single artist image slot
      operationId: unlockArtistImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: imageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated image list for the artist
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
        "404":
          description: Image or artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}:
    get:
      tags: [Artists]
      summary: Get artist details
      operationId: getArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artist with band members
          content:
            application/json:
              schema:
                type: object
                properties:
                  artist:
                    $ref: "#/components/schemas/Artist"
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/BandMember"
                    description: Band members associated with this artist.
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/health:
    get:
      tags: [Artists, Rules]
      summary: Evaluate artist health
      operationId: evaluateArtistHealth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Health evaluation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  artist_id:
                    type: string
                    description: ID of the artist.
                  artist_name:
                    type: string
                    description: Display name of the artist.
                  violations:
                    type: array
                    items:
                      type: object
                    description: List of active violations for this artist.
                  rules_passed:
                    type: integer
                    description: Number of rules the artist passes.
                  rules_total:
                    type: integer
                    description: Total number of applicable rules.
                  health_score:
                    type: number
                    description: Health score from 0.0 (worst) to 1.0 (best).
                  warning:
                    type: string
                    description: Present when the health score was computed but failed to persist.
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/history:
    get:
      tags: [History]
      summary: List artist metadata change history
      operationId: listArtistHistory
      description: >
        Returns paginated metadata change records for an artist, ordered by
        most recent first. Records are written by integration hooks in Phase 2;
        the table exists from Phase 1 onwards.
      parameters:
        - name: id
          in: path
          required: true
          description: Artist ID.
          schema:
            type: string
        - name: limit
          in: query
          description: >
            Maximum number of records to return (10-500). Defaults to the
            caller's page_size preference when omitted.
          schema:
            type: integer
            minimum: 10
            maximum: 500
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of metadata changes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  changes:
                    type: array
                    items:
                      $ref: "#/components/schemas/MetadataChange"
                    description: List of metadata change records.
                  total:
                    type: integer
                    description: Total number of change records for this artist across all pages.
                  limit:
                    type: integer
                    description: The limit value used for this request.
                  offset:
                    type: integer
                    description: The offset value used for this request.
                required: [changes, total, limit, offset]
        "404":
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/aliases:
    get:
      tags: [Aliases]
      summary: List artist aliases
      operationId: listAliases
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of aliases
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Unique identifier.
                    alias:
                      type: string
                      description: Alternative name for the artist.
                    source:
                      type: string
                      description: Origin of this alias (e.g. musicbrainz, manual).
    post:
      tags: [Aliases]
      summary: Add alias to artist
      operationId: addAlias
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  type: string
                source:
                  type: string
              required: [alias]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                alias:
                  type: string
                source:
                  type: string
              required: [alias]
      responses:
        "201":
          description: Alias created
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Validation error (e.g. alias is required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/aliases/{aliasId}:
    delete:
      tags: [Aliases]
      summary: Remove alias
      operationId: removeAlias
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: aliasId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alias deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/{id}/images/upload:
    post:
      tags: [Images]
      summary: Upload image file
      operationId: uploadImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: skip_crop
          in: query
          schema:
            type: string
            enum: ["true"]
          description: >
            When set to "true", skip geometry checking and save the image even
            if the aspect ratio does not match the slot requirement.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [file, type]
      responses:
        "200":
          description: Image saved, or needs_crop when the aspect ratio does not match the slot requirement
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: '"ok" when saved successfully, "needs_crop" when the image requires cropping before saving.'
                  saved:
                    type: array
                    items:
                      type: string
                    description: Filenames of images saved to disk.
                  type:
                    type: string
                    description: Image type (e.g. thumb, fanart, logo, banner).
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
                  count:
                    type: integer
                    description: Total number of fanart images now on disk for this artist. Present only when type is fanart.
                  needs_crop:
                    type: boolean
                    description: True when the uploaded image aspect ratio does not match the target slot. The image is not saved; the client should present a crop UI.
                  required_ratio:
                    type: number
                    description: The aspect ratio (width/height) required by the target slot. Present only when needs_crop is true.
                  actual_ratio:
                    type: number
                    description: The actual aspect ratio of the uploaded image. Present only when needs_crop is true.
                  width:
                    type: integer
                    description: Width of the uploaded image in pixels. Present only when needs_crop is true.
                  height:
                    type: integer
                    description: Height of the uploaded image in pixels. Present only when needs_crop is true.
                  image_data:
                    type: string
                    description: Base64-encoded data URI of the uploaded image. Present only when needs_crop is true, for use in a client-side crop tool.
        "413":
          description: File exceeds 25MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fetch:
    post:
      tags: [Images]
      summary: Fetch image from URL
      operationId: fetchImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: skip_crop
          in: query
          schema:
            type: string
            enum: ["true"]
          description: >
            When set to "true", skip geometry checking and save the image even
            if the aspect ratio does not match the slot requirement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, type]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                url:
                  type: string
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, type]
      responses:
        "200":
          description: Image fetched and saved, or needs_crop when the aspect ratio does not match the slot requirement
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: '"ok" when saved successfully, "needs_crop" when the image requires cropping before saving.'
                  saved:
                    type: array
                    items:
                      type: string
                    description: Filenames of images saved to disk.
                  type:
                    type: string
                    description: Image type (e.g. thumb, fanart, logo, banner).
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
                  count:
                    type: integer
                    description: Total number of fanart images now on disk for this artist. Present only when type is fanart.
                  needs_crop:
                    type: boolean
                    description: True when the fetched image aspect ratio does not match the target slot. The image is not saved; the client should present a crop UI.
                  required_ratio:
                    type: number
                    description: The aspect ratio (width/height) required by the target slot. Present only when needs_crop is true.
                  actual_ratio:
                    type: number
                    description: The actual aspect ratio of the fetched image. Present only when needs_crop is true.
                  width:
                    type: integer
                    description: Width of the fetched image in pixels. Present only when needs_crop is true.
                  height:
                    type: integer
                    description: Height of the fetched image in pixels. Present only when needs_crop is true.
                  image_data:
                    type: string
                    description: Base64-encoded data URI of the fetched image. Present only when needs_crop is true, for use in a client-side crop tool.

  /artists/{id}/images/search:
    get:
      tags: [Images]
      summary: Search providers for images
      operationId: searchImages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
        - name: sort
          in: query
          description: Sort order for results. Defaults to likes descending.
          schema:
            type: string
            enum: [likes, resolution]
            default: likes
      responses:
        "200":
          description: Image search results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                    description: List of available images from providers.
                  errors:
                    type: array
                    items:
                      type: string
                    description: Errors encountered during the image search.
            text/html:
              schema:
                type: string

  /artists/{id}/images/crop:
    post:
      tags: [Images]
      summary: Crop and save image
      operationId: cropImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                image_data:
                  type: string
                  description: Base64-encoded image data
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
                x:
                  type: integer
                y:
                  type: integer
                width:
                  type: integer
                height:
                  type: integer
              required: [image_data, type]
      responses:
        "200":
          description: Image cropped and saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the crop operation.
                  saved:
                    type: array
                    items:
                      type: string
                    description: Filenames of images saved to disk.
                  type:
                    type: string
                    description: Image type (e.g. thumb, fanart, logo, banner).
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.

  /artists/{id}/nfo/diff:
    get:
      tags: [NFO]
      summary: Get NFO field-level diff
      description: >
        For pathless artists (no filesystem path), returns a virtual NFO
        generated from database fields instead of reading from disk.
      operationId: getNFODiff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: NFO diff result (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
            text/html:
              schema:
                type: string

  /artists/{id}/nfo/conflict:
    get:
      tags: [NFO]
      summary: Check for external NFO modifications
      description: >
        For pathless artists, always returns no conflict since there is
        no on-disk NFO file to be modified externally.
      operationId: checkNFOConflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conflict check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_conflict:
                    type: boolean
                    description: Whether an NFO conflict was detected.
                  reason:
                    type: string
                    description: Explanation of the conflict.
                  external_writer:
                    type: string
                    description: Name of the external tool that wrote the NFO.
                  last_modified:
                    type: string
                    format: date-time
                    description: Present when the NFO file exists and is accessible; contains the file's last-modified timestamp regardless of conflict status. Omitted when the file does not exist or cannot be accessed (pathless artists, missing file, or filesystem errors).

  /history/{id}/revert:
    post:
      tags: [History]
      summary: Revert a metadata change
      operationId: revertHistory
      description: >
        Restores the old value from a metadata_changes record back to the
        artist field. Creates a new history entry with source "revert".
      parameters:
        - name: id
          in: path
          required: true
          description: Metadata change record ID.
          schema:
            type: string
      responses:
        "200":
          description: Change reverted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reverted:
                    type: boolean
                    description: Whether the change was successfully reverted.
                  change_id:
                    type: string
                    description: ID of the reverted change record.
                required: [reverted, change_id]
            text/html:
              schema:
                type: string
                description: >
                  When the request includes an HX-Request header, returns an HTML
                  fragment instead of JSON. Depending on where the request
                  originated, this may be an activity-card fragment, an
                  artist-history row fragment, or a fallback confirmation block
                  if the new history record cannot be located.
        "400":
          description: Field is not revertible, or change source is "revert".
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Change not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: History service is not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /history:
    get:
      tags: [History]
      summary: List global metadata change history
      operationId: listGlobalHistory
      description: >
        Returns paginated metadata change records across all artists,
        ordered by most recent first.
      parameters:
        - name: limit
          in: query
          description: >
            Maximum number of records to return (10-500). Defaults to the
            caller's page_size preference when omitted.
          schema:
            type: integer
            minimum: 10
            maximum: 500
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: artist_id
          in: query
          description: Filter to a single artist.
          schema:
            type: string
        - name: field
          in: query
          description: >
            Filter by field name. Repeat the parameter to include multiple
            fields (e.g. ?field=biography&field=genres).
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: source
          in: query
          description: >
            Filter by change source. Repeat the parameter to include multiple
            sources (e.g. ?source=manual&source=scan). Use wildcard suffix for
            prefix matching (e.g. ?source=provider:* matches all provider sources).
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: from
          in: query
          description: >
            Include changes on or after this timestamp. Accepts RFC 3339 date-time
            (e.g. 2024-01-15T00:00:00Z) or a plain date (YYYY-MM-DD, interpreted
            as midnight UTC on that day).
          schema:
            oneOf:
              - type: string
                format: date-time
              - type: string
                format: date
        - name: to
          in: query
          description: >
            Include changes on or before this timestamp. Accepts RFC 3339 date-time
            (e.g. 2024-01-15T23:59:59Z) or a plain date (YYYY-MM-DD). A date-only
            value is treated as end-of-UTC-day (23:59:59.999999999) so the full
            day is included.
          schema:
            oneOf:
              - type: string
                format: date-time
              - type: string
                format: date
      responses:
        "200":
          description: Paginated list of metadata changes with artist names.
          content:
            application/json:
              schema:
                type: object
                properties:
                  changes:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/MetadataChange"
                        - type: object
                          required: [artist_name]
                          properties:
                            artist_name:
                              type: string
                              description: Display name of the artist this change belongs to.
                    description: List of metadata change records.
                  total:
                    type: integer
                    description: Total number of matching records.
                  limit:
                    type: integer
                    description: Maximum number of records returned.
                  offset:
                    type: integer
                    description: Number of records skipped from the start.
                required: [changes, total, limit, offset]
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: History service is not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/platform-ids:
    get:
      tags: [Platform IDs]
      summary: List platform artist ID mappings
      operationId: getPlatformIDs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of platform artist ID mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    artist_id:
                      type: string
                      description: ID of the artist.
                    connection_id:
                      type: string
                      description: ID of the platform connection.
                    platform_artist_id:
                      type: string
                      description: Artist identifier on the remote platform.
                    created_at:
                      type: string
                      format: date-time
                      description: When the platform mapping was created (UTC, RFC 3339).
                    updated_at:
                      type: string
                      format: date-time
                      description: When the platform mapping was last modified (UTC, RFC 3339).

  /artists/{id}/platform-ids/{connectionId}:
    put:
      tags: [Platform IDs]
      summary: Set platform artist ID mapping
      operationId: setPlatformID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                platform_artist_id:
                  type: string
              required: [platform_artist_id]
      responses:
        "200":
          description: Platform ID set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags: [Platform IDs]
      summary: Delete platform artist ID mapping
      operationId: deletePlatformID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform ID deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/{id}/platform-state:
    get:
      tags: [Platform State]
      summary: Get artist platform state comparison card
      description: >-
        Fetches the current state of an artist on a platform connection and
        returns an HTML partial comparing Stillwater and platform metadata.
        Used by HTMX for lazy-loading platform state cards on the artist
        detail page.
      operationId: getPlatformState
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connection_id
          in: query
          required: true
          schema:
            type: string
        - name: readonly
          in: query
          required: false
          description: >-
            When "true", returns a read-only card with additional
            platform-only fields (sort name, tags, backdrop count, locked
            status). Defaults to the interactive comparison card.
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: HTML partial containing the platform state comparison card
          content:
            text/html:
              schema:
                type: string
        "400":
          description: >-
            Bad request (missing connection_id or connection disabled).
            HTMX requests receive an HTML error partial instead of JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
            text/html:
              schema:
                type: string
        "404":
          description: >-
            Artist, connection, or platform ID not found.
            HTMX requests receive an HTML error partial instead of JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
            text/html:
              schema:
                type: string
        "500":
          description: >-
            Internal server error. HTMX requests, including platform fetch
            failures, receive an HTML error partial instead of JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
            text/html:
              schema:
                type: string

  /artists/{id}/pull:
    post:
      tags: [Platform State]
      summary: Pull artist metadata from platform
      description: >-
        Fetches the artist's metadata from the specified platform connection
        and overwrites local biography, genres, and date fields with any
        non-empty values returned by the platform.
      operationId: pullMetadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connection_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Metadata pulled and local fields updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status, typically "pulled".
                  updated:
                    type: array
                    items:
                      type: string
                    description: List of artist fields that were written from platform data.
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/push:
    post:
      tags: [Push]
      summary: Push metadata to platform
      operationId: pushMetadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                platform_artist_id:
                  type: string
                  description: >-
                    Platform-specific artist ID. If omitted, the server
                    looks up a stored mapping from the artist_platform_ids
                    table. Returns 400 if no stored mapping exists.
              required: [connection_id]
      responses:
        "200":
          description: Metadata pushed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /platforms:
