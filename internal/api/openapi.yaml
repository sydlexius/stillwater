  # --- Inbound webhooks ---

  /webhooks/inbound/lidarr:
    post:
      tags: [Webhooks]
      summary: Receive Lidarr webhook event
      description: >
        Accepts inbound webhook events from Lidarr. Responds immediately with 200
        and processes the event asynchronously. Uses standard authentication
        (session cookie, bearer token, or API key query parameter).
      operationId: handleLidarrWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventType:
                  type: string
                  description: Lidarr event type (Test, ArtistAdded, Grab, Download, AlbumImport)
                artist:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    path:
                      type: string
                    mbId:
                      type: string
                    foreignArtistId:
                      type: string
              required: [eventType]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

