          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full Artist object with lock state cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Artist is not locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

