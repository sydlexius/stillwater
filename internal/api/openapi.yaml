  # --- Self-update ---

  /updates/check:
    post:
      tags: [Updates]
      summary: Check for updates
      description: |
        Queries the GitHub Releases API for the latest version on the configured
        channel (stable, prerelease, or nightly). Returns the current running
        version, the latest available version, and whether an update is available.

        Uses POST rather than GET because the call mutates server-side updater
        state (`last_checked` timestamp, cached `latest` / `release_url` /
        `update_available` fields) and is therefore CSRF-protected.

        In Docker environments, `update_available` may still be true but
        `POST /updates/apply` will return 422.
      operationId: checkForUpdates
      responses:
        "200":
          description: Update check result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCheckResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: GitHub API unreachable or returned an error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /updates/status:
    get:
      tags: [Updates]
      summary: Get update status
      description: |
        Returns the current state of the update lifecycle:
        `idle`, `checking`, `downloading`, `applying`, or `error`.
        Poll this endpoint after `POST /updates/apply` to track progress.
      operationId: getUpdateStatus
      responses:
        "200":
          description: Current update state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /updates/apply:
    post:
      tags: [Updates]
      summary: Apply update
      description: |
        Starts an asynchronous binary self-update. Downloads the latest release
        asset for the current platform, verifies its SHA256 checksum, and
        atomically replaces the running binary.

        Returns 202 Accepted immediately. Poll `GET /updates/status` to track
        progress.

        Returns 422 when running inside a Docker container; re-pull the image
        instead. Returns 409 when an update is already in progress, or when a
        previous apply has staged a binary that requires a process restart
        before another apply can run.

        **Note:** After a successful apply the process must be restarted manually
        (or via the host process manager) to load the new binary. A future
        release will add an automatic restart hook. Until then, a successful
        apply is signalled by `GET /updates/status` returning
        `restart_required: true` and `pending_version` set to the installed tag.
      operationId: applyUpdate
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: Update started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Update already in progress, or restart required from a previous apply.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Binary update not supported in Docker environments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Unexpected error starting the update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /updates/config:
    get:
      tags: [Updates]
      summary: Get update configuration
      description: >-
        Returns the current updater configuration: channel, enabled,
        auto_check, auto_update, and check_interval_hours. The
        `auto_update` field defaults to false and is ignored on Docker
        hosts (the scheduler no-ops on Docker; orchestration handles
        container image refresh).
      operationId: getUpdateConfig
      responses:
        "200":
          description: Current updater config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConfig"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error while reading updater config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Updates]
      summary: Set update configuration
      description: |
        Persists the updater configuration: channel (`stable`, `prerelease`, or
        `nightly`), the top-level `enabled` switch, the `auto_check` toggle,
        the `auto_update` toggle, and the `check_interval_hours` cadence used
        by the background auto-check loop. Config is stored in the settings
        key-value table.

        `auto_update` defaults to false and is ignored on Docker hosts (the
        scheduler no-ops on Docker; orchestration handles container image
        refresh). When true alongside `enabled` and `auto_check`, the
        scheduler calls Apply automatically after a successful check finds a
        newer release that is not on the skip list.

        Example PUT body:

        ```json
        {
          "channel": "stable",
          "enabled": true,
          "auto_check": true,
          "auto_update": false,
          "check_interval_hours": 24
        }
        ```
      operationId: setUpdateConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConfig"
      responses:
        "200":
          description: Updated config (echoed back from DB).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConfig"
        "400":
          description: Invalid request body or invalid channel value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error while saving or reading updater config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /updates/skips:
    get:
      tags: [Updates]
      summary: List skipped release tags
      description: >-
        Returns the persisted skip list. The scheduler reads this list on
        every tick and short-circuits AutoUpdate when the candidate tag is
        present.
      operationId: listUpdateSkips
      responses:
        "200":
          description: Current skip list.
          content:
            application/json:
              schema:
                type: object
                required: [skipped_versions]
                properties:
                  skipped_versions:
                    type: array
                    items:
                      type: string
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Updates]
      summary: Append a release tag to the skip list
      description: >-
        Idempotent: a tag already present is a no-op. The scheduler honors
        the post-write list on the next tick.
      operationId: addUpdateSkip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version:
                  type: string
                  minLength: 1
                  description: Release tag to skip (e.g. "v1.2.3" or "nightly-20260101").
      responses:
        "200":
          description: Skip list after append.
          content:
            application/json:
              schema:
                type: object
                required: [skipped_versions]
                properties:
                  skipped_versions:
                    type: array
                    items:
                      type: string
        "400":
          description: Missing or empty version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /updates/skips/{version}:
    delete:
      tags: [Updates]
      summary: Remove a release tag from the skip list
      description: >-
        Idempotent: removing a tag that is not present is a no-op.
      operationId: removeUpdateSkip
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Skip removed (or was not present).
        "400":
          description: Missing version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Artist field editing ---

  /artists/{id}/fields/{field}/display:
    get:
      tags: [Artists]
      summary: Get field display view
      operationId: getFieldDisplay
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field value (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                    description: Name of the metadata field.
                  value:
                    type: string
                    description: Formatted field value for display.
            text/html:
              schema:
                type: string
        "400":
          description: Non-editable field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/fields/edit-all:
    get:
      tags: [Artists]
      summary: Get all field edit views (batch)
      description: |
        Returns HTMX edit fragments for every editable field in a single
        response. Each fragment carries hx-swap-oob="outerHTML" so htmx
        distributes them to their DOM targets without a targeted main swap.
        Requires an HTMX request (HX-Request header); rejects non-HTMX
        requests with 400.
      operationId: getFieldsEditAll
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All field edit fragments as OOB HTML
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Non-HTMX request
        "404":
          description: Artist not found

  /artists/{id}/fields/{field}/edit:
    get:
      tags: [Artists]
      summary: Get field edit view
      operationId: getFieldEdit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field value for editing (returns HTML edit form when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                    description: Name of the metadata field.
                  value:
                    type: string
                    description: Current field value for editing.
            text/html:
              schema:
                type: string

  /artists/{id}/fields/{field}:
    patch:
      tags: [Artists]
      summary: Update a single metadata field
      description: |
        Updates one metadata field on the artist. Supported fields:
        biography, genres, styles, moods, formed, born, disbanded, died,
        years_active, type, gender, origin, name, sort_name, disambiguation,
        musicbrainz_id, audiodb_id, discogs_id, wikidata_id, deezer_id.

        Validation rules: name must be non-empty (rejects empty or
        whitespace-only strings); musicbrainz_id must be a valid UUID when
        non-empty (an empty string clears the stored ID).
      operationId: updateField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
          application/x-www-form-urlencoded:
            schema:
