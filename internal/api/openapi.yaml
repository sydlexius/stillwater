                  type: string
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                mbid:
                  type: string
                discogs_id:
                  type: string
                source:
                  type: string
      responses:
        "200":
          description: Linked and refreshed (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
