          in: query
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Web search image results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
            text/html:
              schema:
                type: string

  /artists/{id}/images/logo/trim:
    post:
      tags: [Images]
      summary: Trim transparent padding from logo
      operationId: trimLogo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Logo trimmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
        "404":
          description: Artist or logo not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/list:
    get:
      tags: [Images]
      summary: List all fanart images with metadata
      operationId: listFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: management
          in: query
          required: false
          description: When true and request is HTMX, returns the management gallery variant with per-slot controls
          schema:
            type: boolean
      responses:
        "200":
          description: Fanart gallery items (returns HTML gallery when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    index:
                      type: integer
                    filename:
                      type: string
                    width:
                      type: integer
                    height:
                      type: integer
                    size:
                      type: integer
                      format: int64
            text/html:
              schema:
                type: string

  /artists/{id}/images/fanart/{index}/file:
    get:
      tags: [Images]
      summary: Serve fanart image by index
      operationId: serveFanartByIndex
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Artist not found or index out of range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/batch:
    delete:
      tags: [Images]
      summary: Delete selected fanart by indices
      operationId: batchDeleteFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                indices:
                  type: array
                  items:
                    type: integer
              required: [indices]
      responses:
        "200":
          description: Fanart deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  deleted:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Warnings from batch deletion, including file removal failures, renumbering issues, and platform sync errors. Empty only when there are no warnings.
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/fetch-batch:
    post:
      tags: [Images]
      summary: Fetch multiple fanart images from URLs
      operationId: batchFetchFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  maxItems: 20
              required: [urls]
      responses:
        "200":
          description: Fetch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  saved:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: string
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    description: Warnings from syncing fanart to connected platforms after batch fetch. Empty when there are no sync issues.
                    items:
                      type: string
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/reorder:
    post:
      tags: [Images]
      summary: Reorder local fanart files
      operationId: reorderFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order:
                  type: array
                  description: Permutation of current slot indices defining the new order. order[i] = current slot that becomes new slot i.
                  items:
                    type: integer
              required: [order]
      responses:
        "200":
          description: Fanart reordered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    description: Warnings from syncing reordered fanart to connected platforms. Empty only when there are no sync issues.
                    items:
                      type: string
        "400":
          description: Invalid permutation or length mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/{slot}/assign:
    post:
      tags: [Images]
      summary: Assign a platform backdrop to a local fanart slot
      operationId: assignFanartSlot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                  description: ID of the platform connection to download from
                platform_index:
                  type: integer
                  minimum: 0
                  description: 0-based index of the backdrop on the platform
              required: [connection_id, platform_index]
      responses:
        "200":
          description: Backdrop assigned to slot
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  slot:
                    type: integer
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    description: Warnings from syncing fanart to connected platforms after assignment. Empty only when there are no sync issues.
                    items:
                      type: string
        "400":
          description: Invalid slot (gap), missing connection, or bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Failed to download backdrop from platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/{slot}:
    delete:
      tags: [Images]
      summary: Delete a single fanart slot and renumber remaining
      operationId: deleteFanartSlot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fanart slot deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  deleted:
                    type: string
                    description: Filename of the deleted file
                  count:
                    type: integer
                  sync_warnings:
                    type: array
                    description: Warnings from fanart deletion, including renumbering issues and platform sync errors. Empty only when there are no warnings.
                    items:
                      type: string
        "400":
          description: Slot out of range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/platform-backdrops:
    get:
      tags: [Images]
      summary: List available backdrops from all connected platforms
      operationId: listPlatformBackdrops
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform backdrops grouped by connection (returns HTML panel when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  connections:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlatformBackdropConnection"
            text/html:
              schema:
                type: string

  /artists/{id}/platform-backdrops/{connectionId}/{index}/thumbnail:
    get:
      tags: [Images]
      summary: Proxy a platform backdrop image through Stillwater
      operationId: getPlatformBackdropThumbnail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proxied backdrop image
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: No platform mapping or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Failed to fetch backdrop from platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/fanart-sync-state:
    get:
      tags: [Images]
      summary: Get per-image sync state for fanart slots across connected platforms
      operationId: getFanartSyncState
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: >
            Per-slot sync state. When no Emby/Jellyfin connections exist, returns
            state "no_connections" with an empty slots array. For HTMX requests,
            returns HTML badge fragments with OOB swap targets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: "#/components/schemas/FanartSyncSlot"
                  state:
                    type: string
                    description: >
                      Only present when value is "no_connections", indicating no
                      Emby/Jellyfin connections are configured for this artist
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}/file:
    get:
      tags: [Images]
      summary: Serve artist image file
      operationId: serveImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Artist or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}/info:
    get:
      tags: [Images]
      summary: Get image metadata (dimensions, size)
      operationId: getImageInfo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image metadata (returns HTML badge when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  filename:
                    type: string
                  width:
                    type: integer
                  height:
                    type: integer
                  size:
                    type: integer
                    format: int64
                  modified:
                    type: string
                    format: date-time
            text/html:
              schema:
                type: string
        "404":
          description: Artist or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}:
    delete:
      tags: [Images]
      summary: Delete artist image
      operationId: deleteImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image deleted (returns HTML preview card when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  deleted:
                    type: array
                    items:
                      type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
            text/html:
              schema:
                type: string
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Push extras ---

  /artists/{id}/push/images:
    post:
      tags: [Push]
      summary: Push images to platform
      operationId: pushImages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                platform_artist_id:
                  type: string
                  description: >-
                    Platform-specific artist ID. If omitted, the server
                    looks up a stored mapping from the artist_platform_ids
                    table. Returns 400 if no stored mapping exists.
                image_types:
                  type: array
                  items:
                    type: string
                    enum: [thumb, fanart, logo, banner]
                  description: Types to push (defaults to all four)
              required: [connection_id]
      responses:
        "200":
          description: Push results
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploaded:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/push/images/{type}:
    delete:
      tags: [Push]
      summary: Delete a single image from a platform
      operationId: deletePushImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                platform_artist_id:
                  type: string
                  description: >-
                    Platform-specific artist ID. If omitted, the server
                    looks up a stored mapping from the artist_platform_ids
                    table. Returns 400 if no stored mapping exists.
              required: [connection_id]
      responses:
        "200":
          description: Image deleted
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: deleted
        "400":
          description: >-
            Invalid request (invalid image type, missing connection_id,
            connection disabled, or no stored platform ID mapping)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Platform delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
