                  type: object
                  properties:
                    artists:
                      type: array
                      items:
                        $ref: "#/components/schemas/Artist"
                    reason:
                      type: string
                      description: >-
                        Human-readable explanation of why these artists are considered
                        duplicates (e.g. "shared MusicBrainz ID: abc123",
                        "shared alias: The Beatles").

  /artists/locked:
    get:
      tags: [Artists]
      summary: List locked artists
      operationId: listLockedArtists
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
        - name: sort
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Paginated list of locked artists
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: array
                    items:
                      $ref: "#/components/schemas/Artist"
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer

  /artists/{id}/lock:
    post:
      tags: [Artists]
      summary: Lock an artist
      description: Prevents automated operations (rule fixers, metadata fetchers, image operations) from modifying this artist. Manual edits remain allowed.
      operationId: lockArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full Artist object with lock state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Artist is already locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Artists]
      summary: Unlock an artist
      description: Removes the metadata lock, allowing automated operations to modify this artist again.
      operationId: unlockArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full Artist object with lock state cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Artist is not locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}:
    get:
      tags: [Artists]
      summary: Get artist details
      operationId: getArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artist with band members
          content:
            application/json:
              schema:
                type: object
                properties:
                  artist:
                    $ref: "#/components/schemas/Artist"
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/BandMember"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/health:
    get:
      tags: [Artists, Rules]
      summary: Evaluate artist health
      operationId: evaluateArtistHealth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Health evaluation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  artist_id:
                    type: string
                  artist_name:
                    type: string
                  violations:
                    type: array
                    items:
                      type: object
                  rules_passed:
                    type: integer
                  rules_total:
                    type: integer
                  health_score:
                    type: number
                  warning:
                    type: string
                    description: Present when the health score was computed but failed to persist.
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/history:
    get:
      tags: [History]
      summary: List artist metadata change history
      operationId: listArtistHistory
      description: >
        Returns paginated metadata change records for an artist, ordered by
        most recent first. Records are written by integration hooks in Phase 2;
        the table exists from Phase 1 onwards.
      parameters:
        - name: id
          in: path
          required: true
          description: Artist ID.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of records to return (1-200, default 50).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of metadata changes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  changes:
                    type: array
                    items:
                      $ref: "#/components/schemas/MetadataChange"
                  total:
                    type: integer
                    description: Total number of change records for this artist across all pages.
                  limit:
                    type: integer
                    description: The limit value used for this request.
                  offset:
                    type: integer
                    description: The offset value used for this request.
                required: [changes, total, limit, offset]
        "404":
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/aliases:
    get:
      tags: [Aliases]
      summary: List artist aliases
      operationId: listAliases
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of aliases
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    alias:
                      type: string
                    source:
                      type: string
    post:
      tags: [Aliases]
      summary: Add alias to artist
      operationId: addAlias
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                alias:
                  type: string
                source:
                  type: string
              required: [alias]
      responses:
        "201":
          description: Alias created
          content:
            application/json:
              schema:
                type: object

  /artists/{id}/aliases/{aliasId}:
    delete:
      tags: [Aliases]
      summary: Remove alias
      operationId: removeAlias
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: aliasId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alias deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/{id}/images/upload:
    post:
      tags: [Images]
      summary: Upload image file
      operationId: uploadImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: skip_crop
          in: query
          schema:
            type: string
            enum: ["true"]
          description: >
            When set to "true", skip geometry checking and save the image even
            if the aspect ratio does not match the slot requirement.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [file, type]
      responses:
        "200":
          description: Image saved, or needs_crop when the aspect ratio does not match the slot requirement
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: '"ok" when saved successfully, "needs_crop" when the image requires cropping before saving.'
                  saved:
                    type: array
                    items:
                      type: string
                  type:
                    type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
                  count:
                    type: integer
                    description: Total number of fanart images now on disk for this artist. Present only when type is fanart.
                  needs_crop:
                    type: boolean
                    description: True when the uploaded image aspect ratio does not match the target slot. The image is not saved; the client should present a crop UI.
                  required_ratio:
                    type: number
                    description: The aspect ratio (width/height) required by the target slot. Present only when needs_crop is true.
                  actual_ratio:
                    type: number
                    description: The actual aspect ratio of the uploaded image. Present only when needs_crop is true.
                  width:
                    type: integer
                    description: Width of the uploaded image in pixels. Present only when needs_crop is true.
                  height:
                    type: integer
                    description: Height of the uploaded image in pixels. Present only when needs_crop is true.
                  image_data:
                    type: string
                    description: Base64-encoded data URI of the uploaded image. Present only when needs_crop is true, for use in a client-side crop tool.
        "413":
          description: File exceeds 25MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fetch:
    post:
      tags: [Images]
      summary: Fetch image from URL
      operationId: fetchImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: skip_crop
          in: query
          schema:
            type: string
            enum: ["true"]
          description: >
            When set to "true", skip geometry checking and save the image even
            if the aspect ratio does not match the slot requirement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, type]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                url:
                  type: string
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, type]
      responses:
        "200":
          description: Image fetched and saved, or needs_crop when the aspect ratio does not match the slot requirement
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: '"ok" when saved successfully, "needs_crop" when the image requires cropping before saving.'
                  saved:
                    type: array
                    items:
                      type: string
                  type:
                    type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
                  count:
                    type: integer
                    description: Total number of fanart images now on disk for this artist. Present only when type is fanart.
                  needs_crop:
                    type: boolean
                    description: True when the fetched image aspect ratio does not match the target slot. The image is not saved; the client should present a crop UI.
                  required_ratio:
                    type: number
                    description: The aspect ratio (width/height) required by the target slot. Present only when needs_crop is true.
                  actual_ratio:
                    type: number
                    description: The actual aspect ratio of the fetched image. Present only when needs_crop is true.
                  width:
                    type: integer
                    description: Width of the fetched image in pixels. Present only when needs_crop is true.
                  height:
                    type: integer
                    description: Height of the fetched image in pixels. Present only when needs_crop is true.
                  image_data:
                    type: string
                    description: Base64-encoded data URI of the fetched image. Present only when needs_crop is true, for use in a client-side crop tool.

  /artists/{id}/images/search:
    get:
      tags: [Images]
      summary: Search providers for images
      operationId: searchImages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image search results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                  errors:
                    type: array
                    items:
                      type: string
            text/html:
              schema:
                type: string

  /artists/{id}/images/crop:
    post:
      tags: [Images]
      summary: Crop and save image
      operationId: cropImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                image_data:
                  type: string
                  description: Base64-encoded image data
                type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
                x:
                  type: integer
                y:
                  type: integer
                width:
                  type: integer
                height:
                  type: integer
              required: [image_data, type]
      responses:
        "200":
          description: Image cropped and saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  saved:
                    type: array
                    items:
                      type: string
                  type:
                    type: string
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.

  /artists/{id}/nfo/diff:
    get:
      tags: [NFO]
      summary: Get NFO field-level diff
      description: >
        For pathless artists (no filesystem path), returns a virtual NFO
        generated from database fields instead of reading from disk.
      operationId: getNFODiff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: compare_to
          in: query
          description: Snapshot ID to compare against (defaults to latest)
          schema:
            type: string
      responses:
        "200":
          description: NFO diff result (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
            text/html:
              schema:
                type: string

  /artists/{id}/nfo/conflict:
    get:
      tags: [NFO]
      summary: Check for external NFO modifications
      description: >
        For pathless artists, always returns no conflict since there is
        no on-disk NFO file to be modified externally.
      operationId: checkNFOConflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conflict check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_conflict:
                    type: boolean
                  reason:
                    type: string
                  external_writer:
                    type: string
                  last_modified:
                    type: string
                    format: date-time
                    description: Present when the NFO file exists and is accessible; contains the file's last-modified timestamp regardless of conflict status. Omitted when the file does not exist or cannot be accessed (pathless artists, missing file, or filesystem errors).

  /artists/{id}/nfo/snapshots:
    get:
      tags: [NFO]
      summary: List NFO snapshots
      operationId: listNFOSnapshots
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of snapshots
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots:
                    type: array
                    items:
                      type: object

  /artists/{id}/nfo/snapshots/{snapshotId}/restore:
    post:
      tags: [NFO]
      summary: Restore NFO from snapshot
      description: >
        For pathless artists, applies the snapshot fields to the database
        and pushes updated metadata to connected platforms instead of
        writing to disk.
      operationId: restoreNFOSnapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: snapshotId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: NFO restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/{id}/platform-ids:
    get:
      tags: [Platform IDs]
      summary: List platform artist ID mappings
      operationId: getPlatformIDs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of platform artist ID mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    artist_id:
                      type: string
                    connection_id:
                      type: string
                    platform_artist_id:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time

  /artists/{id}/platform-ids/{connectionId}:
    put:
      tags: [Platform IDs]
      summary: Set platform artist ID mapping
      operationId: setPlatformID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                platform_artist_id:
                  type: string
              required: [platform_artist_id]
      responses:
        "200":
          description: Platform ID set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags: [Platform IDs]
      summary: Delete platform artist ID mapping
      operationId: deletePlatformID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform ID deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/{id}/pull:
    post:
      tags: [Platform State]
      summary: Pull artist metadata from platform
      description: >-
        Fetches the artist's metadata from the specified platform connection
        and overwrites local biography, genres, and date fields with any
        non-empty values returned by the platform.
      operationId: pullMetadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connection_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Metadata pulled and local fields updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status, typically "pulled".
                  updated:
                    type: array
                    items:
                      type: string
                    description: List of artist fields that were written from platform data.
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/push:
    post:
      tags: [Push]
      summary: Push metadata to platform
      operationId: pushMetadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                platform_artist_id:
                  type: string
                  description: >-
                    Platform-specific artist ID. If omitted, the server
                    looks up a stored mapping from the artist_platform_ids
                    table. Returns 400 if no stored mapping exists.
              required: [connection_id]
      responses:
        "200":
          description: Metadata pushed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /platforms:
    get:
      tags: [Platforms]
      summary: List platform profiles
      operationId: listPlatforms
      responses:
        "200":
          description: List of platform profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [Platforms]
      summary: Create platform profile
      operationId: createPlatform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                nfo_enabled:
                  type: boolean
                nfo_format:
                  type: string
                  enum: [kodi, jellyfin]
                image_naming:
                  type: object
              required: [name]
      responses:
        "201":
          description: Platform created
          content:
            application/json:
              schema:
                type: object

  /platforms/{id}:
    get:
      tags: [Platforms]
      summary: Get platform profile
      operationId: getPlatform
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform profile
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Platforms]
      summary: Update platform profile
      operationId: updatePlatform
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                nfo_enabled:
                  type: boolean
                nfo_format:
                  type: string
                image_naming:
                  type: object
      responses:
        "200":
          description: Platform updated
          content:
            application/json:
              schema:
                type: object
    delete:
      tags: [Platforms]
      summary: Delete platform profile
      operationId: deletePlatform
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /platforms/{id}/activate:
    post:
      tags: [Platforms]
      summary: Set platform as active
      operationId: activatePlatform
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /connections:
    get:
      tags: [Connections]
      summary: List connections
      operationId: listConnections
      responses:
        "200":
          description: List of connections (API keys excluded)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectionResponse"
    post:
      tags: [Connections]
      summary: Create connection
      operationId: createConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [emby, jellyfin, lidarr]
                url:
                  type: string
                api_key:
                  type: string
                enabled:
                  type: boolean
                skip_test:
                  type: boolean
              required: [name, type, url]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [emby, jellyfin, lidarr]
                url:
                  type: string
                api_key:
                  type: string
                skip_test:
                  type: boolean
              required: [name, type, url]
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"

  /connections/{id}:
    get:
      tags: [Connections]
      summary: Get connection
      operationId: getConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Connections]
      summary: Update connection
      operationId: updateConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                url:
                  type: string
                api_key:
                  type: string
                enabled:
                  type: boolean
      responses:
        "200":
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"
    delete:
      tags: [Connections]
      summary: Delete connection
      operationId: deleteConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /connections/{id}/test:
    post:
      tags: [Connections]
      summary: Test connection
      operationId: testConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, error]
                  message:
                    type: string
                  drift_warnings:
                    type: array
                    description: Platform settings that may conflict with Stillwater-managed metadata. Present only when drift is detected.
                    items:
                      type: string

  /providers:
    get:
      tags: [Providers]
      summary: List providers and API key status
      operationId: listProviders
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object

  /providers/{name}/key:
    put:
      tags: [Providers]
      summary: Set provider API key
      operationId: setProviderKey
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                skip_test:
                  type: boolean
              required: [api_key]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                skip_test:
                  type: boolean
              required: [api_key]
      responses:
        "200":
          description: Key saved (returns HTML provider card when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
    delete:
      tags: [Providers]
      summary: Delete provider API key
      operationId: deleteProviderKey
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /providers/{name}/mirror:
    put:
      tags: [Providers]
      summary: Set provider mirror URL
      operationId: setProviderMirror
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                base_url:
                  type: string
                  description: Mirror base URL (must be http or https)
                rate_limit:
                  type: number
                  description: Requests per second (default 10, max 100)
              required: [base_url]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                base_url:
                  type: string
                  description: Mirror base URL (must be http or https)
                rate_limit:
                  type: number
                  description: Requests per second (default 10, max 100)
              required: [base_url]
      responses:
        "200":
          description: Mirror saved (returns HTML provider card when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  test:
                    type: string
                    enum: [ok, error]
                    description: Connection test result
                  test_error:
                    type: string
                    description: Error message if test failed
            text/html:
              schema:
                type: string
    delete:
      tags: [Providers]
      summary: Delete provider mirror configuration
      operationId: deleteProviderMirror
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mirror cleared (returns HTML provider card when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /providers/{name}/test:
    post:
      tags: [Providers]
      summary: Test provider connection
      operationId: testProvider
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test result (returns HTML provider card when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, error]
                  error:
                    type: string
            text/html:
              schema:
                type: string

  /providers/priorities:
    get:
      tags: [Providers]
      summary: Get provider priorities
      operationId: getPriorities
      responses:
        "200":
          description: Priority configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  priorities:
                    type: array
                    items:
                      type: object
    put:
      tags: [Providers]
      summary: Set provider priorities
      operationId: setPriorities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                priorities:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      providers:
                        type: array
                        items:
                          type: string
              required: [priorities]
      responses:
        "200":
          description: Priorities saved (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /providers/search:
    post:
      tags: [Providers]
      summary: Search providers for artist
      operationId: providerSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required: [name]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object

  /providers/fetch:
    post:
      tags: [Providers]
      summary: Fetch metadata from providers
      operationId: providerFetch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mbid:
                  type: string
                name:
                  type: string
      responses:
        "200":
          description: Fetched metadata
          content:
            application/json:
              schema:
                type: object

  /rules:
    get:
      tags: [Rules]
      summary: List rules
      description: >
        Returns all rules with their filesystem_dependent flag set. Also
        includes has_local_library indicating whether at least one library
        with a filesystem path exists. Filesystem-dependent rules cannot
        be enabled when has_local_library is false.
      operationId: listRules
      responses:
        "200":
          description: List of rules with local library status
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                  has_local_library:
                    type: boolean
                    description: True when at least one library with a filesystem path exists

  /rules/{id}:
    put:
      tags: [Rules]
      summary: Update rule
      operationId: updateRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                automation_mode:
                  type: string
                  enum: [auto, manual]
                  description: Automation mode for this rule. Use the enabled flag to disable a rule; "disabled" is not a valid automation_mode value.
                config:
                  type: object
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request (e.g., unsupported automation_mode value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict when enabling a filesystem-dependent rule without any local library path configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/{id}/run:
    post:
      tags: [Rules]
      summary: Start async evaluation of a single rule against all artists
      description: >
        Launches rule evaluation in a background goroutine and returns immediately.
        Shares the status slot with run-all; poll GET /rules/run-all/status for progress.
      operationId: runRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Rule evaluation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                  rule_id:
                    type: string
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A rule evaluation is already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/run-all:
    post:
      tags: [Rules]
      summary: Run all enabled rules (async)
      description: >
        Starts an asynchronous run of all enabled rules against all artists.
        Returns 202 immediately; poll GET /rules/run-all/status for completion status.
      operationId: runAllRules
      responses:
        "202":
          description: Run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleRunStatus"
        "409":
          description: A run is already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/run-all/status:
    get:
      tags: [Rules]
      summary: Get async rule-run status
      description: >
        Returns the current status of the most recent rule evaluation,
        whether triggered by run-all or a single-rule run. Both share
        the same status slot; only one can run at a time.
      operationId: getRunAllRulesStatus
      responses:
        "200":
          description: Current run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleRunStatus"

  /rules/status:
    get:
      tags: [Rules]
      summary: Get rule scheduler status
      description: Returns the current state of the rule evaluation scheduler.
      operationId: getRulesStatus
      responses:
        "200":
          description: Scheduler status
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_evaluation_at:
                    type: string
                    format: date-time
                    nullable: true
                  interval_minutes:
                    type: integer
                  next_evaluation_at:
                    type: string
                    format: date-time
                    nullable: true
                  scheduler_enabled:
                    type: boolean

  /rules/classical-mode:
    get:
      tags: [Rules]
      summary: Get classical music handling mode
      operationId: getClassicalMode
      responses:
        "200":
          description: Current mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    enum: [skip, composer, performer]
    put:
      tags: [Rules]
      summary: Set classical music handling mode
      operationId: setClassicalMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [skip, composer, performer]
              required: [mode]
      responses:
        "200":
          description: Mode updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string

  /bulk/fetch-metadata:
    post:
      tags: [Bulk Operations]
      summary: Start bulk metadata fetch
      operationId: bulkFetchMetadata
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [prompt_no_match, yolo, auto_exact, auto_similar]
                  default: prompt_no_match
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object
        "409":
          description: Another job is already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bulk/fetch-images:
    post:
      tags: [Bulk Operations]
      summary: Start bulk image fetch
      operationId: bulkFetchImages
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  default: prompt_no_match
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object

  /bulk/jobs:
    get:
      tags: [Bulk Operations]
      summary: List recent bulk jobs
      operationId: listBulkJobs
      responses:
        "200":
          description: Recent jobs (last 20)
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      type: object
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bulk/jobs/{id}:
    get:
      tags: [Bulk Operations]
      summary: Get bulk job details
      operationId: getBulkJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job with items
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    type: object
                  items:
                    type: array
                    items:
                      type: object
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bulk/jobs/{id}/cancel:
    post:
      tags: [Bulk Operations]
      summary: Cancel running bulk job
      operationId: cancelBulkJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job canceling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/bulk-identify:
    post:
      tags: [Bulk Operations]
      summary: Start bulk artist identification
      operationId: startBulkIdentify
      description: >
        Processes unidentified artists (missing MusicBrainz ID) through a 3-tier
        pipeline: connection-based matching, album comparison, and name-only search.
        Returns 409 if a job is already running.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                library_id:
                  type: string
                  description: Optional library ID to scope the identification to a single library.
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                  total:
                    type: integer
                    description: Number of unidentified artists to process.
        "200":
          description: No unidentified artists found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [completed]
                  message:
                    type: string
                  total:
                    type: integer
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Job already running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                  message:
                    type: string
        "500":
          description: Failed to list artists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Artist service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Bulk Operations]
      summary: Get bulk identification progress
      operationId: getBulkIdentifyProgress
      responses:
        "200":
          description: Current progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifyProgress"
    delete:
      tags: [Bulk Operations]
      summary: Cancel bulk identification
      operationId: cancelBulkIdentify
      responses:
        "200":
          description: Cancellation status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, canceling, completed, canceled]
                    description: >
                      Current job status. "canceling" when a running job has been
                      asked to stop; "completed" or "canceled" if the job already
                      finished; "idle" if no job exists.
                  message:
                    type: string
                required:
                  - status
                  - message

  /artists/bulk-identify/link:
    post:
      tags: [Bulk Operations]
      summary: Link artist to MusicBrainz ID and refresh
      operationId: bulkIdentifyLink
      description: >
        Links an artist to a MusicBrainz ID and attempts a full metadata refresh.
        If the artist exists in the bulk-identify review queue, it is removed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artist_id, mbid]
              properties:
                artist_id:
                  type: string
                mbid:
                  type: string
                  description: MusicBrainz artist ID to link.
                discogs_id:
                  type: string
                  description: Optional Discogs artist ID.
      responses:
        "200":
          description: Artist linked and refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [linked]
                  artist_id:
                    type: string
                  mbid:
                    type: string
        "400":
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to update artist or refresh metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Artist service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

