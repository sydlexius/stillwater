  /scraper/providers:
    get:
      tags: [Scraper]
      summary: List scraper providers with capabilities
      operationId: listScraperProviders
      responses:
        "200":
          description: Provider capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
