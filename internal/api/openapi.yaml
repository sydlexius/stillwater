              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: TheAudioDB search failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Artist service not configured / unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/audiodb/link:
    post:
      tags: [Artists]
      summary: Link a TheAudioDB ID to the artist and refresh
      operationId: audiodbLink
      description: >
        Persists the selected numeric TheAudioDB ID on the artist and runs a
        metadata refresh. Two guards apply: a locked audiodb_id field is refused
        with 409 (field_locked), and because the refresh may write artist.nfo the
        request is subject to the NFO conflict gate (409 when blocked). Returns an
        HTML fragment when the HX-Request header is set.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                audiodb_id:
                  type: string
                  description: Numeric TheAudioDB artist ID.
              required: [audiodb_id]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                audiodb_id:
                  type: string
              required: [audiodb_id]
      responses:
        "200":
          description: Linked and refreshed (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  artist_id:
                    type: string
                  audiodb_id:
                    type: string
            text/html:
              schema:
                type: string
        "400":
          description: Missing or non-numeric audiodb_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: audiodb_id field locked or conflict gate blocked the write
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ConflictWriteBlock"
                  - $ref: "#/components/schemas/FieldLockedError"
                discriminator:
                  propertyName: error
                  mapping:
                    field_locked: "#/components/schemas/FieldLockedError"
                    nfo_write_blocked: "#/components/schemas/ConflictWriteBlock"
                    round_trip_write_blocked: "#/components/schemas/ConflictWriteBlock"
        "500":
          description: Failed to link TheAudioDB ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Artist service not configured / unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Discography fetch ---

  /artists/{id}/discography/fetch:
    post:
      tags: [Artists]
      summary: Fetch discography from MusicBrainz
      operationId: fetchArtistDiscography
      description: >
        Fetches release groups from MusicBrainz for the artist's MBID, merges
        them into the on-disk artist.nfo, and writes the result atomically. The
        merge preserves existing entries and user-added albums. Returns counts
        of added, kept, skipped, and total release groups. Requires admin role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Artist ID.
        - name: include
          in: query
          required: false
          schema:
            type: string
            default: "Album,EP"
            example: "Album,EP,Single"
          description: >
            Comma-separated list of MusicBrainz primary release types to include.
            Valid values: Album, EP, Single, Compilation, Live, Soundtrack.
            Defaults to "Album,EP" when omitted.
      responses:
        "200":
          description: Fetch completed; returns counts for the merge operation.
          content:
            application/json:
              schema:
                type: object
                required: [added, kept, skipped, total]
                properties:
                  added:
                    type: integer
                    description: Number of new release groups written to the NFO.
                  kept:
                    type: integer
                    description: Number of existing NFO entries matched and preserved.
                  skipped:
                    type: integer
                    description: Number of release groups filtered out (wrong type) or already present.
                  total:
                    type: integer
                    description: Total release groups returned by MusicBrainz before filtering.
            text/html:
              schema:
                type: string
                description: Re-rendered Discography tab partial returned to HTMX callers.
        "400":
          description: >
            Bad request. Possible reasons: artist has no MusicBrainz ID, or
            artist has no filesystem path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A discography fetch for this artist is already in progress.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: >
            Unprocessable entity. The existing artist.nfo could not be parsed
            (malformed XML). Fix or remove the file before retrying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error (artist load failure or NFO write failure).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: MusicBrainz request failed (bad gateway).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: MusicBrainz provider is not registered or unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- MusicBrainz contribution ---

  /artists/{id}/musicbrainz/diffs:
    get:
      tags: [Artists]
      operationId: getArtistMusicBrainzDiffs
      summary: Get metadata diffs between Stillwater and MusicBrainz
      description: >
        Returns computed diffs between the current Stillwater metadata and the
        last-known MusicBrainz values captured during the most recent provider
        refresh. Only fields where the Stillwater value is non-empty and differs
        from the MusicBrainz snapshot are included.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diff results
          content:
            application/json:
              schema:
                type: object
                properties:
                  artist_id:
                    type: string
                    description: ID of the artist.
                  musicbrainz_id:
                    type: string
                    description: MusicBrainz artist ID (MBID).
                  diffs:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Metadata field name
                        stillwater_value:
                          type: string
                          description: Current value in Stillwater
                        musicbrainz_value:
                          type: string
                          description: Last-known value from MusicBrainz
                        source:
                          type: string
                          description: Provider that sourced the current Stillwater value
                    description: List of field-level differences.
                  contribution_mode:
                    type: string
                    enum: [disabled, web_form, api]
                    description: Current MusicBrainz contribution setting
                  last_fetched_at:
                    type: string
                    format: date-time
                    description: When the MusicBrainz snapshots were last captured
        "404":
          description: Artist not found or has no MusicBrainz ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/reidentify:
    post:
      tags: [Artists]
      summary: Identify or re-identify an artist via MusicBrainz
      description: >
        Returns the disambiguation form so the user can link (or re-link)
        a MusicBrainz entry. When clear_ids is true, all provider IDs are
        wiped first (destructive "Re-identify" flow). Without it, existing
        IDs are preserved (non-destructive "Identify" flow).
      operationId: reidentifyArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                clear_ids:
                  type: string
                  enum: ["true"]
                  description: >
                    When set to "true", clears all provider IDs and fetch
                    timestamps before returning the disambiguation form.
                    Omit for the non-destructive identify flow.
      responses:
        "200":
          description: Disambiguation form returned (provider IDs cleared only when clear_ids=true; returns HTML disambiguation form when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the reidentification.
                  artist:
                    type: string
                    description: Artist name after reidentification.
                  message:
                    type: string
                    description: Human-readable result detail.
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/run-rules:
    post:
      tags: [Artists, Rules]
      summary: Run all enabled rules scoped to a single artist
      operationId: runArtistRules
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rules ran successfully; returns violation count and a pre-filtered dashboard link (JSON) or an inline HTML fragment (HTMX)
          content:
            application/json:
              schema:
                type: object
                properties:
                  violations_found:
                    type: integer
                    description: Number of violations detected for this artist
                  dashboard_url:
                    type: string
                    description: Dashboard URL pre-filtered to this artist's violations
            text/html:
              schema:
                type: string
                description: Inline result fragment for HTMX callers
        "404":
          description: Artist not found (non-HTMX callers only; HTMX callers receive a 200 with an inline error fragment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Rule evaluation failed (non-HTMX callers only; HTMX callers receive a 200 with an inline error fragment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured (non-HTMX callers only; HTMX callers receive a 200 with an inline error fragment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Additional image routes ---

  /artists/{id}/images/websearch:
    get:
      tags: [Images]
      summary: Search web for artist images
      operationId: webImageSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
        - name: sort
          in: query
          description: Sort order for results. Defaults to likes descending.
          schema:
            type: string
            enum: [likes, resolution]
            default: likes
      responses:
        "200":
          description: Web search image results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: [array, "null"]
                    items:
                      type: object
                    description: Image results from web search providers. May be null when no providers returned results.
            text/html:
              schema:
                type: string
        "400":
          description: Invalid sort parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/logo/trim:
    post:
      tags: [Images]
      summary: Trim transparent padding from logo
      operationId: trimLogo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Logo trimmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the logo trim operation.
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
        "204":
          description: Logo trimmed (HTMX request); HX-Refresh response header tells the client to reload.
        "404":
          description: Artist or logo not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}/revert:
    post:
      tags: [Images]
      summary: Revert the most recent image edit
      description: >-
        For single-slot kinds (thumb, logo, banner) restores the pre-edit
        original from the peer-inert backup. For fanart, drops the newest
        derived slot, leaving the original slot intact. Gated by the conflict
        gate. One-deep: a second revert with no backup returns 404.
      operationId: revertImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          description: Image kind (thumb, fanart, logo, banner).
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image reverted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Always "reverted" on success.
                  type:
                    type: string
                    description: The image kind that was reverted.
                  count:
                    type: integer
                    description: Remaining fanart count (fanart kind only).
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Non-fatal warnings from syncing the reverted image to connected platforms.
                required: [status, type, sync_warnings]
        "400":
          description: Invalid image type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found, or no backup / no derived slot to revert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Write blocked by the conflict gate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictWriteBlock"
        "500":
          description: >-
            Server error, including a fail-closed abort when the conflict gate
            could not be evaluated for this destructive operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/list:
    get:
      tags: [Images]
      summary: List all fanart images with metadata
      operationId: listFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: management
          in: query
          required: false
          description: When true and request is HTMX, returns the management gallery variant with per-slot controls
          schema:
            type: boolean
      responses:
        "200":
          description: Fanart gallery items (returns HTML gallery when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    index:
                      type: integer
                      description: Zero-based index of the fanart slot.
                    filename:
                      type: string
                      description: Name of the image file on disk.
                    width:
                      type: integer
                      description: Image width in pixels.
                    height:
                      type: integer
                      description: Image height in pixels.
                    size:
                      type: integer
                      format: int64
                      description: File size in bytes.
            text/html:
              schema:
                type: string

  /artists/{id}/images/fanart/{index}/file:
    get:
      tags: [Images]
      summary: Serve fanart image by index
      operationId: serveFanartByIndex
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Artist not found or index out of range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/batch:
    delete:
      tags: [Images]
      summary: Delete selected fanart by indices
      operationId: batchDeleteFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                indices:
                  type: array
                  items:
                    type: integer
              required: [indices]
      responses:
        "200":
          description: Fanart deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the delete operation.
                  deleted:
                    type: array
                    items:
                      type: string
                    description: Indices of the deleted fanart slots.
                  count:
                    type: integer
                    description: Number of fanart images remaining after deletion.
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Warnings from batch deletion, including file removal failures, renumbering issues, and platform sync errors. Empty only when there are no warnings.
        "409":
          description: Write blocked by the conflict gate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictWriteBlock"
        "500":
          description: >-
            Server error, including a fail-closed abort when the conflict gate
            could not be evaluated for this destructive delete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/fetch-batch:
    post:
      tags: [Images]
      summary: Fetch multiple fanart images from URLs
      operationId: batchFetchFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  maxItems: 20
              required: [urls]
      responses:
        "200":
          description: Fetch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the batch fetch.
                  saved:
                    type: array
                    items:
                      type: string
                    description: Filenames of images saved successfully.
                  errors:
                    type: array
                    items:
                      type: string
                    description: Error messages for any failed fetches.
                  count:
                    type: integer
                    description: Number of images fetched.
                  sync_warnings:
                    type: array
                    description: Warnings from syncing fanart to connected platforms after batch fetch. Empty when there are no sync issues.
                    items:
                      type: string
        "409":
          description: Write blocked by the conflict ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictWriteBlock"

  /artists/{id}/images/fanart/reorder:
    post:
      tags: [Images]
      summary: Reorder local fanart files
      operationId: reorderFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order:
                  type: array
                  description: Permutation of current slot indices defining the new order. order[i] = current slot that becomes new slot i.
                  items:
                    type: integer
              required: [order]
      responses:
        "200":
          description: Fanart reordered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the reorder operation.
                  count:
                    type: integer
                    description: Total number of fanart images after reorder.
                  sync_warnings:
                    type: array
                    description: Warnings from syncing reordered fanart to connected platforms. Empty only when there are no sync issues.
                    items:
                      type: string
        "400":
          description: Invalid permutation or length mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Write blocked by the conflict gate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictWriteBlock"
        "500":
          description: >-
            Server error, including a fail-closed abort when the conflict gate
            could not be evaluated for this destructive reorder.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/{slot}/assign:
