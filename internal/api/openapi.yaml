          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error writing NFO output settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: NFO settings service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/cache/stats:
    get:
      tags: [Settings]
      summary: Get image cache statistics
      description: Returns the current size, file count, and artist count for the pathless-artist image cache.
      operationId: getCacheStats
      responses:
        "200":
          description: Cache statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheStats"
  /settings/cache:
    delete:
      tags: [Settings]
      summary: Clear the image cache
      description: Deletes all files in the pathless-artist image cache and resets image existence flags. Uses best-effort deletion.
      operationId: clearCache
      responses:
        "200":
          description: Summary of the clear operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheClearResult"

  # --- Self-update ---

  /updates/check:
    post:
      tags: [Updates]
      summary: Check for updates
      description: |
        Queries the GitHub Releases API for the latest version on the configured
        channel (stable or prerelease). Returns the current running version, the
        latest available version, and whether an update is available.

        Uses POST rather than GET because the call mutates server-side updater
        state (`last_checked` timestamp, cached `latest` / `release_url` /
        `update_available` fields) and is therefore CSRF-protected.

        In Docker environments, `update_available` may still be true but
        `POST /updates/apply` will return 422.
      operationId: checkForUpdates
      responses:
        "200":
          description: Update check result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCheckResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: GitHub API unreachable or returned an error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /updates/status:
    get:
      tags: [Updates]
      summary: Get update status
      description: |
        Returns the current state of the update lifecycle:
        `idle`, `checking`, `downloading`, `applying`, or `error`.
        Poll this endpoint after `POST /updates/apply` to track progress.
      operationId: getUpdateStatus
      responses:
        "200":
          description: Current update state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /updates/apply:
    post:
      tags: [Updates]
      summary: Apply update
      description: |
        Starts an asynchronous binary self-update. Downloads the latest release
        asset for the current platform, verifies its SHA256 checksum, and
        atomically replaces the running binary.

        Returns 202 Accepted immediately. Poll `GET /updates/status` to track
        progress.

        Returns 422 when running inside a Docker container; re-pull the image
        instead. Returns 409 when an update is already in progress.

        **Note:** After a successful apply the process must be restarted manually
        (or via the host process manager) to load the new binary. A future
        release will add an automatic restart hook.
      operationId: applyUpdate
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: Update started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Update already in progress.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Binary update not supported in Docker environments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Unexpected error starting the update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /updates/config:
    get:
      tags: [Updates]
      summary: Get update configuration
      description: Returns the current update channel and auto-check preference.
      operationId: getUpdateConfig
      responses:
        "200":
          description: Current updater config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConfig"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error while reading updater config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Updates]
      summary: Set update configuration
      description: |
        Persists the update channel (`stable` or `prerelease`) and the
        auto-check toggle. Config is stored in the settings key-value table.
      operationId: setUpdateConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConfig"
      responses:
        "200":
          description: Updated config (echoed back from DB).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConfig"
        "400":
          description: Invalid request body or invalid channel value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error while saving or reading updater config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Updater service not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Artist field editing ---

  /artists/{id}/fields/{field}/display:
    get:
      tags: [Artists]
      summary: Get field display view
      operationId: getFieldDisplay
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field value (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                    description: Name of the metadata field.
                  value:
                    type: string
                    description: Formatted field value for display.
            text/html:
              schema:
                type: string
        "400":
          description: Non-editable field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/fields/{field}/edit:
    get:
      tags: [Artists]
      summary: Get field edit view
      operationId: getFieldEdit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field value for editing (returns HTML edit form when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                    description: Name of the metadata field.
                  value:
                    type: string
                    description: Current field value for editing.
            text/html:
              schema:
                type: string

  /artists/{id}/fields/{field}:
    patch:
      tags: [Artists]
      summary: Update a single metadata field
      description: |
        Updates one metadata field on the artist. Supported fields:
        biography, genres, styles, moods, formed, born, disbanded, died,
        years_active, type, gender, name, sort_name, disambiguation,
        musicbrainz_id, audiodb_id, discogs_id, wikidata_id, deezer_id.

        Validation rules: name must be non-empty (rejects empty or
        whitespace-only strings); musicbrainz_id must be a valid UUID when
        non-empty (an empty string clears the stored ID).
      operationId: updateField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
      responses:
        "200":
          description: Field updated (returns HTML display fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the operation.
                  field:
                    type: string
                    description: Name of the updated metadata field.
                  value:
                    type: string
                    description: Updated field value.
            text/html:
              schema:
                type: string
        "400":
          description: Unknown field, invalid value, or validation failure (e.g. empty name or malformed MBID)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Artists]
      summary: Clear a single metadata field
      operationId: clearField
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field cleared (returns HTML display fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the operation.
                  field:
                    type: string
                    description: Name of the updated metadata field.
            text/html:
              schema:
                type: string
        "400":
          description: Unknown field or field cannot be cleared (e.g. name must remain non-empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/fields/{field}/providers:
    get:
      tags: [Artists]
      summary: Compare field value across providers
      operationId: getFieldProviders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider comparison results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    type: string
                    description: Name of the metadata field queried.
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                          description: Name of the provider.
                        value:
                          type: string
                          description: Field value returned by this provider.
                        values:
                          type: array
                          items:
                            type: string
                          description: Array of field values when the field is multi-valued.
                        has_data:
                          type: boolean
                          description: Whether the provider returned data for this field.
                        error:
                          type: string
                          description: Error message if the provider test failed.
                    description: Per-provider lookup results for this field.
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/members:
    delete:
      tags: [Artists]
      summary: Clear all band members
      operationId: clearMembers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members cleared (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /artists/{id}/members/from-provider:
    post:
      tags: [Artists]
      summary: Save band members from provider data
      operationId: saveMembersFromProvider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  mbid:
                    type: string
                  instruments:
                    type: array
                    items:
                      type: string
                  vocal_type:
                    type: string
                  date_joined:
                    type: string
                  date_left:
                    type: string
                  is_active:
                    type: boolean
      responses:
        "200":
          description: Members saved (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Artist refresh and disambiguation ---

  /artists/{id}/refresh:
    post:
      tags: [Artists]
      summary: Refresh artist metadata from providers
      description: >
        Triggers a full metadata refresh. If the artist has no MusicBrainz ID,
        returns a disambiguation prompt instead.
      operationId: refreshArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refresh result or disambiguation prompt (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the metadata refresh.
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Metadata field name.
                        provider:
                          type: string
                          description: Name of the provider that supplied this field.
                    description: Per-field provider attribution for updated fields.
                  warning:
                    type: string
                    description: Present when metadata was refreshed but name update could not be saved.
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/search:
    post:
      tags: [Artists]
      summary: Search providers for disambiguation
      operationId: refreshSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
      responses:
        "200":
          description: Disambiguation candidates (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                    description: Search results from the refresh operation.
            text/html:
              schema:
                type: string
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/link:
    post:
      tags: [Artists]
      summary: Link artist to provider ID and refresh
      operationId: refreshLink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mbid:
                  type: string
                discogs_id:
                  type: string
                source:
                  type: string
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                mbid:
                  type: string
                discogs_id:
                  type: string
                source:
                  type: string
      responses:
        "200":
          description: Linked and refreshed (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the metadata refresh.
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Metadata field name.
                        provider:
                          type: string
                          description: Name of the provider that supplied this field.
                    description: Per-field provider attribution for updated fields.
                  warning:
                    type: string
                    description: Present when metadata was refreshed but name update could not be saved.
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- MusicBrainz contribution ---

  /artists/{id}/musicbrainz/diffs:
    get:
      tags: [Artists]
      operationId: getArtistMusicBrainzDiffs
      summary: Get metadata diffs between Stillwater and MusicBrainz
      description: >
        Returns computed diffs between the current Stillwater metadata and the
        last-known MusicBrainz values captured during the most recent provider
        refresh. Only fields where the Stillwater value is non-empty and differs
        from the MusicBrainz snapshot are included.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diff results
          content:
            application/json:
              schema:
                type: object
                properties:
                  artist_id:
                    type: string
                    description: ID of the artist.
                  musicbrainz_id:
                    type: string
                    description: MusicBrainz artist ID (MBID).
                  diffs:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Metadata field name
                        stillwater_value:
                          type: string
                          description: Current value in Stillwater
                        musicbrainz_value:
                          type: string
                          description: Last-known value from MusicBrainz
                        source:
                          type: string
                          description: Provider that sourced the current Stillwater value
                    description: List of field-level differences.
                  contribution_mode:
                    type: string
                    enum: [disabled, web_form, api]
                    description: Current MusicBrainz contribution setting
                  last_fetched_at:
                    type: string
                    format: date-time
                    description: When the MusicBrainz snapshots were last captured
        "404":
          description: Artist not found or has no MusicBrainz ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/reidentify:
    post:
      tags: [Artists]
      summary: Identify or re-identify an artist via MusicBrainz
      description: >
        Returns the disambiguation form so the user can link (or re-link)
        a MusicBrainz entry. When clear_ids is true, all provider IDs are
        wiped first (destructive "Re-identify" flow). Without it, existing
        IDs are preserved (non-destructive "Identify" flow).
      operationId: reidentifyArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                clear_ids:
                  type: string
                  enum: ["true"]
                  description: >
                    When set to "true", clears all provider IDs and fetch
                    timestamps before returning the disambiguation form.
                    Omit for the non-destructive identify flow.
      responses:
        "200":
          description: Disambiguation form returned (provider IDs cleared only when clear_ids=true; returns HTML disambiguation form when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the reidentification.
                  artist:
                    type: string
                    description: Artist name after reidentification.
                  message:
                    type: string
                    description: Human-readable result detail.
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/run-rules:
    post:
      tags: [Artists, Rules]
      summary: Run all enabled rules scoped to a single artist
      operationId: runArtistRules
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rules ran successfully; returns violation count and a pre-filtered dashboard link (JSON) or an inline HTML fragment (HTMX)
          content:
            application/json:
              schema:
                type: object
                properties:
                  violations_found:
                    type: integer
                    description: Number of violations detected for this artist
                  dashboard_url:
                    type: string
                    description: Dashboard URL pre-filtered to this artist's violations
            text/html:
              schema:
                type: string
                description: Inline result fragment for HTMX callers
        "404":
          description: Artist not found (non-HTMX callers only; HTMX callers receive a 200 with an inline error fragment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Rule evaluation failed (non-HTMX callers only; HTMX callers receive a 200 with an inline error fragment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured (non-HTMX callers only; HTMX callers receive a 200 with an inline error fragment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Additional image routes ---

  /artists/{id}/images/websearch:
    get:
      tags: [Images]
      summary: Search web for artist images
      operationId: webImageSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
        - name: sort
          in: query
          description: Sort order for results. Defaults to likes descending.
          schema:
            type: string
            enum: [likes, resolution]
            default: likes
      responses:
        "200":
          description: Web search image results (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                    description: Image results from web search providers.
            text/html:
              schema:
                type: string

  /artists/{id}/images/logo/trim:
    post:
      tags: [Images]
      summary: Trim transparent padding from logo
      operationId: trimLogo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Logo trimmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the logo trim operation.
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
        "404":
          description: Artist or logo not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/list:
    get:
      tags: [Images]
      summary: List all fanart images with metadata
      operationId: listFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: management
          in: query
          required: false
          description: When true and request is HTMX, returns the management gallery variant with per-slot controls
          schema:
            type: boolean
      responses:
        "200":
          description: Fanart gallery items (returns HTML gallery when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    index:
                      type: integer
                      description: Zero-based index of the fanart slot.
                    filename:
                      type: string
                      description: Name of the image file on disk.
                    width:
                      type: integer
                      description: Image width in pixels.
                    height:
                      type: integer
                      description: Image height in pixels.
                    size:
                      type: integer
                      format: int64
                      description: File size in bytes.
            text/html:
              schema:
                type: string

  /artists/{id}/images/fanart/{index}/file:
    get:
      tags: [Images]
      summary: Serve fanart image by index
      operationId: serveFanartByIndex
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Artist not found or index out of range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/batch:
    delete:
      tags: [Images]
      summary: Delete selected fanart by indices
      operationId: batchDeleteFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                indices:
                  type: array
                  items:
                    type: integer
              required: [indices]
      responses:
        "200":
          description: Fanart deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the delete operation.
                  deleted:
                    type: array
                    items:
                      type: string
                    description: Indices of the deleted fanart slots.
                  count:
                    type: integer
                    description: Number of fanart images remaining after deletion.
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Warnings from batch deletion, including file removal failures, renumbering issues, and platform sync errors. Empty only when there are no warnings.
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/fetch-batch:
    post:
      tags: [Images]
      summary: Fetch multiple fanart images from URLs
      operationId: batchFetchFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  maxItems: 20
              required: [urls]
      responses:
        "200":
          description: Fetch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the batch fetch.
                  saved:
                    type: array
                    items:
                      type: string
                    description: Filenames of images saved successfully.
                  errors:
                    type: array
                    items:
                      type: string
                    description: Error messages for any failed fetches.
                  count:
                    type: integer
                    description: Number of images fetched.
                  sync_warnings:
                    type: array
                    description: Warnings from syncing fanart to connected platforms after batch fetch. Empty when there are no sync issues.
                    items:
                      type: string
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/reorder:
    post:
      tags: [Images]
      summary: Reorder local fanart files
      operationId: reorderFanart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order:
                  type: array
                  description: Permutation of current slot indices defining the new order. order[i] = current slot that becomes new slot i.
                  items:
                    type: integer
              required: [order]
      responses:
        "200":
          description: Fanart reordered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the reorder operation.
                  count:
                    type: integer
                    description: Total number of fanart images after reorder.
                  sync_warnings:
                    type: array
                    description: Warnings from syncing reordered fanart to connected platforms. Empty only when there are no sync issues.
                    items:
                      type: string
        "400":
          description: Invalid permutation or length mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/{slot}/assign:
    post:
      tags: [Images]
      summary: Assign a platform backdrop to a local fanart slot
      operationId: assignFanartSlot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                  description: ID of the platform connection to download from
                platform_index:
                  type: integer
                  minimum: 0
                  description: 0-based index of the backdrop on the platform
              required: [connection_id, platform_index]
      responses:
        "200":
          description: Backdrop assigned to slot
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the assignment.
                  slot:
                    type: integer
                    description: Zero-based fanart slot index.
                  count:
                    type: integer
                    description: Total number of fanart images after assignment.
                  sync_warnings:
                    type: array
                    description: Warnings from syncing fanart to connected platforms after assignment. Empty only when there are no sync issues.
                    items:
                      type: string
        "400":
          description: Invalid slot (gap), missing connection, or bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Failed to download backdrop from platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/fanart/{slot}:
    delete:
      tags: [Images]
      summary: Delete a single fanart slot and renumber remaining
      operationId: deleteFanartSlot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: slot
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fanart slot deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the delete operation.
                  deleted:
                    type: string
                    description: Filename of the deleted file
                  count:
                    type: integer
                    description: Number of fanart images remaining after deletion.
                  sync_warnings:
                    type: array
                    description: Warnings from fanart deletion, including renumbering issues and platform sync errors. Empty only when there are no warnings.
                    items:
                      type: string
        "400":
          description: Slot out of range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/platform-backdrops:
    get:
      tags: [Images]
      summary: List available backdrops from all connected platforms
      operationId: listPlatformBackdrops
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform backdrops grouped by connection (returns HTML panel when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  connections:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlatformBackdropConnection"
                    description: Per-connection backdrop image lists.
            text/html:
              schema:
                type: string

  /artists/{id}/platform-backdrops/{connectionId}/{index}/thumbnail:
    get:
      tags: [Images]
      summary: Proxy a platform backdrop image through Stillwater
      operationId: getPlatformBackdropThumbnail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
        - name: index
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proxied backdrop image
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: No platform mapping or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Failed to fetch backdrop from platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/fanart-sync-state:
    get:
      tags: [Images]
      summary: Get per-image sync state for fanart slots across connected platforms
      operationId: getFanartSyncState
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: >
            Per-slot sync state. When no Emby/Jellyfin connections exist, returns
            state "no_connections" with an empty slots array. For HTMX requests,
            returns HTML badge fragments with OOB swap targets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: "#/components/schemas/FanartSyncSlot"
                    description: Per-slot sync state for each fanart image.
                  state:
                    type: string
                    description: >
                      Only present when value is "no_connections", indicating no
                      Emby/Jellyfin connections are configured for this artist
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /images/random-backdrop:
    get:
      tags: [Images]
      summary: Random artist backdrop redirect
      operationId: randomBackdrop
      description: >
        Picks a random artist that has at least one fanart/backdrop image and
        returns a 307 redirect to that artist's fanart file endpoint. Used by
        the ambient backdrop feature to display a blurred background image in
        the layout shell. Returns 404 if no artists have fanart images.
      responses:
        "307":
          description: Redirect to artist fanart file endpoint
        "404":
          description: No artists with fanart images found

  /artists/{id}/images/{type}/file:
    get:
      tags: [Images]
      summary: Serve artist image file
      operationId: serveImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Artist or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}/info:
    get:
      tags: [Images]
      summary: Get image metadata (dimensions, size)
      operationId: getImageInfo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image metadata (returns HTML badge when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    description: Image type (e.g. thumb, fanart, logo, banner).
                  filename:
                    type: string
                    description: Name of the image file on disk.
                  width:
                    type: integer
                    description: Image width in pixels.
                  height:
                    type: integer
                    description: Image height in pixels.
                  size:
                    type: integer
                    format: int64
                    description: File size in bytes.
                  modified:
                    type: string
                    format: date-time
                    description: When the file was last modified (UTC, RFC 3339).
            text/html:
              schema:
                type: string
        "404":
          description: Artist or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/images/{type}:
    delete:
      tags: [Images]
      summary: Delete artist image
      operationId: deleteImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      responses:
        "200":
          description: Image deleted (returns HTML preview card when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the delete operation.
                  deleted:
                    type: array
                    items:
                      type: string
                    description: Filenames of images that were deleted.
                  sync_warnings:
                    type: array
                    items:
                      type: string
                    description: Platform sync warnings, including failures and reasons why sync was skipped. Empty only when there are no warnings.
            text/html:
              schema:
                type: string
        "409":
          description: No filesystem path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Push extras ---

  /artists/{id}/push/images:
    post:
      tags: [Push]
      summary: Push images to platform
      operationId: pushImages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                platform_artist_id:
                  type: string
                  description: >-
                    Platform-specific artist ID. If omitted, the server
                    looks up a stored mapping from the artist_platform_ids
                    table. Returns 400 if no stored mapping exists.
                image_types:
                  type: array
                  items:
                    type: string
                    enum: [thumb, fanart, logo, banner]
                  description: Types to push (defaults to all four)
              required: [connection_id]
      responses:
        "200":
          description: Push results
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploaded:
                    type: array
                    items:
                      type: string
                    description: Filenames of images uploaded to the platform.
                  errors:
                    type: array
                    items:
                      type: string
                    description: Error messages for any failed uploads.
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/push/images/{type}:
    delete:
      tags: [Push]
      summary: Delete a single image from a platform
      operationId: deletePushImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [thumb, fanart, logo, banner]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                platform_artist_id:
                  type: string
                  description: >-
                    Platform-specific artist ID. If omitted, the server
                    looks up a stored mapping from the artist_platform_ids
                    table. Returns 400 if no stored mapping exists.
              required: [connection_id]
      responses:
        "200":
          description: Image deleted
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: deleted
                    description: Result status of the delete operation.
        "400":
          description: >-
            Invalid request (invalid image type, missing connection_id,
            connection disabled, or no stored platform ID mapping)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist or connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Platform delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /events/stream:
    get:
      summary: SSE event stream
      description: |
        Server-Sent Events endpoint that streams real-time system events to
        connected browser clients. Events include scan completions, rule
        violations, bulk operation results, and artist updates.

        The connection sends a heartbeat comment every 30 seconds to keep
        the connection alive. Clients should auto-reconnect on disconnect.

        Event format follows the SSE specification with named events:
        ```
        event: scan.completed
        data: {"type":"scan.completed","title":"Scan completed","message":"Library scan finished","timestamp":"...","data":{}}
        ```
      operationId: getEventStream
      tags:
        - Events
      responses:
        "200":
          description: SSE stream established. Events are sent as text/event-stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE formatted event stream with named events and JSON data payloads.
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: SSE hub not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
