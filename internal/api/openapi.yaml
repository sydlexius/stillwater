  # --- Artist refresh and disambiguation ---

  /artists/{id}/rename-directory:
    post:
      tags: [Artists]
      summary: Rename the artist's on-disk directory
      description: >
        Renames the artist's directory to the supplied name and updates the
        stored path. Decoupled from the Name field edit (PATCH /artists/{id}/fields/name)
        so that editing display name does not have a filesystem side-effect
        that can break Emby/Jellyfin item-to-path mappings. See issue #1077.
      operationId: renameArtistDirectory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_dirname:
                  type: string
                  description: New leaf directory name. Must be a single path segment with no separators ("/" or "\"); "." and ".." are also rejected.
              required: [new_dirname]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                new_dirname:
                  type: string
                  description: New leaf directory name. Must be a single path segment with no separators ("/" or "\"); "." and ".." are also rejected.
              required: [new_dirname]
      responses:
        "200":
          description: >
            Directory renamed. The platforms array carries one entry per
            artist_platform_ids mapping found for the artist (Emby /
            Jellyfin / Lidarr). When the platform-mapping enumeration
            itself fails, the array also contains one synthesized failure
            entry whose connection_id is the empty string, so the response
            always carries a concrete signal instead of an empty slice that
            hides a backend error. An empty array therefore means exactly
            "this artist has no platform mappings" with no ambiguity. A
            single per-platform failure does NOT roll back the rename; the
            local filesystem + database are already consistent and a stale
            item-to-path mapping on a peer is recoverable.
          content:
            application/json:
              schema:
                type: object
                required: [status, new_path, platforms]
                properties:
                  status:
                    type: string
                    enum: [renamed]
                  new_path:
                    type: string
                  platforms:
                    type: array
                    items:
                      type: object
                      required: [connection_id, result]
                      properties:
                        connection_id:
                          type: string
                          description: Platform connection ID. Empty only for the synthesized enumeration-failure entry (result will be "failed" with an explanatory error).
                        result:
                          type: string
                          enum: [ok, failed]
                        error:
                          type: string
                          description: User-safe summary of the failure. Present only when result is "failed".
        "400":
          description: Invalid directory name (empty, ".", "..", contains a separator, or matches the current directory name).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Artist locked, has no path, or destination directory already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Filesystem or database error during rename
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh:
    post:
      tags: [Artists]
      summary: Refresh artist metadata from providers
      description: >
        Triggers a full metadata refresh. If the artist has no MusicBrainz ID,
        returns a disambiguation prompt instead.
      operationId: refreshArtist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refresh result or disambiguation prompt (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the metadata refresh.
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Metadata field name.
                        provider:
                          type: string
                          description: Name of the provider that supplied this field.
                    description: Per-field provider attribution for updated fields.
                  warning:
                    type: string
                    description: Present when metadata was refreshed but name update could not be saved.
            text/html:
              schema:
                type: string
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/search:
    post:
      tags: [Artists]
      summary: Search providers for disambiguation
      operationId: refreshSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                query:
                  type: string
              required: [query]
      responses:
        "200":
          description: Disambiguation candidates (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                    description: Search results from the refresh operation.
                  failed_providers:
                    type: array
                    items:
                      type: string
                    description: |
                      Human-readable display names of providers that errored
                      during the search. Present only when at least one
                      provider failed; absent when every provider succeeded
                      (so the legitimate "no matches" state stays distinct
                      from "providers unreachable"). Added in issue #1663.
            text/html:
              schema:
                type: string
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/refresh/link:
    post:
      tags: [Artists]
      summary: Link artist to provider ID and refresh
      operationId: refreshLink
      parameters:
        - name: id
