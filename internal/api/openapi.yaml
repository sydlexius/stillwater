            schema:
              type: object
              properties:
                passphrase:
                  type: string
              required: [passphrase]
      responses:
        "200":
          description: Encrypted settings JSON file download
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortableSettingsEnvelopeExport"
        "400":
          description: Missing passphrase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
