  # --- Libraries ---

  /libraries:
    get:
      tags: [Libraries]
      summary: List libraries
      operationId: listLibraries
      responses:
        "200":
          description: All libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
    post:
      tags: [Libraries]
      summary: Create library
      operationId: createLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular]
                  default: regular
              required: [name]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular]
                  default: regular
              required: [name]
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Duplicate library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /libraries/{id}:
    get:
      tags: [Libraries]
      summary: Get library
      operationId: getLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Library with artist count
          content:
            application/json:
              schema:
                type: object
                properties:
                  library:
                    $ref: "#/components/schemas/Library"
                  artist_count:
                    type: integer
                    description: Number of artists in this library.
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Libraries]
      summary: Update library
      operationId: updateLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular]
                fs_watch:
                  type: integer
                fs_poll_interval:
                  type: integer
                  description: Seconds between polls (60, 300, 900, or 1800)
                nfo_lock_data:
                  type: boolean
                  description: When true, NFOs written for artists in this library carry <lockdata>true</lockdata>. Off by default; opt-in per library (issue #1264).
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular]
                nfo_lock_data:
                  type: boolean
                  description: When true, NFOs written for artists in this library carry <lockdata>true</lockdata>. Off by default; opt-in per library (issue #1264). Accepts "true"/"false", "1"/"0" (parsed via strconv.ParseBool), and "on" (the default value a checked browser checkbox submits when no explicit value attribute is set). Omit the key entirely to preserve the current setting; an unchecked HTML checkbox simply omits the field.
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Libraries]
      summary: Delete library
      description: >-
        Removes the library. Behavior depends on the `deleteArtists` query
        parameter:


        * `deleteArtists=true`: among the artists that had explicit
          membership in the removed library, delete every one that has no
          remaining home -- no other library membership, and no platform
          mapping on a connection other than the removed library's
          connection (mappings on the same connection do not count, since
          the library being removed was the only tie to that connection).
          Artists that retain another home are preserved.

        * Omitted or `deleteArtists=false`: dereference the library and
          preserve artists that retain another anchor. An artist is preserved
          when it still has at least one other library membership OR at least
          one platform mapping; an artist left with zero library memberships
          AND zero platform mappings is a true zero-home orphan and is pruned
          in the same transaction.
      operationId: deleteLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deleteArtists
          in: query
          description: >-
            When true, the artists that had membership in the removed library
            are deleted if they have no other home (no other library
            membership and no platform mapping on a different connection);
            artists with another home are preserved. When false or omitted,
            the library is dereferenced and only true zero-home orphans (no
            memberships, no platform mappings) are pruned.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Library deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags: [Libraries]
      summary: Partially update library
      description: >
        Applies a partial update to an existing library. Only the fields
        present in the request body are modified; omitted fields are
        preserved. Currently supports the "type" field.
      operationId: patchLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              additionalProperties: false
              properties:
                type:
                  type: string
                  enum: [regular]
                  description: New library type. Only "regular" is accepted.
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [type]
              additionalProperties: false
              properties:
                type:
                  type: string
                  enum: [regular]
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /libraries/{libId}/operation/status:
    get:
      tags: [Libraries]
      summary: Get library operation status
      operationId: getLibraryOpStatus
      parameters:
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current operation status (or idle)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"

  /connections/populate/in-flight:
    get:
      tags: [Libraries]
      summary: List in-flight populate operations
      description: >
        Returns every populate library operation currently in the running
        state, as ProgressPill event envelopes. Used by the SSE
        reconnect-rehydrate path (#1641) so the global ProgressPill UI can
        replay in-flight populate state without per-library status fan-out
        when the EventSource reconnects after a disconnect.
      operationId: listInFlightPopulates
      responses:
        "200":
          description: List of running populate operations (empty when idle)
          content:
            application/json:
              schema:
                type: object
                required: [operations]
                properties:
                  operations:
                    type: array
                    items:
                      type: object
                      required: [op_id, label, processed, total, status]
                      properties:
                        op_id:
                          type: string
                          description: Stable identifier matching the SSE operation.progress payload.
                        label:
                          type: string
                          description: Human-readable verb for the ProgressPill.
                        processed:
                          type: integer
                          description: Items processed so far (0 when total is unknown).
                        total:
                          type: integer
                          description: Total work units (0 when indeterminate).
                        status:
                          type: string
                          enum: [running]
                          description: Always "running"; terminal-state ops are not returned.

  # --- Connection extras ---

  /connections/clobber-check:
    get:
      tags: [Connections]
      summary: Check for NFO/image write conflicts
      description: >
        When no library has a filesystem path configured, returns an empty
        risk list immediately since there are no on-disk files to conflict
        with. Otherwise checks all enabled connections for NFO/image writing
        configuration that could overwrite Stillwater-managed files.
      operationId: clobberCheck
      responses:
        "200":
          description: Clobber risk assessment (returns HTML warnings when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_risk:
                    type: boolean
                    description: Whether any connections have clobber risk.
                  risks:
                    type: array
                    items:
                      type: object
                      properties:
                        connection_id:
                          type: string
                          description: ID of the connection with clobber risk.
                        connection_name:
                          type: string
                          description: Display name of the connection.
                        connection_type:
                          type: string
                          description: Platform type of the connection.
                        nfo_writer:
                          type: boolean
                          description: Whether an NFO writer is enabled and may clobber files.
                        library_name:
                          type: string
                          description: Name of the platform library at risk.
                        error:
                          type: string
                          description: Error message if the operation failed.
                    description: List of connections with clobber risk.
            text/html:
              schema:
                type: string

  /connections/{id}/features:
    patch:
      tags: [Connections]
      summary: Update connection feature flags
      operationId: updateConnectionFeatures
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                feature_library_import:
                  type: boolean
                feature_nfo_write:
                  type: boolean
                feature_image_write:
                  type: boolean
                feature_metadata_push:
                  type: boolean
                feature_trigger_refresh:
                  type: boolean
      responses:
        "200":
          description: Features updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/platform-settings:
    get:
      tags: [Connections]
      summary: Get platform fetcher/saver settings
      operationId: getPlatformSettings
      description: >
        Returns the current fetcher, saver, and metadata downloader configuration
        for all music libraries on the connected platform. For Emby/Jellyfin this
        is per-library; for Lidarr it is global metadata consumers.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform settings for the connection
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/EmbyJellyfinPlatformSettings"
                  - $ref: "#/components/schemas/LidarrPlatformSettings"
                discriminator:
                  propertyName: connection_type
                  mapping:
                    emby: "#/components/schemas/EmbyJellyfinPlatformSettings"
                    jellyfin: "#/components/schemas/EmbyJellyfinPlatformSettings"
                    lidarr: "#/components/schemas/LidarrPlatformSettings"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Platform unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/platform-settings/disable:
    post:
      tags: [Connections]
      summary: Disable conflicting platform settings
      operationId: disablePlatformSettings
      description: >
        Disables conflicting fetchers, savers, and metadata downloaders on the
        connected platform. For Emby/Jellyfin this operates per-library (requires
        library_id). For Lidarr this disables a global metadata consumer (requires
        consumer_id).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                library_id:
                  type: string
                  description: Required for Emby/Jellyfin connections.
                consumer_id:
                  type: integer
                  description: Required for Lidarr connections.
      responses:
        "200":
          description: Settings disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the disable operation.
                  note:
                    type: string
                    description: Platform-specific advisory note (Jellyfin NFO lockdata).
        "400":
          description: Missing required field for connection type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Platform unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/stillwater-managed:
    post:
      tags: [Connections]
      summary: Toggle "Let Stillwater manage images and NFO files on this server"
      operationId: setStillwaterManaged
      description: >
        When enabled=true, Stillwater PATCHes the peer's music library options
        to disable SaveLocalMetadata + MetadataSavers (or Lidarr's metadata
        consumers), snapshotting the prior config so it can be restored when
        the toggle is flipped off. When enabled=false, Stillwater replays the
        snapshot onto the peer and clears it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: >
          The HTMX toggle in the Connections settings page posts form-encoded;
          API/curl callers can use JSON. The handler accepts either and also
          honors an `?enabled=` query param as a last resort.
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        "200":
          description: Toggle state updated
          content:
            application/json:
              schema:
                type: object
                required: [connection_id, feature_manage_server_files]
                properties:
                  connection_id:
                    type: string
                  feature_manage_server_files:
                    type: boolean
        "400":
          description: >
            Invalid request. Returned when the connection id is missing from
            the path, the request body could not be read, or the body was
            neither valid JSON nor a parseable form.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Peer rejected the snapshot or restore
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/verify-path-after-update:
    post:
      tags: [Connections]
      summary: Toggle "Verify path after rename" (Lidarr only)
      operationId: setVerifyPathAfterUpdate
      description: >
        When true, issues a follow-up GET after rename PUT to verify path
        wasn't coerced. Lidarr only. Returns 400 for non-Lidarr connections.
        The HTMX toggle posts form-encoded; API/curl callers can use JSON; an
        `?enabled=` query param is honored as a last resort. A missing or
        unparsable `enabled` is rejected with 400, never coerced to false.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        "200":
          description: Toggle state updated; returns the updated connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"
        "400":
          description: >
            Invalid request. Returned when the connection id is missing, the
            body could not be read or parsed, the `enabled` key is missing or
            unparsable, or the connection is not a Lidarr connection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Persisting the toggle failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /conflicts:
    get:
      tags: [Connections]
      summary: Get the current conflict ledger
      operationId: getConflicts
      description: >
        Returns the aggregated conflict state across every configured connection.
        Used by the UI banner and by external monitoring to audit whether
        Stillwater's writes are currently gated. Pass refresh=1 to force a
        synchronous re-query of every peer (useful after a remediation).
      parameters:
        - name: refresh
          in: query
          required: false
          schema:
            type: string
            enum: ["1"]
      responses:
        "200":
          description: Current ledger
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated_at:
                    type: string
                    format: date-time
                  connections:
                    type: array
                    items:
                      type: object
                  round_trips:
                    type: array
                    items:
                      type: object
                  foreign_files:
                    type: object
                    description: |
                      Foreign-file summary attached to the ledger by the banner
                      handler. A non-zero count promotes the banner to the
                      slate/blue warning state when no real conflict is active.
                    properties:
                      count:
                        type: integer
        "503":
          description: Detector not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /onboarding/reset:
    post:
      operationId: resetOnboarding
      summary: Reset onboarding wizard progress (admin-only)
      description: |
        Clears `onboarding.completed` and resets `onboarding.step` to "0"
        so the next visit to `/` redirects to the wizard. User-facing
        settings (libraries, providers, connections, profile) are
        preserved. Requires an authenticated administrator request.
      tags: [Onboarding]
      responses:
        "204":
          description: Wizard progress reset
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but not admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error while resetting onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /onboarding/conflict-step:
    post:
      tags: [Connections]
      summary: Rendered HTML body for the OOBE conflict pre-flight step
      operationId: postOnboardingConflictStep
      description: >
        HTMX-loaded by the onboarding wizard when the user transitions
        into step 5 (conflict pre-flight, see #1184). Returns the same
        per-state body partials the persistent banner uses but with
        OOBE-specific copy and a hidden gate input. Empty-body (204)
        responses indicate the conflict detector is not configured.

        POST is used because the handler mutates state on every call
        (writes the conflict_check_completed_at marker; with refresh=1
        also invalidates the detector cache). Routing as POST keeps the
        endpoint inside CSRF protection.
      parameters:
        - name: refresh
          in: query
          required: false
          schema:
            type: string
            enum: ["1"]
      responses:
        "200":
          description: Body HTML
          content:
            text/html:
              schema:
                type: string
        "204":
          description: Detection unavailable; no content

  /config/conflict-banner:
    get:
      tags: [Connections]
      summary: Rendered HTML partial for the conflict banner
      operationId: getConflictBanner
      description: >
        HTMX consumers swap the response into #conflict-banner. Empty-body
        responses (204) indicate detection is not available; an HTML fragment
        is returned otherwise.
      parameters:
        - name: refresh
          in: query
          required: false
          schema:
            type: string
            enum: ["1"]
      responses:
        "200":
          description: Banner HTML
          content:
            text/html:
              schema:
                type: string
        "204":
          description: Detection unavailable; no content

  /connections/{id}/platform-summary:
    get:
      tags: [Connections]
      summary: Get platform settings management summary
      operationId: getPlatformSummary
      description: >
        Returns an aggregate summary of platform fetcher/saver management status
        for a connection. Used for connection card badges.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform settings summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_libraries:
                    type: integer
                    description: Total number of music libraries (Emby/Jellyfin).
                  managed_libraries:
                    type: integer
                    description: Number of libraries with no conflicting settings (Emby/Jellyfin).
                  total_consumers:
                    type: integer
                    description: Total number of metadata consumers (Lidarr).
                  has_conflicts:
                    type: boolean
                    description: Whether any library or consumer has conflicting settings.
                  needs_lockdata:
                    type: boolean
                    description: Jellyfin only. Indicates NFO lockdata injection is required.
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Platform unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries:
    get:
      tags: [Connections]
      summary: Discover libraries on connection
      operationId: discoverLibraries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available libraries (returns HTML checklist when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    external_id:
                      type: string
                      description: Platform-specific library identifier.
                    name:
                      type: string
                      description: Display name of the library on the platform.
                    imported:
                      type: boolean
                      description: Whether this library has been imported into Stillwater.
            text/html:
              schema:
                type: string
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/import:
    post:
      tags: [Connections]
      summary: Import libraries from connection
      description: >
        After creating each library, automatically starts a background
        populate operation to fetch artists from the connection. Poll
        GET /api/v1/libraries/{libId}/operation/status for progress.
      operationId: importLibraries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraries:
                  type: array
                  items:
                    type: object
                    properties:
                      external_id:
                        type: string
                      name:
                        type: string
                    required: [external_id, name]
              required: [libraries]
      responses:
        "201":
          description: Libraries imported
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/{libId}/populate:
    post:
      tags: [Connections]
      summary: Populate artists from connection into library
      operationId: populateLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Populate operation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"
        "409":
          description: Operation already running or connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/{libId}/scan:
    post:
      tags: [Connections]
      summary: Scan library via connection API
      operationId: scanLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Scan operation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"
        "409":
          description: Operation already running or connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Provider extras ---

  /providers/priorities/{field}/{provider}/toggle:
    put:
      tags: [Providers]
      summary: Toggle provider for a metadata field
      operationId: toggleFieldProvider
      parameters:
        - name: field
          in: path
          required: true
          schema:
            type: string
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider toggled (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "404":
          description: Field not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /providers/websearch:
    get:
      tags: [Providers]
      summary: List web search image providers
      operationId: getWebSearchProviders
      responses:
        "200":
          description: Web search providers with enabled state
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Internal provider identifier.
                        display_name:
                          type: string
                          description: Human-readable provider display name.
                        enabled:
                          type: boolean
                          description: Whether this web search provider is active.
                    description: Available web search image providers.

  /providers/websearch/{name}/toggle:
    put:
      tags: [Providers]
      summary: Enable or disable a web search provider
      operationId: setWebSearchEnabled
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
              required: [enabled]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
              required: [enabled]
      responses:
        "200":
          description: Provider state updated (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "400":
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Scraper ---

  /scraper/config:
    get:
      tags: [Scraper]
      summary: Get global scraper configuration
      operationId: getScraperConfig
      responses:
        "200":
          description: Scraper config with field mappings and fallback chains
          content:
            application/json:
              schema:
                type: object
    put:
      tags: [Scraper]
      summary: Update global scraper configuration
      operationId: updateScraperConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Config saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scraper/config/connections/{id}:
    get:
      tags: [Scraper]
      summary: Get connection scraper config overrides
      operationId: getConnectionScraperConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Merged config with override indicators
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: object
                    description: Current scraper configuration for this connection.
                  raw:
                    type: object
                    description: Raw configuration data from the platform.
                  overrides:
                    type: object
                    description: User-defined configuration overrides.
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Scraper]
      summary: Update connection scraper config overrides
      operationId: updateConnectionScraperConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Config saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Scraper]
      summary: Reset connection scraper config to global defaults
      operationId: resetConnectionScraperConfig
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Config reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scraper/providers:
    get:
      tags: [Scraper]
      summary: List scraper providers with capabilities
      operationId: listScraperProviders
      responses:
        "200":
          description: Provider capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                          description: Internal provider identifier.
                        display_name:
                          type: string
                          description: Human-readable provider display name.
                        requires_auth:
                          type: boolean
                          description: Whether the provider requires API key authentication.
                        has_key:
                          type: boolean
                          description: Whether the provider has an API key configured.
                        metadata_fields:
                          type: array
                          items:
                            type: string
                          description: Metadata fields this provider can supply.
                        image_fields:
                          type: array
                          items:
                            type: string
                          description: Image types this provider can supply.
                    description: Available metadata scraper providers.

  # --- Notifications ---

  /notifications/counts:
    get:
      tags: [Notifications]
      summary: Get violation counts by severity
      operationId: getNotificationCounts
      responses:
        "200":
          description: Counts by severity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    description: Number of error-severity violations.
                  warning:
                    type: integer
                    description: Number of warning-severity violations.
                  info:
                    type: integer
                    description: Number of info-severity violations.
                  total:
                    type: integer
                    description: Total number of violations.

  /notifications/badge:
    get:
      tags: [Notifications]
      summary: Get notification badge HTML fragment
      description: Returns an HTML fragment for HTMX polling. Not a JSON endpoint.
      operationId: getNotificationBadge
      responses:
        "200":
          description: Badge HTML fragment
          content:
            text/html:
              schema:
                type: string

  /notifications:
    get:
      tags: [Notifications]
      summary: List rule violations with optional filtering and sorting
      operationId: listNotifications
      parameters:
        - name: status
          in: query
          description: Filter by violation status. "active" returns open + pending_choice.
          schema:
            type: string
            enum: [active, open, dismissed, resolved, pending_choice]
            default: active
        - name: sort
          in: query
          description: Sort column
          schema:
            type: string
            enum: [severity, artist_name, rule_id, created_at]
            default: severity
        - name: order
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: severity
          in: query
          description: Filter by severity level
          schema:
            type: string
            enum: [error, warning, info]
        - name: category
          in: query
          description: Filter by rule category
          schema:
            type: string
            enum: [nfo, image, metadata]
        - name: rule_id
          in: query
          description: Filter by specific rule ID
          schema:
            type: string
        # group_by is supported on the HTML endpoint (/notifications/table) only.
        # It is not included here because the JSON response is always a flat array.
      responses:
        "200":
          description: Violations matching filter
          content:
            application/json:
              schema:
                type: object
                properties:
                  violations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Violation"
                    description: List of violation records.
                  count:
                    type: integer
                    description: Total number of violations in this response.
        "400":
          description: Invalid sort or order parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/{id}/dismiss:
    post:
      tags: [Notifications]
      summary: Dismiss a violation
      operationId: dismissViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/resolve:
    post:
      tags: [Notifications]
      summary: Resolve a violation
      operationId: resolveViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /notifications/{id}/apply-candidate:
    post:
      tags: [Notifications]
      summary: Apply an image candidate from a pending-choice violation
      operationId: applyViolationCandidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                image_type:
                  type: string
                  enum: [thumb, fanart, logo, banner]
              required: [url, image_type]
      responses:
        "200":
          description: Candidate applied and violation resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid request or URL mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/bulk-dismiss:
    post:
      tags: [Notifications]
      summary: Bulk dismiss violations
      operationId: bulkDismissViolations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Violation IDs to dismiss (omit to dismiss all)
      responses:
        "200":
          description: Count of dismissed violations
          content:
            application/json:
              schema:
                type: object
                properties:
                  dismissed:
                    type: integer
                    description: Number of violations dismissed.

  /notifications/{id}/fix:
    post:
      tags: [Notifications]
      summary: Apply recommended fix for a violation
      description: |
        Applies the recommended fix for a single violation. For open fixable
        violations, routes through the appropriate fixer (NFO generation,
        metadata fetch, image fetch, directory rename, etc.). Returns the
        fix result with status and message. When the fix modifies NFO files,
        image files, or renames an artist directory, the response may include
        an undo_id that can be passed to
        POST /fix-undo/{undoId} within 30 seconds to revert it.
        Metadata-only fixes, dismissed violations, and failed fixes do not
        produce an undo_id.
      operationId: fixViolation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fix result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [fixed, dismissed, failed]
                    description: Fix result state
                  message:
                    type: string
                    description: Human-readable result description
                  undo_id:
                    type: string
                    description: |
                      Opaque token used to revert this fix via
                      POST /fix-undo/{undoId}. Present only when
                      the fix modified filesystem files and an undo entry was
                      registered. Absent for metadata-only fixes, dismissed
                      violations, and failed fixes.
                  undo_expires_in:
                    type: integer
                    description: |
                      Number of seconds until the undo window closes. Present
                      only when undo_id is set.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /fix-undo/{undoId}:
    post:
      tags: [Notifications]
      summary: Revert a recently applied fix
      description: |
        Reverts a fix that was applied within the undo window (30 seconds).
        The undoId is returned by POST /notifications/{id}/fix when the fix
        modified filesystem files. The undo entry is single-use and expires
        after 30 seconds. Returns 410 Gone when the window has elapsed or
        the token has already been used. On success, attempts to reopen the
        violation so it reappears as fixable in the notifications list;
        reopening may fail even when the revert itself succeeds, in which
        case the response status is still "reverted" with a warning message.
      operationId: undoFix
      parameters:
        - name: undoId
          in: path
          required: true
          schema:
            type: string
          description: Opaque undo token returned by the fix endpoint
      responses:
        "200":
          description: Revert succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [reverted]
                    description: Always "reverted" on success
                  message:
                    type: string
                    description: Human-readable confirmation
        "410":
          description: Invalid, expired, or already-used undo token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Undo store not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/fix-all:
    post:
      tags: [Notifications]
      summary: Start async bulk fix for fixable violations
      description: |
        Starts an asynchronous operation that applies the recommended fix for
        all open fixable violations (pending_choice violations that require
        user candidate selection are excluded). Returns 202 with the total
        count. Poll /notifications/fix-all/status for progress.
      operationId: fixAllViolations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Optional subset of violation IDs. Omit to fix all fixable.
      responses:
        "202":
          description: Fix-all operation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                    description: Current state of the fix-all operation.
                  total:
                    type: integer
                    description: Total number of violations.
        "200":
          description: No fixable violations found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [completed]
                    description: Current state of the fix-all operation.
                  message:
                    type: string
                    description: Human-readable result detail.
                  total:
                    type: integer
                    description: Total number of violations.
        "400":
          description: Malformed JSON body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Fix-all already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                    description: Current state of the fix-all operation.
                  message:
                    type: string
                    description: Human-readable result detail.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/fix-all/status:
    get:
      tags: [Notifications]
      summary: Get fix-all operation progress
      description: Returns the current state of the most recent fix-all operation.
      operationId: fixAllStatus
      responses:
        "200":
          description: Fix-all progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, running, completed]
                    description: Current state of the fix-all operation.
                  total:
                    type: integer
                    description: Total number of violations.
                  processed:
                    type: integer
                    description: Number of violations processed so far.
                  fixed:
                    type: integer
                    description: Number of violations fixed so far.
                  skipped:
                    type: integer
                    description: Number of violations skipped (not fixable).
                  failed:
                    type: integer
                    description: Number of fix attempts that failed.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/export:
    get:
      tags: [Notifications]
      summary: Export filtered violations as CSV or JSON
      description: |
        Streams the current filtered violation list as a CSV file download.
        Respects the same filter and sort parameters as the list endpoint.
        Use format=json query param or Accept: application/json header for JSON output.
      operationId: exportNotifications
      parameters:
        - name: status
          in: query
          description: Filter by violation status. "active" returns open + pending_choice.
          schema:
            type: string
            enum: [active, open, dismissed, resolved, pending_choice]
            default: active
        - name: severity
          in: query
          schema:
            type: string
            enum: [error, warning, info]
        - name: category
          in: query
          schema:
            type: string
            enum: [nfo, image, metadata]
        - name: rule_id
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [severity, artist_name, rule_id, created_at]
            default: severity
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: format
          in: query
          description: Set to "json" for JSON output instead of CSV.
          schema:
            type: string
            enum: [json]
      responses:
        "200":
          description: CSV file download (or JSON when format=json)
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: object
                properties:
                  violations:
                    type: array
                    items:
                      type: object
                      properties:
                        artist_name:
                          type: string
                          description: Display name of the artist.
                        library_name:
                          type: string
                          description: Name of the library the artist belongs to.
                        rule_id:
                          type: string
                          description: Identifier of the rule that triggered this violation.
                        severity:
                          type: string
                          enum: [error, warning, info]
                          description: Violation severity level (error, warning, info).
                        message:
                          type: string
                          description: Human-readable result detail.
                        status:
                          type: string
                          enum: [open, dismissed, resolved, pending_choice]
                          description: Violation lifecycle state.
                        age:
                          type: string
                          description: Human-readable age (e.g. "5h", "3d")
                    description: List of violation records.
                  count:
                    type: integer
                    description: Total number of violations in this response.
        "400":
          description: Invalid sort or order parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications/resolved:
    delete:
      tags: [Notifications]
      summary: Clear old resolved violations
      description: Permanently deletes resolved violations older than 7 days.
      operationId: clearResolvedViolations
      responses:
        "200":
          description: Resolved violations cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /violations/trend:
    get:
      tags: [Reports]
      summary: Get daily violation creation and resolution counts
      operationId: getViolationTrend
      parameters:
        - name: days
          in: query
          description: Number of past days to include. Values outside 1-365 default to 30.
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Daily violation trend data
          content:
            application/json:
              schema:
                type: object
                required: [trend]
                properties:
                  trend:
                    type: array
                    items:
                      type: object
                      required: [date, created, resolved]
                      properties:
                        date:
                          type: string
                          format: date
                          description: Calendar date (YYYY-MM-DD)
                        created:
                          type: integer
                          description: Number of violations created on this date
                        resolved:
                          type: integer
                          description: Number of violations resolved on this date
                    description: Violation count trend data points.
        "500":
          description: Internal server error

  # --- Report extras ---

  /reports/health/by-library:
