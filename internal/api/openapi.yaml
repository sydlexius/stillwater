                    description: Per-library health breakdown.
                  overall:
                    type: object
                    description: Aggregate health summary across all libraries.
            text/html:
              schema:
                type: string

  /reports/compliance/export:
    get:
      tags: [Reports]
      summary: Export compliance report as CSV
      operationId: exportComplianceReport
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            default: name
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
        - name: library_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [compliant, non_compliant]
        - name: health_min
          in: query
          schema:
            type: integer
        - name: health_max
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  /reports/metadata-completeness:
    get:
      tags: [Reports]
      summary: Get aggregate metadata completeness report
      description: >
        Returns field-level coverage percentages across all non-excluded artists.
        Artist type-aware fields (formed for groups, born for persons) are only
        counted for applicable artists. When library_id is provided the report
        is scoped to that library.
      operationId: getMetadataCompleteness
      parameters:
        - name: library_id
          in: query
          schema:
            type: string
          description: Scope the report to a specific library. Omit to include all libraries.
      responses:
        "200":
          description: Metadata completeness report (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_score:
                    type: number
                    format: float
                    description: Mean field-coverage percentage across all applicable field/artist pairs.
                  total_artists:
                    type: integer
                    description: Number of non-excluded artists included in the report.
                  field_coverage:
                    type: array
                    description: Per-field breakdown sorted by percentage ascending (worst coverage first).
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Human-readable field name.
                        count:
                          type: integer
                          description: Number of artists with this field populated.
                        total:
                          type: integer
                          description: Number of artists for which this field is applicable.
                        percentage:
                          type: number
                          format: float
                          description: count/total*100 rounded to one decimal place.
                      required: [field, count, total, percentage]
                  library_coverage:
                    type: array
                    description: Per-library summary. Omitted when only one or no library exists.
                    items:
                      type: object
                      properties:
                        library_id:
                          type: string
                          description: ID of the library.
                        library_name:
                          type: string
                          description: Display name of the library.
                        total_artists:
                          type: integer
                          description: Total number of artists in this library.
                        score:
                          type: number
                          format: float
                          description: Health score from 0.0 (worst) to 1.0 (best).
                        fields:
                          type: array
                          description: Per-field coverage breakdown for this library.
                          items:
                            type: object
                            properties:
                              field:
                                type: string
                                description: Human-readable field name.
                              count:
                                type: integer
                                description: Number of artists with this field populated.
                              total:
                                type: integer
                                description: Number of artists for which this field is applicable.
                              percentage:
                                type: number
                                format: float
                                description: count/total*100 rounded to one decimal place.
                            required: [field, count, total, percentage]
                  lowest_completeness:
                    type: array
                    description: Bottom artists by health score.
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Unique identifier.
                        name:
                          type: string
                          description: Display name of the artist.
                        library_id:
                          type: string
                          description: ID of the library.
                        health_score:
                          type: number
                          format: float
                          description: Metadata completeness score from 0.0 to 1.0.
                      required: [id, name, library_id, health_score]
                required: [overall_score, total_artists, field_coverage, lowest_completeness]
            text/html:
              schema:
                type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Inbound webhooks ---

  /webhooks/inbound/lidarr:
    post:
      tags: [Webhooks]
      summary: Receive Lidarr webhook event
      description: >
        Accepts inbound webhook events from Lidarr. Responds immediately with 200
        and processes the event asynchronously. Uses standard authentication
        (session cookie, bearer token, or API key query parameter).
      operationId: handleLidarrWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventType:
                  type: string
                  description: Lidarr event type (Test, ArtistAdded, Grab, Download, AlbumImport)
                artist:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    path:
                      type: string
                    mbId:
                      type: string
                    foreignArtistId:
                      type: string
              required: [eventType]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/inbound/emby:
    post:
      tags: [Webhooks]
      summary: Receive Emby webhook event
      description: >
        Accepts inbound webhook events from Emby. Responds immediately with 200
        and processes the event asynchronously. Uses standard authentication
        (session cookie, bearer token, or API key query parameter).
      operationId: handleEmbyWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Event:
                  type: string
                  description: >
                    Emby event type (system.notificationtest, library.new,
                    item.updated, library.changed)
                Item:
                  type: object
                  properties:
                    Id:
                      type: string
                    Name:
                      type: string
                    Type:
                      type: string
                      description: Media type, e.g. MusicAlbum
                    ProviderIds:
                      type: object
                      additionalProperties:
                        type: string
                    Path:
                      type: string
                    ArtistItems:
                      type: array
                      description: Related artist references (Emby 4.9+)
                      items:
                        type: object
                        properties:
                          Id:
                            type: string
                          Name:
                            type: string
              required: [Event]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhooks/inbound/jellyfin:
    post:
      tags: [Webhooks]
      summary: Receive Jellyfin webhook event
      description: >
        Accepts inbound webhook events from the Jellyfin webhook plugin. Responds
        immediately with 200 and processes the event asynchronously. Uses standard
        authentication (session cookie, bearer token, or API key query parameter).
      operationId: handleJellyfinWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                NotificationType:
                  type: string
                  description: Jellyfin event type (Test, ItemAdded, ItemUpdated, LibraryChanged)
                ItemId:
                  type: string
                ItemType:
                  type: string
                  description: Media type, e.g. MusicAlbum
                Name:
                  type: string
                Artist:
                  type: string
                  description: Artist name from the Jellyfin webhook plugin
                Provider_musicbrainzalbumartist:
                  type: string
                  description: MusicBrainz album artist ID from the Jellyfin webhook plugin
              required: [NotificationType]
      responses:
        "200":
          description: Event accepted for async processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Missing required webhook scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Settings extras ---

  /settings/logging:
    get:
      tags: [Settings]
      summary: Get logging configuration
      operationId: getLogging
      responses:
        "200":
          description: Current logging config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggingConfig"
    put:
      tags: [Settings]
      summary: Update logging configuration
      operationId: updateLogging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoggingConfig"
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                level:
                  type: string
                  enum: [trace, debug, info, warn, error]
                format:
                  type: string
                  enum: [text, json]
                file_path:
                  type: string
                file_max_size_mb:
                  type: integer
                file_max_files:
                  type: integer
                file_max_age_days:
                  type: integer
      responses:
        "200":
          description: Updated logging config (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoggingConfig"
            text/html:
              schema:
                type: string
        "400":
          description: Invalid level or format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs/files:
    get:
      tags: [Logs]
      summary: List available log files
      description: Returns the log files available for browsing. The current (actively written) file is listed first, followed by rotated backups newest-first. Returns an empty array when file logging is not configured.
      operationId: listLogFiles
      responses:
        "200":
          description: Available log files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogFileInfo"
        "500":
          description: Internal server error (e.g. filesystem permission issue)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Logging manager not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Logs]
      summary: Delete rotated log files
      description: Deletes all rotated log files (all except the current actively-written file). Returns the number of files deleted and bytes freed. Does nothing if file logging is not configured.
      operationId: deleteLogFiles
      responses:
        "200":
          description: Rotated files deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted, bytes_freed]
                properties:
                  deleted:
                    type: integer
                    description: Number of files deleted
                  bytes_freed:
                    type: integer
                    format: int64
                    description: Total bytes freed
        "500":
          description: Internal server error (e.g. filesystem permission issue)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Logging manager not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs:
    get:
      tags: [Logs]
      summary: Get recent log entries
      description: Returns log entries from the in-memory ring buffer, or from a specific log file when the file parameter is provided. Supports filtering by level, search text, and component. Returns JSON for API clients or HTML fragments when the HX-Request header is set.
      operationId: getLogs
      parameters:
        - name: file
          in: query
          description: Filename of a log file to read (e.g. stillwater-2024-03-28T10-00-00.000.log). Must be a plain filename with no path separators. When set, reads from disk instead of the ring buffer; the after filter is ignored. Requires file logging to be configured.
          schema:
            type: string
        - name: level
          in: query
          description: Minimum log level to include. Omit to return all levels.
          schema:
            type: string
            enum: [trace, debug, info, warn, error]
        - name: search
          in: query
          description: Case-insensitive substring search on log message
          schema:
            type: string
        - name: component
          in: query
          description: Exact match on the component attribute
          schema:
            type: string
        - name: after
          in: query
          description: Only return entries after this RFC3339Nano timestamp (ring buffer only; ignored when file is set)
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: Maximum number of entries to return (default 100, max 500)
          schema:
            type: integer
            default: 100
            minimum: 0
            maximum: 500
      responses:
        "200":
          description: Log entries (newest first for JSON, oldest first for HTML)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
            text/html:
              schema:
                type: string
                description: HTML fragment of styled log entry divs for HTMX polling
        "400":
          description: Invalid query parameter (bad level, unparsable after, invalid limit, or invalid filename)
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    description: Error message describing the failure.
        "503":
          description: Logging manager or ring buffer not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Logs]
      summary: Clear log buffer
      description: Removes all entries from the in-memory ring buffer. Returns JSON for API clients or an HTML fragment when the HX-Request header is set.
      operationId: clearLogs
      responses:
        "200":
          description: Buffer cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: cleared
                    description: Result status of the log operation.
            text/html:
              schema:
                type: string
                description: HTML fragment confirming the buffer was cleared
        "503":
          description: Logging manager or ring buffer not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/maintenance/status:
    get:
      tags: [Settings]
      summary: Get database maintenance status
      operationId: getMaintenanceStatus
      responses:
        "200":
          description: Maintenance status (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
