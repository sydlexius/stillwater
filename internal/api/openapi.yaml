          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                url:
                  type: string
                api_key:
                  type: string
                enabled:
                  type: boolean
      responses:
        "200":
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"
    delete:
      tags: [Connections]
      summary: Delete connection
      operationId: deleteConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /connections/{id}/test:
    post:
      tags: [Connections]
      summary: Test connection
      operationId: testConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, error]
                    description: Connection test result (ok or error).
                  message:
                    type: string
                    description: Human-readable connection test result detail.
                  drift_warnings:
                    type: array
                    description: Platform settings that may conflict with Stillwater-managed metadata. Present only when drift is detected.
                    items:
                      type: string

  /providers:
    get:
      tags: [Providers]
      summary: List providers and API key status
      operationId: listProviders
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                    description: List of configured providers.

  /providers/{name}/key:
    put:
      tags: [Providers]
      summary: Set provider API key
      operationId: setProviderKey
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                skip_test:
                  type: boolean
              required: [api_key]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                skip_test:
                  type: boolean
              required: [api_key]
      responses:
        "200":
          description: Key saved (returns HTML provider card when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
    delete:
      tags: [Providers]
      summary: Delete provider API key
      operationId: deleteProviderKey
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /providers/{name}/mirror:
    put:
      tags: [Providers]
      summary: Set provider mirror URL
      operationId: setProviderMirror
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                base_url:
                  type: string
                  description: Mirror base URL (must be http or https)
                rate_limit:
                  type: number
                  description: Requests per second (default 10, max 100)
              required: [base_url]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                base_url:
                  type: string
                  description: Mirror base URL (must be http or https)
                rate_limit:
                  type: number
                  description: Requests per second (default 10, max 100)
              required: [base_url]
      responses:
        "200":
          description: Mirror saved (returns HTML provider card when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the mirror update.
                  test:
                    type: string
                    enum: [ok, error]
                    description: Connection test result
                  test_error:
                    type: string
                    description: Error message if test failed
            text/html:
              schema:
                type: string
    delete:
      tags: [Providers]
      summary: Delete provider mirror configuration
      operationId: deleteProviderMirror
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mirror cleared (returns HTML provider card when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /providers/{name}/test:
    post:
      tags: [Providers]
      summary: Test provider connection
      operationId: testProvider
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test result (returns HTML provider card when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, error]
                    description: Provider test result (ok or error).
                  error:
                    type: string
                    description: Error message if the provider test failed.
                  status_persisted:
                    type: boolean
                    description: >
                      Whether the test result status was persisted to storage.
                      Only present (as false) when persistence failed.
            text/html:
              schema:
                type: string

  /providers/priorities:
    get:
      tags: [Providers]
      summary: Get provider priorities
      operationId: getPriorities
      responses:
        "200":
          description: Priority configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  priorities:
                    type: array
                    items:
                      type: object
                    description: Ordered list of provider priority entries.
    put:
      tags: [Providers]
      summary: Set provider priorities
      operationId: setPriorities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                priorities:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      providers:
                        type: array
                        items:
                          type: string
              required: [priorities]
      responses:
        "200":
          description: Priorities saved (returns HTML fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string

  /providers/search:
    post:
      tags: [Providers]
      summary: Search providers for artist
      operationId: providerSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required: [name]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                    description: Search results from providers.

  /providers/fetch:
    post:
      tags: [Providers]
      summary: Fetch metadata from providers
      operationId: providerFetch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mbid:
                  type: string
                name:
                  type: string
      responses:
        "200":
          description: Fetched metadata
          content:
            application/json:
              schema:
                type: object

  /rules:
    get:
      tags: [Rules]
      summary: List rules
      description: >
        Returns all rules with their filesystem_dependent flag set. Also
        includes has_local_library indicating whether at least one library
        with a filesystem path exists. Filesystem-dependent rules cannot
        be enabled when has_local_library is false.
      operationId: listRules
      responses:
        "200":
          description: List of rules with local library status
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                    description: List of configured rules.
                  has_local_library:
                    type: boolean
                    description: True when at least one library with a filesystem path exists

  /rules/{id}:
    put:
      tags: [Rules]
      summary: Update rule
      operationId: updateRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                automation_mode:
                  type: string
                  enum: [auto, manual]
                  description: Automation mode for this rule. Use the enabled flag to disable a rule; "disabled" is not a valid automation_mode value.
                config:
                  type: object
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request (e.g., unsupported automation_mode value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict when enabling a filesystem-dependent rule without any local library path configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/{id}/run:
    post:
      tags: [Rules]
      summary: Start async evaluation of a single rule
      description: >
        Launches rule evaluation in a background goroutine and returns immediately.
        Shares the status slot with run-all; poll GET /rules/run-all/status for progress.
        Defaults to incremental scope (only artists flagged dirty since their last
        evaluation are processed). Pass scope=all to force evaluation against every
        eligible artist.
      operationId: runRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [incremental, all]
            default: incremental
          description: >
            Which artists to evaluate. Defaults to "incremental" (only artists
            flagged dirty since their last evaluation). "all" is the admin
            "Re-evaluate All" path that forces a full sweep.
      responses:
        "202":
          description: Rule evaluation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleRunStatus"
        "400":
          description: Invalid scope query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A rule evaluation is already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/run-all:
    post:
      tags: [Rules]
      summary: Run all enabled rules (async)
      description: >
        Starts an asynchronous run of all enabled rules.
        Returns 202 immediately; poll GET /rules/run-all/status for completion status.
        Defaults to incremental scope (only artists flagged dirty since their last
        evaluation are processed). Pass scope=all for the "Re-evaluate All" admin
        sweep that re-evaluates every eligible artist.
      operationId: runAllRules
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [incremental, all]
            default: incremental
          description: >
            Which artists to evaluate. Defaults to "incremental" (only artists
            flagged dirty since their last evaluation). "all" forces a full sweep.
      responses:
        "202":
          description: Run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleRunStatus"
        "400":
          description: Invalid scope query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A run is already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message explaining why the run could not start.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Rule pipeline not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /rules/run-all/status:
    get:
      tags: [Rules]
      summary: Get async rule-run status
      description: >
        Returns the current status of the most recent rule evaluation,
        whether triggered by run-all or a single-rule run. Both share
        the same status slot; only one can run at a time.
      operationId: getRunAllRulesStatus
      responses:
        "200":
          description: Current run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleRunStatus"

  /rules/status:
    get:
      tags: [Rules]
      summary: Get rule scheduler status
      description: Returns the current state of the rule evaluation scheduler.
      operationId: getRulesStatus
      responses:
        "200":
          description: Scheduler status
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_evaluation_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: When the last rule evaluation completed (UTC, RFC 3339).
                  interval_minutes:
                    type: integer
                    description: Minutes between scheduled rule evaluations.
                  next_evaluation_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: When the next scheduled evaluation will run (UTC, RFC 3339).
                  scheduler_enabled:
                    type: boolean
                    description: Whether the automatic rule scheduler is enabled.

  /rules/classical-mode:
    get:
      tags: [Rules]
      summary: Get classical music handling mode
      operationId: getClassicalMode
      responses:
        "200":
          description: Current mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    enum: [skip, composer, performer]
                    description: Classical mode setting (skip, composer, or performer).
    put:
      tags: [Rules]
      summary: Set classical music handling mode
      operationId: setClassicalMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [skip, composer, performer]
              required: [mode]
      responses:
        "200":
          description: Mode updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    description: Classical mode setting (skip, composer, or performer).

  /bulk/fetch-metadata:
    post:
      tags: [Bulk Operations]
      summary: Start bulk metadata fetch
      operationId: bulkFetchMetadata
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [prompt_no_match, yolo, auto_exact, auto_similar]
                  default: prompt_no_match
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object
        "409":
          description: Another job is already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bulk/fetch-images:
    post:
      tags: [Bulk Operations]
      summary: Start bulk image fetch
      operationId: bulkFetchImages
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  default: prompt_no_match
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object

  /bulk/jobs:
    get:
      tags: [Bulk Operations]
      summary: List recent bulk jobs
      operationId: listBulkJobs
      responses:
        "200":
          description: Recent jobs (last 20)
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      type: object
                    description: List of bulk operation jobs.
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bulk/jobs/{id}:
    get:
      tags: [Bulk Operations]
      summary: Get bulk job details
      operationId: getBulkJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job with items
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    type: object
                    description: Bulk job details.
                  items:
                    type: array
                    items:
                      type: object
                    description: Individual items within the bulk job.
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bulk/jobs/{id}/cancel:
    post:
      tags: [Bulk Operations]
      summary: Cancel running bulk job
      operationId: cancelBulkJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job canceling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /artists/bulk-actions:
    post:
      tags: [Bulk Operations]
      summary: Start a bulk action over an explicit artist ID list
      operationId: startBulkAction
      description: >
        Runs the requested action for each artist in the supplied ID list.
        Only one bulk action may run at a time; concurrent starts are rejected
        with 409 Conflict. The accepted actions are run_rules,
        re_identify_auto (legacy alias: re_identify), scan, and
        fetch_images. The review flow is started separately via
        POST /artists/re-identify/wizard. Progress is reported via
        GET /artists/bulk-actions/status and a bulk.completed SSE event is
        published when the run finishes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, ids]
              properties:
                action:
                  type: string
                  enum: [run_rules, re_identify, re_identify_auto, scan, fetch_images]
                  description: >
                    Action to apply to each artist in the list. The legacy
                    value re_identify is an alias for re_identify_auto; the
                    wizard variant (re_identify_review) is dispatched
                    separately via POST /artists/re-identify/wizard.
                ids:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: string
                    pattern: "^[A-Za-z0-9_-]{1,64}$"
                  description: Artist IDs to process (max 1000 per request).
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                type: object
                required: [status, action, total]
                properties:
                  status:
                    type: string
                    enum: [running]
                  action:
                    type: string
                    enum: [run_rules, re_identify_auto, scan, fetch_images]
                    description: >
                      Canonical action value as emitted by the handler.
                      The legacy alias re_identify is normalized to
                      re_identify_auto on entry, so this response will
                      never carry the legacy value.
                  total:
                    type: integer
        "400":
          description: Invalid request body or IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Another bulk action is already running
          content:
            application/json:
              schema:
                type: object
                required: [status, message]
                properties:
                  status:
                    type: string
                    enum: [running]
                  message:
                    type: string
        "503":
          description: Required service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/bulk-actions/status:
    get:
      tags: [Bulk Operations]
      summary: Get the current bulk-action progress
      operationId: getBulkActionStatus
      responses:
        "200":
          description: Returns live progress while a bulk action is running, or the most recent terminal snapshot (completed, failed, or canceled) once it has finished. Returns status=idle only when no snapshot exists yet (process has never run a bulk action since startup).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, running, completed, failed, canceled]
                  action:
                    type: string
                    enum: [run_rules, re_identify_auto, scan, fetch_images]
                    description: >
                      Canonical emitted action value. The legacy alias
                      re_identify is normalized on entry by
                      handleBulkAction, so the snapshot never carries it.
                  total:
                    type: integer
                  processed:
                    type: integer
                  succeeded:
                    type: integer
                  skipped:
                    type: integer
                  failed:
                    type: integer
                  current_name:
                    type: string

  /artists/bulk-actions/cancel:
    post:
      tags: [Bulk Operations]
      summary: Cancel the in-flight bulk action
      operationId: cancelBulkAction
      description: >
        Signals the running bulk action goroutine to stop at its next iteration.
        The action's progress snapshot is finalized with status=canceled so
        clients can distinguish canceled runs from normal completion.
      responses:
        "200":
          description: Cancellation requested
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [canceling]
        "409":
          description: No bulk action is currently running
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string

  /artists/bulk-identify:
    post:
      tags: [Bulk Operations]
      summary: Start bulk artist identification
      operationId: startBulkIdentify
      description: >
        Processes unidentified artists (missing MusicBrainz ID) through a 3-tier
        pipeline: connection-based matching, album comparison, and name-only search.
        Returns 409 if a job is already running.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                library_id:
                  type: string
                  description: Optional library ID to scope the identification to a single library.
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                    description: Current state of the identification process.
                  total:
                    type: integer
                    description: Number of unidentified artists to process.
        "200":
          description: No unidentified artists found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [completed]
                    description: Current state of the identification process.
                  message:
                    type: string
                    description: Human-readable result detail.
                  total:
                    type: integer
                    description: Total number of artists to identify.
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Job already running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [running]
                    description: Status indicating a conflict.
                  message:
                    type: string
                    description: Human-readable result detail.
        "500":
          description: Failed to list artists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Artist service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Bulk Operations]
      summary: Get bulk identification progress
      operationId: getBulkIdentifyProgress
      responses:
        "200":
          description: Current progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentifyProgress"
    delete:
      tags: [Bulk Operations]
      summary: Cancel bulk identification
      operationId: cancelBulkIdentify
      responses:
        "200":
          description: Cancellation status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [idle, canceling, completed, canceled]
                    description: >
                      Current job status. "canceling" when a running job has been
                      asked to stop; "completed" or "canceled" if the job already
                      finished; "idle" if no job exists.
                  message:
                    type: string
                    description: Human-readable result detail.
                required:
                  - status
                  - message

  /artists/bulk-identify/link:
    post:
      tags: [Bulk Operations]
      summary: Link artist to MusicBrainz ID and refresh
      operationId: bulkIdentifyLink
      description: >
        Links an artist to a MusicBrainz ID and attempts a full metadata refresh.
        If the artist exists in the bulk-identify review queue, it is removed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artist_id, mbid]
              properties:
                artist_id:
                  type: string
                mbid:
                  type: string
                  description: MusicBrainz artist ID to link.
                discogs_id:
                  type: string
                  description: Optional Discogs artist ID.
      responses:
        "200":
          description: Artist linked and refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [linked]
                    description: Result status of the link operation.
                  artist_id:
                    type: string
                    description: ID of the linked artist.
                  mbid:
                    type: string
                    description: MusicBrainz ID that was linked.
        "400":
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to update artist or refresh metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Artist service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/re-identify/wizard:
    post:
      tags: [Bulk Operations]
      summary: Start an interactive re-identify wizard session
      operationId: startReIdentifyWizard
      description: >
        Creates a new wizard session over the supplied artist IDs and returns
        a session_id the UI uses to walk through per-artist candidate review.
        Candidates are fetched on demand (with the next step pre-fetched in
        the background). Sessions are in-memory and TTL-bounded; they are not
        persisted across restarts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: string
                    pattern: "^[A-Za-z0-9_-]{1,64}$"
      responses:
        "202":
          description: Wizard session created
          content:
            application/json:
              schema:
                type: object
                required: [session_id, total, index]
                properties:
                  session_id: {type: string}
                  total:      {type: integer}
                  index:      {type: integer}
        "400": {description: Invalid request body}
        "503": {description: Artist service not configured}

  /artists/re-identify/wizard/{sid}/step/{idx}/accept:
    post:
      tags: [Bulk Operations]
      summary: Accept a candidate for the current wizard step
      operationId: acceptReIdentifyWizardStep
      parameters:
        - in: path
          name: sid
          required: true
          schema: {type: string}
        - in: path
          name: idx
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mbid]
              properties:
                mbid:       {type: string}
                discogs_id: {type: string}
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [mbid]
              properties:
                mbid:       {type: string}
                discogs_id: {type: string}
      responses:
        "200":
          description: >
            Wizard advanced. The response body is one of two shapes:
            {status: advanced, index: <next>} when there is another
            step, or {status: done, session_id: <sid>} when the
            advance landed on the final step.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [status, index]
                    properties:
                      status: {type: string, enum: [advanced]}
                      index:  {type: integer}
                  - type: object
                    required: [status, session_id]
                    properties:
                      status:     {type: string, enum: [done]}
                      session_id: {type: string}
                discriminator:
                  propertyName: status
        "400": {description: Missing or invalid mbid}
        "404": {description: Wizard session not found or artist missing}

  /artists/re-identify/wizard/{sid}/step/{idx}/skip:
    post:
      tags: [Bulk Operations]
      summary: Skip the current wizard step without changes
      operationId: skipReIdentifyWizardStep
      parameters:
        - in: path
          name: sid
          required: true
          schema: {type: string}
        - in: path
          name: idx
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: >
            Wizard advanced. The response body is one of two shapes:
            {status: advanced, index: <next>} when there is another
            step, or {status: done, session_id: <sid>} when the
            advance landed on the final step.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [status, index]
                    properties:
                      status: {type: string, enum: [advanced]}
                      index:  {type: integer}
                  - type: object
                    required: [status, session_id]
                    properties:
                      status:     {type: string, enum: [done]}
                      session_id: {type: string}
                discriminator:
                  propertyName: status
        "404": {description: Wizard session not found}

  /artists/re-identify/wizard/{sid}/step/{idx}/decline:
    post:
      tags: [Bulk Operations]
      summary: Mark the current wizard step as no-match
      operationId: declineReIdentifyWizardStep
      parameters:
        - in: path
          name: sid
          required: true
          schema: {type: string}
        - in: path
          name: idx
          required: true
          schema: {type: integer}
      responses:
        "200":
          description: >
            Wizard advanced. The response body is one of two shapes:
            {status: advanced, index: <next>} when there is another
            step, or {status: done, session_id: <sid>} when the
            advance landed on the final step.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [status, index]
                    properties:
                      status: {type: string, enum: [advanced]}
                      index:  {type: integer}
                  - type: object
                    required: [status, session_id]
                    properties:
                      status:     {type: string, enum: [done]}
                      session_id: {type: string}
                discriminator:
                  propertyName: status
        "404": {description: Wizard session not found}

  /artists/re-identify/wizard/{sid}/save-exit:
    post:
      tags: [Bulk Operations]
      summary: End the wizard early and leave remaining artists in review
      operationId: saveExitReIdentifyWizard
      parameters:
        - in: path
          name: sid
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Wizard closed; undecided artists moved to the review queue
          content:
            application/json:
              schema:
                type: object
                required: [status, accepted, skipped, declined, leftover]
                properties:
                  status:   {type: string, enum: [saved]}
                  accepted: {type: integer}
                  skipped:  {type: integer}
                  declined: {type: integer}
                  leftover: {type: integer}
        "404":
          description: Wizard session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports/health:
    get:
      tags: [Reports]
      summary: Get library health summary
      operationId: getHealthReport
      responses:
        "200":
          description: Health summary (returns HTML dashboard fragment when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSummary"
            text/html:
              schema:
                type: string

  /reports/health/history:
    get:
      tags: [Reports]
      summary: Get health history for charting
      operationId: getHealthHistory
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Health history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      type: object
                    description: List of historical health snapshots.

  /reports/compliance:
    get:
      tags: [Reports]
      summary: Get compliance report
      operationId: getComplianceReport
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [compliant, non_compliant]
      responses:
        "200":
          description: Paginated compliance report
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      type: object
                    description: Compliance report rows.
                  total:
                    type: integer
                    description: Total number of matching records.
                  page:
                    type: integer
                    description: Current page number (1-based).
                  page_size:
                    type: integer
                    description: Number of records per page.

  /webhooks:
    get:
      tags: [Webhooks]
      summary: List webhooks
      operationId: listWebhooks
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"
    post:
      tags: [Webhooks]
      summary: Create webhook
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                type:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                enabled:
                  type: boolean
              required: [name, url]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                type:
                  type: string
              required: [name, url]
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

  /webhooks/{id}:
    get:
      tags: [Webhooks]
      summary: Get webhook
      operationId: getWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
    put:
      tags: [Webhooks]
      summary: Update webhook
      operationId: updateWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                type:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                enabled:
                  type: boolean
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
    delete:
      tags: [Webhooks]
      summary: Delete webhook
      operationId: deleteWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /webhooks/{id}/test:
    post:
      tags: [Webhooks]
      summary: Send test webhook event
      operationId: testWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test event sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /shared-filesystem/status:
    get:
      operationId: getSharedFilesystemStatus
      tags: [SharedFilesystem]
      summary: Get shared-filesystem overlap status
      description: Returns information about libraries with shared-filesystem overlaps and dismiss state.
      responses:
        "200":
          description: Shared-filesystem status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedFilesystemStatus"
  /shared-filesystem/dismiss:
    post:
      operationId: dismissSharedFilesystem
      tags: [SharedFilesystem]
      summary: Dismiss the shared-filesystem warning permanently
      responses:
        "200":
          description: Warning dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /shared-filesystem/recheck:
    post:
      operationId: recheckSharedFilesystem
      tags: [SharedFilesystem]
      summary: Get current shared-filesystem status count
      description: Returns the current count of libraries whose shared-filesystem status is set by evidence.
      responses:
        "200":
          description: Recheck result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedFilesystemRecheckResult"

  /filesystem/browse:
    get:
      tags: [Filesystem]
      operationId: browseFilesystem
      summary: Browse filesystem directories
      description: >
        Returns the direct subdirectories of the given absolute path.
        Only directories are returned; files are excluded. Hidden directories
        (those whose names start with a dot) are also excluded.
        Requires administrator role.
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Absolute filesystem path to list. Must be an absolute path; traversal segments (e.g. "..") are normalized by the server via filepath.Clean before listing.
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilesystemBrowseResult"
        "400":
          description: Invalid path (not absolute, not a directory, or symlink resolution failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden (administrator role required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to read directory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings:
    get:
      tags: [Settings]
      summary: Get all settings
      operationId: getSettings
      responses:
        "200":
          description: Key-value settings map
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
    put:
      tags: [Settings]
      summary: Update settings
      operationId: updateSettings
      description: >
        Update one or more settings as key-value string pairs.
        Known keys include:
        auto_fetch_images (true/false),
        show_platform_debug (true/false),
        notif_badge_enabled (true/false),
        notif_badge_severity_error (true/false),
        notif_badge_severity_warning (true/false),
        notif_badge_severity_info (true/false),
        rule_schedule.interval_minutes (integer as string; 0 to disable, or >= 5),
        backup_retention_count (positive integer as string),
        backup_max_age_days (integer as string),
        cache.image.max_size_mb (integer as string),
        provider.name_similarity_threshold (0-100 integer as string;
        minimum similarity score for provider name matching,
        set to 0 to disable validation, default 60),
        images.backdrop.target_count (1-10 integer as string;
        target number of backdrop/fanart images per artist, default 1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /preferences:
    get:
      tags: [Preferences]
      summary: Get all user preferences
      operationId: getPreferences
      description: >
        Returns all preference keys for the authenticated user, merged with defaults.
        Preferences are per-user appearance settings (theme, sidebar
        state, typography, etc.).
      responses:
        "200":
          description: >
            All 15 preference keys with the user's values merged over defaults.
            The response always contains exactly these keys.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  theme:
                    type: string
                    enum: [dark, light, system]
                    description: UI color theme (e.g. dark, light).
                  sidebar_state:
                    type: string
                    enum: [full, icon-only, hidden]
                    description: Sidebar visibility mode (full, icon-only, or hidden).
                  content_width:
                    type: string
                    enum: [narrow, wide]
                    description: Content area maximum width preference.
                  font_family:
                    type: string
                    enum: [system, inter, atkinson]
                    description: Preferred font family for the UI.
                  font_size:
                    type: string
                    enum: [small, medium, large]
                    description: Base font size preference.
                  letter_spacing:
                    type: string
                    enum: [normal, wide, extra-wide]
                    description: Letter spacing adjustment preference.
                  thumbnail_size:
                    type: string
                    enum: [small, medium, large]
                    description: Thumbnail display size preference.
                  reduced_motion:
                    type: string
                    enum: [system, on, off]
                    description: Whether reduced-motion animations are preferred.
                  lite_mode:
                    type: string
                    enum: [off, on, auto]
                    description: Whether lite mode is active to reduce UI complexity.
                  language:
                    type: string
                    enum: [en]
                    description: Preferred UI language code.
                  notification_enabled:
                    type: string
                    enum: ["true", "false"]
                    description: Whether browser notifications are enabled.
                  page_size:
                    type: string
                    pattern: "^(?:[1-9][0-9]|[1-4][0-9]{2}|500)$"
                    description: Number of items per page (integer 10-500 as a string).
                    example: "50"
                  metadata_languages:
                    type: string
                    description: >
                      JSON array of BCP 47 language tags in priority order for
                      metadata resolution (e.g. '["en","ja"]').
                    example: '["en"]'
                  auto_fetch_images:
                    type: string
                    enum: ["true", "false"]
                    description: >
                      Whether to automatically search providers when opening
                      the image search panel.
                  bg_opacity:
                    type: string
                    pattern: "^(?:[2-9][0-9]|100)$"
                    description: >
                      Background glass opacity percentage (integer 20-100
                      as a string).
                    example: "65"
                required:
                  - theme
                  - sidebar_state
                  - content_width
                  - font_family
                  - font_size
                  - letter_spacing
                  - thumbnail_size
                  - reduced_motion
                  - lite_mode
                  - language
                  - notification_enabled
                  - page_size
                  - metadata_languages
                  - auto_fetch_images
                  - bg_opacity
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /preferences/{key}:
    get:
      tags: [Preferences]
      summary: Get a single user preference
      operationId: getPreference
      description: >
        Returns the value of a single preference key for the authenticated user.
        For known fixed keys the value is merged with the compiled default when no
        row exists. For suppress_confirm_* keys a missing row returns "false".
      parameters:
        - name: key
          in: path
          required: true
          description: >
            A known preference key (theme, sidebar_state, etc.) or a
            suppress_confirm_* key of the form suppress_confirm_{action} where
            {action} contains only lowercase letters, digits, and underscores.
          schema:
            oneOf:
              - type: string
                enum:
                  - theme
                  - sidebar_state
                  - content_width
                  - font_family
                  - font_size
                  - letter_spacing
                  - thumbnail_size
                  - reduced_motion
                  - lite_mode
                  - language
                  - notification_enabled
                  - page_size
                  - metadata_languages
                  - auto_fetch_images
                  - bg_opacity
              - type: string
                pattern: "^suppress_confirm_[a-z0-9_]+$"
      responses:
        "200":
          description: Preference value
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key:
                    type: string
                    description: The preference key that was requested.
                  value:
                    type: string
                    description: >
                      The current value of the preference. For known fixed
                      keys, returns the stored value or the compiled default
                      when no row exists. For suppress_confirm_* keys, returns
                      "true" or "false".
        "400":
          description: Unknown preference key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Preferences]
      summary: Update a user preference
      operationId: updatePreference
      parameters:
        - name: key
          in: path
          required: true
          description: >
            A known preference key or a suppress_confirm_* key of the form
            suppress_confirm_{action}. suppress_confirm_* keys accept only
            "true" or "false".
          schema:
            oneOf:
              - type: string
                enum:
                  - theme
                  - sidebar_state
                  - content_width
                  - font_family
                  - font_size
                  - letter_spacing
                  - thumbnail_size
                  - reduced_motion
                  - lite_mode
                  - language
                  - notification_enabled
                  - page_size
                  - metadata_languages
                  - auto_fetch_images
                  - bg_opacity
              - type: string
                pattern: "^suppress_confirm_[a-z0-9_]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
      responses:
        "200":
          description: Preference updated
          content:
            application/json:
              schema:
                type: object
                required: [key, value]
                properties:
                  key:
                    type: string
                    description: The preference key that was updated.
                  value:
                    type: string
                    description: The new value after the update.
        "400":
          description: Invalid key or value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /settings/backup:
    post:
      tags: [Backup]
      summary: Create database backup
      operationId: createBackup
      responses:
        "200":
          description: Backup info (returns HTML backup list when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupInfo"
            text/html:
              schema:
                type: string

  /settings/backup/history:
    get:
      tags: [Backup]
      summary: List backup files
      operationId: listBackups
      responses:
        "200":
          description: List of backups (returns HTML backup table when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BackupInfo"
            text/html:
              schema:
                type: string

  /settings/backup/{filename}:
    get:
      tags: [Backup]
      summary: Download backup file
      operationId: downloadBackup
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    delete:
      tags: [Backup]
      summary: Delete a backup file
      operationId: deleteBackup
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup deleted (returns HTML backup list when HX-Request header is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
            text/html:
              schema:
                type: string
        "400":
          description: Invalid filename
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scanner/run:
    post:
      tags: [Scanner]
      summary: Trigger filesystem scan
      operationId: runScanner
      responses:
        "202":
          description: Scan started
          content:
            application/json:
              schema:
                type: object
        "409":
          description: Scan already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scanner/status:
    get:
      tags: [Scanner]
      summary: Get scan status
      operationId: getScannerStatus
      responses:
        "200":
          description: Current or last scan status
          content:
            application/json:
              schema:
                type: object

  # --- API Documentation ---

  /docs:
    get:
      tags: [Docs]
      summary: Interactive API reference
      security: []
      operationId: getAPIDocs
      responses:
        "200":
          description: Scalar API reference HTML page
          content:
            text/html:
              schema:
                type: string

  /docs/openapi.yaml:
    get:
      tags: [Docs]
      summary: OpenAPI specification
      security: []
      operationId: getOpenAPISpec
      responses:
        "200":
          description: OpenAPI spec in YAML format
          content:
            application/yaml:
              schema:
                type: string

  # --- Libraries ---

  /libraries:
    get:
      tags: [Libraries]
      summary: List libraries
      operationId: listLibraries
      responses:
        "200":
          description: All libraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
    post:
      tags: [Libraries]
      summary: Create library
      operationId: createLibrary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                  default: regular
              required: [name]
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                  default: regular
              required: [name]
      responses:
        "201":
          description: Library created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Duplicate library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /libraries/{id}:
    get:
      tags: [Libraries]
      summary: Get library
      operationId: getLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Library with artist count
          content:
            application/json:
              schema:
                type: object
                properties:
                  library:
                    $ref: "#/components/schemas/Library"
                  artist_count:
                    type: integer
                    description: Number of artists in this library.
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Libraries]
      summary: Update library
      operationId: updateLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
                fs_watch:
                  type: integer
                fs_poll_interval:
                  type: integer
                  description: Seconds between polls (60, 300, 900, or 1800)
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                path:
                  type: string
                type:
                  type: string
                  enum: [regular, classical]
      responses:
        "200":
          description: Library updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "404":
          description: Library not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Libraries]
      summary: Delete library
      operationId: deleteLibrary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deleteArtists
          in: query
          description: When true, cascade-delete artists instead of dereferencing them
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Library deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /libraries/{libId}/operation/status:
    get:
      tags: [Libraries]
      summary: Get library operation status
      operationId: getLibraryOpStatus
      parameters:
        - name: libId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current operation status (or idle)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryOpResult"

  # --- Connection extras ---

  /connections/clobber-check:
    get:
      tags: [Connections]
      summary: Check for NFO/image write conflicts
      description: >
        When no library has a filesystem path configured, returns an empty
        risk list immediately since there are no on-disk files to conflict
        with. Otherwise checks all enabled connections for NFO/image writing
        configuration that could overwrite Stillwater-managed files.
      operationId: clobberCheck
      responses:
        "200":
          description: Clobber risk assessment (returns HTML warnings when HX-Request header is set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_risk:
                    type: boolean
                    description: Whether any connections have clobber risk.
                  risks:
                    type: array
                    items:
                      type: object
                      properties:
                        connection_id:
                          type: string
                          description: ID of the connection with clobber risk.
                        connection_name:
                          type: string
                          description: Display name of the connection.
                        connection_type:
                          type: string
                          description: Platform type of the connection.
                        nfo_writer:
                          type: boolean
                          description: Whether an NFO writer is enabled and may clobber files.
                        library_name:
                          type: string
                          description: Name of the platform library at risk.
                        error:
                          type: string
                          description: Error message if the operation failed.
                    description: List of connections with clobber risk.
            text/html:
              schema:
                type: string

  /connections/{id}/features:
    patch:
      tags: [Connections]
      summary: Update connection feature flags
      operationId: updateConnectionFeatures
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                feature_library_import:
                  type: boolean
                feature_nfo_write:
                  type: boolean
                feature_image_write:
                  type: boolean
                feature_metadata_push:
                  type: boolean
                feature_trigger_refresh:
                  type: boolean
      responses:
        "200":
          description: Features updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/platform-settings:
    get:
      tags: [Connections]
      summary: Get platform fetcher/saver settings
      operationId: getPlatformSettings
      description: >
        Returns the current fetcher, saver, and metadata downloader configuration
        for all music libraries on the connected platform. For Emby/Jellyfin this
        is per-library; for Lidarr it is global metadata consumers.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform settings for the connection
          content:
            application/json:
              schema:
                oneOf:
                  - title: EmbyJellyfinPlatformSettings
                    type: object
                    required: [connection_type, libraries]
                    properties:
                      connection_type:
                        type: string
                        enum: [emby, jellyfin]
                        description: Platform type of the connection.
                      libraries:
                        type: array
                        description: Per-library fetcher/saver settings.
                        items:
                          type: object
                          properties:
                            library_id:
                              type: string
                              description: ID of the library.
                            library_name:
                              type: string
                              description: Display name of the library on the platform.
                            image_fetchers:
                              type: array
                              items:
                                type: string
                              description: Image fetcher plugins enabled for this library.
                            metadata_fetchers:
                              type: array
                              items:
                                type: string
                              description: Metadata fetcher plugins enabled for this library.
                            metadata_savers:
                              type: array
                              items:
                                type: string
                              description: Metadata saver plugins enabled for this library.
                            has_conflicts:
                              type: boolean
                              description: Whether conflicting plugin settings were detected.
                            needs_lockdata:
                              type: boolean
                              description: Jellyfin only. Indicates NFO lockdata injection is required.
                            enable_internet_providers:
                              type: boolean
                              description: Jellyfin only. Whether internet providers are enabled for this library.
                      note:
                        type: string
                        description: Platform-specific advisory note.
                  - title: LidarrPlatformSettings
                    type: object
                    required: [connection_type, metadata_consumers]
                    properties:
                      connection_type:
                        type: string
                        enum: [lidarr]
                        description: Platform type of the connection.
                      metadata_consumers:
                        type: array
                        description: Global metadata consumers.
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              description: Unique identifier.
                            consumer_name:
                              type: string
                              description: Display name of the metadata consumer plugin.
                            metadata_type:
                              type: string
                              description: Type of metadata this consumer handles.
                            enabled:
                              type: boolean
                              description: Whether this metadata consumer is enabled.
                      note:
                        type: string
                        description: Platform-specific advisory note.
                discriminator:
                  propertyName: connection_type
                  mapping:
                    emby: "#/components/schemas/EmbyJellyfinPlatformSettings"
                    jellyfin: "#/components/schemas/EmbyJellyfinPlatformSettings"
                    lidarr: "#/components/schemas/LidarrPlatformSettings"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Platform unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/platform-settings/disable:
    post:
      tags: [Connections]
      summary: Disable conflicting platform settings
      operationId: disablePlatformSettings
      description: >
        Disables conflicting fetchers, savers, and metadata downloaders on the
        connected platform. For Emby/Jellyfin this operates per-library (requires
        library_id). For Lidarr this disables a global metadata consumer (requires
        consumer_id).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                library_id:
                  type: string
                  description: Required for Emby/Jellyfin connections.
                consumer_id:
                  type: integer
                  description: Required for Lidarr connections.
      responses:
        "200":
          description: Settings disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Result status of the disable operation.
                  note:
                    type: string
                    description: Platform-specific advisory note (Jellyfin NFO lockdata).
        "400":
          description: Missing required field for connection type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Platform unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/platform-summary:
    get:
      tags: [Connections]
      summary: Get platform settings management summary
      operationId: getPlatformSummary
      description: >
        Returns an aggregate summary of platform fetcher/saver management status
        for a connection. Used for connection card badges.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform settings summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_libraries:
                    type: integer
                    description: Total number of music libraries (Emby/Jellyfin).
                  managed_libraries:
                    type: integer
                    description: Number of libraries with no conflicting settings (Emby/Jellyfin).
                  total_consumers:
                    type: integer
                    description: Total number of metadata consumers (Lidarr).
                  has_conflicts:
                    type: boolean
                    description: Whether any library or consumer has conflicting settings.
                  needs_lockdata:
                    type: boolean
                    description: Jellyfin only. Indicates NFO lockdata injection is required.
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Platform unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries:
    get:
      tags: [Connections]
      summary: Discover libraries on connection
      operationId: discoverLibraries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available libraries (returns HTML checklist when HX-Request header is set)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    external_id:
                      type: string
                      description: Platform-specific library identifier.
                    name:
                      type: string
                      description: Display name of the library on the platform.
                    imported:
                      type: boolean
                      description: Whether this library has been imported into Stillwater.
            text/html:
              schema:
                type: string
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Connection not tested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /connections/{id}/libraries/import:
    post:
      tags: [Connections]
      summary: Import libraries from connection
      description: >
        After creating each library, automatically starts a background
        populate operation to fetch artists from the connection. Poll
        GET /api/v1/libraries/{libId}/operation/status for progress.
      operationId: importLibraries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraries:
                  type: array
                  items:
                    type: object
                    properties:
                      external_id:
                        type: string
                      name:
                        type: string
                    required: [external_id, name]
              required: [libraries]
      responses:
        "201":
          description: Libraries imported
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
        "400":
          description: Invalid request
