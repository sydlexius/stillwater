          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artists/{id}/platform-backdrops:
    get:
      tags: [Images]
      summary: List available backdrops from all connected platforms
      operationId: listPlatformBackdrops
      parameters:
