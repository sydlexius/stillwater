version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - exhaustive
    - gosec
    - govet
    - misspell
    - musttag
    - nilerr
    - noctx
    - nolintlint
    - revive
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    exhaustive:
      default-signifies-exhaustive: true
    gosec:
      excludes:
        - G104  # Unhandled errors (too noisy for http.Error calls)
        - G117  # Struct field matching secret pattern (false positive on API key input fields)
        - G120  # FormValue without MaxBytesReader (authenticated endpoints only; unauthenticated handlers use MaxBytesReader directly)
    revive:
      rules:
        - name: exported
          severity: warning
          arguments:
            - disableStutteringCheck
        - name: unexported-return
          severity: warning
    misspell:
      locale: US
    nolintlint:
      # Every //nolint:foo directive must carry a // reason comment so that
      # future readers can judge whether the suppression is still valid. The
      # cost at the directive site -- writing one sentence -- is the friction
      # we want; it converts "I'll just nolint this" into "let me actually
      # fix it" or at least "let me document why this is safe."
      require-explanation: true
      # require-specific defaults to false; no bare //nolint directives exist
      # in this tree so leaving it off avoids ceremony for a problem we don't
      # have. Revisit if bare directives start appearing.
      # allow-unused defaults to false in golangci-lint v2; an unused
      # //nolint (e.g. one that duplicates an exclusion already in this file)
      # is itself a smell worth deleting.
    musttag:
      functions:
        # API response wrapper. Without this, musttag only checks direct
        # encoding/json call sites and misses every handler response struct
        # that flows through writeJSON -- defeating the linter's purpose for
        # the request/response body drift class M49 was created to deflect.
        - name: github.com/sydlexius/stillwater/internal/api.writeJSON
          tag: json
          arg-pos: 2
    usestdlibvars:
      http-method: true
      http-status-code: true
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
      constant-kind: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - noctx
      - text: "catalogue.*is a misspelling"
        linters:
          - misspell

formatters:
  enable:
    - gofmt
    - goimports
