version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - exhaustive
    - gosec
    - govet
    - misspell
    - nilerr
    - noctx
    - revive
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    exhaustive:
      default-signifies-exhaustive: true
    gosec:
      excludes:
        - G104  # Unhandled errors (too noisy for http.Error calls)
        - G117  # Struct field matching secret pattern (false positive on API key input fields)
        - G120  # FormValue without MaxBytesReader (authenticated endpoints only; unauthenticated handlers use MaxBytesReader directly)
    revive:
      rules:
        - name: exported
          severity: warning
          arguments:
            - disableStutteringCheck
        - name: unexported-return
          severity: warning
    misspell:
      locale: US
    usestdlibvars:
      http-method: true
      http-status-code: true
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
      constant-kind: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - noctx
      - text: "catalogue.*is a misspelling"
        linters:
          - misspell

formatters:
  enable:
    - gofmt
    - goimports
