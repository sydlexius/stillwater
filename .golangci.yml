version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - exhaustive
    - gocognit
    - gosec
    - govet
    - misspell
    - musttag
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - revive
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    exhaustive:
      default-signifies-exhaustive: true
    gocognit:
      # Threshold 30 is the gocognit default and the standard floor for
      # cognitive complexity in Go projects. Raising it would bury
      # findings the linter is meant to surface. Production functions
      # over 30 are individually triaged: each has a function-specific
      # //nolint:gocognit reason explaining why the complexity is
      # essential at that site, or a reason ending with "refactor
      # tracked under parent #1540 (sub-issue TBD)" when the function
      # warrants a follow-up refactor. The two-axis triage (cog x path
      # criticality) is documented in #1468; sub-issues for the
      # refactor-worthy sites are filed under parent #1540 in M55.5.
      # nolintlint enforces that every suppression carries a reason.
      min-complexity: 30
    gosec:
      excludes:
        - G104  # Unhandled errors (too noisy for http.Error calls)
        - G117  # Struct field matching secret pattern (false positive on API key input fields)
        - G120  # FormValue without MaxBytesReader (authenticated endpoints only; unauthenticated handlers use MaxBytesReader directly)
    revive:
      rules:
        - name: exported
          severity: warning
          arguments:
            - disableStutteringCheck
        - name: unexported-return
          severity: warning
    misspell:
      locale: US
    nolintlint:
      # Every //nolint:foo directive must carry a // reason comment so that
      # future readers can judge whether the suppression is still valid. The
      # cost at the directive site -- writing one sentence -- is the friction
      # we want; it converts "I'll just nolint this" into "let me actually
      # fix it" or at least "let me document why this is safe."
      require-explanation: true
      # require-specific defaults to false; no bare //nolint directives exist
      # in this tree so leaving it off avoids ceremony for a problem we don't
      # have. Revisit if bare directives start appearing.
      # allow-unused defaults to false in golangci-lint v2; an unused
      # //nolint (e.g. one that duplicates an exclusion already in this file)
      # is itself a smell worth deleting.
    musttag:
      functions:
        # API response wrapper. Without this, musttag only checks direct
        # encoding/json call sites and misses every handler response struct
        # that flows through writeJSON -- defeating the linter's purpose for
        # the request/response body drift class M49 was created to deflect.
        - name: github.com/sydlexius/stillwater/internal/api.writeJSON
          tag: json
          arg-pos: 2
    usestdlibvars:
      http-method: true
      http-status-code: true
      time-weekday: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      sql-isolation-level: true
      tls-signature-scheme: true
      constant-kind: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - noctx
          - contextcheck
          # gocognit on tests would force rewriting table-driven cases,
          # fixture builders, and integration scenarios into helper-heavy
          # forms that obscure what the test is actually exercising. The
          # same "ceremony without value" rationale that exempts gosec
          # and errcheck from test files applies here. A substantial
          # share of threshold-30 violations live in _test.go /
          # _fuzz_test.go; excluding them categorically keeps the
          # production sweep the signal-bearing part of the lint surface.
          - gocognit
          # prealloc in tests is noise: fixture builders and table setups
          # are written for readability, not allocator throughput, and the
          # capacities are usually tiny constants. Production-side
          # preallocation is where the perf win lives.
          - prealloc
      # cmd/gen-* are build-time documentation generators that run once
      # per `make generate`. Allocation efficiency is not the point; the
      # code is optimized for readability of the generator itself, and
      # adding capacity hints to small build-step slices buys nothing.
      - path: cmd/gen-.*/
        linters:
          - prealloc
      - text: "catalogue.*is a misspelling"
        linters:
          - misspell
      # contextcheck descends through the templ.Component interface boundary
      # and reports synthetic cascade findings at every handler that calls a
      # templ component. templ's runtime propagates ctx correctly via
      # Render(ctx, w) but the static analyzer cannot see that across the
      # interface, so the "should pass the context parameter" class fires on
      # the hand-written call site. Suppressing only that error text leaves
      # the "Non-inherited new context" class active in the same files --
      # though note that class requires the enclosing function to have a
      # `ctx context.Context` parameter to compare against, which most
      # http.Handler methods (`(w, *http.Request)`) lack. Reviewer eyes still
      # catch handler-method goroutines that should use
      # `context.WithoutCancel(req.Context())` instead of bare Background.
      - text: "should pass the context parameter"
        path: 'internal/api/handlers.*\.go'
        linters:
          - contextcheck

formatters:
  enable:
    - gofmt
    - goimports
