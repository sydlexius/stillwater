version: 2

before:
  hooks:
    - go tool templ generate
    - >-
      sh -c 'curl -sL
      https://github.com/tailwindlabs/tailwindcss/releases/download/v4.2.0/tailwindcss-linux-x64
      -o /tmp/tailwindcss && chmod +x /tmp/tailwindcss &&
      /tmp/tailwindcss -i web/static/css/input.css -o web/static/css/styles.css --minify'

builds:
  - id: stillwater
    main: ./cmd/stillwater
    binary: stillwater
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sydlexius/stillwater/internal/version.Version={{ .Version }}
      - -X github.com/sydlexius/stillwater/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/sydlexius/stillwater/internal/version.Date={{ .Date }}
      - -X github.com/sydlexius/stillwater/internal/version.BuildType=release

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers_v2:
  - id: stillwater
    images:
      - "ghcr.io/sydlexius/stillwater"
    # dockers_v2 ignores empty tag templates, so prerelease gating is encoded
    # by emitting "" for the disallowed branch:
    #   :VERSION       always
    #   :MAJOR.MINOR   non-prerelease only
    #   :latest        non-prerelease only
    #   :beta          prerelease only
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}{{ .Major }}.{{ .Minor }}{{ end }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
      - "{{ if .Prerelease }}beta{{ end }}"
    # Standard OCI labels surfaced by GHCR, Docker Hub, Grype, Scorecard,
    # and most registry / scanner UIs without further configuration.
    # .BaseImage / .BaseImageDigest are parsed from the FROM line of the
    # dockerfile below at release time (goreleaser v2.16+), so the base
    # layer's digest pin in Dockerfile.goreleaser is the single source of
    # truth -- no drift risk from duplicating the digest here.
    labels:
      org.opencontainers.image.base.name: "{{ .BaseImage }}"
      org.opencontainers.image.base.digest: "{{ .BaseImageDigest }}"
      org.opencontainers.image.source: "https://github.com/sydlexius/stillwater"
      org.opencontainers.image.licenses: "GPL-3.0"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
    dockerfile: build/docker/Dockerfile.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - build/docker/entrypoint.sh

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --new-bundle-format
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    args:
      - sign
      - --yes
      # Sign by immutable digest, not the mutable tag reference. dockers_v2
      # produces multiple logical tags (:VERSION, :MAJOR.MINOR, :latest,
      # :beta) all pointing at the same image; signing ${artifact} alone
      # races against concurrent tag updates, while ${artifact}@${digest}
      # pins the signature to the specific image content.
      - ${artifact}@${digest}

changelog:
  # The signed annotated tag's body is the source of truth for release
  # notes (see release.header below, where {{ .TagBody }} is injected).
  # Auto-generated commit-title dumps were overwriting hand-crafted
  # release prose; v1.0.5 had to be patched with `gh release edit
  # --notes-file` after the fact. Tag with:
  #   git tag -s vX.Y.Z -F path/to/notes.md
  # If the tag annotation is empty, the release body will simply omit
  # the changelog section -- preferable to silently restoring the
  # commit dump, which is the bug we're fixing.
  disable: true
  sort: asc
  use: github
  groups:
    - title: Breaking Changes
      regexp: '(?i)^(?:.*!:|BREAKING(?: CHANGE)?:)'
      order: 0
    - title: Features
      regexp: '^feat(\(.+\))?:'
      order: 1
    - title: Bug Fixes
      regexp: '^fix(\(.+\))?:'
      order: 2
    - title: Performance
      regexp: '^perf(\(.+\))?:'
      order: 3
    - title: Refactoring
      regexp: '^refactor(\(.+\))?:'
      order: 4
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^ci:'
      - '^style:'
      - '^test:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sydlexius
    name: stillwater
  prerelease: auto
  make_latest: false
  # The body of a signed annotated tag (everything below the subject
  # line of `git tag -s -F notes.md`) is injected here via {{ .TagBody }}.
  # Footer below appends Docker pull + full-changelog link regardless,
  # so even a minimal tag annotation produces a useful release page.
  header: |
    {{ if .Prerelease }}> This is a pre-release version. Use the `beta` Docker tag to try it out.{{ end }}

    {{ .TagBody }}
  footer: |
    **Docker:** `docker pull ghcr.io/sydlexius/stillwater:{{ .Version }}`

    {{- if .PreviousTag }}
    **Full Changelog:** [{{ .PreviousTag }}...{{ .Tag }}](https://github.com/sydlexius/stillwater/compare/{{ .PreviousTag }}...{{ .Tag }})
    {{- else }}
    **Full Changelog:** [{{ .Tag }}](https://github.com/sydlexius/stillwater/releases/tag/{{ .Tag }})
    {{- end }}
