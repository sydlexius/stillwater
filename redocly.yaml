extends:
  - recommended

# Temporary rule downgrades for legacy spec issues tracked in #1263.
# Once that issue is resolved, remove the downgrades below (or delete this
# file if no warnings remain to suppress).
rules:
  # Existing nullable: true usages need migration to OpenAPI 3.1
  # type: [<type>, "null"] form. Tracked in #1263.
  struct: warn
  # discriminator.mapping references on EmbyJellyfin / Lidarr platform
  # settings cannot be resolved through the current discriminator parent
  # schema structure. Tracked in #1263.
  no-unresolved-refs: warn
