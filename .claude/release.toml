# Release configuration for /push-release skill

[versioning]
# Dev fallback version file -- bumped to match the tag so `go run` shows the
# correct version even without ldflags.
file = "internal/version/version.go"
pattern = 'Version = "{version}"'
post_bump = []

[build]
working_dir = "."
pre_checks = [
    # Wait for ALL workflow runs on the current main tip to pass before tagging.
    # Uses --commit <SHA> so every parallel workflow (CI, Security, etc.) is
    # checked, not just whichever run happens to be most recent on the branch.
    "sha=$(gh api repos/sydlexius/stillwater/git/ref/heads/main --jq .object.sha) && echo \"Checking all CI runs for main (${sha:0:7})...\" && gh run list --commit \"$sha\" --json databaseId --jq '.[].databaseId' | xargs -r -I{} gh run watch {} --exit-status && echo \"All runs passed\"",
    # Run local deterministic checks
    "bash scripts/pre-push-gate.sh",
]

[release_notes]
# Map GitHub PR labels to release note sections.  PRs are grouped by the first
# matching label; unmatched PRs fall into default_group.
default_group = "Other Changes"

[release_notes.group_labels]
enhancement = "New Features"
bug         = "Bug Fixes"
ux          = "UX Improvements"
database    = "Database"
documentation = "Documentation"
technical-debt = "Technical Debt"
testing     = "Testing"
automation  = "Automation"
providers   = "Provider Updates"
scanner     = "Scanner"
rules       = "Rules Engine"
images      = "Image Management"
webhooks    = "Webhooks"
emby        = "Emby"
jellyfin    = "Jellyfin"
reports     = "Reports"

[release]
tag_prefix = "v"
