site_name: Stillwater
site_description: Self-hosted artist and composer metadata management for Emby, Jellyfin, and Kodi
site_url: https://sydlexius.github.io/stillwater/
repo_url: https://github.com/sydlexius/stillwater
repo_name: sydlexius/stillwater
# edit_uri points at docs/site/src/ for most pages.
# The Contributing section pages are thin stubs that include canonical files
# via pymdownx.snippets. MkDocs does not support per-page edit_uri overrides,
# so "Edit this page" on Contributing pages points at the stub, not the
# canonical file. Canonical file locations for reference:
#   contributing/index.md       -> CONTRIBUTING.md (repo root)
#   contributing/dev-setup.md   -> docs/dev-setup.md
#   contributing/architecture-decisions.md -> docs/architecture-decisions.md
#   contributing/pr-workflow.md -> docs/pr-workflow.md
#   contributing/worktrees.md   -> docs/worktrees.md
#   contributing/milestone-protocol.md -> docs/milestone-protocol.md
edit_uri: edit/main/docs/site/src/

docs_dir: src
site_dir: site

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - redirects:
      redirect_maps: {}

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sydlexius/stillwater

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Install (Docker Compose): getting-started/install-docker-compose.md
      - Install (binary): getting-started/install-binary.md
      - Install (Unraid): getting-started/install-unraid.md
      - First-run setup: getting-started/first-run-oobe.md
      - Connect Emby: getting-started/connect-emby.md
      - Connect Jellyfin: getting-started/connect-jellyfin.md
  - Core concepts:
      - core-concepts/index.md
      - Artists and libraries: core-concepts/artists-and-libraries.md
      - Auto-provisioning: core-concepts/auto-provisioning.md
      - Conflict gate: core-concepts/conflict-gate.md
      - Field locks: core-concepts/field-locks.md
      - Images: core-concepts/images.md
      - NFO files: core-concepts/nfo-files.md
      - Platform profiles: core-concepts/platform-profiles.md
      - Providers: core-concepts/providers.md
      - Rules: core-concepts/rules.md
  - How-to:
      - how-to/index.md
      - Run scans: how-to/run-scans.md
      - Edit an artist: how-to/edit-artist.md
      - Filter the artists list: how-to/filter-artists.md
      - Find a setting: how-to/find-a-setting.md
      - Refresh metadata: how-to/refresh-metadata.md
      - Fetch and crop images: how-to/fetch-and-crop-images.md
      - Fetch discography: how-to/fetch-discography.md
      - Configure provider priorities: how-to/configure-provider-priorities.md
      - Enable and configure rules: how-to/enable-and-configure-rules.md
      - Export and import settings: how-to/export-import-settings.md
      - Update Stillwater: how-to/self-update.md
      - Reverse proxy: how-to/reverse-proxy.md
      - Direct TLS setup: how-to/direct-tls-setup.md
      - HTTP-to-HTTPS redirect: how-to/http-redirect.md
      - ACME (Let's Encrypt / Buypass): how-to/acme-letsencrypt.md
      - Inbound webhooks: how-to/inbound-webhooks.md
  - Reference:
      - reference/index.md
      - Settings, by tab: reference/settings-by-tab.md
      - Rules catalogue: reference/rules-catalogue.md
      - Providers: reference/providers.md
      - Environment variables: reference/environment-variables.md
  - Troubleshooting:
