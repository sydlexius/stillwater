site_name: Stillwater
site_description: Self-hosted artist and composer metadata management for Emby, Jellyfin, and Kodi
site_url: https://sydlexius.github.io/stillwater/
repo_url: https://github.com/sydlexius/stillwater
repo_name: sydlexius/stillwater
# edit_uri points at docs/site/src/ for most pages.
# The Contributing section pages are thin stubs that include canonical files
# via pymdownx.snippets. MkDocs does not support per-page edit_uri overrides,
# so "Edit this page" on Contributing pages points at the stub, not the
# canonical file. Canonical file locations for reference:
#   contributing/index.md       -> CONTRIBUTING.md (repo root)
#   contributing/dev-setup.md   -> docs/dev-setup.md
#   contributing/architecture-decisions.md -> docs/architecture-decisions.md
#   contributing/pr-workflow.md -> docs/pr-workflow.md
#   contributing/worktrees.md   -> docs/worktrees.md
#   contributing/milestone-protocol.md -> docs/milestone-protocol.md
edit_uri: edit/main/docs/site/src/

docs_dir: src
site_dir: site

theme:
  name: material
  custom_dir: overrides
  palette:
    # primary/accent: custom -> colors defined in stylesheets/extra.css to
    # match the M55 blue palette (blue-600 / blue-500).
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    # navigation.instant is intentionally NOT enabled: the /api/ page is a
    # standalone Scalar document (see the API Reference nav entry below and
    # docs/site/build-api-reference.sh) with none of Material's DOM structure,
    # so instant loading silently fails to mount it (#1760). Do not re-add.
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - redirects:
      redirect_maps: {}

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sydlexius/stillwater

extra_css:
  - stylesheets/extra.css

nav:
