      - The Dashboard: how-to/dashboard.md
      - Run scans: how-to/run-scans.md
      - Merge duplicate artists: how-to/merge-duplicate-artists.md
      - View reports: how-to/view-reports.md
      - Unmatched images: how-to/foreign-files.md
      - Activity feed: how-to/activity-feed.md
      - Logs viewer: how-to/logs-viewer.md
      - Edit an artist: how-to/edit-artist.md
      - Filter the artists list: how-to/filter-artists.md
      - Find a setting: how-to/find-a-setting.md
      - Customize preferences: how-to/customize-preferences.md
      - Quick Actions: how-to/quick-actions.md
      - Refresh metadata: how-to/refresh-metadata.md
      - Fetch and crop images: how-to/fetch-and-crop-images.md
      - Fetch discography: how-to/fetch-discography.md
      - Configure provider priorities: how-to/configure-provider-priorities.md
      - Enable and configure rules: how-to/enable-and-configure-rules.md
      - Export and import settings: how-to/export-import-settings.md
      - Convert YAML config to TOML: how-to/convert-yaml-to-toml.md
      - Update Stillwater: how-to/self-update.md
      - Reverse proxy: how-to/reverse-proxy.md
      - Direct TLS setup: how-to/direct-tls-setup.md
      - HTTP-to-HTTPS redirect: how-to/http-redirect.md
      - ACME (Let's Encrypt / Buypass): how-to/acme-letsencrypt.md
      - Inbound webhooks: how-to/inbound-webhooks.md
  - Reference:
      - reference/index.md
      - Settings, by tab: reference/settings-by-tab.md
      - Rules catalogue: reference/rules-catalogue.md
      - Providers: reference/providers.md
      - Environment variables: reference/environment-variables.md
      - UI label glossary: reference/ui-labels.md
  - Troubleshooting:
      - troubleshooting/index.md
      - Platform authentication: troubleshooting/platform-auth.md
  - Contributing:
      - Overview: contributing/index.md
      - Dev setup: contributing/dev-setup.md
      - Architecture decisions: contributing/architecture-decisions.md
      - Architecture:
          - Overview: contributing/architecture/index.md
          - Rule engine: contributing/architecture/rule-engine.md
          - Scanner pipeline: contributing/architecture/scanner-pipeline.md
          - Conflict gate: contributing/architecture/conflict-gate.md
          - Providers and coalesce: contributing/architecture/providers-and-coalesce.md
          - Settings import/export: contributing/architecture/settings-import-export.md
          - Event bus and workers: contributing/architecture/event-bus-and-workers.md
          - SSE event catalog: contributing/architecture/sse-events.md
      - PR workflow: contributing/pr-workflow.md
      - Worktrees: contributing/worktrees.md
      - Milestone protocol: contributing/milestone-protocol.md
      - CI Reference: contributing/ci-reference.md
  - Legal:
      - legal/index.md
      - Privacy Policy: legal/privacy-policy.md
      - Code Signing Policy: legal/code-signing-policy.md
  # /api/ is overwritten at deploy time with the standalone Scalar reference
  # (see docs/site/build-api-reference.sh), a document with none of Material's
  # DOM structure. With navigation.instant disabled (see theme.features above),
  # clicking this entry does a normal full-page load and Scalar mounts cleanly.
  # Re-enabling instant loading would intercept the click and break it (#1760).
  - API Reference: api/index.md
